services:
  caipe-ui:
    environment:
      NEXTAUTH_URL: https://caipe-rbac.outshift.io
      OIDC_ISSUER: https://caipe-rbac.outshift.io/realms/caipe

  dynamic-agents:
    environment:
      OIDC_ISSUER: https://caipe-rbac.outshift.io/realms/caipe

  rag-server:
    environment:
      OIDC_ISSUER: https://caipe-rbac.outshift.io/realms/caipe
      OIDC_ISSUER_URL: https://caipe-rbac.outshift.io/realms/caipe

  keycloak:
    environment:
      KC_HOSTNAME: https://caipe-rbac.outshift.io
      KC_PROXY_HEADERS: xforwarded

  agentgateway:
    volumes:
      - ./deploy/agentgateway/config.caipe-rbac.yaml:/etc/agentgateway/config.yaml:ro

  caipe-rbac-proxy:
    image: nginx:1.27-alpine
    container_name: caipe-rbac-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caipe-rbac-nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/ubuntu/certs:/etc/nginx/certs:ro
    restart: unless-stopped
