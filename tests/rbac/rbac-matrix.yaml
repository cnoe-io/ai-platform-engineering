# tests/rbac/rbac-matrix.yaml
#
# Single source of truth for "who can do what" across CAIPE.
#
# Schema: docs/docs/specs/102-comprehensive-rbac-tests-and-completion/contracts/rbac-matrix.schema.json
# Validator: scripts/validate-rbac-matrix.py (T009)
# Linter rule: every requireRbacPermission / require_rbac_permission call site
#              MUST be represented here (FR-010, SC-006).
#
# Personas are defined in spec.md §Personas and seeded by deploy/keycloak/init-idp.sh (T019).
#
# This file STARTS empty. Each user-story phase (T040, T060, T076, T085, T093,
# T103, T119) adds its routes. The matrix linter (T009) hard-fails the build
# if a route is missing here, so phase-by-phase additions are mandatory.
---
version: 1
routes:
