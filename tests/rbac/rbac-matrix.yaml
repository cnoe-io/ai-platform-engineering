# tests/rbac/rbac-matrix.yaml
#
# Single source of truth for "who can do what" across CAIPE.
#
# Schema: docs/docs/specs/102-comprehensive-rbac-tests-and-completion/contracts/rbac-matrix.schema.json
# Validator: scripts/validate-rbac-matrix.py (T009)
# Linter rule: every requireRbacPermission / require_rbac_permission call site
#              MUST be represented here (FR-010, SC-006).
#
# Personas are defined in spec.md §Personas and seeded by deploy/keycloak/init-idp.sh (T019).
#
# This file STARTS empty. Each user-story phase (T040, T060, T076, T085, T093,
# T103, T119) adds its routes. The matrix linter (T009) hard-fails the build
# if a route is missing here, so phase-by-phase additions are mandatory.
---
version: 1
routes:
  # T038 smoke entry — proves the matrix-driver loads, parses, dispatches, and
  # asserts. Phases 3–9 will add the rest. Do NOT delete this entry without
  # first updating the matrix-driver's empty-matrix branch.
  - id: ui-bff-admin-teams-list
    surface: ui_bff
    method: GET
    path: /api/admin/teams
    resource: admin_ui
    scope: view
    notes: >-
      Smoke route added in T038. Already migrated to requireRbacPermission
      (see ui/src/app/api/admin/teams/route.ts). admin_ui#view is granted to
      the `admin` realm role via admin-ui-full-access policy, denied otherwise.
    expectations:
      alice_admin:
        status: 200
      bob_chat_user:
        status: 403
        reason: DENY_NO_CAPABILITY
      carol_kb_ingestor:
        status: 403
        reason: DENY_NO_CAPABILITY
      dave_no_role:
        status: 403
        reason: DENY_NO_CAPABILITY
      eve_dynamic_agent_user:
        status: 403
        reason: DENY_NO_CAPABILITY
      frank_service_account:
        status: 403
        reason: DENY_NO_CAPABILITY

