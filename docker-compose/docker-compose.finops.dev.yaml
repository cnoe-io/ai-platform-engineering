# ============================================================================
# Grid FinOps local development compose
# ============================================================================
#
# Starts the LiteLLM and Cloudability MCP servers used by the Grid FinOps
# dynamic agent seed in config/app-config.finops.yaml.
#
# Usage:
#   CAIPE_APP_CONFIG_FILE=./config/app-config.finops.yaml \
#     docker compose -f docker-compose.dev.yaml \
#     -f docker-compose/docker-compose.finops.dev.yaml \
#     --profile caipe-ui up --build
#
# Add --profile litellm-alerts to run the automatic LiteLLM Webex alert scanner.
#
# MCP endpoints from containers:
#   http://mcp-litellm:8000/mcp
#   http://mcp-cloudability:8000/mcp
#
# MCP endpoints from the host:
#   http://localhost:18080/mcp
#   http://localhost:18085/mcp
# ============================================================================

services:
  caipe-ui:
    environment:
      # Local FinOps testing runs without the RBAC stack. Enable the explicit
      # no-SSO dev principal so chat APIs can create conversations.
      - ALLOW_DEV_ADMIN_WHEN_SSO_DISABLED=${ALLOW_DEV_ADMIN_WHEN_SSO_DISABLED:-true}
      - CAIPE_UNSAFE_RBAC_BYPASS=${CAIPE_UNSAFE_RBAC_BYPASS:-true}
      # Show the Agents tab and route chat through the Dynamic Agents backend.
      - DYNAMIC_AGENTS_ENABLED=${DYNAMIC_AGENTS_ENABLED:-true}

  dynamic-agents:
    environment:
      # The dev UI service is caipe-ui, not caipe-ui-prod.
      - AUTHZ_SERVICE_URL=${AUTHZ_SERVICE_URL:-http://caipe-ui:3000}
      # Local no-SSO dev auth sends X-User-Context without a bearer token.
      - DA_REQUIRE_BEARER=${DA_REQUIRE_BEARER:-false}

  mcp-litellm:
    container_name: mcp-litellm
    ports:
      - 18080:8000
    environment:
      - MCP_MODE=http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
      - LITELLM_API_URL=${LITELLM_API_URL:-${LITELLM_PROXY_URL:-https://litellm.prod.outshift.ai}}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-${LITELLM_MASTER_KEY:?Set LITELLM_API_KEY or LITELLM_MASTER_KEY in your shell or repo-root .env}}
      - LITELLM_API_TIMEOUT=${LITELLM_API_TIMEOUT:-120}
      - LITELLM_VERIFY_SSL=${LITELLM_VERIFY_SSL:-true}
      - LITELLM_TOKEN_ALERTS_ENABLED=${LITELLM_TOKEN_ALERTS_ENABLED:-false}
      - LITELLM_TOKEN_ALERT_THRESHOLD=${LITELLM_TOKEN_ALERT_THRESHOLD:-0.8}
      - LITELLM_TOKEN_ALERT_LIMITS_JSON=${LITELLM_TOKEN_ALERT_LIMITS_JSON:-{}}
      - LITELLM_TOKEN_ALERT_TARGETS_JSON=${LITELLM_TOKEN_ALERT_TARGETS_JSON:-[]}
      - LITELLM_TOKEN_ALERT_NOTIFICATION_CHANNEL=${LITELLM_TOKEN_ALERT_NOTIFICATION_CHANNEL:-none}
      - LITELLM_TOKEN_ALERT_ALLOWED_RECIPIENTS=${LITELLM_TOKEN_ALERT_ALLOWED_RECIPIENTS:-}
      - LITELLM_TOKEN_ALERT_WEBEX_API_URL=${LITELLM_TOKEN_ALERT_WEBEX_API_URL:-https://webexapis.com/v1}
      - SERVER_NAME=${SERVER_NAME:-LITELLM}
    volumes:
      - ./ai_platform_engineering/agents/litellm/mcp/mcp_litellm:/app/mcp_litellm
    build:
      context: .
      dockerfile: build/agents/Dockerfile.mcp
      args:
        - AGENT_NAME=litellm

  litellm-token-alert-scanner:
    container_name: litellm-token-alert-scanner
    profiles:
      - litellm-alerts
    command:
      - python
      - -m
      - mcp_litellm.token_alert_scanner
    environment:
      - LITELLM_API_URL=${LITELLM_API_URL:-${LITELLM_PROXY_URL:-https://litellm.prod.outshift.ai}}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-${LITELLM_MASTER_KEY:?Set LITELLM_API_KEY or LITELLM_MASTER_KEY in your shell or repo-root .env}}
      - LITELLM_API_TIMEOUT=${LITELLM_API_TIMEOUT:-120}
      - LITELLM_VERIFY_SSL=${LITELLM_VERIFY_SSL:-true}
      - LITELLM_TOKEN_ALERTS_ENABLED=${LITELLM_TOKEN_ALERTS_ENABLED:-false}
      - LITELLM_TOKEN_ALERT_THRESHOLD=${LITELLM_TOKEN_ALERT_THRESHOLD:-0.8}
      - LITELLM_TOKEN_ALERT_LIMITS_JSON=${LITELLM_TOKEN_ALERT_LIMITS_JSON:-{}}
      - LITELLM_TOKEN_ALERT_TARGETS_JSON=${LITELLM_TOKEN_ALERT_TARGETS_JSON:-[]}
      - LITELLM_TOKEN_ALERT_NOTIFICATION_CHANNEL=${LITELLM_TOKEN_ALERT_NOTIFICATION_CHANNEL:-none}
      - LITELLM_TOKEN_ALERT_ALLOWED_RECIPIENTS=${LITELLM_TOKEN_ALERT_ALLOWED_RECIPIENTS:-}
      - LITELLM_TOKEN_ALERT_WEBEX_API_URL=${LITELLM_TOKEN_ALERT_WEBEX_API_URL:-https://webexapis.com/v1}
      - LITELLM_TOKEN_ALERT_SCANNER_ENABLED=${LITELLM_TOKEN_ALERT_SCANNER_ENABLED:-false}
      - LITELLM_TOKEN_ALERT_SCAN_INTERVAL_SECONDS=${LITELLM_TOKEN_ALERT_SCAN_INTERVAL_SECONDS:-3600}
      - LITELLM_TOKEN_ALERT_SCANNER_DRY_RUN=${LITELLM_TOKEN_ALERT_SCANNER_DRY_RUN:-false}
      - LITELLM_TOKEN_ALERT_DEDUPE_FILE=${LITELLM_TOKEN_ALERT_DEDUPE_FILE:-/tmp/litellm-token-alerts/state.json}
      - LITELLM_TOKEN_ALERT_DEDUPE_TTL_SECONDS=${LITELLM_TOKEN_ALERT_DEDUPE_TTL_SECONDS:-86400}
      - WEBEX_TOKEN=${WEBEX_TOKEN:-}
      - WEBEX_ACCESS_TOKEN=${WEBEX_ACCESS_TOKEN:-}
      - WEBEX_INTEGRATION_BOT_ACCESS_TOKEN=${WEBEX_INTEGRATION_BOT_ACCESS_TOKEN:-}
    volumes:
      - ./ai_platform_engineering/agents/litellm/mcp/mcp_litellm:/app/mcp_litellm
      - litellm-token-alert-state:/tmp/litellm-token-alerts
    build:
      context: .
      dockerfile: build/agents/Dockerfile.mcp
      args:
        - AGENT_NAME=litellm

  mcp-cloudability:
    container_name: mcp-cloudability
    ports:
      - 18085:8000
    environment:
      - MCP_MODE=http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
      - CLOUDABILITY_API_URL=${CLOUDABILITY_API_URL:-https://api.cloudability.com/v3}
      - CLOUDABILITY_REGION=${CLOUDABILITY_REGION:-}
      - CLOUDABILITY_API_KEY=${CLOUDABILITY_API_KEY:-}
      - CLOUDABILITY_API_PUBLIC_KEY=${CLOUDABILITY_API_PUBLIC_KEY:-}
      - CLOUDABILITY_API_PRIVATE_KEY=${CLOUDABILITY_API_PRIVATE_KEY:-}
      - APPTIO_OPENTOKEN=${APPTIO_OPENTOKEN:-}
      - APPTIO_ENVIRONMENT_ID=${APPTIO_ENVIRONMENT_ID:-}
      - SERVER_NAME=${CLOUDABILITY_SERVER_NAME:-Cloudability}
    volumes:
      - ./ai_platform_engineering/agents/cloudability/mcp/mcp_cloudability:/app/mcp_cloudability
    build:
      context: .
      dockerfile: build/agents/Dockerfile.mcp
      args:
        - AGENT_NAME=cloudability

volumes:
  litellm-token-alert-state:
