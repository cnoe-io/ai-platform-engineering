# docker-compose/docker-compose.e2e.override.yaml
#
# Thin overlay on top of docker-compose.dev.yaml for `make test-rbac` (spec 102).
#
# Per spec.md Clarifications 2026-04-22:
#   - We DO NOT duplicate service definitions. Every service is sourced from
#     docker-compose.dev.yaml via COMPOSE_PROFILES.
#   - This file ONLY remaps host ports (to avoid collisions with a running dev
#     stack) and injects e2e-only env vars (e.g. RBAC_FALLBACK_CONFIG_PATH).
#
# Usage:
#   COMPOSE_PROFILES="rbac,caipe-ui,caipe-supervisor,caipe-mongodb,dynamic-agents,rag,all-agents,slack-bot" \
#     docker compose -f docker-compose.dev.yaml -f docker-compose/docker-compose.e2e.override.yaml up -d --wait
#
# See:
#   - docs/docs/specs/102-comprehensive-rbac-tests-and-completion/quickstart.md
#   - docs/docs/specs/102-comprehensive-rbac-tests-and-completion/spec.md (Clarification 2026-04-22)
---
services:
  # MongoDB — remap host port 27017 -> 27018 to avoid colliding with a dev mongo.
  caipe-mongodb:
    ports: !override
      - "27018:27017"

  # Caipe UI — remap host port 3000 -> 3010 to avoid colliding with a dev next dev server.
  caipe-ui:
    ports: !override
      - "3010:3000"
    environment:
      # E2E uses the in-stack supervisor URL for direct calls; the BFF still
      # talks to caipe-supervisor:8000 over the docker network unchanged.
      E2E_RUN: "true"

  # Supervisor — remap host port 8000 -> 8010.
  caipe-supervisor:
    ports: !override
      - "8010:8000"
    environment:
      RBAC_FALLBACK_CONFIG_PATH: /etc/keycloak/realm-config-extras.json
    volumes:
      # Mount the realm-config-extras.json into the supervisor so the
      # PDP-unavailable fallback (T013) is read by the Python helper (T021).
      - ./deploy/keycloak/realm-config-extras.json:/etc/keycloak/realm-config-extras.json:ro

  # Dynamic agents backend — same env override.
  dynamic-agents:
    environment:
      RBAC_FALLBACK_CONFIG_PATH: /etc/keycloak/realm-config-extras.json
    volumes:
      - ./deploy/keycloak/realm-config-extras.json:/etc/keycloak/realm-config-extras.json:ro

  # RAG server — same env override (note: service name is `rag_server` in dev compose).
  rag_server:
    environment:
      RBAC_FALLBACK_CONFIG_PATH: /etc/keycloak/realm-config-extras.json
    volumes:
      - ./deploy/keycloak/realm-config-extras.json:/etc/keycloak/realm-config-extras.json:ro
