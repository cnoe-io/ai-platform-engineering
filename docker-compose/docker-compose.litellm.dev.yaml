# ============================================================================
# LiteLLM MCP local development compose
# ============================================================================
#
# Usage:
#   docker compose -f docker-compose/docker-compose.litellm.dev.yaml up --build
#
# MCP endpoints:
#   Host machine: http://localhost:18080/mcp
#   Same compose network: http://mcp-litellm:8000/mcp
# ============================================================================

services:
  mcp-litellm:
    container_name: mcp-litellm
    ports:
    - 18080:8000
    environment:
    - MCP_MODE=http
    - MCP_HOST=0.0.0.0
    - MCP_PORT=8000
    - LITELLM_API_URL=${LITELLM_API_URL:-https://litellm.prod.outshift.ai}
    - LITELLM_API_KEY=${LITELLM_API_KEY:?Set LITELLM_API_KEY in your shell or repo-root .env}
    - LITELLM_API_TIMEOUT=${LITELLM_API_TIMEOUT:-120}
    - LITELLM_VERIFY_SSL=${LITELLM_VERIFY_SSL:-true}
    - LITELLM_TOKEN_ALERTS_ENABLED=${LITELLM_TOKEN_ALERTS_ENABLED:-false}
    - LITELLM_TOKEN_ALERT_THRESHOLD=${LITELLM_TOKEN_ALERT_THRESHOLD:-0.8}
    - LITELLM_TOKEN_ALERT_LIMITS_JSON=${LITELLM_TOKEN_ALERT_LIMITS_JSON:-{}}
    - LITELLM_TOKEN_ALERT_TARGETS_JSON=${LITELLM_TOKEN_ALERT_TARGETS_JSON:-[]}
    - LITELLM_TOKEN_ALERT_NOTIFICATION_CHANNEL=${LITELLM_TOKEN_ALERT_NOTIFICATION_CHANNEL:-none}
    - LITELLM_TOKEN_ALERT_ALLOWED_RECIPIENTS=${LITELLM_TOKEN_ALERT_ALLOWED_RECIPIENTS:-}
    - LITELLM_TOKEN_ALERT_WEBEX_API_URL=${LITELLM_TOKEN_ALERT_WEBEX_API_URL:-https://webexapis.com/v1}
    - LITELLM_TOKEN_ALERT_SCANNER_ENABLED=${LITELLM_TOKEN_ALERT_SCANNER_ENABLED:-false}
    - LITELLM_TOKEN_ALERT_SCAN_INTERVAL_SECONDS=${LITELLM_TOKEN_ALERT_SCAN_INTERVAL_SECONDS:-3600}
    - LITELLM_TOKEN_ALERT_SCANNER_DRY_RUN=${LITELLM_TOKEN_ALERT_SCANNER_DRY_RUN:-false}
    - LITELLM_TOKEN_ALERT_DEDUPE_FILE=${LITELLM_TOKEN_ALERT_DEDUPE_FILE:-/tmp/litellm-token-alerts/state.json}
    - LITELLM_TOKEN_ALERT_DEDUPE_TTL_SECONDS=${LITELLM_TOKEN_ALERT_DEDUPE_TTL_SECONDS:-86400}
    - WEBEX_TOKEN=${WEBEX_TOKEN:-}
    - WEBEX_ACCESS_TOKEN=${WEBEX_ACCESS_TOKEN:-}
    - WEBEX_INTEGRATION_BOT_ACCESS_TOKEN=${WEBEX_INTEGRATION_BOT_ACCESS_TOKEN:-}
    - SERVER_NAME=${SERVER_NAME:-LITELLM}
    volumes:
    - ../ai_platform_engineering/agents/litellm/mcp/mcp_litellm:/app/mcp_litellm
    build:
      context: ..
      dockerfile: build/agents/Dockerfile.mcp
      args:
      - AGENT_NAME=litellm

  litellm-token-alert-scanner:
    container_name: litellm-token-alert-scanner
    profiles:
    - litellm-alerts
    command:
    - python
    - -m
    - mcp_litellm.token_alert_scanner
    environment:
    - LITELLM_API_URL=${LITELLM_API_URL:-https://litellm.prod.outshift.ai}
    - LITELLM_API_KEY=${LITELLM_API_KEY:?Set LITELLM_API_KEY in your shell or repo-root .env}
    - LITELLM_API_TIMEOUT=${LITELLM_API_TIMEOUT:-120}
    - LITELLM_VERIFY_SSL=${LITELLM_VERIFY_SSL:-true}
    - LITELLM_TOKEN_ALERTS_ENABLED=${LITELLM_TOKEN_ALERTS_ENABLED:-false}
    - LITELLM_TOKEN_ALERT_THRESHOLD=${LITELLM_TOKEN_ALERT_THRESHOLD:-0.8}
    - LITELLM_TOKEN_ALERT_LIMITS_JSON=${LITELLM_TOKEN_ALERT_LIMITS_JSON:-{}}
    - LITELLM_TOKEN_ALERT_TARGETS_JSON=${LITELLM_TOKEN_ALERT_TARGETS_JSON:-[]}
    - LITELLM_TOKEN_ALERT_NOTIFICATION_CHANNEL=${LITELLM_TOKEN_ALERT_NOTIFICATION_CHANNEL:-none}
    - LITELLM_TOKEN_ALERT_ALLOWED_RECIPIENTS=${LITELLM_TOKEN_ALERT_ALLOWED_RECIPIENTS:-}
    - LITELLM_TOKEN_ALERT_WEBEX_API_URL=${LITELLM_TOKEN_ALERT_WEBEX_API_URL:-https://webexapis.com/v1}
    - LITELLM_TOKEN_ALERT_SCANNER_ENABLED=${LITELLM_TOKEN_ALERT_SCANNER_ENABLED:-false}
    - LITELLM_TOKEN_ALERT_SCAN_INTERVAL_SECONDS=${LITELLM_TOKEN_ALERT_SCAN_INTERVAL_SECONDS:-3600}
    - LITELLM_TOKEN_ALERT_SCANNER_DRY_RUN=${LITELLM_TOKEN_ALERT_SCANNER_DRY_RUN:-false}
    - LITELLM_TOKEN_ALERT_DEDUPE_FILE=${LITELLM_TOKEN_ALERT_DEDUPE_FILE:-/tmp/litellm-token-alerts/state.json}
    - LITELLM_TOKEN_ALERT_DEDUPE_TTL_SECONDS=${LITELLM_TOKEN_ALERT_DEDUPE_TTL_SECONDS:-86400}
    - WEBEX_TOKEN=${WEBEX_TOKEN:-}
    - WEBEX_ACCESS_TOKEN=${WEBEX_ACCESS_TOKEN:-}
    - WEBEX_INTEGRATION_BOT_ACCESS_TOKEN=${WEBEX_INTEGRATION_BOT_ACCESS_TOKEN:-}
    volumes:
    - ../ai_platform_engineering/agents/litellm/mcp/mcp_litellm:/app/mcp_litellm
    - litellm-token-alert-state:/tmp/litellm-token-alerts
    build:
      context: ..
      dockerfile: build/agents/Dockerfile.mcp
      args:
      - AGENT_NAME=litellm

volumes:
  litellm-token-alert-state:
