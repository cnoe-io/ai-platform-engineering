              $ref: "#/components/schemas/NotificationsFlat"
      responses:
        "200":
          description: Full settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessUserSettings"
        "401": { $ref: "#/components/responses/Unauthorized" }

  /settings/defaults:
    patch:
      operationId: patchUserDefaults
      summary: Flat merge into defaults
      tags: [settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DefaultsFlat"
      responses:
        "200":
          description: Full settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessUserSettings"
        "401": { $ref: "#/components/responses/Unauthorized" }

  /debug/auth-status:
    get:
      operationId: debugAuthStatus
      summary: Session and admin flag introspection
      tags: [platform]
      security: []
      responses:
        "200":
          description: Auth status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebugAuthStatus"

  /debug/session:
    get:
      operationId: debugSession
      summary: Lightweight session dump
      tags: [platform]
      security: []
      responses:
        "200":
          description: Session debug
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebugSession"

  /feedback:
    get:
      operationId: feedbackConfig
      summary: Whether Langfuse feedback is enabled
      tags: [platform]
      security: []
      responses:
        "200":
          description: Feedback config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackConfig"
    post:
      operationId: submitFeedback
      summary: Submit like/dislike to Langfuse when configured
      tags: [platform]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackSubmitBody"
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackSubmitResponse"
        "400":
          description: Bad request
        "500":
          description: Server error

  /nps:
    post:
      operationId: submitNps
      summary: Store NPS response
      tags: [platform]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NpsSubmitBody"
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessNpsSubmit"
        "404": { $ref: "#/components/responses/NpsDisabled" }
        "503": { $ref: "#/components/responses/ServiceUnavailableMongo" }

  /nps/active:
    get:
      operationId: getActiveNpsCampaign
      summary: Whether an NPS campaign is active for UI
      tags: [platform]
      responses:
        "200":
          description: Active campaign state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NpsActiveResponse"
        "503": { $ref: "#/components/responses/ServiceUnavailableMongo" }

  /changelog:
    get:
      operationId: getChangelog
      summary: Parsed CHANGELOG.md releases
      tags: [platform]
      security: []
      responses:
        "200":
          description: Releases
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangelogResponse"
        "500":
          description: Fetch failed
        "502":
          description: Upstream failed

  /skill-templates:
    get:
      operationId: listSkillTemplates
      summary: Built-in skill templates from disk
      tags: [platform]
      security: []
      responses:
        "200":
          description: Template array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SkillTemplate"

  /workflow-runs:
    post:
      operationId: createWorkflowRun
      summary: Create workflow run
      tags: [platform]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowRunCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessWorkflowRunCreate"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503": { $ref: "#/components/responses/ServiceUnavailableMongo" }
    get:
      operationId: listOrGetWorkflowRun
      summary: List runs for owner or get one by id
      tags: [platform]
      parameters:
        - name: id
          in: query
          schema: { type: string }
        - name: workflow_id
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Run or array of runs
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      $ref: "#/components/schemas/WorkflowRun"
                  - $ref: "#/components/schemas/WorkflowRun"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503": { $ref: "#/components/responses/ServiceUnavailableMongo" }
    put:
      operationId: updateWorkflowRun
      summary: Owner update by query id
      tags: [platform]
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowRunUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessWorkflowRunMutate"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/ServiceUnavailableMongo" }
    delete:
      operationId: deleteWorkflowRun
      summary: Owner delete by query id
      tags: [platform]
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessWorkflowRunMutate"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/ServiceUnavailableMongo" }

  /dynamic-agents:
    get:
      operationId: proxyDynamicAgentsRoot
      summary: Proxy GET to Dynamic Agents service
      tags: [dynamic-agents]
      responses:
        "200":
          description: Service JSON (passthrough)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "502":
          description: Upstream error

  /dynamic-agents/available:
    get:
      operationId: proxyDynamicAgentsAvailable
      summary: List available dynamic agents
      tags: [dynamic-agents]
      responses:
        "200":
          description: Passthrough JSON
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /dynamic-agents/models:
    get:
      operationId: proxyDynamicAgentsModels
      summary: List models from Dynamic Agents
      tags: [dynamic-agents]
      responses:
        "200":
          description: Passthrough JSON
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /dynamic-agents/agents/{id}:
    get:
      operationId: proxyDynamicAgentById
      summary: Get dynamic agent by id
      tags: [dynamic-agents]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Agent document (passthrough)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          description: Not found

  /dynamic-agents/chat/start-stream:
    post:
      operationId: proxyDynamicAgentsStartStream
      summary: Start agent chat stream (proxied SSE/binary)
      tags: [dynamic-agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Streaming response (content-type varies)
        "502":
          description: Upstream error

  /rag/{path}:
    parameters:
      - name: path
        in: path
        required: true
        description: Remaining path segments forwarded to RAG (catch-all)
        schema:
          type: string
    get:
      operationId: proxyRagGet
      summary: Proxy GET to RAG server
      tags: [rag]
      responses:
        "200":
          description: RAG response (passthrough)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "502":
          description: RAG unreachable
    post:
      operationId: proxyRagPost
      summary: Proxy POST to RAG server
      tags: [rag]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: RAG response (passthrough)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "502":
          description: RAG unreachable

components:
  securitySchemes:
    SessionCookie:
      type: apiKey
      in: cookie
      name: next-auth.session-token
      description: |
        NextAuth.js session cookie. In production with Secure cookies the name may be
        `__Secure-next-auth.session-token`. Send the session cookie from the browser; API clients must obtain a session via OIDC first.

  parameters:
    KeycloakUserId:
      name: id
      in: path
      required: true
      schema:
        type: string
    MongoObjectId:
      name: id
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-f0-9]{24}$"
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeCamel:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    PageSizeUnderscore:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    AuditPage:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    AuditPageSize:
      name: page_size
      in: query
      schema:
        type: integer
        maximum: 100
        default: 20
    AdminUsersSearch:
      name: search
      in: query
      schema:
        type: string
    AdminUsersRole:
      name: role
      in: query
      schema:
        type: string
    AdminUsersTeam:
      name: team
      in: query
      schema:
        type: string
    AdminUsersIdp:
      name: idp
      in: query
      schema:
        type: string
    AdminUsersSlackStatus:
      name: slackStatus
      in: query
      schema:
        type: string
        enum: [linked, unlinked]
    AdminUsersEnabled:
      name: enabled
      in: query
      schema:
        type: boolean
    ChatPage:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    ChatPageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    ConversationId:
      name: id
      in: path
      required: true
      description: Conversation UUID
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorEnvelope"
    BadRequestJson:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorCodeEnvelope"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorEnvelope"
    UnauthorizedPlain:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorPlain"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorEnvelope"
    ForbiddenPlain:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorPlain"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorEnvelope"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorEnvelope"
    BadGateway:
      description: Bad gateway
    GatewayTimeout:
      description: Gateway timeout
    ServiceUnavailableMongo:
      description: MongoDB not configured
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorEnvelope"
    ServiceUnavailablePrometheus:
      description: Prometheus not configured
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorEnvelope"
    ServiceUnavailablePlain:
      description: Service unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorPlain"
    FeatureDisabled:
      description: Feature disabled
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorEnvelope"
    NpsDisabled:
      description: NPS disabled
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorEnvelope"
    FeatureDisabledAudit:
      description: Audit logs disabled
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorEnvelope"

  schemas:
    ApiErrorEnvelope:
      type: object
      properties:
        success:
          type: boolean
          const: false
        error:
          type: string
        code:
          type: string
    ApiErrorCodeEnvelope:
      type: object
      properties:
        success:
          type: boolean
        error:
          type: string
        code:
          type: string
    ErrorPlain:
      type: object
      properties:
        error:
          type: string
    ErrorSlackLink:
      type: object
      properties:
        error:
          type: string
    SuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          const: true
        data:
          description: Payload (shape varies by operation)

    AdminUserSummary:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        enabled:
          type: boolean
        attributes:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        roles:
          type: array
          items:
            type: string
    AdminUserListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/AdminUserSummary"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    KeycloakUserDetail:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        email: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        enabled: { type: boolean }
        createdAt: { type: integer, format: int64 }
        attributes:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
        slackLinkStatus:
          type: string
          enum: [linked, unlinked]
        realmRoles:
          type: array
          items:
            $ref: "#/components/schemas/RealmRole"
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/UserSession"
        federatedIdentities:
          type: array
          items:
            $ref: "#/components/schemas/FederatedIdentity"
        teams:
          type: array
          items:
            $ref: "#/components/schemas/TeamKbRow"
        lastAccess: { type: integer, format: int64 }
    SuccessUserDetail:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                user:
                  $ref: "#/components/schemas/KeycloakUserDetail"

    RealmRole:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
    UserSession:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        ipAddress: { type: string }
        start: { type: integer, format: int64 }
        lastAccess: { type: integer, format: int64 }
        rememberMe: { type: boolean }
    FederatedIdentity:
      type: object
      properties:
        identityProvider: { type: string }
        userId: { type: string }
        userName: { type: string }
    TeamKbRow:
      type: object
      properties:
        team_id: { type: string }
        tenant_id: { type: string }

    KeycloakUserUpdate:
      type: object
      additionalProperties: true
      properties:
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string }
        enabled: { type: boolean }
        attributes:
          type: object
          additionalProperties:
            type: array
            items: { type: string }

    SuccessOk:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, const: true }
        data:
          type: object
          properties:
            ok: { type: boolean, const: true }

    RoleRef:
      type: object
      required: [name]
      properties:
        name: { type: string }
    RoleNamesBody:
      type: object
      required: [roles]
      properties:
        roles:
          type: array
          items:
            $ref: "#/components/schemas/RoleRef"

    TeamIdBody:
      type: object
      required: [teamId]
      properties:
        teamId: { type: string }

    SuccessRoleUpdate:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, const: true }
        data:
          type: object
          properties:
            message: { type: string }
            email: { type: string }
            role: { type: string }

    MigrateMessage:
      type: object
      properties:
        role: { type: string }
        content: { type: string }
        created_at: { type: string, format: date-time }
        turn_id: { type: string }
    MigrateConversation:
      type: object
      required: [id, title]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        createdAt: { type: string, format: date-time }
        messages:
          type: array
          items:
            $ref: "#/components/schemas/MigrateMessage"
    MigrateConversationsBody:
      type: object
      required: [conversations]
      properties:
        conversations:
          type: array
          items:
            $ref: "#/components/schemas/MigrateConversation"
    SuccessMigrateResult:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, const: true }
        data:
          type: object
          properties:
            message: { type: string }
            migrated: { type: integer }
            skipped: { type: integer }
            errors:
              type: array
              items: { type: string }

    TeamMember:
      type: object
      properties:
        user_id: { type: string }
        role: { type: string, enum: [owner, admin, member] }
        added_at: { type: string, format: date-time }
        added_by: { type: string }
    Team:
      type: object
      properties:
        _id: { type: string }
        name: { type: string }
        description: { type: string }
        owner_id: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        members:
          type: array
          items:
            $ref: "#/components/schemas/TeamMember"
        keycloak_roles:
          type: array
          items: { type: string }
    SuccessTeamsList:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, const: true }
        data:
          type: object
          properties:
            teams:
              type: array
              items:
                $ref: "#/components/schemas/Team"
            total: { type: integer }

    CreateTeamBody:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }
