      tags: [platform]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FavoritesBody"
      responses:
        "200":
          description: Updated favorites
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessFavoritesUpdate"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /users/search:
