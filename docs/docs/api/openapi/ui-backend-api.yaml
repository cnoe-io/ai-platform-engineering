    put:
      operationId: putUserSettings
      summary: Partial update nested preferences/notifications/defaults
      tags: [settings]
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSettingsPatch"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessUserSettings"
        "401": { $ref: "#/components/responses/Unauthorized" }

  /settings/preferences:
    patch:
      operationId: patchUserPreferences
      summary: Flat merge into preferences
      tags: [settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreferencesFlat"
      responses:
        "200":
          description: Full settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessUserSettings"
        "401": { $ref: "#/components/responses/Unauthorized" }

  /settings/notifications:
    patch:
      operationId: patchUserNotifications
      summary: Flat merge into notifications
      tags: [settings]
      requestBody:
        required: true
        content:
