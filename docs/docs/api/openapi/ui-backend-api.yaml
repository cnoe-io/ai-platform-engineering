openapi: 3.1.0
info:
  title: CAIPE UI Backend API
  version: 1.0.0
  description: |
    Backend-for-Frontend API for the CAIPE UI (Next.js App Router). Routes live under `/api/*` on the UI origin.
    Most endpoints require a NextAuth session cookie. Admin vs admin-view vs authenticated-only behavior matches
    the markdown API docs in `docs/docs/api/`.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: /api
    description: UI Backend API routes
security:
  - SessionCookie: []
tags:
  - name: admin
    description: Admin and admin-view operations (users, teams, stats, audit, Slack admin, metrics, NPS admin)
  - name: chat
    description: Conversations, messages, sharing, bookmarks, search
  - name: rbac
    description: Keycloak realm roles, IdP mappers, permissions, policies, RBAC audit
  - name: slack
    description: Slack linking and channel-to-team mappings
  - name: platform
    description: Health, version, config, debug, feedback, NPS, changelog, workflow runs
  - name: dynamic-agents
    description: Proxy to Dynamic Agents service
  - name: rag
    description: Proxy to RAG server
  - name: settings
    description: User preferences and defaults

paths:
  /admin/users:
    get:
      operationId: adminListUsers
      summary: List Keycloak users with filters
      tags: [admin]
      parameters:
        - $ref: "#/components/parameters/AdminUsersSearch"
        - $ref: "#/components/parameters/AdminUsersRole"
        - $ref: "#/components/parameters/AdminUsersTeam"
        - $ref: "#/components/parameters/AdminUsersIdp"
        - $ref: "#/components/parameters/AdminUsersSlackStatus"
        - $ref: "#/components/parameters/AdminUsersEnabled"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSizeCamel"
      responses:
        "200":
          description: User list (unwrapped)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "503": { $ref: "#/components/responses/ServiceUnavailableMongo" }

  /admin/users/{id}:
    parameters:
      - $ref: "#/components/parameters/KeycloakUserId"
    get:
      operationId: adminGetUser
      summary: Get Keycloak user detail with sessions and teams
      tags: [admin]
      responses:
        "200":
          description: Wrapped user detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessUserDetail"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      operationId: adminUpdateUser
      summary: Update Keycloak user
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeycloakUserUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessOk"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /admin/users/{id}/roles:
    parameters:
      - $ref: "#/components/parameters/KeycloakUserId"
    post:
      operationId: adminAssignRealmRoles
      summary: Assign realm roles by name
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleNamesBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessOk"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: adminRemoveRealmRoles
      summary: Remove realm roles by name
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleNamesBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessOk"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /admin/users/{id}/teams:
    parameters:
      - $ref: "#/components/parameters/KeycloakUserId"
    post:
      operationId: adminAddUserTeam
      summary: Add user email to team_kb_ownership members
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamIdBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessOk"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/ServiceUnavailableMongo" }
    delete:
      operationId: adminRemoveUserTeam
      summary: Remove user from team_kb_ownership
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamIdBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessOk"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/ServiceUnavailableMongo" }

  /admin/users/{email}/role:
    patch:
      operationId: adminPatchMongoUserRole
      summary: Update MongoDB users.metadata.role by email
      tags: [admin]
      parameters:
        - name: email
          in: path
          required: true
          description: URL-encoded user email
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [admin, user]
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessRoleUpdate"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/ServiceUnavailableMongo" }

  /admin/migrate-conversations:
    post:
      operationId: adminMigrateConversations
      summary: Import conversations into MongoDB for calling admin
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MigrateConversationsBody"
      responses:
        "200":
          description: Migration result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMigrateResult"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "503": { $ref: "#/components/responses/ServiceUnavailableMongo" }

  /admin/teams:
    get:
      operationId: adminListTeams
      summary: List MongoDB teams
      tags: [admin]
      responses:
        "200":
          description: Teams list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessTeamsList"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "503": { $ref: "#/components/responses/ServiceUnavailableMongo" }
    post:
      operationId: adminCreateTeam
      summary: Create team
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessTeamCreated"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "503": { $ref: "#/components/responses/ServiceUnavailableMongo" }

  /admin/teams/{id}:
    parameters:
      - $ref: "#/components/parameters/MongoObjectId"
    get:
      operationId: adminGetTeam
      summary: Get team by id
      tags: [admin]
      responses:
        "200":
          description: Team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessTeamWrap"
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/ServiceUnavailableMongo" }
    patch:
      operationId: adminPatchTeam
      summary: Update team name/description
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchTeamBody"
      responses:
        "200":
          description: Updated team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessTeamWrap"
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: adminDeleteTeam
      summary: Delete team
      tags: [admin]
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessTeamDeleted"
        "404": { $ref: "#/components/responses/NotFound" }

  /admin/teams/{id}/members:
    parameters:
      - $ref: "#/components/parameters/MongoObjectId"
    post:
      operationId: adminAddTeamMember
      summary: Add team member
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTeamMemberBody"
      responses:
        "201":
          description: Team with member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessTeamWrap"
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: adminRemoveTeamMember
      summary: Remove team member
      tags: [admin]
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Team updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessTeamWrap"
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /admin/teams/{id}/roles:
    parameters:
      - $ref: "#/components/parameters/MongoObjectId"
    get:
      operationId: adminGetTeamKeycloakRoles
      summary: Get team keycloak_roles
      tags: [admin]
      responses:
        "200":
          description: Roles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessTeamRoles"
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      operationId: adminPutTeamKeycloakRoles
      summary: Replace team keycloak_roles
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamRolesBody"
      responses:
        "200":
          description: Updated team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessTeamWrap"
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /admin/stats:
    get:
      operationId: adminGetStats
      summary: Platform analytics aggregates
      tags: [admin]
      parameters:
        - name: range
          in: query
          schema:
            type: string
            enum: [1d, 7d, 30d, 90d]
            default: 30d
      responses:
        "200":
          description: Stats payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessAdminStats"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "503": { $ref: "#/components/responses/ServiceUnavailableMongo" }

  /admin/stats/checkpoints:
    get:
      operationId: adminGetCheckpointStats
      summary: LangGraph checkpoint collection stats
      tags: [admin]
      parameters:
        - name: range
          in: query
          schema:
            type: string
        - name: peek
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Checkpoint stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessGenericData"
        "503": { $ref: "#/components/responses/ServiceUnavailableMongo" }

  /admin/stats/skills:
    get:
      operationId: adminGetSkillStats
      summary: Skill and workflow run aggregates
      tags: [admin]
      responses:
        "200":
          description: Skill stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessGenericData"
        "503": { $ref: "#/components/responses/ServiceUnavailableMongo" }

  /admin/metrics:
    get:
      operationId: adminPrometheusInstantOrRange
      summary: Proxy PromQL to Prometheus
      tags: [admin]
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [instant, range]
        - name: start
          in: query
          schema:
            type: string
        - name: end
          in: query
          schema:
            type: string
        - name: step
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Prometheus JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessPrometheusWrap"
        "400": { $ref: "#/components/responses/BadRequest" }
        "502": { $ref: "#/components/responses/BadGateway" }
        "503": { $ref: "#/components/responses/ServiceUnavailablePrometheus" }
        "504": { $ref: "#/components/responses/GatewayTimeout" }
    post:
      operationId: adminPrometheusBatch
      summary: Batch PromQL queries
      tags: [admin]
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrometheusBatchBody"
      responses:
        "200":
          description: Per-query results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessPrometheusBatch"
        "400": { $ref: "#/components/responses/BadRequest" }
        "503": { $ref: "#/components/responses/ServiceUnavailablePrometheus" }

  /admin/feedback:
    get:
      operationId: adminListFeedback
      summary: List messages with feedback ratings
      tags: [admin]
      parameters:
        - name: rating
          in: query
          schema:
            type: string
            enum: [positive, negative]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Feedback entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessAdminFeedback"
        "404": { $ref: "#/components/responses/FeatureDisabled" }
        "503": { $ref: "#/components/responses/ServiceUnavailableMongo" }

  /admin/nps:
    get:
      operationId: adminGetNpsAnalytics
      summary: NPS analytics
      tags: [admin]
      parameters:
        - name: campaign_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: NPS data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessGenericData"
        "404": { $ref: "#/components/responses/NpsDisabled" }
        "503": { $ref: "#/components/responses/ServiceUnavailableMongo" }

  /admin/nps/campaigns:
    get:
      operationId: adminListNpsCampaigns
      summary: List NPS campaigns
      tags: [admin]
      responses:
        "200":
          description: Campaigns
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessNpsCampaigns"
        "404": { $ref: "#/components/responses/NpsDisabled" }
        "503": { $ref: "#/components/responses/ServiceUnavailableMongo" }
    post:
      operationId: adminCreateNpsCampaign
      summary: Create NPS campaign
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NpsCampaignCreate"
      responses:
        "201":
          description: Created campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessNpsCampaign"
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }
    patch:
      operationId: adminStopNpsCampaign
      summary: End campaign early
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [campaign_id]
              properties:
                campaign_id:
                  type: string
      responses:
        "200":
          description: Stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessCampaignStopped"
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /admin/audit-logs:
    get:
      operationId: adminAuditLogsList
      summary: Paginated conversations for audit
      tags: [admin]
      parameters:
        - $ref: "#/components/parameters/AuditPage"
        - $ref: "#/components/parameters/AuditPageSize"
        - name: owner_email
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: include_deleted
          in: query
          schema:
            type: boolean
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived, deleted]
      responses:
        "200":
          description: Paginated audit items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessPaginatedConversations"
        "403": { $ref: "#/components/responses/FeatureDisabledAudit" }
        "503": { $ref: "#/components/responses/ServiceUnavailableMongo" }

  /admin/audit-logs/owners:
    get:
      operationId: adminAuditLogOwners
      summary: Distinct conversation owners
      tags: [admin]
      parameters:
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Owner emails
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessOwners"
        "403": { $ref: "#/components/responses/FeatureDisabledAudit" }
        "503": { $ref: "#/components/responses/ServiceUnavailableMongo" }

  /admin/audit-logs/export:
    get:
      operationId: adminAuditLogsExportCsv
      summary: Export audit logs as CSV
      tags: [admin]
      parameters:
        - name: owner_email
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: date_from
          in: query
          schema:
            type: string
        - name: date_to
          in: query
          schema:
            type: string
        - name: include_deleted
          in: query
          schema:
            type: boolean
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
        "403": { $ref: "#/components/responses/FeatureDisabledAudit" }
        "503": { $ref: "#/components/responses/ServiceUnavailableMongo" }

  /admin/audit-logs/{id}/messages:
    get:
      operationId: adminAuditConversationMessages
      summary: Conversation plus paginated messages for audit
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          description: Conversation UUID
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/AuditPage"
        - $ref: "#/components/parameters/AuditPageSize"
      responses:
        "200":
          description: Conversation and messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessAuditMessages"
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/FeatureDisabledAudit" }
        "404": { $ref: "#/components/responses/NotFound" }

  /admin/slack/users:
    get:
      operationId: adminSlackUsersList
      summary: Paginated Slack identity dashboard rows
      tags: [slack]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSizeUnderscore"
        - name: status
          in: query
          schema:
            type: string
            enum: [all, linked, pending, unlinked]
            default: all
      responses:
        "200":
          description: Slack users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessSlackUserPage"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /admin/slack/users/{id}:
    parameters:
      - $ref: "#/components/parameters/KeycloakUserId"
    post:
      operationId: adminSlackUserRelinkNonce
      summary: Create re-link URL for Keycloak user
      tags: [slack]
      responses:
        "200":
          description: Relink payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessSlackRelink"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      operationId: adminSlackUserRevoke
      summary: Remove slack_user_id from Keycloak user
      tags: [slack]
      responses:
        "200":
          description: Revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessSlackRevoke"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /admin/slack/channel-mappings:
    get:
      operationId: adminListChannelMappings
      summary: List Slack channel to team mappings
      tags: [slack]
      responses:
        "200":
          description: Mappings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessChannelMappings"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "503": { $ref: "#/components/responses/ServiceUnavailableMongo" }
    post:
      operationId: adminUpsertChannelMapping
      summary: Upsert channel mapping
      tags: [slack]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChannelMappingUpsert"
      responses:
        "201":
          description: Created mapping
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessChannelMapping"
        "400": { $ref: "#/components/responses/BadRequest" }
        "503": { $ref: "#/components/responses/ServiceUnavailableMongo" }
    delete:
      operationId: adminDeactivateChannelMapping
      summary: Soft-deactivate mapping by id
