openapi: 3.1.0
info:
  title: CAIPE RAG Server API
  version: 1.0.0
  description: |
    REST API for the CAIPE RAG server (FastAPI): datasource metadata, ingestion jobs,
    hybrid vector search, graph exploration (when enabled), MCP tool configuration, and health.
    Validates Bearer JWT (OIDC/Keycloak) via JWKS unless noted otherwise.
servers:
  - url: /
    description: RAG Server
tags:
  - name: datasources
    description: Datasource metadata CRUD and listing
  - name: ingestion
    description: Ingestors, jobs, document ingest, and web/Confluence queue endpoints
  - name: query
    description: Semantic/sparse hybrid search over the vector collection
  - name: graph-explore
    description: Neo4j data and ontology graph exploration (requires ENABLE_GRAPH_RAG)
  - name: mcp-tools
    description: MCP search tool configs and built-in tool toggles in Redis
  - name: health
    description: Process health and configuration snapshot
security:
  - bearerAuth: []
paths:
  /v1/user/info:
    get:
      operationId: getUserInfo
      summary: Get current user information
      description: |
        Returns resolved role, groups, and permission strings for UI gating.
        No authentication required; anonymous and trusted-network contexts are supported.
      tags:
        - query
      security: []
      parameters: []
      responses:
        "200":
          description: User context and permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfoResponse"

  /v1/ingestors:
    get:
      operationId: listIngestors
      summary: List registered ingestors
      tags:
        - ingestion
      parameters:
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      responses:
        "200":
          description: Array of ingestor records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IngestorInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/ingestor/heartbeat:
    post:
      operationId: pingIngestor
      summary: Register or refresh ingestor heartbeat
      tags:
        - ingestion
      parameters:
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestorPingRequest"
      responses:
        "200":
          description: Heartbeat accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestorPingResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/ingestor/delete:
    delete:
      operationId: deleteIngestor
      summary: Delete ingestor metadata
      tags:
        - ingestion
      parameters:
        - name: ingestor_id
          in: query
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      responses:
        "200":
          description: Ingestor removed from metadata
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Ingestor not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/datasource:
    post:
      operationId: upsertDatasource
      summary: Create or update datasource metadata
      tags:
        - datasources
      parameters:
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataSourceInfo"
      responses:
        "202":
          description: Datasource metadata accepted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: deleteDatasource
      summary: Delete datasource and associated vector/graph data
      tags:
        - datasources
      parameters:
        - name: datasource_id
          in: query
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      responses:
        "200":
          description: Datasource deleted
        "400":
          description: Ingestion job in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Datasource not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/datasources:
    get:
      operationId: listDatasources
      summary: List datasources
      tags:
        - datasources
      parameters:
        - name: ingestor_id
          in: query
          required: false
          schema:
            type: string
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      responses:
        "200":
          description: Datasource list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasourceListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/job/{job_id}:
    get:
      operationId: getJob
      summary: Get ingestion job by ID
      tags:
        - ingestion
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/jobs/datasource/{datasource_id}:
    get:
      operationId: getJobsByDatasource
      summary: List jobs for a datasource
      tags:
        - ingestion
      parameters:
        - name: datasource_id
          in: path
          required: true
          schema:
            type: string
        - name: status_filter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/JobStatus"
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      responses:
        "200":
          description: Jobs for datasource
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: No jobs for datasource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/jobs/batch:
    post:
      operationId: getJobsBatch
      summary: Batch fetch jobs for multiple datasources
      tags:
        - ingestion
      parameters:
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobsBatchRequest"
      responses:
        "200":
          description: Jobs grouped by datasource_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobsBatchResponse"
        "400":
          description: Too many datasource IDs or invalid status filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/job:
    post:
      operationId: createJob
      summary: Create a new ingestion job
      tags:
        - ingestion
      parameters:
        - name: datasource_id
          in: query
          required: true
          schema:
            type: string
        - name: job_status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/JobStatus"
        - name: message
          in: query
          required: false
          schema:
            type: string
        - name: total
          in: query
          required: false
          schema:
            type: integer
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobCreateResponse"
        "400":
          description: Failed to create job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Datasource not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/job/{job_id}:
    patch:
      operationId: updateJob
      summary: Update job status or metadata
      tags:
        - ingestion
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
        - name: job_status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/JobStatus"
        - name: message
          in: query
          required: false
          schema:
            type: string
        - name: total
          in: query
          required: false
          schema:
            type: integer
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      responses:
        "200":
          description: Job updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobPatchResponse"
        "400":
          description: Update failed (e.g. terminated job)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/job/{job_id}/terminate:
    post:
      operationId: terminateJob
      summary: Terminate an ingestion job
      tags:
        - ingestion
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      responses:
        "200":
          description: Job terminated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobTerminateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/job/{job_id}/increment-progress:
    post:
      operationId: incrementJobProgress
      summary: Increment job progress counter
      tags:
        - ingestion
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
        - name: increment
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      responses:
        "200":
          description: New progress value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobProgressResponse"
        "400":
          description: Job terminated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/job/{job_id}/increment-failure:
    post:
      operationId: incrementJobFailure
      summary: Increment job failure counter
      tags:
        - ingestion
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
        - name: increment
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      responses:
        "200":
          description: New failure count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobFailureResponse"
        "400":
          description: Job terminated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/job/{job_id}/add-errors:
    post:
      operationId: addJobErrors
      summary: Append error messages to a job
      tags:
        - ingestion
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
      responses:
        "200":
          description: Errors recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAddErrorsResponse"
        "400":
          description: Empty list or job terminated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/query:
    post:
      operationId: queryDocuments
      summary: Hybrid semantic and sparse (BM25) search
      tags:
        - query
      parameters:
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
      responses:
        "200":
          description: Ranked document hits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QueryResult"
        "400":
          description: Limit exceeds server maximum
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/ingest:
    post:
      operationId: ingestDocuments
      summary: Bulk ingest documents into Milvus (and graph when enabled)
      tags:
        - ingestion
      parameters:
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentIngestRequest"
      responses:
        "202":
          description: Ingestion started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestAcceptedMessage"
        "400":
          description: Validation error, document limit, or wrong job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageBody"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Datasource or job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/ingest/webloader/url:
    post:
      operationId: ingestWebloaderUrl
      summary: Queue URL crawl for webloader ingestor
      tags:
        - ingestion
      parameters:
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UrlIngestRequest"
      responses:
        "202":
          description: Request queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebIngestQueuedResponse"
        "400":
          description: URL already ingested or job pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/ingest/webloader/reload:
    post:
      operationId: reloadWebloaderDatasource
      summary: Re-queue URL datasource reload
      tags:
        - ingestion
      parameters:
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UrlReloadRequest"
      responses:
        "202":
          description: Reload queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasourceMessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Datasource not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/ingest/webloader/reload-all:
    post:
      operationId: reloadAllWebloaderUrls
      summary: Re-queue reload for all web URL datasources
      tags:
        - ingestion
      parameters:
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      responses:
        "202":
          description: Bulk reload queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleMessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/ingest/confluence/page:
    post:
      operationId: ingestConfluencePage
      summary: Queue Confluence page (and optional children) for ingestion
      tags:
        - ingestion
      parameters:
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfluenceIngestRequest"
      responses:
        "202":
          description: Request queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebIngestQueuedResponse"
        "400":
          description: Invalid URL, host mismatch, or job pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/ingest/confluence/reload:
    post:
      operationId: reloadConfluenceDatasource
      summary: Re-queue Confluence datasource reload
      tags:
        - ingestion
      parameters:
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfluenceReloadRequest"
      responses:
        "202":
          description: Reload queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasourceMessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Datasource not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/ingest/confluence/reload-all:
    post:
      operationId: reloadAllConfluencePages
      summary: Re-queue reload for all Confluence datasources
      tags:
        - ingestion
      parameters:
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      responses:
        "202":
          description: Bulk reload queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleMessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/graph/explore/entity_type:
    get:
      operationId: listGraphEntityTypes
      summary: List ontology entity types
      description: Requires graph RAG and Neo4j. Returns payload from ontology graph driver.
      tags:
        - graph-explore
      parameters:
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      responses:
        "200":
          description: Entity types (structure varies by deployment)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/graph/explore/data/entities/batch:
    get:
      operationId: fetchDataEntitiesBatch
      summary: Paginated entities from data graph
      tags:
        - graph-explore
      parameters:
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - name: entity_type
          in: query
          required: false
          schema:
            type: string
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      responses:
        "200":
          description: Entity batch page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityBatchResponse"
        "400":
          description: Limit exceeds maximum
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/graph/explore/data/relations/batch:
    get:
      operationId: fetchDataRelationsBatch
      summary: Paginated relations from data graph
      tags:
        - graph-explore
      parameters:
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - name: relation_name
          in: query
          required: false
          schema:
