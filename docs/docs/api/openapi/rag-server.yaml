components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: OIDC / Keycloak access token (optional on some routes; trusted network may apply per server config)

  parameters:
    XTenantId:
      name: X-Tenant-Id
      in: header
      required: false
      schema:
        type: string
      description: Tenant/org for team/KB datasource scoping when enterprise RBAC is enabled
    XTeamId:
      name: X-Team-Id
      in: header
      required: false
      schema:
        type: string
      description: Team for KB-scoped datasource resolution when enterprise RBAC is enabled

  responses:
    Unauthorized:
      description: Missing or invalid Bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorDetail"
    Forbidden:
      description: Authenticated but insufficient role or policy denied
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorDetail"
    InternalError:
      description: Server error or dependency not initialized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorDetail"

  schemas:
    ErrorDetail:
      type: object
      properties:
        detail:
          oneOf:
            - type: string
            - type: array
              items: {}
      additionalProperties: true

    MessageBody:
      type: object
      properties:
        message:
          type: string
      additionalProperties: true

    UserInfoResponse:
      type: object
      required:
        - email
        - role
        - is_authenticated
        - groups
        - permissions
        - in_trusted_network
      properties:
        email:
          type: string
        role:
          type: string
          description: anonymous | readonly | ingestonly | admin
        is_authenticated:
          type: boolean
        groups:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
          description: e.g. read, ingest, delete
        in_trusted_network:
          type: boolean

    DataSourceInfo:
      type: object
      required:
        - datasource_id
        - ingestor_id
        - source_type
      properties:
        datasource_id:
          type: string
        ingestor_id:
          type: string
        description:
          type: string
          default: ""
        source_type:
          type: string
        last_updated:
          type: integer
        default_chunk_size:
          type: integer
          nullable: true
        default_chunk_overlap:
          type: integer
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true

    DatasourceListResponse:
      type: object
      required:
        - success
        - datasources
        - count
      properties:
        success:
          type: boolean
        datasources:
          type: array
          items:
            $ref: "#/components/schemas/DataSourceInfo"
        count:
          type: integer

    IngestorInfo:
      type: object
      required:
        - ingestor_id
        - ingestor_type
        - ingestor_name
      properties:
        ingestor_id:
          type: string
        ingestor_type:
          type: string
        ingestor_name:
          type: string
        description:
          type: string
          default: ""
        metadata:
          type: object
          additionalProperties: true
        last_seen:
          type: integer
          default: 0

    IngestorPingRequest:
      type: object
      required:
        - ingestor_type
        - ingestor_name
      properties:
        ingestor_type:
          type: string
        ingestor_name:
          type: string
        description:
          type: string
          default: ""
        metadata:
          type: object
          additionalProperties: true
          default: {}

    IngestorPingResponse:
      type: object
      required:
        - ingestor_id
        - max_documents_per_ingest
        - message
      properties:
        ingestor_id:
          type: string
        max_documents_per_ingest:
          type: integer
        message:
          type: string

    JobStatus:
      type: string
      enum:
        - pending
        - in_progress
        - completed
        - completed_with_errors
        - terminated
        - failed

    JobInfo:
      type: object
      required:
        - job_id
        - status
        - created_at
      properties:
        job_id:
          type: string
        status:
          $ref: "#/components/schemas/JobStatus"
        message:
          type: string
          nullable: true
        created_at:
          type: integer
        completed_at:
          type: integer
          nullable: true
        total:
          type: integer
          nullable: true
        progress_counter:
          type: integer
          default: 0
        failed_counter:
          type: integer
          default: 0
        error_msgs:
          type: array
          items:
            type: string
          default: []
        datasource_id:
          type: string
          nullable: true
        document_count:
          type: integer
          default: 0
        chunk_count:
          type: integer
          default: 0

    JobsBatchRequest:
      type: object
      required:
        - datasource_ids
      properties:
        datasource_ids:
          type: array
          items:
            type: string
          maxItems: 100
        status_filter:
          type: array
          items:
            type: string
          nullable: true

    JobsBatchResponse:
      type: object
      required:
        - jobs
        - total_jobs
        - datasource_count
      properties:
        jobs:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/JobInfo"
        total_jobs:
          type: integer
        datasource_count:
          type: integer

    JobCreateResponse:
      type: object
      required:
        - job_id
        - datasource_id
      properties:
        job_id:
          type: string
        datasource_id:
          type: string

    JobPatchResponse:
      type: object
      required:
        - job_id
        - datasource_id
      properties:
        job_id:
          type: string
        datasource_id:
          type: string

    JobTerminateResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string

    JobProgressResponse:
      type: object
      required:
        - job_id
        - progress_counter
      properties:
        job_id:
          type: string
        progress_counter:
          type: integer

    JobFailureResponse:
      type: object
      required:
        - job_id
        - failed_counter
      properties:
        job_id:
          type: string
        failed_counter:
          type: integer

    JobAddErrorsResponse:
      type: object
      required:
        - job_id
        - errors_added
        - total_errors
      properties:
        job_id:
          type: string
        errors_added:
          type: integer
        total_errors:
          type: integer

    LangChainDocument:
      type: object
      required:
        - page_content
      properties:
        page_content:
          type: string
        metadata:
          type: object
          additionalProperties: true
          default: {}

    QueryRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
        limit:
          type: integer
          minimum: 1
          default: 3
        similarity_threshold:
          type: number
          minimum: 0
          maximum: 1
          default: 0.3
        filters:
          type: object
          additionalProperties: true
          nullable: true
          description: e.g. datasource_id; values may be string, bool, or array
        ranker_type:
          type: string
          default: weighted
        ranker_params:
          type: object
          additionalProperties: true
          nullable: true

    QueryResult:
      type: object
      required:
        - document
        - score
      properties:
        document:
          $ref: "#/components/schemas/LangChainDocument"
        score:
          type: number

    DocumentIngestRequest:
      type: object
      required:
        - documents
        - ingestor_id
        - datasource_id
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/LangChainDocument"
        ingestor_id:
          type: string
        datasource_id:
          type: string
        job_id:
          type: string
          nullable: true
        fresh_until:
          type: integer
          default: 0
          description: Epoch seconds until data is considered fresh

    IngestAcceptedMessage:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Text data ingestion started successfully

    CrawlMode:
      type: string
      enum:
        - single
        - sitemap
        - recursive

    ScrapySettings:
      type: object
      properties:
        crawl_mode:
          $ref: "#/components/schemas/CrawlMode"
        max_depth:
          type: integer
          minimum: 1
          maximum: 10
          default: 2
        max_pages:
          type: integer
          minimum: 1
          default: 2000
        render_javascript:
          type: boolean
          default: false
        wait_for_selector:
          type: string
          nullable: true
        page_load_timeout:
          type: integer
          minimum: 5
          maximum: 120
          default: 15
        follow_external_links:
          type: boolean
          default: false
        allowed_url_patterns:
          type: array
          items:
            type: string
          nullable: true
        denied_url_patterns:
          type: array
          items:
            type: string
