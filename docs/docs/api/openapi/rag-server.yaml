  /v1/graph/ontology/agent/{path}:
    get:
      operationId: proxyOntologyAgentGet
      summary: Reverse proxy to ontology agent (GET)
      description: |
        Proxies to ONTOLOGY_AGENT_RESTAPI_ADDR. GET paths ending with `/status` require readonly;
        other GET paths require admin. Response is streamed from upstream.
      tags:
        - graph-explore
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      responses:
        "200":
          description: Upstream response (streaming body; media type varies)
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: proxyOntologyAgentPost
      summary: Reverse proxy to ontology agent (POST)
      description: Requires admin role. Streams upstream response.
      tags:
        - graph-explore
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      requestBody:
        description: Forwarded verbatim to ontology agent
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Upstream response (streaming)
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "403":
          $ref: "#/components/responses/Forbidden"
    delete:
      operationId: proxyOntologyAgentDelete
      summary: Reverse proxy to ontology agent (DELETE)
      description: Requires admin role.
      tags:
        - graph-explore
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTeamId"
      responses:
        "200":
          description: Upstream response (streaming)
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "403":
          $ref: "#/components/responses/Forbidden"

