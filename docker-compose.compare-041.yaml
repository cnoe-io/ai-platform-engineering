# Comparison stack: run slack-bot 0.2.41 pointing to caipe-supervisor-041
#
# Usage:
#   docker compose -f docker-compose.compare-041.yaml up -d
#   docker compose -f docker-compose.compare-041.yaml down
#
# Supervisor 0.2.41 is already running on port 8041.
# Slack-bot 0.2.41 connects to it and listens on #test-april-2025.

name: caipe-041

services:

  slack-bot-041:
    image: ghcr.io/cnoe-io/caipe-slack-bot:0.2.41
    container_name: slack-bot-041
    env_file:
      - .env
    ports:
      - "38001:3000"
    environment:
      - CAIPE_URL=http://caipe-supervisor-041:8000
      - SLACK_INTEGRATION_APP_NAME=${SLACK_INTEGRATION_APP_NAME:-CAIPE-041}
      - SLACK_INTEGRATION_BOT_TOKEN=${SLACK_INTEGRATION_BOT_TOKEN_041}
      - SLACK_INTEGRATION_APP_TOKEN=${SLACK_INTEGRATION_APP_TOKEN_041}
      - SLACK_INTEGRATION_BOT_CONFIG=${SLACK_INTEGRATION_BOT_CONFIG_041}
    networks:
      - caipe-net
    restart: unless-stopped

networks:
  caipe-net:
    external: true
    name: ai-platform-engineering_default
