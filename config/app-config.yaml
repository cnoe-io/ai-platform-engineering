# CAIPE UI — application seed configuration (committed example template)
# ------------------------------------------------------------------------
# This file is the EXAMPLE/template for app-config. The docker-compose
# stack mounts the file pointed to by `APP_CONFIG_FILE` (set in .env);
# by default it falls back to this committed template, which seeds nothing.
#
# For local dev, copy this file to `config/app-config.local.yaml` and
# uncomment / customize the sections you need:
#
#   cp config/app-config.yaml config/app-config.local.yaml
#   # then in .env:  APP_CONFIG_FILE=./config/app-config.local.yaml
#
# `config/*.local.yaml` is gitignored.
#
# In Kubernetes deployments, Helm resolves the appConfig.* values block
# (see applications/caipe/dev/a/values.yaml → appConfig) into the mounted
# ConfigMap, so this file is NOT used in cluster deployments.
#
# Entities defined here are "config-driven": they are upserted into
# MongoDB on every restart, marked config_driven=true, and cannot be
# edited/deleted via the UI. Stale entries (removed from this file)
# are automatically cleaned up.
#
# In docker-compose dev mode, ${VAR:-default} syntax is expanded at
# load time. In Kubernetes, Helm resolves values before creating the
# ConfigMap, so the mounted YAML contains literal values.

# ── Models ────────────────────────────────────────────────────────
# At least one model must be present for AI Assist (Skill description /
# SKILL.md generation, Dynamic Agents builder) to function. The `model_id`
# value MUST match what the configured provider expects:
#
#   aws-bedrock  → raw Bedrock modelId, e.g. "global.anthropic.claude-sonnet-4-6"
#                  (NO "bedrock/" prefix — cnoe-agent-utils passes it straight
#                  to boto3 and Bedrock will reject a prefixed string).
#   openai       → OpenAI model name, e.g. "gpt-4o"
#   azure-openai → Azure deployment name (matches AZURE_OPENAI_DEPLOYMENT)
#   anthropic-claude → Anthropic model id, e.g. "claude-sonnet-4-5"
#
# `provider` must be one of the cnoe-agent-utils bindings.
models:
  # AWS Bedrock — Claude family (inference-profile IDs, "global." prefix).
  # Requires AWS_REGION + AWS credentials (env or AWS_PROFILE) on the
  # dynamic-agents container. Mirrors platform-apps-deployment caipe/dev.
  - model_id: "global.anthropic.claude-haiku-4-5-20251001-v1:0"
    name: "Claude Haiku 4.5 (Bedrock)"
    provider: "aws-bedrock"
    description: "Fast, efficient Claude 4.5 Haiku via AWS Bedrock (default)"
  - model_id: "global.anthropic.claude-sonnet-4-6"
    name: "Claude Sonnet 4.6 (Bedrock)"
    provider: "aws-bedrock"
    description: "Claude Sonnet 4.6 via AWS Bedrock"
  - model_id: "global.anthropic.claude-sonnet-4-5-20250929-v1:0"
    name: "Claude Sonnet 4.5 (Bedrock)"
    provider: "aws-bedrock"
    description: "Claude Sonnet 4.5 via AWS Bedrock"
  # Azure OpenAI — uncomment when AZURE_OPENAI_* envs are set on
  # dynamic-agents. `model_id` must match the Azure deployment name.
  # - model_id: "gpt-4o"
  #   name: "GPT-4o (Azure)"
  #   provider: "azure-openai"
  #   description: "GPT-4o via Azure OpenAI"
  # - model_id: "gpt-4o-mini"
  #   name: "GPT-4o Mini (Azure)"
  #   provider: "azure-openai"
  #   description: "Fast, cost-effective GPT-4o Mini via Azure OpenAI"

# ── MCP Servers ───────────────────────────────────────────────────
# Supported transports: "http" (streamable HTTP), "sse", "stdio"
# Hostnames are docker-compose service names; only services actually running
# in your COMPOSE_PROFILES will be reachable. Disabled-by-default ones can
# still be flipped on via the UI later.
mcp_servers:
  # ── Per-user OAuth (Webex Meetings) — for Pam Beesly ─────────
  # Local proxy that mirrors Cisco's official Webex Meetings MCP tool surface
  # but hits webexapis.com REST directly. Drop-in swap for
  # https://mcp.webexapis.com/mcp/webex-meeting once cisco.com Control Hub
  # enables agentic apps for the org. The dynamic-agents runtime injects the
  # per-user OAuth bearer (resolved from vendor_connections) on every request;
  # the MCP server forwards it to webexapis.com.
  - id: "webex_meetings"
    name: "Webex Meetings"
    description: "Webex meeting/transcript tools (per-user OAuth — Settings → Integrations → Connect Webex)."
    transport: "http"
    endpoint: "http://mcp-webex-meetings:8000/mcp"
    auth:
      type: "user_oauth"
      provider: "webex"
    enabled: true

  # ── Pod Meeting helper (Pam Beesly internal utility) ─────────
  # Pure server-to-server. No auth. Reads MONGODB_URI for pod registry.
  - id: "pod_meeting"
    name: "Pod Meeting Helper"
    description: "Deterministic helpers for pod meeting prep + writeup (VTT parse, action/decision extraction, agenda + notes XHTML)."
    transport: "http"
    endpoint: "http://mcp-pod-meeting:8000/mcp"
    enabled: true

  # ── In-house MCP servers (require their compose profiles) ────
  - id: "webex"
    name: "Webex"
    description: "In-house Webex messaging MCP (uses shared WEBEX_TOKEN bot)"
    transport: "http"
    endpoint: "http://mcp-webex:8000/mcp"
    enabled: true

  # Same mcp-webex deployment, different bot identity. Runtime injects
  # WEBEX_PAM_TOKEN per-request as the Authorization header; mcp-webex
  # forwards it to webexapis.com. Add more entries here for additional
  # personas (Dwight, Jim, etc.) — one Mongo row per bot, one shared pod.
  - id: "webex_pam"
    name: "Webex (Pam Bot)"
    description: "Webex messaging via Pam Beesly's bot identity."
    transport: "http"
    endpoint: "http://mcp-webex:8000/mcp"
    auth:
      type: "bot_token"
      secret_ref: "WEBEX_PAM_TOKEN"
    enabled: true
  - id: "confluence"
    name: "Confluence"
    description: "Confluence wiki and documentation"
    transport: "http"
    endpoint: "http://mcp-confluence:8000/mcp"
    enabled: true
  - id: "jira"
    name: "Jira"
    description: "Jira issue tracking and project management"
    transport: "http"
    endpoint: "http://mcp-jira:8000/mcp"
    enabled: false
  - id: "argocd"
    name: "ArgoCD"
    description: "ArgoCD application and deployment management"
    transport: "http"
    endpoint: "http://mcp-argocd:8000/mcp"
    enabled: false
  - id: "pagerduty"
    name: "PagerDuty"
    description: "PagerDuty incident management"
    transport: "http"
    endpoint: "http://mcp-pagerduty:8000/mcp"
    enabled: false
  - id: "slack"
    name: "Slack"
    description: "Slack messaging"
    transport: "http"
    endpoint: "http://mcp-slack:8000/mcp"
    enabled: false
  - id: "backstage"
    name: "Backstage"
    description: "Backstage catalog"
    transport: "http"
    endpoint: "http://mcp-backstage:8000/mcp"
    enabled: false
  - id: "github"
    name: "GitHub"
    description: "GitHub repository operations"
    transport: "http"
    endpoint: "http://mcp-github:8000/mcp"
    enabled: false
  - id: "knowledge-base"
    name: "Knowledge Base"
    description: "RAG knowledge base"
    transport: "http"
    endpoint: "http://rag_server:9446/mcp"
    enabled: true

