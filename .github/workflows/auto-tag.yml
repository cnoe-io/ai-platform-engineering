name: "[Release] Auto-tag on Push"
# Automatically tag commits on main or branches with release/** prefix
# (release or hotfix branches) based on version changes.
run-name: >-
  Auto-tag ${{
    github.ref == 'refs/heads/main' && 'dev (or new release)' ||
    contains(github.ref, '-hotfix') && 'hotfix' ||
    'rc'
  }} [${{ github.ref_name }}]

on:
  push:
    branches:
      - main
      - 'release/**'
    paths:
      # App code / build changes
      - 'ai_platform_engineering/**'
      - 'build/**'
      - 'pyproject.toml'
      - 'uv.lock'
      # Chart changes
      - 'charts/**'

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  auto-tag:
    name: Determine version, update files, tag and push
    runs-on: ubuntu-latest
    # Don't run on commits pushed by the release bot or final release PR bumps (avoid infinite loops).
    if: >-
      ${{
        !(
          github.event.head_commit.author.email == 'caipe-ci-release[bot]@users.noreply.github.com' ||
          github.event.head_commit.committer.email == 'caipe-ci-release[bot]@users.noreply.github.com' ||
          (
            startsWith(github.ref, 'refs/heads/release/') &&
            startsWith(github.event.head_commit.message, 'chore: bump version to ') &&
            !contains(github.event.head_commit.message, '-rc.') &&
            !contains(github.event.head_commit.message, '-dev.') &&
            !contains(github.event.head_commit.message, '-chart.') &&
            !contains(github.event.head_commit.message, '-hotfix.') &&
            (
              github.event.head_commit.author.email == 'github-actions[bot]@users.noreply.github.com' ||
              github.event.head_commit.committer.email == 'github-actions[bot]@users.noreply.github.com'
            )
          )
        )
      }}
    steps:
      - name: 🔒 Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 🔑 Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.CI_RELEASE_APP_ID }}
          private-key: ${{ secrets.CI_RELEASE_APP_PRIVATE_KEY }}
          permission-actions: write
          permission-contents: write
          permission-packages: write

      - name: 📥 Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      # ── Release branch merge detection ──────────────────────────────
      - name: 🔍 Detect release branch merge to main
        id: release-merge
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          RELEASE_VERSION=""

          # Detection strategies for release branch merges to main:
          #   1. Merge commit (PR "Create a merge commit" or local --no-ff): second parent on release branch
          #   2. Squash merge (PR "Squash and merge"): commit message contains release/x.y.z
          #   3. Fast-forward (direct push or local merge when main is behind): HEAD itself is on release branch
          # NOT covered: "Rebase and merge" — creates new SHAs, no merge commit, no branch name in messages.
          #   Disable rebase-and-merge for release PRs in repo settings.

          # Method 1: Merge commit — check second parent against release branches
          PARENTS=$(git log -1 --format='%P' HEAD)
          PARENT_COUNT=$(echo "$PARENTS" | wc -w)

          if [[ "$PARENT_COUNT" -ge 2 ]]; then
            SECOND_PARENT=$(echo "$PARENTS" | awk '{print $2}')
            echo "🔍 Merge commit detected. Checking second parent: $SECOND_PARENT"
            RELEASE_BRANCH=$(git branch -r --contains "$SECOND_PARENT" 2>/dev/null \
              | grep -oP 'origin/release/\K[0-9]+\.[0-9]+\.[0-9]+$' \
              | head -n 1 || true)
            if [[ -n "$RELEASE_BRANCH" ]]; then
              RELEASE_VERSION="$RELEASE_BRANCH"
              echo "✅ Merge from release/$RELEASE_VERSION detected (via second parent)"
            fi
          fi

          # Method 2: Squash merge — check commit message for release/x.y.z
          if [[ -z "$RELEASE_VERSION" ]]; then
            COMMIT_MSG=$(git log -1 --format='%s' HEAD)
            if [[ "$COMMIT_MSG" =~ release/([0-9]+\.[0-9]+\.[0-9]+) ]]; then
              RELEASE_VERSION="${BASH_REMATCH[1]}"
              echo "✅ Squash merge from release/$RELEASE_VERSION detected (via commit message)"
            fi
          fi

          # Method 3: Fast-forward — HEAD itself is on a release branch
          if [[ -z "$RELEASE_VERSION" ]]; then
            FF_BRANCH=$(git branch -r --contains HEAD 2>/dev/null \
              | grep -oP 'origin/release/\K[0-9]+\.[0-9]+\.[0-9]+$' \
              | head -n 1 || true)
            if [[ -n "$FF_BRANCH" ]]; then
              RELEASE_VERSION="$FF_BRANCH"
              echo "✅ Fast-forward from release/$RELEASE_VERSION detected (HEAD on release branch)"
            fi
          fi

          if [[ -n "$RELEASE_VERSION" ]]; then
            echo "🚀 Release branch merge detected — version: $RELEASE_VERSION"
            echo "is_release_merge=true" >> "$GITHUB_OUTPUT"
            echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "ℹ️ Not a release branch merge — proceeding with normal auto-tag"
            echo "is_release_merge=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 🏷️ Detect existing release tag on HEAD
        id: existing-release-tag
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          set -euo pipefail

          git fetch --tags --force --quiet || true
          RELEASE_TAG=$(git tag --points-at HEAD | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)

          if [[ -n "$RELEASE_TAG" ]]; then
            echo "✅ HEAD is already release-tagged with $RELEASE_TAG; skipping dev auto-tag"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 🚀 Dispatch release-manual for release merge
        if: ${{ steps.release-merge.outputs.is_release_merge == 'true' && steps.existing-release-tag.outputs.skip != 'true' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.release-merge.outputs.version }}
        run: |
          echo "🚀 Dispatching release-manual.yml with version=$VERSION"

          gh workflow run release-manual.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            -f version="$VERSION"

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          # 🔀 Release Branch Merge Detected

          | Property | Value |
          |----------|-------|
          | **Version** | \`${VERSION}\` |
          | **Action** | Dispatched \`release-manual.yml\` |
          | **Branch** | \`main\` |
          | **Commit** | \`${GITHUB_SHA}\` |
          EOF

      - name: 📊 Existing release tag summary
        if: ${{ steps.existing-release-tag.outputs.skip == 'true' }}
        env:
          RELEASE_TAG: ${{ steps.existing-release-tag.outputs.tag }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          # 🏷️ Auto-tag Skipped

          | Property | Value |
          |----------|-------|
          | **Reason** | Current commit is already release-tagged |
          | **Release tag** | \`${RELEASE_TAG}\` |
          | **Branch** | \`${GITHUB_REF#refs/heads/}\` |
          | **Commit** | \`${GITHUB_SHA}\` |

          No dev tag was created because this commit already represents a release.
          EOF

      # ── Normal auto-tag flow (skip if release merge) ───────────────────
      - name: 🐍 Set up Python
        if: ${{ steps.release-merge.outputs.is_release_merge != 'true' && steps.existing-release-tag.outputs.skip != 'true' }}
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.13'

      - name: 📦 Install uv
        if: ${{ steps.release-merge.outputs.is_release_merge != 'true' && steps.existing-release-tag.outputs.skip != 'true' }}
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      # ── Shared Logic 1: determine version ──────────────────────────────
      - name: 🏷️ Determine version
        if: ${{ steps.release-merge.outputs.is_release_merge != 'true' && steps.existing-release-tag.outputs.skip != 'true' }}
        id: version
        uses: ./.github/actions/determine-version
        with:
          token: ${{ steps.app-token.outputs.token }}

      # ── Shared Logic 2: update version files ───────────────────────────
      - name: 📝 Update version files
        if: ${{ steps.release-merge.outputs.is_release_merge != 'true' && steps.existing-release-tag.outputs.skip != 'true' }}
        id: update
        uses: ./.github/actions/update-version-files
        with:
          version: ${{ steps.version.outputs.tag }}
          diff_target: ${{ steps.version.outputs.diff_target }}
      # ── Commit + tag + push ────────────────────────────────────────────
      - name: 📤 Commit, tag, and push
        if: ${{ steps.release-merge.outputs.is_release_merge != 'true' && steps.existing-release-tag.outputs.skip != 'true' }}
        id: push-tag
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ steps.update.outputs.final_version }}
        run: |
          set -euo pipefail

          git config user.name "caipe-ci-release[bot]"
          git config user.email "caipe-ci-release[bot]@users.noreply.github.com"

          # assisted-by Codex Codex-sonnet-4-6
          # The workflow may be retried after a tag was already published; treat
          # that as an idempotent success instead of failing on duplicate refs.
          git fetch --tags --force --quiet || true
          if git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null ||
             git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "✅ Tag $TAG already exists; skipping commit/tag push"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=tag_exists" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if there are changes to commit
          if git diff --quiet && git diff --cached --quiet; then
            echo "ℹ️ No file changes to commit"
          else
            # Stage version-related files
            git add pyproject.toml uv.lock docs/docusaurus.config.ts docs/src/pages/index.tsx || true
            find charts -name "Chart.yaml" -type f -exec git add {} +

            git commit -m "chore: bump version to $TAG"
          fi

          # Create annotated tag and push
          git tag -a "$TAG" -m "Auto-tag $TAG"
          AUTH_HEADER=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w0)
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${AUTH_HEADER}" \
            push origin "HEAD:${GITHUB_REF_NAME}" "$TAG"

          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "✅ Pushed tag: $TAG"

      - name: 📊 Summary
        if: ${{ steps.release-merge.outputs.is_release_merge != 'true' && steps.existing-release-tag.outputs.skip != 'true' && steps.push-tag.outputs.pushed == 'true' }}
        env:
          TAG: ${{ steps.update.outputs.final_version }}
        run: |
          IS_CHART_ONLY=false
          [[ "$TAG" =~ -chart\.[0-9]+$ ]] && IS_CHART_ONLY=true

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          # 🏷️ Auto-tag Created

          | Property | Value |
          |----------|-------|
          | **Tag** | \`${TAG}\` |
          | **Branch** | \`${GITHUB_REF#refs/heads/}\` |
          | **Commit** | \`${GITHUB_SHA}\` |
          | **Chart-only** | \`${IS_CHART_ONLY}\` |

          ## What happens next

          - Tag push event triggers CI workflows
          - CI workflows read tag from \`github.ref_name\`
          EOF

          if [[ "$IS_CHART_ONLY" == "true" ]]; then
            echo "- ⏭️ Image builds **skipped** (chart-only change)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- 🔄 Image builds triggered (changed images rebuilt, unchanged retagged)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: 📊 Existing auto-tag summary
        if: ${{ steps.release-merge.outputs.is_release_merge != 'true' && steps.existing-release-tag.outputs.skip != 'true' && steps.push-tag.outputs.skip_reason == 'tag_exists' }}
        env:
          TAG: ${{ steps.update.outputs.final_version }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          # 🏷️ Auto-tag Skipped

          | Property | Value |
          |----------|-------|
          | **Reason** | Tag already exists |
          | **Tag** | \`${TAG}\` |
          | **Branch** | \`${GITHUB_REF#refs/heads/}\` |
          | **Commit** | \`${GITHUB_SHA}\` |

          This run was treated as successful because auto-tagging is idempotent.
          EOF
