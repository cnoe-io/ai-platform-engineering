name: "[Prebuild] Artifact Comment Reconciler"
description: "Rebuild the managed PR prebuild comment from uploaded status artifacts"

on:
  repository_dispatch:
    types: [prebuild-artifact-status]

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: prebuild-artifact-comment-pr-${{ github.event.client_payload.pr_number }}-sha-${{ github.event.client_payload.head_sha }}
  # Later dispatches reconcile the same artifact set, so stale runs can be canceled.
  cancel-in-progress: true

jobs:
  reconcile:
    runs-on: ubuntu-latest
    if: |
      github.event.client_payload.pr_number != '' &&
      github.event.client_payload.head_sha != ''
    steps:
      - name: 🔑 Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.CI_BUILD_APP_ID }}
          private-key: ${{ secrets.CI_BUILD_APP_PRIVATE_KEY }}
          permission-actions: read
          permission-issues: write
          permission-pull-requests: read

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Reconcile prebuild artifact comment
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.client_payload.pr_number }}
          HEAD_SHA: ${{ github.event.client_payload.head_sha }}
        run: python3 .github/scripts/reconcile-prebuild-artifacts.py
