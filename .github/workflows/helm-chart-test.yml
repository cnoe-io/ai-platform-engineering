name: "[Tests][Helm] Helm Chart"
description: "Test Helm charts"

on:
  push:
    branches: [ main, develop, 'release/**' ]
    paths:
      - 'charts/**'
      - '.github/workflows/helm-chart-test.yml'
  pull_request:
    branches: [ main, develop, 'release/**' ]
    paths:
      - 'charts/**'
      - '.github/workflows/helm-chart-test.yml'
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  helm-chart-test:
    if: github.actor != 'github-actions[bot]' && github.actor != 'caipe-ci-release[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        helm-version: ['v3.18.2', 'v3.17.3']

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
    - name: Set up Helm
      uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      with:
        version: ${{ matrix.helm-version }}

    - name: Add required Helm repositories
      run: |
        helm repo add milvus https://zilliztech.github.io/milvus-helm/
        helm repo add neo4j https://helm.neo4j.com/neo4j
        helm repo add external-secrets https://charts.external-secrets.io
        helm repo update

    - name: Login to GitHub Container Registry
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure Helm for OCI authentication
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_ACTOR: ${{ github.actor }}
      run: |
        echo "$GITHUB_TOKEN" | helm registry login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

    - name: Install Helm dependencies for rag-stack
      run: |
        cd charts/rag-stack
        helm dependency update

    - name: Install Helm dependencies for ai-platform-engineering
      run: |
        cd charts/ai-platform-engineering
        helm dependency update

    - name: Lint rag-stack chart
      run: |
        helm lint charts/rag-stack

    - name: Lint ai-platform-engineering chart
      run: |
        helm lint charts/ai-platform-engineering

    - name: Test rag-stack installation (dry-run)
      run: |
        cd charts/rag-stack
        helm template test-rag-stack . \
          --debug \
          --set milvus.cluster.enabled=false \
          --set milvus.etcd.replicaCount=1 \
          --set milvus.pulsar.enabled=false \
          --set milvus.minio.mode=standalone

    - name: Test ai-platform-engineering installation (dry-run) - All services
      run: |
        cd charts/ai-platform-engineering
        helm template test-all-services . \
          --debug \
          --set tags.complete=true \
          --set rag-stack.milvus.cluster.enabled=false \
          --set rag-stack.milvus.etcd.replicaCount=1 \
          --set rag-stack.milvus.pulsar.enabled=false \
          --set rag-stack.milvus.minio.mode=standalone

    - name: Test ai-platform-engineering installation (dry-run) - Basic configuration
      run: |
        cd charts/ai-platform-engineering
        helm template test-basic . \
          --debug \
          --set tags.basic=true \
          --set tags.rag-stack=false

    - name: Test ai-platform-engineering installation (dry-run) - RBAC runtime
      run: |
        cd charts/ai-platform-engineering
        helm template test-rbac-runtime . \
          --debug \
          --set tags.keycloak=true \
          --set keycloak.admin.secretRef=caipe-keycloak-admin \
          --set openfga.enabled=true \
          --set openfgaAuthzBridge.enabled=true \
          --set agentgateway.enabled=true \
          --set openfga-authz-bridge.tokenValidation.issuer=https://idp.example.com/realms/caipe \
          --set openfga-authz-bridge.tokenValidation.audiences[0]=agentgateway \
          --set openfga-authz-bridge.tokenValidation.audiences[1]=caipe-platform

    - name: Test ai-platform-engineering installation (dry-run) - AgentGateway static routing (CRD-free, default)
      run: |
        cd charts/ai-platform-engineering
        # routingMode defaults to "static" and must NOT render any Gateway API /
        # AgentGateway custom resources (those require CRDs the operator may not be
        # able to install). MCP routes go into the standalone proxy static config.
        # No explicit routingMode is set here, so this also asserts the default.
        rendered=$(helm template test-agentgateway-static . \
          --set tags.basic=true \
          --set tags.rag-stack=false \
          --set tags.caipe-ui=true \
          --set global.deploymentMode=single-node \
          --set global.agentgateway.enabled=true \
          --set agentgateway.enabled=true \
          --set agent-argocd.mcp.agentgateway.enabled=true)
        if echo "$rendered" | grep -Eq 'kind:[[:space:]]*(Gateway|HTTPRoute|AgentgatewayBackend|AgentgatewayPolicy)'; then
          echo "ERROR: default routingMode rendered Gateway API / AgentGateway custom resources" >&2
          echo "$rendered" | grep -E 'kind:[[:space:]]*(Gateway|HTTPRoute|AgentgatewayBackend|AgentgatewayPolicy)' >&2
          exit 1
        fi
        echo "$rendered" | grep -q 'test-agentgateway-static-agentgateway-static-config' \
          || { echo "ERROR: static config ConfigMap was not rendered" >&2; exit 1; }
        # The UI must be wired to the standalone proxy admin /config for CRD-free discovery.
        echo "$rendered" | grep -q 'http://test-agentgateway-static-agentgateway:15000' \
          || { echo "ERROR: caipe-ui AGENT_GATEWAY_ADMIN_URL not wired to the standalone proxy admin endpoint" >&2; exit 1; }
        echo "OK: default (static) routing mode rendered no Gateway API CRs, produced the static config ConfigMap, and wired UI discovery"

    - name: Test ai-platform-engineering installation (dry-run) - AgentGateway gateway-api routing (opt-in)
      run: |
        cd charts/ai-platform-engineering
        # routingMode=gateway-api is opt-in and must render the Gateway API CRs.
        rendered=$(helm template test-agentgateway-gwapi . \
          --set tags.basic=true \
          --set tags.rag-stack=false \
          --set global.deploymentMode=single-node \
          --set global.agentgateway.enabled=true \
          --set agentgateway.enabled=true \
          --set global.agentgateway.routingMode=gateway-api \
          --set agent-argocd.mcp.agentgateway.enabled=true)
        echo "$rendered" | grep -Eq 'kind:[[:space:]]*Gateway$' \
          || { echo "ERROR: gateway-api mode did not render a Gateway custom resource" >&2; exit 1; }
        echo "OK: opt-in gateway-api routing mode rendered Gateway API CRs"

    - name: Test ai-platform-engineering installation (dry-run) - Minimal configuration
      run: |
        cd charts/ai-platform-engineering
        helm template test-minimal . \
          --debug \
          --set supervisor-agent.enabled=true \
          --set agent-argocd.enabled=false \
          --set agent-github.enabled=false \
          --set tags.rag-stack=false

    - name: Validate ai-platform-engineering image channels
      run: |
        python3 scripts/validate-helm-image-channel.py

    - name: Test rag-stack with different configurations
      run: |
        cd charts/rag-stack

        # Test with all services disabled except rag-server
        helm template test-minimal . \
          --set milvus.enabled=false \
          --set rag-server.enabled=true \
          --set agent-ontology.enabled=false \
          --set rag-redis.enabled=false \
          --set neo4j.enabled=false

        # Test with custom resource limits
        helm template test-resources . \
          --set milvus.cluster.enabled=false \
          --set milvus.etcd.replicaCount=1 \
          --set milvus.pulsar.enabled=false \
          --set milvus.minio.mode=standalone \
          --set rag-server.resources.limits.cpu=1000m \
          --set rag-server.resources.limits.memory=1Gi

    - name: Test with different resource configurations
      run: |
        cd charts/ai-platform-engineering

        # Test with custom resource limits
        helm template test-resources . \
          --set tags.basic=true \
          --set tags.rag-stack=true \
          --set rag-stack.milvus.cluster.enabled=false \
          --set rag-stack.milvus.etcd.replicaCount=1 \
          --set rag-stack.milvus.pulsar.enabled=false \
          --set rag-stack.milvus.minio.mode=standalone \
          --set rag-stack.rag-server.resources.limits.cpu=1000m \
          --set rag-stack.rag-server.resources.limits.memory=1Gi

    - name: Test with different storage classes
      run: |
        cd charts/ai-platform-engineering

        # Test with custom storage class
        helm template test-storage . \
          --set tags.rag-stack=true \
          --set rag-stack.milvus.cluster.enabled=false \
          --set rag-stack.milvus.etcd.replicaCount=1 \
          --set rag-stack.milvus.pulsar.enabled=false \
          --set rag-stack.milvus.minio.mode=standalone \
          --set rag-stack.rag-redis.persistence.storageClass=fast-ssd \
          --set rag-stack.rag-redis.persistence.size=5Gi

    - name: Test with different namespaces
      run: |
        cd charts/ai-platform-engineering

        # Test with custom namespace
        helm template test-namespace . \
          --namespace=ai-platform-test \
          --set tags.basic=true \
          --set tags.rag-stack=false

    - name: Test with SLIM integration
      run: |
        cd charts/ai-platform-engineering

        # Test with SLIM enabled
        helm template test-slim . \
          --set global.slim.enabled=true \
          --set global.slim.endpoint=http://slim-service:46357 \
          --set global.slim.transport=slim \
          --set tags.basic=true \
          --set tags.rag-stack=false

    - name: Test with different agent configurations
      run: |
        cd charts/ai-platform-engineering

        # Test with specific agents enabled
        helm template test-agents . \
          --set tags.complete=true \
          --set tags.rag-stack=false \
          --set agent-argocd.enabled=true \
          --set agent-github.enabled=true \
          --set agent-slack.enabled=true \
          --set agent-jira.enabled=true

    - name: Validate chart packages
      run: |
        # Package rag-stack
        cd charts/rag-stack
        helm package .
        helm lint rag-stack-*.tgz
        cd ../..

        # Package ai-platform-engineering
        cd charts/ai-platform-engineering
        helm package .
        helm lint ai-platform-engineering-*.tgz

    - name: Run Helm chart tests
      run: |
        # Test rag-stack chart tests if they exist
        if helm test --help > /dev/null 2>&1; then
          echo "Helm test command available"
          # Note: helm test requires a running cluster, so we just verify the test manifests render
          cd charts/rag-stack
          helm template test-rag . --show-only templates/tests/*.yaml 2>/dev/null || echo "No test templates in rag-stack"
          cd ../..

          cd charts/ai-platform-engineering
          helm template test-ai . --show-only templates/tests/*.yaml 2>/dev/null || echo "Rendering test templates"
        fi

    - name: Clean up
      if: always()
      run: |
        rm -f charts/rag-stack/*.tgz
        rm -f charts/ai-platform-engineering/*.tgz
        rm -rf charts/rag-stack/charts/*.tgz
        rm -rf charts/ai-platform-engineering/charts/*.tgz

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: helm-test-results-${{ matrix.helm-version }}
        path: |
          charts/**/*.tgz
        retention-days: 7
        if-no-files-found: ignore
