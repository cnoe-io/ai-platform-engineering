name: "[Docs] Snapshot & Prune Versions"

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to snapshot (e.g. 0.4.12)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  snapshot:
    name: Snapshot and prune doc versions
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout repository (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Determine version
        id: versions
        run: |
          NEW_VERSION="${{ github.event.inputs.version || github.ref_name }}"
          NEW_VERSION="${NEW_VERSION#v}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Snapshotting version: $NEW_VERSION"

      - name: Install helm-docs
        env:
          HELM_DOCS_VERSION: "1.14.2"
        run: |
          curl -sSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz helm-docs
          sudo mv helm-docs /usr/local/bin/helm-docs

      - name: Regenerate Helm chart docs
        run: make helm-docs

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 'lts/*'

      - name: Snapshot and prune doc versions
        env:
          NEW_VERSION: ${{ steps.versions.outputs.new_version }}
        run: |
          cd docs
          npm install --silent
          NEW_VERSION="$NEW_VERSION" node scripts/snapshot-and-prune-versions.js

      - name: Validate Docusaurus build
        run: |
          cd docs
          npm run build

      - name: Open PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          WORKFLOW_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.versions.outputs.new_version }}
        run: |
          BRANCH="docs/snapshot-${NEW_VERSION}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"

          git add docs/versioned_docs/ docs/versioned_sidebars/
          git add docs/versions.json docs/versions-config.json
          find docs -name "*.md" -newer /tmp -exec git add {} + 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No snapshot changes to commit"
            exit 0
          fi

          git commit -m "docs: snapshot version ${NEW_VERSION} and prune old versions"
          git push origin "$BRANCH"

          {
            echo "## Docs snapshot for ${NEW_VERSION}"
            echo ""
            echo "Auto-generated by the \`docs-snapshot\` workflow on tag push."
            echo ""
            echo "### What's in this PR"
            echo ""
            echo "- \`versioned_docs/version-${NEW_VERSION}/\` — frozen copy of current docs"
            echo "- \`versioned_sidebars/version-${NEW_VERSION}-sidebars.json\`"
            echo "- \`versions.json\` — updated with ${NEW_VERSION}, old versions pruned"
            echo "- \`versions-config.json\` — \`lastVersion\` set to ${NEW_VERSION}"
            echo "- Helm chart reference pages regenerated via \`make helm-docs\`"
            echo ""
            echo "**Retention policy**: 5 latest from current minor series + highest from each prior minor."
            echo ""
            echo "### Review checklist"
            echo ""
            echo "- [ ] Version dropdown shows correct entries"
            echo "- [ ] Docusaurus build passes (validated in CI)"
            echo "- [ ] Helm docs look correct"
          } > /tmp/pr-body.md

          GH_TOKEN="$WORKFLOW_TOKEN" gh pr create \
            --title "docs: snapshot ${NEW_VERSION}" \
            --base main \
            --head "$BRANCH" \
            --body-file /tmp/pr-body.md

          echo "PR opened: docs/snapshot-${NEW_VERSION}"
