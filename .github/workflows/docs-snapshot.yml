name: "[Docs] Register Published Version"

# On a release tag, register the new version in docs/published-versions.json and
# apply the retention policy. The heavy versioned_docs/ trees are NOT committed —
# they are materialised at build time from release tags by
# scripts/generate-versioned-docs.js (see publish-gh-pages.yml). This keeps the PR
# tiny (one JSON file) and avoids the giant, conflict-prone snapshot PRs.

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.5.3)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  register:
    name: Register published doc version
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: audit

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.CI_RELEASE_APP_ID }}
          private-key: ${{ secrets.CI_RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout repository (full history + tags)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Full history + tags so the build-time generator can snapshot each
          # published release tag during the validation build below.
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Determine version
        id: versions
        run: |
          NEW_VERSION="${{ github.event.inputs.version || github.ref_name }}"
          NEW_VERSION="${NEW_VERSION#v}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $NEW_VERSION"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 'lts/*'

      - name: Update published-versions.json (apply retention policy)
        env:
          NEW_VERSION: ${{ steps.versions.outputs.new_version }}
        run: node docs/scripts/update-published-versions.js

      - name: Install helm-docs
        env:
          HELM_DOCS_VERSION: "1.14.2"
        run: |
          curl -sSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz helm-docs
          sudo mv helm-docs /usr/local/bin/helm-docs

      - name: Regenerate Helm chart docs (current)
        run: make helm-docs

      - name: Install docs dependencies
        run: |
          cd docs
          npm install --silent

      - name: Generate versioned docs from release tags
        run: node docs/scripts/generate-versioned-docs.js

      - name: Validate Docusaurus build (all published versions)
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: |
          cd docs
          npm run build

      - name: Open PR (published-versions.json only)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_VERSION: ${{ steps.versions.outputs.new_version }}
        run: |
          BRANCH="docs/publish-${NEW_VERSION}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"

          # Only the small registry file (+ any refreshed Helm reference pages).
          # Generated versioned_docs/ are git-ignored and never committed.
          git add docs/published-versions.json
          git add docs/docs/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "published-versions.json already up to date; nothing to open."
            exit 0
          fi

          git commit -m "docs: publish version ${NEW_VERSION}"
          git push origin "$BRANCH"

          {
            echo "## Publish docs version ${NEW_VERSION}"
            echo ""
            echo "Auto-generated by the \`docs-snapshot\` workflow on tag push."
            echo ""
            echo "Adds \`${NEW_VERSION}\` to \`docs/published-versions.json\` and applies the"
            echo "retention policy. Versioned docs are generated at build time from"
            echo "release tags, so this PR does **not** commit any \`versioned_docs/\` trees."
            echo ""
            echo "The full multi-version Docusaurus build was validated in CI."
          } > /tmp/pr-body.md

          gh pr create \
            --title "docs: publish ${NEW_VERSION}" \
            --base main \
            --head "$BRANCH" \
            --body-file /tmp/pr-body.md

          # Keep the registry fresh: auto-merge so it never goes stale behind main.
          gh pr merge "$BRANCH" --auto --squash || \
            echo "Auto-merge could not be enabled; merge manually."

          echo "PR opened: $BRANCH"
