# Snyk container scan workflow.
# Scans the already-published GHCR image — does NOT rebuild from source.
# Requires SNYK_TOKEN to be set as a GitHub Actions secret.

name: Snyk Container

on:
  push:
    branches: [ "main" ]
    tags: [ '**' ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '19 11 * * 4'

permissions:
  contents: read

jobs:
  snyk:
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/ai-platform-engineering
    steps:
    - uses: actions/checkout@v4

    - name: Determine image tag
      id: tag
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        else
          echo "tag=latest" >> $GITHUB_OUTPUT
        fi

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Pull image to scan
      run: docker pull ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}

    - name: Run Snyk to check image for vulnerabilities
      continue-on-error: true
      uses: snyk/actions/docker@14818c4695ecc4045f33c9cee9e795a788711ca4
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        image: ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}

    - name: Upload result to GitHub Code Scanning
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: snyk.sarif
