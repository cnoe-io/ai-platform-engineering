name: "[CI] Dynamic Agents Build and Push"
description: "Build and push Dynamic Agents Docker image"

on:
  push:
    branches:
      - main
    paths:
      - 'ai_platform_engineering/dynamic_agents/**'
    tags:
      - '**'
  pull_request:
    paths:
      - 'ai_platform_engineering/dynamic_agents/**'
  workflow_dispatch:
    inputs:
      tag_version:
        description: 'Version tag to apply (e.g., 0.2.21)'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  determine-changes:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.set-outputs.outputs.should_build }}
      should_retag: ${{ steps.set-outputs.outputs.should_retag }}
      tag_version: ${{ steps.version.outputs.tag_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Determine Tag
        id: version
        uses: ./.github/actions/determine-release-tag
        with:
          manual_tag: ${{ inputs.tag_version }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            dynamic_agents:
              - 'ai_platform_engineering/dynamic_agents/**'

      - name: Set Outputs
        id: set-outputs
        env:
          DYNAMIC_AGENTS_CHANGED: ${{ steps.filter.outputs.dynamic_agents }}
          TAG_VERSION: ${{ steps.version.outputs.tag_version }}
        run: |
          SHOULD_BUILD="false"
          SHOULD_RETAG="false"
          TAG_VERSION="${{ env.TAG_VERSION }}"

          # Check if this is an RC tag
          if [[ "$TAG_VERSION" =~ -rc\.[0-9]+$ ]]; then
            IS_RC="true"
          else
            IS_RC="false"
          fi

          # Determine build vs retag logic:
          # 1. Final release (non-RC tag via workflow_dispatch or tag push): Always build
          # 2. RC tag with changes: Build
          # 3. RC tag without changes: Retag from previous version
          # 4. Push to main: Build
          # 5. PR or other: Build only if changed

          if [ -n "$TAG_VERSION" ]; then
            if [ "$IS_RC" == "true" ]; then
              if [ "$DYNAMIC_AGENTS_CHANGED" == "true" ]; then
                SHOULD_BUILD="true"
                echo "🔨 RC tag with changes: building"
              else
                SHOULD_RETAG="true"
                echo "🏷️ RC tag without changes: retagging"
              fi
            else
              SHOULD_BUILD="true"
              echo "🚀 Final release: building"
            fi
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            SHOULD_BUILD="true"
            echo "📦 Push to main: building"
          elif [ "$DYNAMIC_AGENTS_CHANGED" == "true" ]; then
            SHOULD_BUILD="true"
            echo "🔍 Files changed: building"
          fi

          echo "should_build=$SHOULD_BUILD" >> $GITHUB_OUTPUT
          echo "should_retag=$SHOULD_RETAG" >> $GITHUB_OUTPUT
          echo "Outputs: build=$SHOULD_BUILD, retag=$SHOULD_RETAG, is_rc=$IS_RC"

  build-and-push:
    runs-on: ubuntu-latest
    needs: determine-changes
    if: needs.determine-changes.outputs.should_build == 'true'
    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/caipe-dynamic-agents
      DOCKERFILE: ai_platform_engineering/dynamic_agents/build/Dockerfile

    steps:
      - name: 🔒 Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
            type=raw,value=${{ needs.determine-changes.outputs.tag_version }},enable=${{ needs.determine-changes.outputs.tag_version != '' }}
            type=ref,event=branch,prefix=
            type=ref,event=tag,prefix=
            type=sha,format=short,prefix=

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      - name: Build and Push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: ai_platform_engineering/dynamic_agents
          file: ${{ env.DOCKERFILE }}
          push: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=min
          provenance: false
          sbom: false

  retag-unchanged:
    runs-on: ubuntu-latest
    needs: determine-changes
    if: needs.determine-changes.outputs.should_retag == 'true'
    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/caipe-dynamic-agents
      DOCKERFILE: ai_platform_engineering/dynamic_agents/build/Dockerfile

    steps:
      - name: 🔒 Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: audit

      - name: 📦 Install crane
        run: |
          VERSION="v0.20.2"
          curl -sL "https://github.com/google/go-containerregistry/releases/download/${VERSION}/go-containerregistry_Linux_x86_64.tar.gz" | tar xz crane
          sudo mv crane /usr/local/bin/

      - name: 🔐 Log in to registry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GH_TOKEN" | crane auth login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: 🔍 Check source image and retag or build
        id: retag-or-build
        env:
          TAG_VERSION: ${{ needs.determine-changes.outputs.tag_version }}
        run: |
          FULL_IMAGE="${REGISTRY}/${IMAGE_NAME}"

          echo "🏷️ Processing dynamic-agents..."

          # Determine source tag (previous version)
          if [[ "$TAG_VERSION" =~ ^(.+)-rc\.([0-9]+)$ ]]; then
            BASE_VERSION="${BASH_REMATCH[1]}"
            RC_NUM="${BASH_REMATCH[2]}"

            if [[ "$RC_NUM" -gt 1 ]]; then
              PREV_RC=$((RC_NUM - 1))
              SOURCE_TAG="${BASE_VERSION}-rc.${PREV_RC}"
            else
              SOURCE_TAG="${BASE_VERSION}"
            fi
          else
            SOURCE_TAG="latest"
          fi

          TARGET_TAG="${TAG_VERSION}"

          echo "  Source: ${SOURCE_TAG}"
          echo "  Target: ${TARGET_TAG}"

          # Check if source image exists
          if crane manifest "${FULL_IMAGE}:${SOURCE_TAG}" >/dev/null 2>&1; then
            echo "  ✅ Source image exists, retagging..."
            if crane tag "${FULL_IMAGE}:${SOURCE_TAG}" "${TARGET_TAG}"; then
              echo "  ✅ Successfully retagged from ${SOURCE_TAG}"
              echo "needs_build=false" >> $GITHUB_OUTPUT
            else
              echo "  ⚠️ Retag failed unexpectedly, will build instead"
              echo "needs_build=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "  ⚠️ Source image ${SOURCE_TAG} not found (may still be building)"
            echo "  📦 Will build fresh instead of using stale fallback"
            echo "needs_build=true" >> $GITHUB_OUTPUT
          fi

      # Fallback build if retag not possible
      - name: Checkout repository
        if: steps.retag-or-build.outputs.needs_build == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Docker Buildx
        if: steps.retag-or-build.outputs.needs_build == 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Log in to GitHub Container Registry
        if: steps.retag-or-build.outputs.needs_build == 'true'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        if: steps.retag-or-build.outputs.needs_build == 'true'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      - name: 🔨 Build and Push (fallback)
        if: steps.retag-or-build.outputs.needs_build == 'true'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: ai_platform_engineering/dynamic_agents
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.determine-changes.outputs.tag_version }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=min
          provenance: false
          sbom: false

  # Notify release-finalize workflow when this CI completes (for final release builds only)
  notify-release:
    runs-on: ubuntu-latest
    needs: [determine-changes, build-and-push, retag-unchanged]
    if: |
      always() &&
      needs.determine-changes.outputs.tag_version != '' &&
      !contains(needs.determine-changes.outputs.tag_version, '-rc.')
    steps:
      - name: 🔔 Notify release finalize
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_VERSION: ${{ needs.determine-changes.outputs.tag_version }}
        run: |
          # Determine overall conclusion
          BUILD_RESULT="${{ needs.build-and-push.result }}"
          RETAG_RESULT="${{ needs.retag-unchanged.result }}"

          # Consider skipped as success (job conditions not met)
          if [[ "$BUILD_RESULT" == "skipped" ]]; then BUILD_RESULT="success"; fi
          if [[ "$RETAG_RESULT" == "skipped" ]]; then RETAG_RESULT="success"; fi

          if [[ "$BUILD_RESULT" == "success" && "$RETAG_RESULT" == "success" ]]; then
            CONCLUSION="success"
          else
            CONCLUSION="failure"
          fi

          echo "🔔 Notifying release-finalize: tag=$TAG_VERSION, conclusion=$CONCLUSION"

          gh api /repos/${{ github.repository }}/dispatches --input - <<EOF
          {
            "event_type": "ci-completed",
            "client_payload": {
              "tag": "$TAG_VERSION",
              "workflow": "${{ github.workflow }}",
              "conclusion": "$CONCLUSION"
            }
          }
          EOF
