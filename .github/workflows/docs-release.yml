name: "[Docs] Generate Release Post"
description: "Auto-generate a release blog post + upgrade guide when a semver tag is pushed"

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to document (e.g., 0.4.9)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-release-docs:
    name: Generate release blog post
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout repository (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Determine versions
        id: versions
        run: |
          NEW_VERSION="${{ github.event.inputs.version || github.ref_name }}"
          # Strip leading 'v' if present
          NEW_VERSION="${NEW_VERSION#v}"

          # Previous semver tag (skip RC/hotfix tags)
          PREV_VERSION=$(git tag --sort=-version:refname \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v "^${NEW_VERSION}$" \
            | head -1)

          echo "new_version=$NEW_VERSION"   >> $GITHUB_OUTPUT
          echo "prev_version=$PREV_VERSION" >> $GITHUB_OUTPUT

          # Derive blog filename date (tag commit date)
          TAG_DATE=$(git log -1 --format=%cs "refs/tags/${NEW_VERSION}" 2>/dev/null || date +%Y-%m-%d)
          SLUG=$(echo "$NEW_VERSION" | tr '.' '-')
          echo "tag_date=$TAG_DATE"                               >> $GITHUB_OUTPUT
          echo "blog_file=docs/releases/${TAG_DATE}-release-${SLUG}.md" >> $GITHUB_OUTPUT

          echo "New: $NEW_VERSION  Prev: $PREV_VERSION  Date: $TAG_DATE"

      - name: Install helm-docs
        env:
          HELM_DOCS_VERSION: "1.14.2"
        run: |
          curl -sSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz helm-docs
          sudo mv helm-docs /usr/local/bin/helm-docs

      - name: Regenerate Helm chart docs
        run: make helm-docs

      - name: Collect release data
        id: data
        env:
          NEW_VERSION: ${{ steps.versions.outputs.new_version }}
          PREV_VERSION: ${{ steps.versions.outputs.prev_version }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Git log between versions
          GIT_LOG=$(git log "${PREV_VERSION}..${NEW_VERSION}" \
            --oneline --no-merges \
            --grep-reflog="" 2>/dev/null \
            | grep -vE '^[a-f0-9]+ (chore|ci|test|refactor)' \
            | head -80 || true)

          # CHANGELOG section
          CHANGELOG=$(sed -n "/^## ${NEW_VERSION}/,/^## ${PREV_VERSION}/p" CHANGELOG.md 2>/dev/null \
            | head -100 || true)

          # Helm values diff (best-effort — skip if auth fails)
          CHART="oci://ghcr.io/cnoe-io/charts/ai-platform-engineering"
          helm pull "$CHART" --version "$PREV_VERSION" --untar --untardir /tmp/prev-chart 2>/dev/null || true
          helm pull "$CHART" --version "$NEW_VERSION"  --untar --untardir /tmp/new-chart  2>/dev/null || true
          if [[ -f "/tmp/prev-chart/ai-platform-engineering/values.yaml" && \
                -f "/tmp/new-chart/ai-platform-engineering/values.yaml" ]]; then
            HELM_DIFF=$(diff -u \
              /tmp/prev-chart/ai-platform-engineering/values.yaml \
              /tmp/new-chart/ai-platform-engineering/values.yaml || true)
          else
            HELM_DIFF="(helm values diff unavailable — chart not yet published)"
          fi

          # Write to temp files to avoid env-var size limits
          echo "$GIT_LOG"   > /tmp/git-log.txt
          echo "$CHANGELOG" > /tmp/changelog.txt
          echo "$HELM_DIFF" > /tmp/helm-diff.txt

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 'lts/*'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate release blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEW_VERSION: ${{ steps.versions.outputs.new_version }}
          PREV_VERSION: ${{ steps.versions.outputs.prev_version }}
          TAG_DATE: ${{ steps.versions.outputs.tag_date }}
          BLOG_FILE: ${{ steps.versions.outputs.blog_file }}
        run: |
          SLUG=$(echo "$NEW_VERSION" | tr '.' '-')

          PROMPT="You are running in a GitHub Actions workflow for cnoe-io/ai-platform-engineering.
          Generate a release blog post for version $NEW_VERSION (upgrading from $PREV_VERSION).

          Use the release-docs skill format. Write the output as a single Docusaurus blog post file.

          File to write: $BLOG_FILE

          Frontmatter:
          ---
          slug: release-$NEW_VERSION
          title: \"Release $NEW_VERSION — <2-5 word subtitle from the biggest changes>\"
          date: $TAG_DATE
          authors: [sriaradhyula]
          tags: [release]
          ---

          Structure:
          1. ## Highlights (2-4 sentences, operator-focused)
          2. <!-- truncate -->
          3. ## What's New (grouped by feature area, link to PR numbers from the git log)
          4. ## Bug Fixes
          5. ## Breaking Changes (if any, otherwise 'No breaking changes. Drop-in upgrade from $PREV_VERSION.')
          6. ## Known Issues (if none, say 'None known at this time.')
          7. ---
          8. ## Upgrade Guide: $PREV_VERSION → $NEW_VERSION
             - ### Overview (one paragraph)
             - ### Helm Values Changes (use the diff; if empty, say 'No values changes. Drop-in upgrade.')
             - ### Upgrade Runbook (helm upgrade command + verify steps)

          Git log (non-chore commits between $PREV_VERSION and $NEW_VERSION):
          $(cat /tmp/git-log.txt)

          CHANGELOG.md section:
          $(cat /tmp/changelog.txt)

          Helm values diff:
          $(cat /tmp/helm-diff.txt)

          Write the complete file now. Do not include any explanation outside the file content."

          claude --print \
            --allowedTools "Write,Read,Bash" \
            -p "$PROMPT"

      - name: Verify blog post was created
        env:
          BLOG_FILE: ${{ steps.versions.outputs.blog_file }}
        run: |
          if [[ ! -f "$BLOG_FILE" ]]; then
            echo "ERROR: Claude did not create $BLOG_FILE"
            ls docs/releases/
            exit 1
          fi
          echo "Blog post created: $BLOG_FILE"
          head -10 "$BLOG_FILE"

      - name: Snapshot and prune doc versions
        env:
          NEW_VERSION: ${{ steps.versions.outputs.new_version }}
        run: |
          cd docs
          npm install --silent
          # Snapshot current docs/ tree as the new version, then prune old snapshots
          # Retention: latest 5 from current minor series + highest from each prior minor
          NEW_VERSION="$NEW_VERSION" node scripts/snapshot-and-prune-versions.js

      - name: Validate Docusaurus build
        run: |
          cd docs
          npm run build

      - name: Open PR with release docs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_VERSION: ${{ steps.versions.outputs.new_version }}
          PREV_VERSION: ${{ steps.versions.outputs.prev_version }}
          BLOG_FILE: ${{ steps.versions.outputs.blog_file }}
        run: |
          BRANCH="docs/release-${NEW_VERSION}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"

          # Stage: blog post, helm docs, versioned snapshots, and version config
          git add docs/releases/
          git add docs/versioned_docs/ docs/versioned_sidebars/
          git add docs/versions.json docs/versions-config.json
          find docs -name "*.md" -newer /tmp/git-log.txt -exec git add {} +

          if git diff --cached --quiet; then
            echo "No doc changes to commit"
            exit 0
          fi

          git commit -m "docs: release ${NEW_VERSION} — blog post, docs snapshot, version prune"
          git push origin "$BRANCH"

          gh pr create \
            --title "docs: release $NEW_VERSION" \
            --base main \
            --head "$BRANCH" \
            --body "$(cat <<EOF
          ## Release $NEW_VERSION Docs

          Auto-generated by the \`docs-release\` workflow triggered by the \`$NEW_VERSION\` tag.

          ### What's in this PR

          - **Release blog post**: \`$BLOG_FILE\`
            - Release notes narrative (Highlights, What's New, Bug Fixes, Breaking Changes)
            - Embedded upgrade guide ($PREV_VERSION → $NEW_VERSION)
          - **Helm chart reference pages**: regenerated via \`make helm-docs\`
          - **Docs version snapshot**: \`versioned_docs/version-$NEW_VERSION/\` added
          - **Version pruning**: \`versions.json\` and \`versions-config.json\` updated
            (retains 5 latest from current minor series + highest from each prior minor)

          ### Review checklist

          - [ ] Highlights paragraph is accurate and operator-focused
          - [ ] All significant PRs from the git log are represented
          - [ ] Breaking changes section is complete (or correctly says 'No breaking changes')
          - [ ] Upgrade runbook steps are correct
          - [ ] Helm values diff is accurate
          - [ ] Version dropdown in docs shows correct entries (latest 5 + prior major)

          > Generated by Claude Code via the \`release-docs\` skill.
          EOF
          )"

          echo "PR opened: docs/release-${NEW_VERSION}"
