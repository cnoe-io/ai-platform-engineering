# GitHub Actions workflow — RBAC tests
#
# Strategy (chosen 2026-04-22 in /speckit.implement Phase 4 dialogue):
#   - PR (any branch → main / release/*): run the cheap lane only
#       * make test-rbac-lint   (matrix linter + realm-config validator + requireAdmin guard)
#       * make test-rbac-jest   (Jest matrix-driver)
#       * make test-rbac-pytest (pytest matrix-driver, helper-unit, parity)
#     These don't need Docker so they fit comfortably in a free GitHub runner.
#
#   - PR labelled `rbac-e2e`: ALSO run the full e2e lane:
#       * COMPOSE_PROFILES=… docker compose up -d (test-rbac-up)
#       * make test-rbac-e2e (Playwright @rbac specs)
#       * upload artifacts (junit, html, traces) on failure
#     This lane takes 15–25 min wall time. Trigger it only when the PR
#     touches the auth path; the label is opt-in to keep CI cheap.
#
#   - Nightly (cron) on main: run BOTH lanes unconditionally so we
#     always know the e2e suite is still green.
#
#   - workflow_dispatch: manual trigger for runbook validation.

name: "[CI] RBAC tests"

on:
  pull_request:
    branches:
      - main
      - "release/**"
    paths:
      - 'ai_platform_engineering/utils/auth/**'
      - 'ui/src/lib/rbac/**'
      - 'ui/src/lib/api-middleware.ts'
      - 'ui/src/app/api/**'
      - 'tests/rbac/**'
      - 'scripts/validate-rbac-matrix.py'
      - 'scripts/validate-realm-config.py'
      - 'scripts/check-no-new-requireAdmin.sh'
      - 'deploy/keycloak/realm-config.example.json'
      - 'deploy/keycloak/realm-config-extras.json'
      - 'docker-compose.dev.yaml'
      - 'Makefile'
      - '.github/workflows/test-rbac.yaml'
  push:
    branches:
      - main
    paths:
      - 'ai_platform_engineering/utils/auth/**'
      - 'ui/src/lib/rbac/**'
      - 'tests/rbac/**'
      - 'scripts/validate-rbac-matrix.py'
      - 'scripts/check-no-new-requireAdmin.sh'
      - 'deploy/keycloak/**'
      - 'Makefile'
  schedule:
    # Nightly at 03:00 UTC. Runs the FULL pipeline (cheap + e2e).
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run the e2e (docker) lane in addition to the cheap lane"
        type: boolean
        default: true

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "24"

jobs:
  # ===================================================================== #
  # Job 1 — Cheap lane (always runs on PRs, push-to-main, schedule, dispatch)
  # ===================================================================== #
  cheap-lane:
    name: "lint + jest + pytest (no docker)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Soft-gate until release/0.5.1 split PR 7 (rbac-openfga-cutover) lands the
    # production code paths the matrix references. Once realm-config.example.json,
    # resource-catalog.generated.ts, and the migrated route.ts files are on main,
    # PR 7 flips this back to a hard gate by removing this line.
    continue-on-error: true
    steps:
      - name: 🔒 Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v5.0.0

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'ui/package-lock.json'

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v6.7.1

      - name: Install Python deps
        run: uv sync --group unittest

      - name: Install ui/ npm deps
        working-directory: ui
        run: |
          for attempt in 1 2 3; do
            npm ci --no-audit --no-fund && break
            status=$?
            if [ "$attempt" -eq 3 ]; then
              exit "$status"
            fi
            sleep $((attempt * 10))
          done

      - name: ▶ make test-rbac-lint  (matrix linter + realm validator + requireAdmin guard)
        run: |
          # Strict mode: any drift fails the build. The phased rollout pattern
          # (RBAC_LINT_STRICT unset == soft-fail) is for local dev.
          RBAC_LINT_STRICT=1 make test-rbac-lint

      - name: ▶ make test-rbac-jest  (Jest matrix-driver + RBAC unit tests)
        run: make test-rbac-jest

      - name: ▶ make test-rbac-pytest  (pytest matrix-driver + helper unit tests)
        # Cheap-lane runs WITHOUT --rbac-online; rbac_online tests are
        # skipped. The e2e lane below opts into them.
        run: make test-rbac-pytest

      - name: Upload JUnit reports (for Story 7 matrix-completeness check)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: rbac-junit-cheap-${{ github.run_id }}
          path: |
            test-results/rbac-pytest.xml
            ui/test-results/junit.xml
          if-no-files-found: warn
          retention-days: 14

  # ===================================================================== #
  # Job 2 — E2E lane (label-gated on PRs; always on schedule + dispatch)
  # ===================================================================== #
  should-run-e2e:
    name: "decide if e2e lane runs"
    runs-on: ubuntu-latest
    outputs:
      run_e2e: ${{ steps.decide.outputs.run_e2e }}
    steps:
      - id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_INPUT: ${{ github.event.inputs.run_e2e }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail
          case "${EVENT_NAME}" in
            schedule|push)
              echo "run_e2e=true" >>"$GITHUB_OUTPUT"
              ;;
            workflow_dispatch)
              echo "run_e2e=${DISPATCH_INPUT}" >>"$GITHUB_OUTPUT"
              ;;
            pull_request)
              if echo "${PR_LABELS}" | grep -q '"rbac-e2e"'; then
                echo "run_e2e=true" >>"$GITHUB_OUTPUT"
              else
                echo "run_e2e=false" >>"$GITHUB_OUTPUT"
              fi
              ;;
            *)
              echo "run_e2e=false" >>"$GITHUB_OUTPUT"
              ;;
          esac

  e2e-lane:
    name: "playwright e2e (docker stack)"
    needs:
      - cheap-lane
      - should-run-e2e
    if: needs.should-run-e2e.outputs.run_e2e == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      COMPOSE_PROFILES: "rbac,caipe-ui,caipe-mongodb,dynamic-agents,rag,all-agents,slack-bot"
      RBAC_E2E: "1"
    steps:
      - name: 🔒 Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v5.0.0

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'ui/package-lock.json'

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v6.7.1

      - name: Install Python deps
        run: uv sync --group unittest

      - name: Install ui/ npm deps
        working-directory: ui
        run: |
          for attempt in 1 2 3; do
            npm ci --no-audit --no-fund && break
            status=$?
            if [ "$attempt" -eq 3 ]; then
              exit "$status"
            fi
            sleep $((attempt * 10))
          done

      - name: Install Playwright browsers
        working-directory: tests/rbac/e2e
        run: |
          for attempt in 1 2 3; do
            npm install --no-audit --no-fund && break
            status=$?
            if [ "$attempt" -eq 3 ]; then
              exit "$status"
            fi
            sleep $((attempt * 10))
          done
          npx playwright install --with-deps chromium

      - name: Pull docker images for the stack (warm cache)
        run: |
          docker compose -f docker-compose.dev.yaml \
            pull --ignore-pull-failures || true

      - name: ▶ make test-rbac (full pipeline, RBAC_E2E=1)
        run: |
          RBAC_LINT_STRICT=1 RBAC_E2E=1 \
            make test-rbac

      - name: Collect docker logs on failure
        if: failure()
        run: |
          mkdir -p test-results/docker-logs
          docker compose -f docker-compose.dev.yaml \
            logs --no-color > test-results/docker-logs/all.log 2>&1 || true

      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: rbac-e2e-${{ github.run_id }}
          path: |
            tests/rbac/e2e/test-results/
            tests/rbac/e2e/playwright-report/
            test-results/
            ui/test-results/
          if-no-files-found: warn
          retention-days: 14

      - name: ▶ make test-rbac-down  (always)
        if: always()
        run: make test-rbac-down || true
