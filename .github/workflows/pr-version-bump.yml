name: "[CI] PR Version Bump"
description: "Automatically bump version files on PRs"

on:
  pull_request:
    branches:
      - main
      - 'release/**'
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  actions: read

jobs:
  eligibility:
    name: Check PR eligibility
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - name: 🔍 Check changed paths or release merge
        id: check
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            const supportedBase = pr.base.ref === 'main' || pr.base.ref.startsWith('release/');
            if (!supportedBase) {
              core.setOutput('should_run', 'false');
              core.setOutput('reason', `unsupported base branch ${pr.base.ref}`);
              core.info(`should_run=false: unsupported base branch ${pr.base.ref}`);
              return;
            }

            const releaseMergeRe = /^release\/\d+\.\d+\.\d+(?:-hotfix)?$/;
            const isReleaseMerge = pr.base.ref === 'main' && releaseMergeRe.test(pr.head.ref);

            const watchedPrefixes = [
              'charts/',
              'ai_platform_engineering/',
              'build/',
              'ui/'
            ];
            const watchedFiles = new Set([
              'pyproject.toml',
              'uv.lock'
            ]);

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });

            const matchedFile = files.find(({ filename }) =>
              watchedPrefixes.some(prefix => filename.startsWith(prefix)) ||
              watchedFiles.has(filename)
            );

            const shouldRun = isReleaseMerge || Boolean(matchedFile);
            const reason = isReleaseMerge
              ? `release merge ${pr.head.ref} -> ${pr.base.ref}`
              : matchedFile
                ? `matched path ${matchedFile.filename}`
                : 'no watched path changes';

            core.setOutput('should_run', String(shouldRun));
            core.setOutput('reason', reason);
            core.info(`should_run=${shouldRun}: ${reason}`);

  version-bump:
    name: Bump version files on PR
    runs-on: ubuntu-latest
    needs: eligibility
    # Don't run on commits made by the bot (avoid infinite loop)
    if: needs.eligibility.outputs.should_run == 'true' && github.actor != 'github-actions[bot]' && github.actor != 'caipe-release-bot[bot]'
    outputs:
      new_commit: ${{ steps.chart-cleanup-commit.outputs.committed == 'true' || steps.update.outputs.skip_commit == 'false' || (steps.release-check.outputs.is_release_merge == 'true' && steps.release-check.outputs.needs_prepare == 'true' && steps.branch-status.outputs.needs_update != 'true' && steps.mergeability.outputs.has_conflicts != 'true') }}
      should_prebuild: ${{ steps.helm-labels.outputs.should_run }}
    steps:
      - name: 🔒 Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: 📥 Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: 🔍 Check if PR branch is up to date
        id: branch-status
        shell: bash
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          HEAD_REF="${{ github.event.pull_request.head.ref }}"

          git fetch origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"

          BASE_SHA=$(git rev-parse "origin/${BASE_REF}")
          MERGE_BASE=$(git merge-base HEAD "origin/${BASE_REF}")

          NEEDS_UPDATE=false
          if [[ "$MERGE_BASE" != "$BASE_SHA" ]]; then
            NEEDS_UPDATE=true
            echo "⚠️ $HEAD_REF does not contain latest $BASE_REF ($BASE_SHA)"
          else
            echo "✅ $HEAD_REF contains latest $BASE_REF"
          fi

          echo "base_ref=$BASE_REF" >> $GITHUB_OUTPUT
          echo "base_sha=$BASE_SHA" >> $GITHUB_OUTPUT
          echo "merge_base=$MERGE_BASE" >> $GITHUB_OUTPUT
          echo "needs_update=$NEEDS_UPDATE" >> $GITHUB_OUTPUT

      - name: 🔍 Check PR mergeability
        id: mergeability
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            let pr;
            for (let attempt = 0; attempt < 6; attempt++) {
              const response = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              pr = response.data;

              if (pr.mergeable !== null) {
                break;
              }

              await new Promise(resolve => setTimeout(resolve, 1000 * (attempt + 1)));
            }

            const mergeableState = pr.mergeable_state || '';
            const hasConflicts = mergeableState === 'dirty';

            core.setOutput('mergeable', String(pr.mergeable));
            core.setOutput('mergeable_state', mergeableState);
            core.setOutput('has_conflicts', String(hasConflicts));

            console.log(`mergeable=${pr.mergeable}, mergeable_state=${mergeableState}`);

      - name: 🏷️ Apply PR flow label
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const baseRef = process.env.BASE_REF;
            const headRef = process.env.HEAD_REF;
            const releaseBranchRe = /^release\/(\d+\.\d+\.\d+(?:-hotfix)?)$/;

            const baseRelease = baseRef.match(releaseBranchRe);
            const headRelease = headRef.match(releaseBranchRe);

            let label;
            if (baseRelease) {
              label = {
                name: baseRelease[1],
                color: baseRelease[1].endsWith('-hotfix') ? 'd93f0b' : '0e8a16',
                description: `PR targets ${baseRef}`
              };
            } else if (baseRef === 'main' && headRelease) {
              label = {
                name: headRef,
                color: headRelease[1].endsWith('-hotfix') ? 'fbca04' : '1d76db',
                description: `Release branch merge from ${headRef} to main`
              };
            } else if (baseRef === 'main') {
              label = {
                name: 'dev',
                color: 'c5def5',
                description: 'Normal PR to main; uses dev prerelease versioning'
              };
            } else {
              core.info(`No PR flow label configured for ${headRef} -> ${baseRef}`);
              return;
            }

            async function ensureLabel({ name, color, description }) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                core.info(`Creating missing label: ${name}`);
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name,
                    color,
                    description
                  });
                } catch (createError) {
                  if (createError.status !== 422) {
                    throw createError;
                  }
                  core.info(`Label already exists after concurrent create: ${name}`);
                }
              }
            }

            await ensureLabel(label);

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: [label.name]
            });

            core.info(`Applied PR flow label: ${label.name}`);

      - name: 💬 Comment if branch needs update
        id: branch-update-comment
        if: steps.branch-status.outputs.needs_update == 'true' || steps.mergeability.outputs.has_conflicts == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          NEEDS_UPDATE: ${{ steps.branch-status.outputs.needs_update }}
          HAS_CONFLICTS: ${{ steps.mergeability.outputs.has_conflicts }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const baseRef = process.env.BASE_REF;
            const headRef = process.env.HEAD_REF;
            const headSha = process.env.HEAD_SHA;
            const headRepo = process.env.HEAD_REPO;
            const repo = `${context.repo.owner}/${context.repo.repo}`;
            const markerPrefix = '<!-- pr-version-bump:update-branch';
            const marker = `<!-- pr-version-bump:update-branch sha=${headSha} -->`;
            const isFork = headRepo !== repo;
            const isPrebuild = headRef.startsWith('prebuild/');
            const needsUpdate = process.env.NEEDS_UPDATE === 'true';
            const hasConflicts = process.env.HAS_CONFLICTS === 'true';

            const reasons = [];
            if (needsUpdate) {
              reasons.push(`this branch does not contain the latest \`${baseRef}\``);
            }
            if (hasConflicts) {
              reasons.push(`GitHub reports merge conflicts with \`${baseRef}\``);
            }

            const commands = isFork
              ? [
                  `git fetch https://github.com/${repo}.git ${baseRef}`,
                  `git checkout ${headRef}`,
                  `git merge FETCH_HEAD`,
                  `git push`
                ]
              : [
                  `git fetch origin ${baseRef}`,
                  `git checkout ${headRef}`,
                  `git merge FETCH_HEAD`,
                  `git push`
                ];

            let body = `${marker}\n`;
            body += `## ❗ Branch update needed\n\n`;
            body += `**Commit:** \`${headSha.slice(0, 8)}\`\n\n`;
            body += `CI failed to bump chart and app versions because ${reasons.join(' and ')}. Please update the branch by following the steps below:\n\n`;
            body += `Run:\n\n`;
            body += '```bash\n';
            body += commands.join('\n');
            body += '\n```\n\n';

            if (isPrebuild) {
              body += `This is a \`prebuild/*\` branch, so Helm prebuild publishing will still run so you can test the chart changes while the branch is being updated.\n`;
            }

            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 100
              });

              const existing = comments.filter(comment =>
                comment.user?.type === 'Bot' && (comment.body || '').includes(markerPrefix)
              );

              for (const comment of existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id
                });
              }

              const response = await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
              const commentUrl = response.data.html_url || '';
              const result = existing.length > 0 ? 'recreated' : 'created';
              core.setOutput('result', result);
              core.setOutput('comment_url', commentUrl);
              core.notice(`Branch update PR comment ${result}: ${commentUrl}`);
            } catch (error) {
              core.setOutput('result', 'failed');
              core.setOutput('error', error.message);
              core.warning(`Failed to replace branch update PR comment: ${error.message}`);
            }

      - name: 🐍 Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13'

      - name: 📦 Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      # ── Detect release/* → main PR ─────────────────────────────────────
      - name: 🔍 Check if release merge PR
        id: release-check
        shell: bash
        run: |
          BASE="${{ github.event.pull_request.base.ref }}"
          HEAD="${{ github.event.pull_request.head.ref }}"
          if [[ "$BASE" == "main" && "$HEAD" =~ ^release/([0-9]+\.[0-9]+\.[0-9]+)(-hotfix)?$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "is_release_merge=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "🚀 Release merge PR detected: $HEAD → main"

            RAW_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
            if [[ "$RAW_VERSION" == "$VERSION" ]]; then
              echo "needs_prepare=false" >> $GITHUB_OUTPUT
              echo "✅ Release merge PR already prepared at $VERSION"
            else
              echo "needs_prepare=true" >> $GITHUB_OUTPUT
              echo "📦 Release merge PR needs final version bump: $RAW_VERSION → $VERSION"
            fi
          else
            echo "is_release_merge=false" >> $GITHUB_OUTPUT
            echo "needs_prepare=false" >> $GITHUB_OUTPUT
          fi

      # ── Release merge path: prepare-release action ─────────────────────
      - name: 📦 Prepare release (update files + changelog)
        if: ${{ steps.release-check.outputs.is_release_merge == 'true' && steps.release-check.outputs.needs_prepare == 'true' && steps.branch-status.outputs.needs_update != 'true' && steps.mergeability.outputs.has_conflicts != 'true' }}
        uses: ./.github/actions/prepare-release
        with:
          version: ${{ steps.release-check.outputs.version }}

      # ── Sync chart-bump label from review state before version bumping ─
      - name: 🏷️ Check helm labels
        id: helm-labels
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const chartBumpLabel = 'helm-chart-bump';
            const helmPrereleaseLabel = 'helm-prerelease';
            const eventName = context.eventName;
            const action = context.payload.action || '';
            const reviewState = (context.payload.review?.state || '').toLowerCase();

            const labelNames = new Set((pr.labels || []).map(label => label.name));
            let chartBumpPresent = labelNames.has(chartBumpLabel);

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100
            });

            const latestDecisionByReviewer = new Map();
            for (const review of reviews) {
              const state = (review.state || '').toUpperCase();
              if (!['APPROVED', 'CHANGES_REQUESTED', 'DISMISSED'].includes(state)) {
                continue;
              }
              const reviewer = review.user?.login;
              if (!reviewer) {
                continue;
              }
              const submittedAt = review.submitted_at || review.dismissed_at || review.updated_at || review.submittedAt || '';
              const previous = latestDecisionByReviewer.get(reviewer);
              if (!previous || new Date(submittedAt) >= new Date(previous.submittedAt)) {
                latestDecisionByReviewer.set(reviewer, { state, submittedAt });
              }
            }

            const hasActiveApproval = [...latestDecisionByReviewer.values()]
              .some(review => review.state === 'APPROVED');
            const approvalSubmitted = eventName === 'pull_request_review' && action === 'submitted' && reviewState === 'approved';
            const approvalDismissed = eventName === 'pull_request_review' && action === 'dismissed';
            const chartBumpLabelRemoved = eventName === 'pull_request' && action === 'unlabeled' && context.payload.label?.name === chartBumpLabel;

            async function ensureLabel() {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: chartBumpLabel
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: chartBumpLabel,
                  color: '5319e7',
                  description: 'Bump Helm Chart.yaml versions before merge'
                });
              }
            }

            if (approvalSubmitted && !chartBumpPresent) {
              await ensureLabel();
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: [chartBumpLabel]
              });
              chartBumpPresent = true;
              core.info(`Added ${chartBumpLabel} after PR approval`);
            }

            let removedAfterDismissal = false;
            if (approvalDismissed && !hasActiveApproval && chartBumpPresent) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: chartBumpLabel
              });
              chartBumpPresent = false;
              removedAfterDismissal = true;
              core.info(`Removed ${chartBumpLabel} because the PR no longer has an active approval`);
            }

            const undoCharts = chartBumpLabelRemoved || removedAfterDismissal || (approvalDismissed && !hasActiveApproval);
            const bumpCharts = chartBumpPresent && !undoCharts;
            const shouldPrebuild = pr.head.ref.startsWith('prebuild/') || labelNames.has(helmPrereleaseLabel);

            core.setOutput('bump_charts', String(bumpCharts));
            core.setOutput('should_run', String(shouldPrebuild));
            core.setOutput('undo_charts', String(undoCharts));
            core.setOutput('has_active_approval', String(hasActiveApproval));
            core.setOutput('helm_chart_bump_label', String(chartBumpPresent));
            core.setOutput('waiting_for_chart_bump_approval', String(!bumpCharts && !undoCharts && !hasActiveApproval));

            core.info(`bump_charts=${bumpCharts}`);
            core.info(`undo_charts=${undoCharts}`);
            core.info(`should_prebuild=${shouldPrebuild}`);
            core.info(`has_active_approval=${hasActiveApproval}`);

      - name: 💬 Comment if chart bump is waiting for approval
        if: steps.helm-labels.outputs.waiting_for_chart_bump_approval == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const markerPrefix = '<!-- pr-version-bump:waiting-for-chart-bump-approval';
            const marker = `<!-- pr-version-bump:waiting-for-chart-bump-approval sha=${process.env.HEAD_SHA} -->`;
            const body = `${marker}
            ## Helm chart bump waiting for approval

            This failure is expected. Helm chart version bumps are deferred until the PR is approved or the \`helm-chart-bump\` label is added.

            Once the PR is approved, CI will add \`helm-chart-bump\`, commit the Chart.yaml version updates, and rerun.`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100
            });

            const existing = comments.find(comment =>
              comment.user?.type === 'Bot' && (comment.body || '').includes(markerPrefix)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
              core.info(`Updated waiting-for-approval comment: ${existing.html_url}`);
            } else {
              const response = await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
              core.info(`Created waiting-for-approval comment: ${response.data.html_url}`);
            }

      - name: ❌ Require approval before chart bump
        if: steps.helm-labels.outputs.waiting_for_chart_bump_approval == 'true'
        run: |
          echo "::error::Helm chart version bumps are deferred until PR approval or the helm-chart-bump label is added. This failure is expected before approval."
          exit 1

      # ── Normal path: determine-version + update-version-files ──────────
      - name: 🏷️ Determine version
        if: ${{ steps.helm-labels.outputs.undo_charts != 'true' && steps.release-check.outputs.is_release_merge != 'true' && steps.branch-status.outputs.needs_update != 'true' && steps.mergeability.outputs.has_conflicts != 'true' }}
        id: version
        uses: ./.github/actions/determine-version
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Update version files
        if: ${{ steps.helm-labels.outputs.undo_charts != 'true' && steps.release-check.outputs.is_release_merge != 'true' && steps.branch-status.outputs.needs_update != 'true' && steps.mergeability.outputs.has_conflicts != 'true' }}
        id: update
        uses: ./.github/actions/update-version-files
        with:
          version: ${{ steps.version.outputs.tag }}
          diff_target: ${{ steps.version.outputs.diff_target }}
          bump_charts: ${{ steps.helm-labels.outputs.bump_charts }}

      - name: ⚙️ Install yq for chart cleanup
        if: steps.helm-labels.outputs.undo_charts == 'true'
        shell: bash
        run: |
          if ! command -v yq &>/dev/null; then
            sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          fi
          yq --version

      - name: ↩️ Restore chart bump fields
        if: steps.helm-labels.outputs.undo_charts == 'true'
        id: chart-cleanup
        shell: bash
        run: |
          set -euo pipefail

          BASE_REF="${{ github.event.pull_request.base.ref }}"
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          git fetch origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"
          if [[ -n "$BASE_SHA" ]] && git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            BASE_COMMIT="$BASE_SHA"
          else
            BASE_COMMIT="origin/${BASE_REF}"
          fi

          mapfile -t CHART_FILES < <(find charts -name "Chart.yaml" -type f | sort)
          if [[ "${#CHART_FILES[@]}" -eq 0 ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LOCAL_CHART_NAMES=$(for file in "${CHART_FILES[@]}"; do yq -r '.name // ""' "$file"; done | grep -v '^$' | sort -u)

          restore_scalar() {
            local chart_file="$1"
            local base_file="$2"
            local field="$3"
            local base_value
            local current_value

            base_value=$(yq -r ".$field // \"\"" "$base_file")
            current_value=$(yq -r ".$field // \"\"" "$chart_file")
            if [[ -n "$base_value" && "$base_value" != "$current_value" ]]; then
              yq -i ".$field = \"$base_value\"" "$chart_file"
              echo "  ↩️ $chart_file .$field: $current_value -> $base_value"
            fi
          }

          for chart_file in "${CHART_FILES[@]}"; do
            if ! git cat-file -e "$BASE_COMMIT:$chart_file" 2>/dev/null; then
              continue
            fi

            base_file=$(mktemp)
            git show "$BASE_COMMIT:$chart_file" > "$base_file"

            restore_scalar "$chart_file" "$base_file" "version"
            restore_scalar "$chart_file" "$base_file" "appVersion"

            for chart_name in $LOCAL_CHART_NAMES; do
              base_dep_version=$(yq -r ".dependencies[]? | select(.name == \"$chart_name\" and (.repository == null or (.repository | test(\"^file://\")))) | .version" "$base_file" | head -n 1)
              current_dep_version=$(yq -r ".dependencies[]? | select(.name == \"$chart_name\" and (.repository == null or (.repository | test(\"^file://\")))) | .version" "$chart_file" | head -n 1)
              if [[ -n "$base_dep_version" && "$base_dep_version" != "$current_dep_version" ]]; then
                yq -i "(.dependencies[] | select(.name == \"$chart_name\" and (.repository == null or (.repository | test(\"^file://\")))).version) = \"$base_dep_version\"" "$chart_file" 2>/dev/null || true
                echo "  ↩️ $chart_file dependency $chart_name: $current_dep_version -> $base_dep_version"
              fi
            done

            rm -f "$base_file"
          done

          if git diff --quiet -- charts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No chart bump fields needed cleanup"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── Commit changes to PR branch ────────────────────────────────────
      - name: 📤 Commit version bump
        if: steps.helm-labels.outputs.undo_charts != 'true' && (steps.update.outputs.skip_commit == 'false' || (steps.release-check.outputs.is_release_merge == 'true' && steps.release-check.outputs.needs_prepare == 'true')) && steps.branch-status.outputs.needs_update != 'true' && steps.mergeability.outputs.has_conflicts != 'true'
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add pyproject.toml uv.lock CHANGELOG.md docs/docusaurus.config.ts docs/src/pages/index.tsx || true

          if [[ "${{ steps.helm-labels.outputs.bump_charts }}" == "true" ]]; then
            find charts -name "Chart.yaml" -type f -exec git add {} +
          fi

          TAG="${{ steps.update.outputs.final_version || steps.release-check.outputs.version }}"
          git commit -m "chore: bump version to $TAG"
          git push

          echo "✅ Committed version bump to $TAG"

      - name: 📤 Commit chart bump cleanup
        if: steps.chart-cleanup.outputs.changed == 'true'
        id: chart-cleanup-commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          find charts -name "Chart.yaml" -type f -exec git add {} +
          git commit -m "chore: remove Helm chart bump"
          git push

          echo "committed=true" >> "$GITHUB_OUTPUT"
          echo "✅ Removed Helm chart bump changes"

      - name: ❌ Require branch update before merge
        if: steps.branch-status.outputs.needs_update == 'true' || steps.mergeability.outputs.has_conflicts == 'true'
        env:
          COMMENT_RESULT: ${{ steps.branch-update-comment.outputs.result }}
          COMMENT_URL: ${{ steps.branch-update-comment.outputs.comment_url }}
          COMMENT_ERROR: ${{ steps.branch-update-comment.outputs.error }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
        run: |
          if [[ "$COMMENT_RESULT" == "created" ]]; then
            echo "::error::This PR branch must be updated with $BASE_REF before it can merge. A PR comment with the exact commands was created: $COMMENT_URL"
          elif [[ "$COMMENT_RESULT" == "recreated" ]]; then
            echo "::error::This PR branch must be updated with $BASE_REF before it can merge. The previous PR comment was deleted and a new one was created: $COMMENT_URL"
          else
            echo "::error::This PR branch must be updated with $BASE_REF before it can merge, but CI could not create a fresh PR comment: ${COMMENT_ERROR:-unknown error}"
            echo "Run:"
            if [[ "$HEAD_REPO" != "$BASE_REPO" ]]; then
              echo "git fetch https://github.com/${BASE_REPO}.git ${BASE_REF}"
            else
              echo "git fetch origin ${BASE_REF}"
            fi
            echo "git checkout ${HEAD_REF}"
            echo "git merge FETCH_HEAD"
            echo "git push"
          fi
          exit 1

  # Call prebuild workflow for eligible PRs
  prebuild-helm:
    name: Publish Prebuild Helm Charts
    needs: version-bump
    if: |
      always() &&
      needs.version-bump.outputs.should_prebuild == 'true' &&
      needs.version-bump.outputs.new_commit != 'true' &&
      (needs.version-bump.result == 'success' || startsWith(github.event.pull_request.head.ref, 'prebuild/'))
    uses: ./.github/workflows/prebuild-helm.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      new_commit: ${{ needs.version-bump.outputs.new_commit == 'true' }}
      base_ref: ${{ github.event.pull_request.base.ref }}
      base_sha: ${{ github.event.pull_request.base.sha }}
    secrets: inherit
