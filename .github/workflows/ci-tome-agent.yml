name: "[CI] Tome Agent Build and Push"

on:
  push:
    tags:
      - "**"
  pull_request:
    paths:
      - "ai_platform_engineering/agents/tome/**"
      - ".github/workflows/ci-tome-agent.yml"
  workflow_dispatch:
    inputs:
      tag_version:
        description: "Version tag to apply (e.g., 0.6.0-dev.1)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/caipe-tome-agent
  DOCKERFILE: ai_platform_engineering/agents/tome/Dockerfile
  LOCAL_IMAGE: caipe-tome-agent:ci

jobs:
  smoke-test:
    name: Smoke test tome-agent
    runs-on: ubuntu-latest

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build local tome-agent image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ai_platform_engineering/agents/tome
          file: ${{ env.DOCKERFILE }}
          load: true
          tags: ${{ env.LOCAL_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          provenance: false
          sbom: false

      - name: Start tome-agent
        run: |
          docker run -d \
            --name tome-agent-smoke \
            -p 127.0.0.1:8766:8766 \
            -e ANTHROPIC_API_KEY=smoke-test-placeholder \
            -e TTT_AGENT_TOKEN=dev \
            "${LOCAL_IMAGE}"

      - name: Check /healthz
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:8766/healthz; then
              echo
              echo "tome-agent health check passed"
              exit 0
            fi
            sleep 2
          done
          echo "tome-agent health check failed"
          docker logs tome-agent-smoke || true
          exit 1

      - name: Stop tome-agent
        if: always()
        run: docker rm -f tome-agent-smoke || true

  publish:
    name: Publish tome-agent image
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' || (startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-rc.') && !contains(github.ref_name, '-hotfix.') && !contains(github.ref_name, '-chart.')) }}
            type=raw,value=${{ inputs.tag_version }},enable=${{ inputs.tag_version != '' }}
            type=ref,event=tag,prefix=
            type=sha,format=short,prefix=

      - name: Build and push tome-agent image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ai_platform_engineering/agents/tome
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=min
          provenance: false
          sbom: false
