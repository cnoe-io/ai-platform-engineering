name: "[CI] Keycloak Init Build and Push"
description: "Build and push Keycloak init helper Docker image"

on:
  push:
    tags:
      - '**'
  pull_request:
    paths:
      - 'build/Dockerfile.keycloak-init'
      - 'charts/ai-platform-engineering/charts/keycloak/scripts/**'
      - 'charts/ai-platform-engineering/charts/keycloak/realm-config.json'
      - 'charts/ai-platform-engineering/charts/keycloak/templates/job-init-*.yaml'
      - 'charts/ai-platform-engineering/charts/keycloak/templates/job-auth-reconcile.yaml'
      - 'charts/ai-platform-engineering/charts/keycloak/templates/platform-client-external-secret.yaml'
      - 'tests/integration/test_keycloak_platform_client_reconcile.sh'
      - 'tests/integration/test_keycloak_strict_client_secrets.sh'
      - 'tests/integration/test_keycloak_idp_hint_redirect.sh'
      - '.github/workflows/ci-keycloak-init.yml'
  workflow_dispatch:
    inputs:
      tag_version:
        description: 'Version tag to apply (e.g., 0.5.0-rc.7)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  determine-changes:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.set-outputs.outputs.should_build }}
      tag_version: ${{ steps.version.outputs.tag_version }}
      image_prefix: ${{ steps.set-outputs.outputs.image_prefix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Determine Tag
        id: version
        uses: ./.github/actions/determine-release-tag
        with:
          manual_tag: ${{ inputs.tag_version }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Outputs
        id: set-outputs
        env:
          TAG_VERSION: ${{ steps.version.outputs.tag_version }}
        run: |
          SHOULD_BUILD="true"
          TAG_VERSION="${TAG_VERSION}"

          if [[ "$TAG_VERSION" =~ -chart\.[0-9]+$ ]]; then
            SHOULD_BUILD="false"
            IMAGE_PREFIX=""
          elif [[ "$TAG_VERSION" =~ -(rc|hotfix)\.[0-9]+ ]]; then
            IMAGE_PREFIX="pre-release/"
          else
            IMAGE_PREFIX=""
          fi

          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"
          echo "image_prefix=$IMAGE_PREFIX" >> "$GITHUB_OUTPUT"

  build-and-push:
    runs-on: ubuntu-latest
    needs: determine-changes
    if: needs.determine-changes.outputs.should_build == 'true'
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/${{ needs.determine-changes.outputs.image_prefix }}keycloak-init
      DOCKERFILE: build/Dockerfile.keycloak-init
    steps:
      - name: 🔒 Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' || (startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-rc.') && !contains(github.ref_name, '-hotfix.') && !contains(github.ref_name, '-chart.')) }}
            type=raw,value=${{ needs.determine-changes.outputs.tag_version }},enable=${{ needs.determine-changes.outputs.tag_version != '' }}
            type=ref,event=tag,prefix=
            type=sha,format=short,prefix=

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Build and Push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          push: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=min
          provenance: false
          sbom: false

  reconcile-test:
    # End-to-end functional test of init-idp.sh against a real Keycloak 26.3.
    # Catches regressions in the caipe-platform / caipe-ui client_secret
    # reconciliation path that helm template + unit tests cannot see (JSON
    # round-trip of the secret, idempotency, real Admin API response codes,
    # security regression of the dev placeholder remaining accepted).
    #
    # Independent of build-and-push so forks without `packages: write` can
    # still run it on PRs.
    runs-on: ubuntu-latest
    needs: determine-changes
    permissions:
      contents: read
    steps:
      - name: 🔒 Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build keycloak-init image locally (amd64, no provenance for local test)
        # Provenance attestations confuse the legacy docker engine that the
        # integration script invokes via `docker run`. Plain `--load` build
        # produces an image the script can use immediately.
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: build/Dockerfile.keycloak-init
          load: true
          tags: caipe/keycloak-init:reconcile-ci
          platforms: linux/amd64
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Install jq
        run: sudo apt-get update -y && sudo apt-get install -y --no-install-recommends jq

      - name: Run platform-client reconcile end-to-end test
        env:
          INIT_IMAGE: caipe/keycloak-init:reconcile-ci
          # GitHub-hosted runners have no other service on 18080, so the
          # default port is fine. Bind to all interfaces explicitly to
          # avoid Docker bridge-mode oddness.
          KC_PORT: "18080"
        run: |
          chmod +x tests/integration/test_keycloak_platform_client_reconcile.sh
          tests/integration/test_keycloak_platform_client_reconcile.sh

      - name: Capture Keycloak container logs on failure
        if: failure()
        run: |
          docker ps -a --filter "name=kc-platform-reconcile-test"
          for c in $(docker ps -aq --filter "name=kc-platform-reconcile-test"); do
            echo "===== logs: $c ====="
            docker logs --tail 200 "$c" || true
          done

  strict-secrets-test:
    # End-to-end functional test of the production-hardening flag
    # `keycloak.strictClientSecrets`. Boots a throwaway Keycloak 26.3,
    # confirms the four dev placeholder client_secrets are initially
    # accepted, then exercises both the strict-mode failure path (no
    # rotation env vars set → init-idp.sh exits non-zero with a loud
    # error) and the success path (caipe-ui + caipe-platform rotated +
    # bots rotated → strict guard passes, all four placeholders
    # rejected).
    #
    # Independent of build-and-push so forks without `packages: write`
    # can still run it on PRs. Uses cache from the build step so it
    # piggybacks the image layers.
    runs-on: ubuntu-latest
    needs: determine-changes
    permissions:
      contents: read
    steps:
      - name: 🔒 Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build keycloak-init image locally (amd64, no provenance)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: build/Dockerfile.keycloak-init
          load: true
          tags: caipe/keycloak-init:strict-ci
          platforms: linux/amd64
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Install jq
        run: sudo apt-get update -y && sudo apt-get install -y --no-install-recommends jq

      - name: Run strict client-secret end-to-end test
        env:
          INIT_IMAGE: caipe/keycloak-init:strict-ci
          # Distinct port so the job can run in parallel with reconcile-test
          # if GitHub schedules them on the same runner (it currently doesn't,
          # but be defensive).
          KC_PORT: "19080"
        run: |
          chmod +x tests/integration/test_keycloak_strict_client_secrets.sh
          tests/integration/test_keycloak_strict_client_secrets.sh

      - name: Capture Keycloak container logs on failure
        if: failure()
        run: |
          docker ps -a --filter "name=kc-strict-secret-test"
          for c in $(docker ps -aq --filter "name=kc-strict-secret-test"); do
            echo "===== logs: $c ====="
            docker logs --tail 200 "$c" || true
          done

  idp-hint-test:
    # End-to-end functional test of the SSO bootstrap path that
    # init-idp.sh configures: the identity-provider-redirector default
    # provider, the KEYCLOAK_FORCE_IDP_REDIRECT enforcement flag, and
    # the OIDC_IDP_HINT (`kc_idp_hint`) forwarding that auth-config.ts
    # injects into the NextAuth authorization params.
    #
    # Boots a throwaway Keycloak 26.3 + the chart's realm import,
    # runs init-idp.sh against it, then verifies that hitting
    # /realms/caipe/protocol/openid-connect/auth produces a 302/303 to
    # /broker/<alias>/login both with and without an explicit
    # kc_idp_hint, and that an unknown hint does not 5xx.
    #
    # Independent of build-and-push so forks without `packages: write`
    # can still run it on PRs. Uses the cache from the build step so
    # it piggybacks the image layers.
    runs-on: ubuntu-latest
    needs: determine-changes
    permissions:
      contents: read
    steps:
      - name: 🔒 Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build keycloak-init image locally (amd64, no provenance)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: build/Dockerfile.keycloak-init
          load: true
          tags: caipe/keycloak-init:idp-hint-ci
          platforms: linux/amd64
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Install jq
        run: sudo apt-get update -y && sudo apt-get install -y --no-install-recommends jq

      - name: Run kc_idp_hint / IdP redirector end-to-end test
        env:
          INIT_IMAGE: caipe/keycloak-init:idp-hint-ci
          # Distinct port so this job can run in parallel with the
          # other Keycloak integration jobs if GitHub schedules them
          # on the same runner.
          KC_PORT: "21080"
        run: |
          chmod +x tests/integration/test_keycloak_idp_hint_redirect.sh
          tests/integration/test_keycloak_idp_hint_redirect.sh

      - name: Capture Keycloak container logs on failure
        if: failure()
        run: |
          docker ps -a --filter "name=kc-idp-hint-test"
          for c in $(docker ps -aq --filter "name=kc-idp-hint-test"); do
            echo "===== logs: $c ====="
            docker logs --tail 200 "$c" || true
          done

  notify-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [determine-changes, build-and-push, reconcile-test, strict-secrets-test, idp-hint-test]
    if: |
      always() &&
      needs.determine-changes.outputs.tag_version != '' &&
      !contains(needs.determine-changes.outputs.tag_version, '-') &&
      needs.reconcile-test.result == 'success' &&
      needs.strict-secrets-test.result == 'success' &&
      needs.idp-hint-test.result == 'success'
    steps:
      - name: 🔔 Notify release finalize
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_VERSION: ${{ needs.determine-changes.outputs.tag_version }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          CONCLUSION="${{ needs.build-and-push.result }}"
          if [[ "$CONCLUSION" == "skipped" ]]; then CONCLUSION="success"; fi

          gh api /repos/${{ github.repository }}/dispatches --input - <<EOF
          {
            "event_type": "ci-completed",
            "client_payload": {
              "tag": "$TAG_VERSION",
              "workflow": "$WORKFLOW_NAME",
              "conclusion": "$CONCLUSION"
            }
          }
          EOF
