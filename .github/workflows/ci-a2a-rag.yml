name: "[CI][A2A] CAIPE RAG Build and Push"
description: "Build and push CAIPE RAG Docker image"

on:
  push:
    tags:
      - '**'
  pull_request:
    paths:
      - 'ai_platform_engineering/knowledge_bases/rag/**'
  workflow_dispatch:
    inputs:
      tag_version:
        description: 'Version tag to apply (e.g., 0.3.0-dev.5)'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  load-config:
    runs-on: ubuntu-latest
    outputs:
      rag_components: ${{ steps.read-config.outputs.rag_components }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: .github/agents.json
          sparse-checkout-cone-mode: false

      - name: Read config
        id: read-config
        run: |
          RAG_COMPONENTS=$(jq -c '.rag_components' .github/agents.json)
          echo "rag_components=$RAG_COMPONENTS" >> $GITHUB_OUTPUT

  determine-changes:
    runs-on: ubuntu-latest
    needs: load-config
    outputs:
      should_build: ${{ steps.set-outputs.outputs.should_build }}
      should_retag: ${{ steps.set-outputs.outputs.should_retag }}
      tag_version: ${{ steps.version.outputs.tag_version }}
      image_prefix: ${{ steps.set-outputs.outputs.image_prefix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Determine Tag
        id: version
        uses: ./.github/actions/determine-release-tag
        with:
          manual_tag: ${{ inputs.tag_version }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            rag:
              - 'ai_platform_engineering/knowledge_bases/rag/**'

      - name: Set Outputs
        id: set-outputs
        env:
          RAG_CHANGED: ${{ steps.filter.outputs.rag }}
          TAG_VERSION: ${{ steps.version.outputs.tag_version }}
        run: |
          SHOULD_BUILD="false"
          SHOULD_RETAG="false"
          TAG_VERSION="${{ env.TAG_VERSION }}"

          # Chart-only tag: skip image builds entirely
          if [[ "$TAG_VERSION" =~ -chart\.[0-9]+$ ]]; then
            echo "📊 Chart-only tag: skipping image builds"
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "should_retag=false" >> $GITHUB_OUTPUT
            echo "image_prefix=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Determine pre-release type and number
          if [[ "$TAG_VERSION" =~ -(dev|rc|hotfix)\.([0-9]+)$ ]]; then
            IS_PRERELEASE="true"
            PRERELEASE_NUM="${BASH_REMATCH[2]}"
          else
            IS_PRERELEASE="false"
            PRERELEASE_NUM=0
          fi

          # GHCR prefix: -rc.N and -hotfix.N go to pre-release/
          if [[ "$TAG_VERSION" =~ -(rc|hotfix)\.[0-9]+ ]]; then
            IMAGE_PREFIX="pre-release/"
          else
            IMAGE_PREFIX=""
          fi

          if [ -n "$TAG_VERSION" ]; then
            if [ "$IS_PRERELEASE" == "true" ] && [ "$PRERELEASE_NUM" -gt 1 ]; then
              if [ "$RAG_CHANGED" == "true" ]; then
                SHOULD_BUILD="true"
                echo "🔨 Pre-release tag with RAG changes: building"
              else
                SHOULD_RETAG="true"
                echo "🏷️ Pre-release tag without RAG changes: retagging"
              fi
            else
              SHOULD_BUILD="true"
              echo "🚀 Build all: first pre-release or final release"
            fi
          elif [ "$RAG_CHANGED" == "true" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            SHOULD_BUILD="true"
            echo "📦 RAG files changed or manual trigger: building"
          fi

          echo "should_build=$SHOULD_BUILD" >> $GITHUB_OUTPUT
          echo "should_retag=$SHOULD_RETAG" >> $GITHUB_OUTPUT
          echo "image_prefix=$IMAGE_PREFIX" >> $GITHUB_OUTPUT
          echo "Outputs: build=$SHOULD_BUILD, retag=$SHOULD_RETAG, prefix=$IMAGE_PREFIX"

  build-and-push:
    runs-on: ubuntu-latest
    needs: [determine-changes, load-config]
    if: needs.determine-changes.outputs.should_build == 'true'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        component: ${{ fromJson(needs.load-config.outputs.rag_components) }}
        variant: [default]
        include:
          # Add slim variant for ingestors (no Playwright, ~1.5GB smaller)
          - component: ingestors
            variant: slim
          # Add HuggingFace variant for server (with PyTorch, ~900MB larger)
          - component: server
            variant: huggingface
      fail-fast: false

    env:
      REGISTRY: ghcr.io
      # For slim variant, append -slim to image name suffix in tags (not the image name itself)
      IMAGE_NAME: ${{ github.repository_owner }}/${{ needs.determine-changes.outputs.image_prefix }}caipe-rag-${{ matrix.component }}
      DOCKERFILE: ai_platform_engineering/knowledge_bases/rag/build/Dockerfile.${{ matrix.component }}

    steps:
      - name: 🔒 harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: audit

      - name: Free disk space
        run: |
          echo "Disk usage before cleanup:"
          df -h

          # Remove unnecessary packages and files
          sudo apt-get remove -y '^ghc-*' || true
          sudo apt-get remove -y '^dotnet-*' || true
          sudo apt-get remove -y '^llvm-*' || true
          sudo apt-get remove -y 'php*' || true
          sudo apt-get remove -y azure-cli google-cloud-cli hhvm google-chrome-stable firefox powershell mono-devel || true
          sudo apt-get autoremove -y
          sudo apt-get clean

          # Remove large directories
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

          # Clean Docker system
          docker system prune -af --volumes || true

          echo "Disk usage after cleanup:"
          df -h

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # For non-default variants, append variant name as suffix to all tags
          flavor: |
            suffix=${{ matrix.variant != 'default' && format('-{0}', matrix.variant) || '' }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' || (startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-rc.') && !contains(github.ref_name, '-hotfix.') && !contains(github.ref_name, '-chart.')) }}
            type=raw,value=${{ needs.determine-changes.outputs.tag_version }},enable=${{ needs.determine-changes.outputs.tag_version != '' }}
            type=ref,event=tag,prefix=
            type=sha,format=short,prefix=

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      - name: Clean up before build
        run: |
          echo "Cleaning up Docker system before build..."
          docker system prune -f --volumes || true
          echo "Current disk usage:"
          df -h

      - name: Build and Push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: ai_platform_engineering/knowledge_bases/rag
          file: ${{ env.DOCKERFILE }}
          push: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: ${{ matrix.component != 'server' && 'type=gha,mode=min' || '' }}
          build-args: |
            VARIANT=${{ matrix.variant }}
            BUILDKIT_INLINE_CACHE=1
          provenance: false
          sbom: false

  # Retag unchanged rag components from previous version when tag_version is provided
  # If source image doesn't exist (still building), falls back to full build
  retag-unchanged:
    runs-on: ubuntu-latest
    needs: [determine-changes, load-config]
    if: needs.determine-changes.outputs.should_retag == 'true'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        component: ${{ fromJson(needs.load-config.outputs.rag_components) }}
        variant: [default]
        include:
          # Add slim variant for ingestors
          - component: ingestors
            variant: slim
          # Add HuggingFace variant for server
          - component: server
            variant: huggingface
      fail-fast: false

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/${{ needs.determine-changes.outputs.image_prefix }}caipe-rag-${{ matrix.component }}
      DOCKERFILE: ai_platform_engineering/knowledge_bases/rag/build/Dockerfile.${{ matrix.component }}

    steps:
      - name: 🔒 Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: audit

      - name: 📦 Install crane
        run: |
          VERSION="v0.20.2"
          curl -sL "https://github.com/google/go-containerregistry/releases/download/${VERSION}/go-containerregistry_Linux_x86_64.tar.gz" | tar xz crane
          sudo mv crane /usr/local/bin/

      - name: 🔐 Log in to registry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GH_TOKEN" | crane auth login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: 🔍 Check source image and retag or build
        id: retag-or-build
        env:
          TAG_VERSION: ${{ needs.determine-changes.outputs.tag_version }}
          VARIANT: ${{ matrix.variant }}
        run: |
          FULL_IMAGE="${REGISTRY}/${IMAGE_NAME}"

          # Determine variant suffix for tags
          if [[ "$VARIANT" != "default" ]]; then
            VARIANT_SUFFIX="-${VARIANT}"
          else
            VARIANT_SUFFIX=""
          fi

          echo "🏷️ Processing rag-${{ matrix.component }}${VARIANT_SUFFIX}..."

          # Determine source tag (previous version)
          if [[ "$TAG_VERSION" =~ ^(.+)-(dev|rc|hotfix)\.([0-9]+)$ ]]; then
            BASE_VERSION="${BASH_REMATCH[1]}"
            SUFFIX_TYPE="${BASH_REMATCH[2]}"
            SUFFIX_NUM="${BASH_REMATCH[3]}"

            if [[ "$SUFFIX_NUM" -gt 1 ]]; then
              PREV_NUM=$((SUFFIX_NUM - 1))
              SOURCE_TAG="${BASE_VERSION}-${SUFFIX_TYPE}.${PREV_NUM}${VARIANT_SUFFIX}"
            else
              SOURCE_TAG="${BASE_VERSION}${VARIANT_SUFFIX}"
            fi
          else
            SOURCE_TAG="latest${VARIANT_SUFFIX}"
          fi

          TARGET_TAG="${TAG_VERSION}${VARIANT_SUFFIX}"

          echo "  Source: ${SOURCE_TAG}"
          echo "  Target: ${TARGET_TAG}"

          # Check if source image exists
          if crane manifest "${FULL_IMAGE}:${SOURCE_TAG}" >/dev/null 2>&1; then
            echo "  ✅ Source image exists, retagging..."
            if crane tag "${FULL_IMAGE}:${SOURCE_TAG}" "${TARGET_TAG}"; then
              echo "  ✅ Successfully retagged from ${SOURCE_TAG}"
              echo "needs_build=false" >> $GITHUB_OUTPUT
            else
              echo "  ⚠️ Retag failed unexpectedly, will build instead"
              echo "needs_build=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "  ⚠️ Source image ${SOURCE_TAG} not found (may still be building)"
            echo "  📦 Will build fresh instead of using stale fallback"
            echo "needs_build=true" >> $GITHUB_OUTPUT
          fi

      # Fallback build if retag not possible
      - name: Free disk space
        if: steps.retag-or-build.outputs.needs_build == 'true'
        run: |
          echo "Disk usage before cleanup:"
          df -h

          # Remove unnecessary packages and files
          sudo apt-get remove -y '^ghc-*' || true
          sudo apt-get remove -y '^dotnet-*' || true
          sudo apt-get remove -y '^llvm-*' || true
          sudo apt-get remove -y 'php*' || true
          sudo apt-get remove -y azure-cli google-cloud-cli hhvm google-chrome-stable firefox powershell mono-devel || true
          sudo apt-get autoremove -y
          sudo apt-get clean

          # Remove large directories
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

          # Clean Docker system
          docker system prune -af --volumes || true

          echo "Disk usage after cleanup:"
          df -h

      - name: Checkout repository
        if: steps.retag-or-build.outputs.needs_build == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Docker Buildx
        if: steps.retag-or-build.outputs.needs_build == 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Log in to GitHub Container Registry
        if: steps.retag-or-build.outputs.needs_build == 'true'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        if: steps.retag-or-build.outputs.needs_build == 'true'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      - name: Clean up before build
        if: steps.retag-or-build.outputs.needs_build == 'true'
        run: |
          echo "Cleaning up Docker system before build..."
          docker system prune -f --volumes || true
          echo "Current disk usage:"
          df -h

      - name: 🔨 Build and Push (fallback)
        if: steps.retag-or-build.outputs.needs_build == 'true'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: ai_platform_engineering/knowledge_bases/rag
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.determine-changes.outputs.tag_version }}${{ matrix.variant != 'default' && format('-{0}', matrix.variant) || '' }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: ${{ matrix.component != 'server' && 'type=gha,mode=min' || '' }}
          build-args: |
            VARIANT=${{ matrix.variant }}
            BUILDKIT_INLINE_CACHE=1
          provenance: false
          sbom: false

  # Notify release-finalize workflow when this CI completes (for final release builds only)
  notify-release:
    runs-on: ubuntu-latest
    needs: [determine-changes, build-and-push, retag-unchanged]
    if: |
      always() &&
      needs.determine-changes.outputs.tag_version != '' &&
      !contains(needs.determine-changes.outputs.tag_version, '-')
    steps:
      - name: 🔔 Notify release finalize
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_VERSION: ${{ needs.determine-changes.outputs.tag_version }}
        run: |
          # Determine overall conclusion
          BUILD_RESULT="${{ needs.build-and-push.result }}"
          RETAG_RESULT="${{ needs.retag-unchanged.result }}"

          # Consider skipped as success (job conditions not met)
          if [[ "$BUILD_RESULT" == "skipped" ]]; then BUILD_RESULT="success"; fi
          if [[ "$RETAG_RESULT" == "skipped" ]]; then RETAG_RESULT="success"; fi

          if [[ "$BUILD_RESULT" == "success" && "$RETAG_RESULT" == "success" ]]; then
            CONCLUSION="success"
          else
            CONCLUSION="failure"
          fi

          echo "🔔 Notifying release-finalize: tag=$TAG_VERSION, conclusion=$CONCLUSION"

          gh api /repos/${{ github.repository }}/dispatches --input - <<EOF
          {
            "event_type": "ci-completed",
            "client_payload": {
              "tag": "$TAG_VERSION",
              "workflow": "${{ github.workflow }}",
              "conclusion": "$CONCLUSION"
            }
          }
          EOF
