name: "[Pre-Release][A2A] Sub-Agents A2A Docker Build and Push"
description: "Build and push A2A Docker images for sub-agents"

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'ai_platform_engineering/utils/**'
      - 'ai_platform_engineering/agents/**'
      - '.github/**'
      - 'build/agents/Dockerfile.a2a'

permissions:
  contents: write
  packages: write

jobs:
  load-config:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      startsWith(github.head_ref, 'prebuild/') &&
      !contains(github.head_ref, 'single-node') &&
      github.event.action != 'closed'
    outputs:
      all_agents: ${{ steps.read-config.outputs.all_agents }}
      a2a_build_args: ${{ steps.read-config.outputs.a2a_build_args }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: .github/agents.json
          sparse-checkout-cone-mode: false

      - name: Read agents config
        id: read-config
        run: |
          ALL_AGENTS=$(jq -c '.a2a_agents' .github/agents.json)
          echo "all_agents=$ALL_AGENTS" >> $GITHUB_OUTPUT
          A2A_BUILD_ARGS=$(jq -c '.a2a_build_args // {}' .github/agents.json)
          echo "a2a_build_args=$A2A_BUILD_ARGS" >> $GITHUB_OUTPUT

  determine-agents:
    runs-on: ubuntu-latest
    needs: load-config
    if: |
      github.event_name == 'pull_request' &&
      startsWith(github.head_ref, 'prebuild/') &&
      !contains(github.head_ref, 'single-node') &&
      github.event.action != 'closed'
    outputs:
      agents: ${{ steps.set-matrix.outputs.agents }}
      should_build: ${{ steps.set-matrix.outputs.should_build }}
    env:
      ALL_AGENTS: ${{ needs.load-config.outputs.all_agents }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Generate path filters
        id: generate-filters
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const agents = JSON.parse(process.env.ALL_AGENTS);
            let filters = 'shared_utils:\n';
            filters += '  - \'ai_platform_engineering/utils/**\'\n';
            filters += 'shared_dockerfile:\n';
            filters += '  - \'build/agents/Dockerfile.a2a\'\n';
            agents.forEach(agent => {
              filters += `${agent}:\n`;
              filters += `  - 'ai_platform_engineering/agents/${agent}/**'\n`;
              filters += `  - '!ai_platform_engineering/agents/${agent}/mcp/**'\n`;
              filters += `  - '!ai_platform_engineering/agents/${agent}/build/Dockerfile.mcp'\n`;
            });
            core.setOutput('filters', filters);

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          predicate-quantifier: 'every'
          filters: ${{ steps.generate-filters.outputs.filters }}

      - name: Set matrix based on changes
        id: set-matrix
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          BUILD_ALL: >-
            ${{
              steps.filter.outputs.shared_utils == 'true' ||
              steps.filter.outputs.shared_dockerfile == 'true'
            }}
          FILTER_OUTPUTS: ${{ toJson(steps.filter.outputs) }}
        with:
          script: |
            const allAgents = JSON.parse(process.env.ALL_AGENTS);
            const buildAll = process.env.BUILD_ALL === 'true';
            const filterOutputs = JSON.parse(process.env.FILTER_OUTPUTS);
            let selected;
            if (buildAll) {
              selected = allAgents;
            } else {
              selected = allAgents.filter(a => filterOutputs[a] === 'true');
            }
            core.setOutput('agents', JSON.stringify(selected));
            core.setOutput('should_build', String(selected.length > 0));

  build-and-push:
    runs-on: ubuntu-latest
    needs: [determine-agents, load-config]
    if: |
      needs.determine-agents.outputs.should_build == 'true' &&
      startsWith(github.head_ref, 'prebuild/') &&
      !contains(github.head_ref, 'single-node') &&
      github.event.action != 'closed'
    permissions:
      contents: read
      packages: write
      pull-requests: write

    strategy:
      matrix:
        agent: ${{ fromJson(needs.determine-agents.outputs.agents) }}
      fail-fast: false


    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/prebuild/agent-${{ matrix.agent }}
      AGENT_DIR: ai_platform_engineering/agents/${{ matrix.agent }}

    steps:
      - name: 🔒 harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute prebuild tag
        id: compute_tag
        shell: bash
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          BRANCH_NO_PREFIX="${BRANCH#prebuild/}"
          BRANCH_SANITIZED="${BRANCH_NO_PREFIX//\//-}"
          git fetch origin ${{ github.event.pull_request.base.ref }}
          COMMIT_COUNT=$(git rev-list --count origin/${{ github.event.pull_request.base.ref }}..HEAD)
          echo "BRANCH_BARE=${BRANCH_SANITIZED}" >> $GITHUB_ENV
          echo "PREBUILD_TAG=${BRANCH_SANITIZED}-${COMMIT_COUNT}" >> $GITHUB_ENV

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.PREBUILD_TAG }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      - name: Determine Dockerfile path
        id: dockerfile
        run: |
          if [ -f "${{ env.AGENT_DIR }}/build/Dockerfile.a2a" ]; then
            echo "path=${{ env.AGENT_DIR }}/build/Dockerfile.a2a" >> $GITHUB_OUTPUT
          else
            echo "path=build/agents/Dockerfile.a2a" >> $GITHUB_OUTPUT
          fi

      - name: Determine Agent Package Name
        id: agent_package
        run: |
          # Special case: template agent uses agent_petstore package
          if [ "${{ matrix.agent }}" == "template" ]; then
            echo "name=petstore" >> $GITHUB_OUTPUT
          else
            echo "name=${{ matrix.agent }}" >> $GITHUB_OUTPUT
          fi

      - name: Resolve per-agent build args
        id: agent_build_args
        env:
          A2A_BUILD_ARGS: ${{ needs.load-config.outputs.a2a_build_args }}
          AGENT: ${{ matrix.agent }}
        run: |
          EXTRA=$(jq -r --arg a "$AGENT" '.[$a] // {} | to_entries | map("\(.key)=\(.value)") | .[]' <<< "$A2A_BUILD_ARGS")
          {
            echo 'extra<<EOF'
            echo "$EXTRA"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and Push A2A Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            AGENT_NAME=${{ matrix.agent }}
            AGENT_PACKAGE=${{ steps.agent_package.outputs.name }}
            ${{ steps.agent_build_args.outputs.extra }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 💬 Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          AGENT: ${{ matrix.agent }}
          IMAGE_REPO: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.PREBUILD_TAG }}
          PREBUILD_TAG: ${{ env.PREBUILD_TAG }}
        with:
          script: |
            const body = `## 🐳 Prebuild Docker Image Published

            **Agent:** \`${process.env.AGENT}\`
            **Repository:** \`${process.env.IMAGE_REPO}\`
            **Tag:** \`${process.env.PREBUILD_TAG}\`

            ### Usage
            \`\`\`bash
            docker pull ${process.env.IMAGE_REF}
            \`\`\`

            > **Note:** This prebuild image will be automatically cleaned up when the PR is closed or merged.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  load-config-cleanup:
    runs-on: ubuntu-latest
    if: github.event.action == 'closed' && startsWith(github.event.pull_request.head.ref, 'prebuild/') && !contains(github.event.pull_request.head.ref, 'single-node')
    outputs:
      all_agents: ${{ steps.read-config.outputs.all_agents }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: .github/agents.json
          sparse-checkout-cone-mode: false

      - name: Read agents config
        id: read-config
        run: |
          ALL_AGENTS=$(jq -c '.a2a_agents' .github/agents.json)
          echo "all_agents=$ALL_AGENTS" >> $GITHUB_OUTPUT

  cleanup-images:
    runs-on: ubuntu-latest
    needs: load-config-cleanup
    if: github.event.action == 'closed' && startsWith(github.event.pull_request.head.ref, 'prebuild/') && !contains(github.event.pull_request.head.ref, 'single-node')
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        agent: ${{ fromJson(needs.load-config-cleanup.outputs.all_agents) }}
      fail-fast: false
    env:
      OWNER: ${{ github.repository_owner }}
      PACKAGE_NAME: prebuild/agent-${{ matrix.agent }}
    steps:
      - name: Delete prebuild images for branch
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        with:
          script: |
            const owner = process.env.OWNER;
            const rawBranch = process.env.HEAD_REF || '';
            const branchNoPrefix = rawBranch.startsWith('prebuild/') ? rawBranch.substring('prebuild/'.length) : rawBranch;
            const sanitized = branchNoPrefix.replace(/\//g, '-');
            const prefix = `${sanitized}-`;
            const packageName = process.env.PACKAGE_NAME;
            const packageType = 'container';
            try {
              const versions = await github.paginate(github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg, {
                org: owner,
                package_type: packageType,
                package_name: packageName,
                per_page: 100,
              });
              const toDelete = versions.filter(v => (v.metadata?.container?.tags || []).some(t => t.startsWith(prefix)));
              for (const v of toDelete) {
                await github.rest.packages.deletePackageVersionForOrg({
                  org: owner,
                  package_type: packageType,
                  package_name: packageName,
                  package_version_id: v.id,
                });
              }
              core.info(`Deleted ${toDelete.length} versions for ${packageName} with tag prefix ${prefix}`);
            } catch (e) {
              if (e.status === 404) {
                core.info(`Package ${packageName} not found in org ${owner}, skipping.`);
              } else {
                throw e;
              }
            }
