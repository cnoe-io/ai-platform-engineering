name: "[Tests][Dev] Quick Sanity Integration"
description: "Run quick sanity integration tests using prebuilt GHCR images with all agents + RAG"

on:
  # Trigger after the supervisor CI build completes on main — images are ready
  workflow_run:
    workflows: ["[CI][A2A] Supervisor Agent Docker Build and Push"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Explicit IMAGE_TAG to test (e.g. 0.2.43). Leave blank to test the latest non-RC release.'
        required: false
        default: ''
        type: string

concurrency:
  group: caipe-integration-dev
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  quick-sanity-dev:
    runs-on: caipe-integration-tests
    # For workflow_run: only proceed when supervisor CI succeeded
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Cleanup previous run artifacts
        run: |
          echo "::group::Cleaning up previous run artifacts"
          sudo find /home/ubuntu/actions-runner/_work/ai-platform-engineering/ai-platform-engineering -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          sudo find /home/ubuntu/actions-runner/_work/ai-platform-engineering/ai-platform-engineering -name "*.pyc" -type f -delete 2>/dev/null || true
          sudo find /home/ubuntu/actions-runner/_work/ai-platform-engineering/ai-platform-engineering -name "*.pyo" -type f -delete 2>/dev/null || true
          echo "::endgroup::"

      - name: Ensure workspace directory exists
        run: |
          echo "::group::Ensuring workspace directory exists"
          sudo mkdir -p /home/ubuntu/actions-runner/_work/ai-platform-engineering/ai-platform-engineering
          sudo chown -R ubuntu:ubuntu /home/ubuntu/actions-runner/_work/ai-platform-engineering/ai-platform-engineering
          echo "::endgroup::"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # For workflow_run: test the commit that triggered the build
          # For workflow_dispatch: test HEAD of the triggered branch
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Detect image tag
        id: image-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # workflow_dispatch with explicit tag overrides everything
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
            echo "Using explicit override: ${{ inputs.image_tag }}"
            exit 0
          fi

          # workflow_dispatch with no tag: human-triggered run against the
          # latest non-RC (final) release (e.g. 0.2.43)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG=$(gh api /repos/${{ github.repository }}/releases/latest \
              --jq '.tag_name' 2>/dev/null || true)
            if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
              echo "::warning::No final release found, falling back to 'main'"
              TAG="main"
            fi
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
            echo "Using latest final release: ${TAG}"
            exit 0
          fi

          # workflow_run (automatic): use the RC tag rc-tag.yml created for
          # this exact commit (e.g. 0.2.43-rc.1). CI builds already waited for
          # it, so the tag exists and images are pushed by the time we run.
          git fetch --tags --quiet
          TAG=$(git tag --points-at HEAD \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$' \
            | sort -V | tail -1)

          if [ -z "$TAG" ]; then
            echo "::warning::No RC tag on HEAD (doc-only push?), falling back to 'main'"
            TAG="main"
          fi

          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Using image tag: ${TAG}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .env from GitHub Secrets
        run: |
          set -euo pipefail
          cat > .env << 'EOF'
          LLM_PROVIDER=${{ secrets.LLM_PROVIDER }}
          AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT=${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION=${{ secrets.AZURE_OPENAI_API_VERSION }}
          ARGOCD_TOKEN=${{ secrets.ARGOCD_TOKEN }}
          ARGOCD_API_URL=${{ secrets.ARGOCD_API_URL }}
          ARGOCD_VERIFY_SSL=true
          BACKSTAGE_API_TOKEN=${{ secrets.BACKSTAGE_API_TOKEN }}
          BACKSTAGE_URL=${{ secrets.BACKSTAGE_URL }}
          ATLASSIAN_TOKEN=${{ secrets.ATLASSIAN_TOKEN }}
          ATLASSIAN_EMAIL=${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_API_URL=${{ secrets.ATLASSIAN_API_URL }}
          ATLASSIAN_VERIFY_SSL=true
          CONFLUENCE_API_URL=${{ secrets.CONFLUENCE_API_URL }}
          GITHUB_PERSONAL_ACCESS_TOKEN=${{ secrets.GH_PAT }}
          PAGERDUTY_API_KEY=${{ secrets.PAGERDUTY_API_KEY }}
          PAGERDUTY_API_URL=https://api.pagerduty.com
          SPLUNK_TOKEN=${{ secrets.SPLUNK_TOKEN }}
          SPLUNK_API_URL=${{ secrets.SPLUNK_API_URL }}
          KOMODOR_TOKEN=${{ secrets.KOMODOR_TOKEN }}
          KOMODOR_API_URL=${{ secrets.KOMODOR_API_URL }}
          SLACK_BOT_TOKEN=${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_APP_TOKEN=${{ secrets.SLACK_APP_TOKEN }}
          SLACK_SIGNING_SECRET=${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_CLIENT_SECRET=${{ secrets.SLACK_CLIENT_SECRET }}
          SLACK_TEAM_ID=${{ secrets.SLACK_TEAM_ID }}
          A2A_TRANSPORT=p2p
          ENABLE_RAG=true
          ENABLE_TRACING=false
          ENABLE_ARGOCD=true
          ENABLE_AWS=true
          ENABLE_BACKSTAGE=true
          ENABLE_CONFLUENCE=true
          ENABLE_GITHUB=true
          ENABLE_JIRA=true
          ENABLE_PAGERDUTY=true
          ENABLE_PETSTORE=true
          ENABLE_SLACK=true
          ENABLE_SPLUNK=true
          ENABLE_WEBEX=true
          ENABLE_WEATHER=true
          ENABLE_NETUTILS=true
          EOF
          # Mask non-empty values to avoid accidental log exposure
          while IFS='=' read -r k v; do
            [ -z "${k:-}" ] && continue
            [ "${k#\#}" != "$k" ] && continue
            if [ -n "${v:-}" ]; then
              echo "::add-mask::${v}"
            fi
          done < .env

      - name: Show Docker version
        run: |
          docker version
          docker compose version || true

      - name: Setup Python for A2A client test
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Reclaim disk space
        run: |
          echo "::group::Reclaim disk space"
          echo "Before cleanup:"
          df -h /
          docker system prune -af --volumes 2>/dev/null || true
          echo "After cleanup:"
          df -h /
          echo "::endgroup::"

      - name: Pull prebuilt images
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
        run: |
          set -euo pipefail
          echo "Pulling GHCR images with IMAGE_TAG=${IMAGE_TAG}"
          PROFILES=(
            caipe-supervisor caipe-mongodb deps caipe-ui
            all-agents netutils-agent rag
          )
          PROFILE_FLAGS=""
          for p in "${PROFILES[@]}"; do PROFILE_FLAGS+=" --profile $p"; done

          # Pull all prebuilt images — individual failures are tolerated (e.g.
          # agents that weren't rebuilt in this CI run still have a valid
          # latest tag from a previous build).
          docker compose -f docker-compose.dev.yaml $PROFILE_FLAGS pull \
            || echo "::warning::Some image pulls failed (expected for agents not rebuilt in this run)"

      - name: Start services
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
        run: |
          set -euo pipefail
          PROFILES=(
            caipe-supervisor caipe-mongodb deps caipe-ui
            all-agents netutils-agent rag
          )
          PROFILE_FLAGS=""
          for p in "${PROFILES[@]}"; do PROFILE_FLAGS+=" --profile $p"; done

          # Start with --no-build: uses the pulled GHCR images, never rebuilds locally.
          # Tolerates partial failures from agents with missing credentials.
          docker compose -f docker-compose.dev.yaml $PROFILE_FLAGS up -d --no-build \
            || echo "::warning::Some containers failed to start (expected for agents without credentials)"

      - name: Stream service logs (background)
        run: |
          set -euo pipefail
          echo "::group::Service logs"
          PROFILES=(
            caipe-supervisor caipe-mongodb deps caipe-ui
            all-agents netutils-agent rag
          )
          PROFILE_FLAGS=""
          for p in "${PROFILES[@]}"; do PROFILE_FLAGS+=" --profile $p"; done

          ( docker compose -f docker-compose.dev.yaml $PROFILE_FLAGS \
              logs -f --no-color --timestamps \
              | tee -a compose-live.log ) &
          echo $! > logs.pid
        shell: bash

      - name: Wait for readiness
        run: |
          set -euo pipefail
          for i in $(seq 1 36); do
            if curl -sfS http://localhost:8000/.well-known/agent.json >/dev/null; then
              echo "Service is up"
              break
            fi
            if [ "$i" -eq 36 ]; then
              echo "::error::Supervisor did not become ready within 3 minutes"
              docker ps -a --format 'table {{.Names}}\t{{.Status}}'
              exit 1
            fi
            echo "Not ready yet ($i/36). Sleeping 5s..."
            sleep 5
          done

      - name: Install GNU Make
        run: |
          sudo apt-get update
          sudo apt-get install -y make

      - name: Run Quick Sanity Integration Tests
        run: |
          set -euo pipefail
          make quick-sanity

      - name: On failure show recent logs
        if: failure()
        run: |
          echo "::group::Recent logs (last 300 lines)"
          tail -n 300 compose-live.log || true
          echo "::endgroup::"

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: compose-logs-dev
          path: compose-live.log
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: |
          echo "::group::Cleanup"
          PROFILES=(
            caipe-supervisor caipe-mongodb deps caipe-ui
            all-agents netutils-agent rag
          )
          PROFILE_FLAGS=""
          for p in "${PROFILES[@]}"; do PROFILE_FLAGS+=" --profile $p"; done
          docker compose -f docker-compose.dev.yaml $PROFILE_FLAGS \
            down -v --remove-orphans || true
          docker rmi -f $(docker images -aq) 2>/dev/null || true
          echo "::endgroup::"
