name: caipe-cli CI

on:
  pull_request:
    paths:
      - "cli/**"
      - ".github/workflows/caipe-ci.yml"
  push:
    branches:
      - main
      - "100-caipe-v1-core"
    paths:
      - "cli/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-14]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: cli
        run: bun install --frozen-lockfile

      - name: Type check
        working-directory: cli
        run: bun tsc --noEmit

      - name: Lint (Biome)
        working-directory: cli
        run: bun run lint

      - name: Run unit tests (vitest)
        working-directory: cli
        run: bun run test

      - name: Build (verify compilation succeeds)
        working-directory: cli
        run: bun build src/index.ts --outdir dist --target node --external keytar --external fsevents

      - name: Cold-start check (<1s)
        working-directory: cli
        run: |
          ms() { python3 -c "import time; print(int(time.time()*1000))"; }
          start=$(ms)
          node dist/index.js --version
          elapsed=$(( $(ms) - start ))
          echo "Cold-start: ${elapsed}ms"
          if [ "$elapsed" -gt 1000 ]; then
            echo "FAIL: cold-start exceeded 1000ms (${elapsed}ms)"
            exit 1
          fi
