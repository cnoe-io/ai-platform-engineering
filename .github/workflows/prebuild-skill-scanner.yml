name: "[Prebuild] Skill Scanner Docker Build and Push"
description: "Build and push Skill Scanner Docker image for prebuild branches"

# Mirrors prebuild-caipe-ui.yml. The skill-scanner image is referenced by the
# `skill-scanner` Helm subchart (charts/ai-platform-engineering/charts/skill-scanner)
# but, until this workflow landed, it had no per-PR build pipeline at all —
# `ghcr.io/<owner>/prebuild/skill-scanner:<branch>-<count>` simply didn't exist
# for prebuild branches, so reviewers had to build locally to test scanner
# changes against the chart. This workflow closes that gap.

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      # Build only when something the image actually packages changes:
      #   - the Dockerfile itself (base image, pinned scanner version, etc.)
      #   - the docker-compose entry that exercises the same build (so a
      #     compose-only change still triggers a fresh prebuild image).
      # Note: there is no first-party scanner source in this repo — the image
      # installs `cisco-ai-skill-scanner` from PyPI — so we don't need a
      # source path watcher here the way prebuild-caipe-ui.yml watches `ui/**`.
      - 'build/Dockerfile.skill-scanner'
      - 'docker-compose.dev.yaml'

env:
  IMAGE_NAME: ${{ github.repository_owner }}/prebuild/skill-scanner

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      startsWith(github.head_ref, 'prebuild/') &&
      github.event.action != 'closed'
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: 🔒 Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - name: Free disk space
        run: |
          echo "Disk usage before cleanup:"
          df -h
          sudo apt-get remove -y '^ghc-*' || true
          sudo apt-get remove -y '^dotnet-*' || true
          sudo apt-get remove -y '^llvm-*' || true
          sudo apt-get remove -y 'php*' || true
          sudo apt-get remove -y azure-cli google-cloud-cli hhvm google-chrome-stable firefox powershell mono-devel || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          docker system prune -af --volumes || true
          echo "Disk usage after cleanup:"
          df -h

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute prebuild tag
        id: compute_tag
        shell: bash
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          BRANCH_NO_PREFIX="${BRANCH#prebuild/}"
          BRANCH_SANITIZED="${BRANCH_NO_PREFIX//\//-}"
          git fetch origin ${{ github.event.pull_request.base.ref }}
          COMMIT_COUNT=$(git rev-list --count origin/${{ github.event.pull_request.base.ref }}..HEAD)
          echo "BRANCH_BARE=${BRANCH_SANITIZED}" >> $GITHUB_ENV
          echo "PREBUILD_TAG=${BRANCH_SANITIZED}-${COMMIT_COUNT}" >> $GITHUB_ENV

      - name: Read pinned upstream scanner version
        id: scanner_version
        shell: bash
        run: |
          # Honour the same default Dockerfile.skill-scanner uses (ARG default).
          # Surfacing it as a build-arg keeps prebuild tags reproducible — when
          # the Dockerfile bumps the pin, the prebuild image picks it up
          # without an extra workflow edit.
          PINNED=$(awk -F= '/^ARG SKILL_SCANNER_VERSION=/ {gsub(/[" ]/,"",$2); print $2; exit}' build/Dockerfile.skill-scanner)
          if [[ -z "$PINNED" ]]; then
            echo "❌ Could not parse SKILL_SCANNER_VERSION default from build/Dockerfile.skill-scanner"
            exit 1
          fi
          echo "SKILL_SCANNER_VERSION=${PINNED}" >> $GITHUB_ENV
          echo "Resolved upstream scanner version: ${PINNED}"

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.PREBUILD_TAG }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      - name: Build and Push Skill Scanner Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./build/Dockerfile.skill-scanner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SKILL_SCANNER_VERSION=${{ env.SKILL_SCANNER_VERSION }}
            BUILDKIT_INLINE_CACHE=1
            IMAGE_TAG=${{ env.PREBUILD_TAG }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          provenance: false
          sbom: false

      - name: 💬 Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          IMAGE_REPO: ghcr.io/${{ env.IMAGE_NAME }}
          IMAGE_REF: ghcr.io/${{ env.IMAGE_NAME }}:${{ env.PREBUILD_TAG }}
          PREBUILD_TAG: ${{ env.PREBUILD_TAG }}
          SCANNER_VERSION: ${{ env.SKILL_SCANNER_VERSION }}
        with:
          script: |
            const body = `## 🐳 Prebuild Skill Scanner Docker Image Published

            **Repository:** \`${process.env.IMAGE_REPO}\`
            **Tag:** \`${process.env.PREBUILD_TAG}\`
            **Upstream scanner:** \`cisco-ai-skill-scanner==${process.env.SCANNER_VERSION}\`

            ### Usage
            \`\`\`bash
            docker pull ${process.env.IMAGE_REF}
            \`\`\`

            ### Test in docker-compose
            \`\`\`bash
            # Update docker-compose.dev.yaml
            skill-scanner:
              image: ${process.env.IMAGE_REF}
              # ... rest of config
            \`\`\`

            ### Test against the Helm chart
            \`\`\`yaml
            # values.yaml override
            global:
              skillScanner:
                enabled: true
            skill-scanner:
              image:
                repository: ${process.env.IMAGE_REPO}
                tag: ${process.env.PREBUILD_TAG}
            \`\`\`

            > **Note:** This prebuild image will be automatically cleaned up when the PR is closed or merged.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  cleanup-images:
    runs-on: ubuntu-latest
    if: github.event.action == 'closed' && startsWith(github.event.pull_request.head.ref, 'prebuild/')
    permissions:
      contents: read
      packages: write
    env:
      OWNER: ${{ github.repository_owner }}
      PACKAGE_NAME: prebuild/skill-scanner
    steps:
      - name: Delete prebuild images for branch
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        with:
          script: |
            const owner = process.env.OWNER;
            const rawBranch = process.env.HEAD_REF || '';
            const branchNoPrefix = rawBranch.startsWith('prebuild/') ? rawBranch.substring('prebuild/'.length) : rawBranch;
            const sanitized = branchNoPrefix.replace(/\//g, '-');
            const prefix = `${sanitized}-`;
            const packageName = process.env.PACKAGE_NAME;
            const packageType = 'container';
            try {
              const versions = await github.paginate(github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg, {
                org: owner,
                package_type: packageType,
                package_name: packageName,
                per_page: 100,
              });
              const toDelete = versions.filter(v => (v.metadata?.container?.tags || []).some(t => t.startsWith(prefix)));
              for (const v of toDelete) {
                await github.rest.packages.deletePackageVersionForOrg({
                  org: owner,
                  package_type: packageType,
                  package_name: packageName,
                  package_version_id: v.id,
                });
              }
              core.info(`Deleted ${toDelete.length} versions for ${packageName} with tag prefix ${prefix}`);
            } catch (e) {
              if (e.status === 404) {
                core.info(`Package ${packageName} not found in org ${owner}, skipping.`);
              } else {
                throw e;
              }
            }
