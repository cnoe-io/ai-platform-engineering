name: "[Prebuild] Helm Chart Cleanup"
description: "Cleanup prebuild Helm charts when PR is closed or label is removed"

on:
  pull_request:
    types: [closed, unlabeled]
    paths:
      - charts/**

permissions:
  contents: read
  packages: write

jobs:
  cleanup-prebuild:
    name: Cleanup Prebuild Charts
    runs-on: ubuntu-latest
    if: |
      (
        github.event.action == 'closed' &&
        (
          startsWith(github.event.pull_request.head.ref, 'prebuild/') ||
          contains(github.event.pull_request.labels.*.name, 'helm-prerelease')
        )
      ) ||
      (
        github.event.action == 'unlabeled' &&
        github.event.label.name == 'helm-prerelease'
      )

    steps:
      - name: 🗑️ Delete Prebuild Chart Versions
        run: |
          # Get branch name and remove 'prebuild/' prefix if present
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          CLEAN_BRANCH=$(echo "${BRANCH_NAME#prebuild/}" | tr '/' '-' | tr '_' '-' | tr '[:upper:]' '[:lower:]')

          echo "🧹 Cleaning up prebuild versions for branch: $CLEAN_BRANCH"

          OWNER="${{ github.repository_owner }}"
          OWNER_TYPE="${{ github.event.repository.owner.type }}"
          if [ "$OWNER_TYPE" = "User" ]; then
            PACKAGE_OWNER_PATH="users/${OWNER}"
          else
            PACKAGE_OWNER_PATH="orgs/${OWNER}"
          fi

          echo "📦 Using package owner path: ${PACKAGE_OWNER_PATH}"

          # Function to cleanup a chart
          cleanup_chart() {
            local CHART_NAME=$1
            local PACKAGE_NAME="prebuild-helm-charts/${CHART_NAME}"
            local ENCODED_PACKAGE_NAME
            local ALL_VERSIONS_FILE="${CHART_NAME}_all_versions.json"
            local VERSIONS_FILE="${CHART_NAME}_versions.json"
            local ERROR_FILE="${CHART_NAME}_versions.err"

            ENCODED_PACKAGE_NAME=$(echo "${PACKAGE_NAME}" | sed 's|/|%2F|g')

            echo "🔍 Checking ${CHART_NAME} for prebuild versions matching pattern: *-${CLEAN_BRANCH}-*"

            # Get package versions using GitHub CLI (for OCI packages)
            # Note: Forward slash in package name must be URL encoded as %2F
            if ! gh api \
              "/${PACKAGE_OWNER_PATH}/packages/container/${ENCODED_PACKAGE_NAME}/versions" \
              > "${ALL_VERSIONS_FILE}" 2> "${ERROR_FILE}"; then
              if grep -q "HTTP 404" "${ERROR_FILE}"; then
                echo "ℹ️ Package ${PACKAGE_NAME} not found or not accessible, skipping ${CHART_NAME}"
                rm -f "${ALL_VERSIONS_FILE}" "${VERSIONS_FILE}" "${ERROR_FILE}"
                return 0
              fi

              echo "❌ Failed to list package versions for ${PACKAGE_NAME}"
              cat "${ERROR_FILE}"
              rm -f "${ALL_VERSIONS_FILE}" "${VERSIONS_FILE}" "${ERROR_FILE}"
              return 1
            fi

            jq --arg needle "-${CLEAN_BRANCH}-" \
              '.[] | select(.metadata.container.tags[]? | contains($needle)) | {id: .id, tags: .metadata.container.tags}' \
              "${ALL_VERSIONS_FILE}" > "${VERSIONS_FILE}"
            rm -f "${ALL_VERSIONS_FILE}" "${ERROR_FILE}"

            if [ -s "${VERSIONS_FILE}" ]; then
              echo "🗑️ Found ${CHART_NAME} prebuild versions to delete:"
              cat "${VERSIONS_FILE}"

              # Delete each version
              while IFS= read -r version; do
                VERSION_ID=$(echo "$version" | jq -r '.id')
                TAGS=$(echo "$version" | jq -r '.tags | join(", ")')

                echo "Deleting ${CHART_NAME} version $VERSION_ID with tags: $TAGS"

                gh api \
                  --method DELETE \
                  "/${PACKAGE_OWNER_PATH}/packages/container/${ENCODED_PACKAGE_NAME}/versions/${VERSION_ID}" || true
              done < <(cat "${VERSIONS_FILE}" | jq -c '.')

              echo "✅ ${CHART_NAME} prebuild cleanup completed"
            else
              echo "ℹ️ No ${CHART_NAME} prebuild versions found for branch: $CLEAN_BRANCH"
            fi

            rm -f "${VERSIONS_FILE}"
          }

          # Cleanup both charts
          cleanup_chart "rag-stack"
          cleanup_chart "ai-platform-engineering"

          echo "✅ All prebuild chart cleanup completed"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
