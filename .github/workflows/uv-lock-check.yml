name: uv lock sync check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  uv-lock-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13'

      - name: Install uv
        run: pip install uv

      - name: Verify uv.lock files are in sync
        run: |
          bash scripts/check_uv_lock_sync.sh
