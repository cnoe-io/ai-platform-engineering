  prebuild-rag:
    name: RAG Images
    needs: resolve-pr
    if: ${{ needs.resolve-pr.outputs.target == 'rag' || ((needs.resolve-pr.outputs.target == 'all' || needs.resolve-pr.outputs.target == 'docker') && needs.resolve-pr.outputs.rag_changed == 'true') }}
