---
name: "Grype Scan"
description: "Run Anchore Grype vulnerability scan on tag pushes — filesystem and all published container images"

# Runs on tag pushes and workflow_dispatch.
# Uses Grype (anchore/scan-action) as a safe alternative to aquasecurity/trivy-action
# following its March 2026 supply chain compromise.
#
# Two jobs:
#   scan-filesystem — scans the repo source tree for package manifest vulnerabilities
#   scan-containers — scans every published GHCR image (matrix of 35 images)

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"  # matches 0.2.3, 0.2.3-rc.1, 0.2.3.rc, etc.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to scan (e.g. 0.2.3)"
        required: true
        type: string

permissions:
  contents: read
  security-events: write  # required to upload SARIF to GitHub Code Scanning

jobs:
  scan-filesystem:
    name: Filesystem scan
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Run Grype scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        id: scan
        with:
          path: "."
          fail-build: false
          severity-cutoff: high
          output-format: sarif

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        if: always()
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: "grype-filesystem"

  scan-containers:
    name: Container scan (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          # Supervisor / main agent
          - ai-platform-engineering
          # UI
          - caipe-ui
          # Dynamic agents runtime
          - caipe-dynamic-agents
          # Bots
          - caipe-slack-bot
          - caipe-webex-bot
          # RAG components
          - caipe-rag-agent-ontology
          - caipe-rag-server
          - caipe-rag-ingestors
          # A2A sub-agents
          - agent-argocd
          - agent-aws
          - agent-backstage
          - agent-confluence
          - agent-github
          - agent-gitlab
          - agent-jira
          - agent-komodor
          - agent-netutils
          - agent-pagerduty
          - agent-slack
          - agent-splunk
          - agent-template
          - agent-victorops
          - agent-webex
          - agent-weather
          # MCP sub-agents
          - mcp-argocd
          - mcp-backstage
          - mcp-confluence
          - mcp-github
          - mcp-jira
          - mcp-komodor
          - mcp-netutils
          - mcp-pagerduty
          - mcp-splunk
          - mcp-victorops
          - mcp-webex
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Run Grype scan on container image
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        id: scan
        with:
          image: "ghcr.io/cnoe-io/${{ matrix.image }}:${{ steps.tag.outputs.tag }}"
          fail-build: false
          severity-cutoff: high
          output-format: sarif

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        if: always()
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: "grype-${{ matrix.image }}"
