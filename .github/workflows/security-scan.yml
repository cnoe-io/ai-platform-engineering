---
name: "Grype Scan"
description: "Anchore Grype vulnerability scan — filesystem on all events, containers on tags. Blocking gate is GitHub Code Scanning PR diff mode, not fail-build."

# Trigger matrix:
#   pull_request / push to main  → filesystem scan only; fail-build: false — GitHub Code Scanning
#                                  PR diff mode is the gate (only NEW alerts block the PR)
#   push tag                     → filesystem scan + all container images, fail-build: false (informational)
#   workflow_dispatch            → both jobs, fail-build: false
#
# Why fail-build: false everywhere?
#   Grype's fail-build hard-fails on any CVE at or above severity-cutoff, including CVEs in
#   upstream libraries that have no available fix yet. That forces contributors to take the
#   blame for vulnerabilities they didn't introduce and can't resolve.
#
#   GitHub Code Scanning's PR diff mode only surfaces alerts that are *new* in the PR — CVEs
#   already present on the base branch (e.g., in a transitive dep that predates the PR) are
#   silently excluded from the PR check. This means:
#     - A PR that introduces a new vulnerable dependency → new alert → PR blocked
#     - An upstream CVE already present on main → not new → PR not blocked, alert visible in
#       the Security tab so maintainers can track and upgrade when a fix is released
#
#   To activate this: require the "Code scanning results / Grype" check under
#   Settings → Branches → Branch protection rules for main.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to scan (e.g. 0.2.3)"
        required: true
        type: string

permissions:
  contents: read
  security-events: write  # required to upload SARIF to GitHub Code Scanning

jobs:
  scan-filesystem:
    name: Filesystem scan
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Run Grype scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        id: scan
        with:
          path: "."
          fail-build: false  # Gate is GitHub Code Scanning PR diff — see top-level comment
          severity-cutoff: critical
          output-format: sarif

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: always()
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: "grype-filesystem"
          # On pull_request events the default checkout produces a merge commit
          # (refs/pull/N/merge), but GitHub Code Scanning PR checks require the
          # analysis to be associated with refs/pull/N/head + the head commit SHA.
          # Without this, the check shows "1 configuration not found" because the
          # merge-ref analysis is not matched against the PR head check run.
          ref: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/head', github.event.pull_request.number) || github.ref }}
          sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

  scan-containers:
    name: Container scan (${{ matrix.image }})
    runs-on: ubuntu-latest
    # Only runs on manual dispatch — tag-push triggers were removed because images
    # are not yet published when the tag event fires (race condition).
    if: github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        image:
          # Supervisor / main agent
          - ai-platform-engineering
          # UI
          - caipe-ui
          # Dynamic agents runtime
          - caipe-dynamic-agents
          # Bots
          - caipe-slack-bot
          - caipe-webex-bot
          # RAG components
          - caipe-rag-agent-ontology
          - caipe-rag-server
          - caipe-rag-ingestors
          # A2A sub-agents
          - agent-argocd
          - agent-aws
          - agent-backstage
          - agent-confluence
          - agent-github
          - agent-gitlab
          - agent-jira
          - agent-komodor
          - agent-netutils
          - agent-pagerduty
          - agent-slack
          - agent-splunk
          - agent-template
          - agent-victorops
          - agent-webex
          - agent-weather
          # MCP sub-agents
          - mcp-argocd
          - mcp-backstage
          - mcp-confluence
          - mcp-github
          - mcp-jira
          - mcp-komodor
          - mcp-netutils
          - mcp-pagerduty
          - mcp-splunk
          - mcp-victorops
          - mcp-webex
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Run Grype scan on container image
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        id: scan
        with:
          image: "ghcr.io/cnoe-io/${{ matrix.image }}:${{ steps.tag.outputs.tag }}"
          fail-build: false
          severity-cutoff: high
          output-format: sarif

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: always()
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: "grype-${{ matrix.image }}"
