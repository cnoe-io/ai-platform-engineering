name: "[CI] Audit Service Build and Push"

on:
  push:
    tags:
      - '**'
  pull_request:
    paths:
      - 'ai_platform_engineering/audit_service/**'
      - 'build/Dockerfile.audit-service'
  workflow_dispatch:
    inputs:
      tag_version:
        description: 'Version tag to apply (e.g., 0.5.17-dev.2)'
        required: false
        type: string
      force_build:
        description: 'Force a fresh build instead of retagging.'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  determine-changes:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'pull_request' && !startsWith(github.head_ref, 'prebuild/')) ||
      (github.event_name == 'workflow_dispatch')
    outputs:
      should_build: ${{ steps.set-outputs.outputs.should_build }}
      should_retag: ${{ steps.set-outputs.outputs.should_retag }}
      tag_version: ${{ steps.version.outputs.tag_version }}
      image_prefix: ${{ steps.set-outputs.outputs.image_prefix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app-token
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.CI_BUILD_APP_ID }}
          private-key: ${{ secrets.CI_BUILD_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: read

      - name: Determine Tag
        id: version
        uses: ./.github/actions/determine-release-tag
        with:
          manual_tag: ${{ inputs.tag_version }}
          token: ${{ steps.app-token.outputs.token || github.token }}

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        with:
          filters: |
            audit_service:
              - 'ai_platform_engineering/audit_service/**'
              - 'build/Dockerfile.audit-service'

      - name: Set Outputs
        id: set-outputs
        env:
          AUDIT_SERVICE_CHANGED: ${{ steps.filter.outputs.audit_service }}
          TAG_VERSION: ${{ steps.version.outputs.tag_version }}
          FORCE_BUILD: ${{ inputs.force_build }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          SHOULD_BUILD="false"
          SHOULD_RETAG="false"

          if [[ "$TAG_VERSION" =~ -chart\.[0-9]+$ ]]; then
            {
              echo "should_build=false"
              echo "should_retag=false"
              echo "image_prefix="
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$TAG_VERSION" =~ -(dev|rc|hotfix)\.([0-9]+)$ ]]; then
            IS_PRERELEASE="true"
            PRERELEASE_NUM="${BASH_REMATCH[2]}"
          else
            IS_PRERELEASE="false"
            PRERELEASE_NUM=0
          fi

          if [[ "$TAG_VERSION" =~ -(rc|hotfix)\.[0-9]+ ]]; then
            IMAGE_PREFIX="pre-release/"
          else
            IMAGE_PREFIX=""
          fi

          if [ "$FORCE_BUILD" == "true" ]; then
            SHOULD_BUILD="true"
            SHOULD_RETAG="false"
          elif [ -n "$TAG_VERSION" ]; then
            if [ "$IS_PRERELEASE" == "true" ] && [ "$PRERELEASE_NUM" -gt 1 ]; then
              if [ "$AUDIT_SERVICE_CHANGED" == "true" ]; then
                SHOULD_BUILD="true"
              else
                SHOULD_RETAG="true"
              fi
            else
              SHOULD_BUILD="true"
            fi
          elif [ "$AUDIT_SERVICE_CHANGED" == "true" ] || [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            SHOULD_BUILD="true"
          fi

          {
            echo "should_build=$SHOULD_BUILD"
            echo "should_retag=$SHOULD_RETAG"
            echo "image_prefix=$IMAGE_PREFIX"
          } >> "$GITHUB_OUTPUT"

  build-and-push:
    runs-on: ubuntu-latest
    needs: determine-changes
    if: needs.determine-changes.outputs.should_build == 'true'
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/${{ needs.determine-changes.outputs.image_prefix }}caipe-audit-service
      DOCKERFILE: build/Dockerfile.audit-service
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' || (startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-rc.') && !contains(github.ref_name, '-hotfix.') && !contains(github.ref_name, '-chart.')) }}
            type=raw,value=${{ needs.determine-changes.outputs.tag_version }},enable=${{ needs.determine-changes.outputs.tag_version != '' }}
            type=ref,event=tag,prefix=
            type=sha,format=short,prefix=

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Build and Push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          push: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  retag-unchanged:
    runs-on: ubuntu-latest
    needs: determine-changes
    if: needs.determine-changes.outputs.should_retag == 'true'
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/${{ needs.determine-changes.outputs.image_prefix }}caipe-audit-service
      DOCKERFILE: build/Dockerfile.audit-service
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Install crane
        run: |
          VERSION="v0.20.2"
          curl -sL "https://github.com/google/go-containerregistry/releases/download/${VERSION}/go-containerregistry_Linux_x86_64.tar.gz" | tar xz crane
          sudo mv crane /usr/local/bin/

      - name: Log in to registry
        env:
          GH_TOKEN: ${{ github.token }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          echo "$GH_TOKEN" | crane auth login ghcr.io -u "$GH_ACTOR" --password-stdin

      - name: Check source image and retag or build
        id: retag-or-build
        env:
          TAG_VERSION: ${{ needs.determine-changes.outputs.tag_version }}
        run: |
          FULL_IMAGE="${REGISTRY}/${IMAGE_NAME}"
          if [[ "$TAG_VERSION" =~ ^(.+)-(dev|rc|hotfix)\.([0-9]+)$ ]]; then
            BASE_VERSION="${BASH_REMATCH[1]}"
            SUFFIX_TYPE="${BASH_REMATCH[2]}"
            SUFFIX_NUM="${BASH_REMATCH[3]}"
            SOURCE_TAG=""
            if [[ "$SUFFIX_NUM" -gt 1 ]]; then
              for ((p=SUFFIX_NUM-1; p>=1; p--)); do
                CANDIDATE="${BASE_VERSION}-${SUFFIX_TYPE}.${p}"
                if crane manifest "${FULL_IMAGE}:${CANDIDATE}" >/dev/null 2>&1; then
                  SOURCE_TAG="$CANDIDATE"
                  break
                fi
              done
            fi
            if [[ -z "$SOURCE_TAG" ]]; then
              SOURCE_TAG="${BASE_VERSION}"
            fi
          else
            SOURCE_TAG="latest"
          fi

          if crane manifest "${FULL_IMAGE}:${SOURCE_TAG}" >/dev/null 2>&1 && crane tag "${FULL_IMAGE}:${SOURCE_TAG}" "${TAG_VERSION}"; then
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.retag-or-build.outputs.needs_build == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Docker Buildx
        if: steps.retag-or-build.outputs.needs_build == 'true'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GitHub Container Registry
        if: steps.retag-or-build.outputs.needs_build == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up QEMU
        if: steps.retag-or-build.outputs.needs_build == 'true'
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Build and Push fallback image
        if: steps.retag-or-build.outputs.needs_build == 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.determine-changes.outputs.tag_version }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  notify-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [determine-changes, build-and-push, retag-unchanged]
    if: |
      always() &&
      needs.determine-changes.outputs.tag_version != '' &&
      !contains(needs.determine-changes.outputs.tag_version, '-')
    steps:
      - name: Notify release finalize
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_VERSION: ${{ needs.determine-changes.outputs.tag_version }}
          BUILD_RESULT: ${{ needs.build-and-push.result }}
          RETAG_RESULT: ${{ needs.retag-unchanged.result }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          if [[ "$BUILD_RESULT" == "skipped" ]]; then BUILD_RESULT="success"; fi
          if [[ "$RETAG_RESULT" == "skipped" ]]; then RETAG_RESULT="success"; fi
          if [[ "$BUILD_RESULT" == "success" && "$RETAG_RESULT" == "success" ]]; then
            CONCLUSION="success"
          else
            CONCLUSION="failure"
          fi
          gh api --method POST "/repos/${REPOSITORY}/dispatches" --input - <<EOF
          {
            "event_type": "ci-completed",
            "client_payload": {
              "tag": "$TAG_VERSION",
              "workflow": "$WORKFLOW_NAME",
              "conclusion": "$CONCLUSION"
            }
          }
          EOF
