name: "[Release] Manual Version Release"
description: "Manually trigger a new release by specifying the version"

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version to release (e.g., 0.2.9, 0.3.0, 1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  # Commit version bump (pyproject.toml + Chart.yaml), changelog, and tag
  commit-release:
    name: Commit Release
    runs-on: ubuntu-latest
    outputs:
      current_version: ${{ steps.validate.outputs.current_version }}
    steps:
      - name: 🔒 Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: audit

      - name: 🔑 Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: 📥 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: ✅ Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "📦 Requested version: $VERSION"

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ ERROR: Version must be in semver format (e.g., 0.2.9, 0.3.0, 1.0.0)"
            echo "   Received: '$VERSION'"
            exit 1
          fi

          echo "✅ Version format is valid"

      - name: 🔍 Get current version and validate
        id: validate
        run: |
          # Extract current version from pyproject.toml (strip any pre-release suffix to bare x.y.z)
          RAW_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          CURRENT_BARE=$(echo "$RAW_VERSION" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          NEW_VERSION="${{ github.event.inputs.version }}"

          echo "📋 Current version (raw): $RAW_VERSION"
          echo "📋 Current version (bare): $CURRENT_BARE"
          echo "📦 New version: $NEW_VERSION"
          echo "current_version=$RAW_VERSION" >> $GITHUB_OUTPUT

          # If current bare version already matches, that's fine (pr-version-bump already ran)
          if [[ "$CURRENT_BARE" == "$NEW_VERSION" || "$RAW_VERSION" == "$NEW_VERSION" ]]; then
            echo "✅ Version already at $NEW_VERSION (pr-version-bump likely ran) — will verify files"
          else
            # Check for downgrade
            HIGHER=$(echo -e "$CURRENT_BARE\n$NEW_VERSION" | sort -V | tail -n1)
            if [[ "$HIGHER" == "$CURRENT_BARE" && "$CURRENT_BARE" != "$NEW_VERSION" ]]; then
              echo "❌ ERROR: New version ($NEW_VERSION) must be greater than or equal to current version ($CURRENT_BARE)"
              exit 1
            fi
            echo "✅ Version increment validated: $CURRENT_BARE -> $NEW_VERSION"
          fi

      - name: 🔍 Check tag doesn't already exist
        run: |
          NEW_VERSION="${{ github.event.inputs.version }}"
          if git tag -l "$NEW_VERSION" | grep -q .; then
            echo "❌ ERROR: Tag '$NEW_VERSION' already exists"
            exit 1
          fi
          echo "✅ Tag '$NEW_VERSION' does not exist"

      - name: 🐍 Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13'

      - name: 📦 Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: 📦 Prepare release (update files + changelog + verify)
        uses: ./.github/actions/prepare-release
        with:
          version: ${{ github.event.inputs.version }}

      - name:  Commit, tag, and push
        run: |
          NEW_VERSION="${{ github.event.inputs.version }}"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage changes (pyproject.toml, uv.lock, Chart.yaml files, changelog)
          git add pyproject.toml CHANGELOG.md uv.lock
          find charts -name "Chart.yaml" -type f -exec git add {} +

          # Commit — may be a no-op if pr-version-bump already prepared everything
          if git diff --cached --quiet; then
            echo "ℹ️ No file changes needed — files already at $NEW_VERSION"
          else
            CURRENT_VERSION="${{ steps.validate.outputs.current_version }}"
            if [[ -n "$CURRENT_VERSION" ]]; then
              git commit -m "bump: version $CURRENT_VERSION → $NEW_VERSION"
            else
              git commit -m "bump: release $NEW_VERSION"
            fi
            echo "✅ Committed version file updates"
          fi

          # Create annotated tag
          git tag -a "$NEW_VERSION" -m "Release $NEW_VERSION"

          # Push commit and tag
          git push origin main
          git push origin "$NEW_VERSION"

          echo "✅ Committed and pushed release $NEW_VERSION"
          echo ""
          echo "🏷️ Tag '$NEW_VERSION' created and pushed"

  # Then: Trigger CI builds and create draft release
  publish-and-trigger-ci:
    name: Publish Release & Trigger CI
    needs: commit-release
    runs-on: ubuntu-latest
    steps:
      - name: 🔑 Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: 🔄 Trigger fresh CI builds for release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          NEW_VERSION="${{ github.event.inputs.version }}"
          echo "🔄 Triggering fresh CI builds for release $NEW_VERSION..."
          echo "   (build_all=true, tag_version=$NEW_VERSION)"
          echo ""

          # Workflows with their input capabilities
          # Format: "workflow_file:supports_build_all"
          # All workflows support tag_version now
          CI_WORKFLOWS=(
            "ci-a2a-sub-agent.yml:true"
            "ci-mcp-sub-agent.yml:true"
            "ci-a2a-rag.yml:false"
            "ci-supervisor-agent.yml:false"
            "ci-agent-forge-plugin.yml:false"
            "ci-caipe-ui.yml:false"
            "ci-slack-bot.yml:false"
          )

          SUCCESS=0
          FAILED=0

          # Trigger all workflows (fire and forget - don't wait)
          for WF_CONFIG in "${CI_WORKFLOWS[@]}"; do
            IFS=':' read -r WF HAS_BUILD_ALL <<< "$WF_CONFIG"
            echo -n "  🚀 $WF... "

            ARGS="-f tag_version=$NEW_VERSION"
            if [[ "$HAS_BUILD_ALL" == "true" ]]; then
              ARGS="$ARGS -f build_all=true"
            fi

            if ERROR=$(gh workflow run "$WF" --repo "${{ github.repository }}" --ref "$NEW_VERSION" $ARGS 2>&1); then
              echo "✅"
              ((SUCCESS++)) || true
            else
              echo "❌"
              echo "     Error: $ERROR"
              ((FAILED++)) || true
            fi
          done

          echo ""
          if [[ $FAILED -eq 0 ]]; then
            echo "✅ All $SUCCESS CI workflows triggered successfully"
          elif [[ $SUCCESS -gt 0 ]]; then
            echo "⚠️ $SUCCESS workflows triggered, $FAILED failed"
          else
            echo "❌ All $FAILED workflows failed to trigger"
            exit 1
          fi
          echo "📝 Images will be tagged with $NEW_VERSION when builds complete"

      - name: 🚀 Create GitHub Release (Draft)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          NEW_VERSION="${{ github.event.inputs.version }}"
          echo "🔄 Creating DRAFT GitHub Release for $NEW_VERSION..."

          gh release create "$NEW_VERSION" \
            --repo "${{ github.repository }}" \
            --title "Release $NEW_VERSION" \
            --generate-notes \
            --draft

          echo "✅ Draft release created"
          echo "📋 Release will be published automatically when all CI builds pass"
          echo "🔗 https://github.com/${{ github.repository }}/releases/tag/$NEW_VERSION"

      - name: 📊 Summary
        run: |
          NEW_VERSION="${{ github.event.inputs.version }}"
          CURRENT_VERSION="${{ needs.commit-release.outputs.current_version }}"

          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          if [[ -n "$CURRENT_VERSION" ]]; then
            echo "| Previous Version | \`$CURRENT_VERSION\` |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| New Version | \`$NEW_VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`$NEW_VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`main\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files Modified" >> $GITHUB_STEP_SUMMARY
          echo "- \`charts/**/Chart.yaml\` - versions synced" >> $GITHUB_STEP_SUMMARY
          echo "- \`pyproject.toml\` - version updated" >> $GITHUB_STEP_SUMMARY
          echo "- \`CHANGELOG.md\` - changelog generated (commitizen)" >> $GITHUB_STEP_SUMMARY
          echo "- \`uv.lock\` - lock file regenerated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images (CI builds triggered) ⏳" >> $GITHUB_STEP_SUMMARY
          echo "CI workflows triggered asynchronously - images will be tagged with \`$NEW_VERSION\` when complete:" >> $GITHUB_STEP_SUMMARY
          echo "- Supervisor agent" >> $GITHUB_STEP_SUMMARY
          echo "- Agent Forge plugin" >> $GITHUB_STEP_SUMMARY
          echo "- A2A sub-agents" >> $GITHUB_STEP_SUMMARY
          echo "- MCP sub-agents" >> $GITHUB_STEP_SUMMARY
          echo "- RAG components" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### GitHub Release (Draft) 📝" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [Release $NEW_VERSION](https://github.com/${{ github.repository }}/releases/tag/$NEW_VERSION)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Release is in DRAFT state** — it will be published automatically when all CI builds pass." >> $GITHUB_STEP_SUMMARY
          echo "If any CI fails, the release will remain as a draft for investigation." >> $GITHUB_STEP_SUMMARY

