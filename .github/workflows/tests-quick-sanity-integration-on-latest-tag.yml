name: "[Tests][Release Tag] Quick Sanity Integration"
description: "Deploy a release-tag Helm chart via setup-caipe.sh into Kind and run sanity tests"

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      chart_version:
        description: 'Helm chart version to test (e.g., 0.2.41). If empty, resolves latest semver release tag.'
        required: false
        type: string

concurrency:
  group: caipe-integration-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  quick-sanity-release:
    runs-on: caipe-integration-tests

    steps:
      - name: Cleanup previous run artifacts
        run: |
          echo "::group::Cleaning up previous run artifacts"
          sudo find /home/ubuntu/actions-runner/_work/ai-platform-engineering/ai-platform-engineering -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          sudo find /home/ubuntu/actions-runner/_work/ai-platform-engineering/ai-platform-engineering -name "*.pyc" -type f -delete 2>/dev/null || true
          sudo find /home/ubuntu/actions-runner/_work/ai-platform-engineering/ai-platform-engineering -name "*.pyo" -type f -delete 2>/dev/null || true
          echo "::endgroup::"

      - name: Ensure workspace directory exists
        run: |
          echo "::group::Ensuring workspace directory exists"
          sudo mkdir -p /home/ubuntu/actions-runner/_work/ai-platform-engineering/ai-platform-engineering
          sudo chown -R ubuntu:ubuntu /home/ubuntu/actions-runner/_work/ai-platform-engineering/ai-platform-engineering
          echo "::endgroup::"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Reclaim disk space
        run: |
          echo "::group::Reclaim disk space"
          echo "Before cleanup:"
          df -h /
          docker system prune -af --volumes 2>/dev/null || true
          echo "After cleanup:"
          df -h /
          echo "::endgroup::"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install helm
        uses: azure/setup-helm@v5

      - name: Install kind
        run: |
          KIND_VERSION=v0.27.0
          curl -fsSL -o /tmp/kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x /tmp/kind
          sudo mv /tmp/kind /usr/local/bin/kind
          kind version

      - name: Clear stale kubeconfig
        run: |
          rm -f ~/.kube/config
          mkdir -p ~/.kube

      - name: Pre-clean Kind cluster
        run: |
          kind delete cluster --name caipe 2>/dev/null || true

      - name: Resolve chart version
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.chart_version }}" ]; then
            CHART_VERSION="${{ github.event.inputs.chart_version }}"
            echo "Using manually provided chart version: $CHART_VERSION"
          else
            CHART_VERSION=$(git tag --sort=-version:refname \
              | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
              | head -1)
            if [ -z "$CHART_VERSION" ]; then
              echo "ERROR: No semver release tag found" >&2
              exit 1
            fi
            echo "Resolved latest release tag: $CHART_VERSION"
          fi
          echo "CHART_VERSION=$CHART_VERSION" >> "$GITHUB_ENV"

      - name: Create .env from GitHub Secrets
        run: |
          set -euo pipefail
          cat > .env << 'EOF'
          LLM_PROVIDER=${{ secrets.LLM_PROVIDER }}
          AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT=${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION=${{ secrets.AZURE_OPENAI_API_VERSION }}
          OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}
          OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}
          OPENAI_MODEL_NAME=${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          ARGOCD_TOKEN=${{ secrets.ARGOCD_TOKEN }}
          ARGOCD_API_URL=${{ secrets.ARGOCD_API_URL }}
          ARGOCD_VERIFY_SSL=true
          BACKSTAGE_API_TOKEN=${{ secrets.BACKSTAGE_API_TOKEN }}
          BACKSTAGE_URL=${{ secrets.BACKSTAGE_URL }}
          ATLASSIAN_TOKEN=${{ secrets.ATLASSIAN_TOKEN }}
          ATLASSIAN_EMAIL=${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_API_URL=${{ secrets.ATLASSIAN_API_URL }}
          ATLASSIAN_VERIFY_SSL=true
          CONFLUENCE_API_URL=${{ secrets.CONFLUENCE_API_URL }}
          GITHUB_PERSONAL_ACCESS_TOKEN=${{ secrets.GH_PAT }}
          PAGERDUTY_API_KEY=${{ secrets.PAGERDUTY_API_KEY }}
          PAGERDUTY_API_URL=https://api.pagerduty.com
          SPLUNK_TOKEN=${{ secrets.SPLUNK_TOKEN }}
          SPLUNK_API_URL=${{ secrets.SPLUNK_API_URL }}
          KOMODOR_TOKEN=${{ secrets.KOMODOR_TOKEN }}
          KOMODOR_API_URL=${{ secrets.KOMODOR_API_URL }}
          SLACK_BOT_TOKEN=${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_APP_TOKEN=${{ secrets.SLACK_APP_TOKEN }}
          SLACK_SIGNING_SECRET=${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_CLIENT_SECRET=${{ secrets.SLACK_CLIENT_SECRET }}
          SLACK_TEAM_ID=${{ secrets.SLACK_TEAM_ID }}
          ENABLE_TRACING=false
          EOF
          # Mask non-empty values to avoid accidental log exposure
          while IFS='=' read -r k v; do
            [ -z "${k:-}" ] && continue
            [ "${k#\#}" != "$k" ] && continue
            if [ -n "${v:-}" ]; then
              echo "::add-mask::${v}"
            fi
          done < .env

      - name: Run setup-caipe.sh
        run: |
          set -euo pipefail
          set -a && source .env && set +a
          CAIPE_CHART_VERSION="${CHART_VERSION}" ./setup-caipe.sh --non-interactive --create-cluster setup

      - name: Run validation
        run: |
          set -euo pipefail
          ./setup-caipe.sh validate

      - name: On failure show pod logs
        if: failure()
        run: |
          echo "::group::Pod status"
          kubectl get pods -n caipe -o wide 2>/dev/null || true
          echo "::endgroup::"
          echo "::group::Pod logs (last 300 lines)"
          kubectl logs -n caipe --all-containers --tail=300 -l app.kubernetes.io/instance=caipe 2>/dev/null || true
          echo "::endgroup::"

      - name: Collect pod logs
        if: always()
        run: |
          {
            echo "=== Pod Status ==="
            kubectl get pods -n caipe -o wide 2>/dev/null || echo "Could not get pod status"
            echo ""
            echo "=== Pod Logs ==="
            kubectl logs -n caipe --all-containers --tail=500 -l app.kubernetes.io/instance=caipe 2>/dev/null || echo "Could not get pod logs"
          } > kind-logs.txt

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: kind-logs-release-${{ env.CHART_VERSION }}
          path: kind-logs.txt
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: |
          echo "::group::Cleanup"
          ./setup-caipe.sh nuke || true
          kind delete cluster --name caipe 2>/dev/null || true
          docker rmi -f $(docker images -aq) 2>/dev/null || true
          echo "::endgroup::"
