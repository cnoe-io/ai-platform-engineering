name: "[Prebuild] Helm Chart"
description: "Publish prebuild Helm charts"

on:
  # Called directly from pr-version-bump workflow
  workflow_call:
    inputs:
      pr_number:
        description: 'PR number to publish prebuild for'
        required: true
        type: number
      new_commit:
        description: 'Whether a new commit was made by version bump'
        required: false
        type: boolean
        default: false
      base_ref:
        description: 'PR base branch ref'
        required: false
        type: string
        default: ''
      base_sha:
        description: 'PR base commit SHA to diff against'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  issues: write
  packages: write
  pull-requests: write
  actions: read

jobs:
  publish-prebuild:
    name: Publish Prebuild Helm Chart
    runs-on: ubuntu-latest
    # Skip if a new commit was made (will re-run on next trigger)
    if: ${{ !inputs.new_commit }}

    steps:
      - name: 📋 Set PR info from inputs
        id: bump-status
        run: |
          echo "pr_number=${{ inputs.pr_number }}" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "📋 Processing PR #${{ inputs.pr_number }}"

      - name: 🔍 Get PR details
        id: pr-info
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const prNumber = '${{ steps.bump-status.outputs.pr_number }}';
            if (!prNumber) {
              core.setFailed('PR number not found in artifact');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: parseInt(prNumber)
            });

            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_sha', pr.head.sha);
            const inputBaseRef = '${{ inputs.base_ref }}';
            const inputBaseSha = '${{ inputs.base_sha }}';
            const baseRef = inputBaseRef || pr.base.ref;
            const baseSha = inputBaseSha || pr.base.sha;

            core.setOutput('base_ref', baseRef);
            core.setOutput('base_sha', baseSha);
            core.setOutput('head_repo_full_name', pr.head.repo.full_name);
            core.setOutput('labels', pr.labels.map(l => l.name).join(','));

            console.log(`PR #${prNumber}: ${pr.head.ref} -> ${baseRef}`);
            console.log(`Head SHA: ${pr.head.sha}`);
            console.log(`Base SHA: ${baseSha}`);
            console.log(`Labels: ${pr.labels.map(l => l.name).join(', ')}`);

      - name: 📥 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.pr-info.outputs.head_sha }}
          fetch-depth: 0

      - name: 📥 Fetch PR base branch
        id: base
        shell: bash
        run: |
          BASE_REF="${{ steps.pr-info.outputs.base_ref }}"
          BASE_SHA="${{ steps.pr-info.outputs.base_sha }}"

          git fetch origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"

          if [[ -n "$BASE_SHA" ]] && git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            BASE_COMMIT="$BASE_SHA"
          else
            BASE_COMMIT=$(git rev-parse "origin/${BASE_REF}")
          fi

          echo "base_ref=$BASE_REF" >> $GITHUB_OUTPUT
          echo "base_commit=$BASE_COMMIT" >> $GITHUB_OUTPUT
          echo "📌 Using $BASE_REF at $BASE_COMMIT as Helm prebuild diff base"

      - name: 🔍 Check if chart versions are bumped
        id: version-check
        run: |
          BASE_COMMIT="${{ steps.base.outputs.base_commit }}"
          BASE_REF="${{ steps.base.outputs.base_ref }}"
          HEAD_REF="${{ steps.pr-info.outputs.head_ref }}"

          echo "🔍 Checking if chart versions have been bumped..."

          if [[ "$HEAD_REF" == prebuild/* ]]; then
            echo "✅ prebuild/* branch detected; proceeding even if chart version bump is pending"
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if any changed chart has unbumped version
          CHANGED_FILES=$(git diff --name-only "$BASE_COMMIT"..HEAD | grep "^charts/" || true)

          if [[ -z "$CHANGED_FILES" ]]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Find unique chart directories
          CHART_DIRS=""
          for FILE in $CHANGED_FILES; do
            DIR=$(dirname "$FILE")
            while [[ "$DIR" != "." && "$DIR" != "charts" ]]; do
              if [[ -f "$DIR/Chart.yaml" ]]; then
                if [[ ! "$CHART_DIRS" =~ "$DIR" ]]; then
                  CHART_DIRS="$CHART_DIRS $DIR"
                fi
                break
              fi
              DIR=$(dirname "$DIR")
            done
          done

          # Check if any chart version is NOT bumped
          NEEDS_BUMP=false
          for CHART_DIR in $CHART_DIRS; do
            if [[ -f "$CHART_DIR/Chart.yaml" ]]; then
              CURRENT_VERSION=$(grep "^version:" "$CHART_DIR/Chart.yaml" | awk '{print $2}' | tr -d '"')
              BASE_VERSION=$(git show "$BASE_COMMIT:$CHART_DIR/Chart.yaml" 2>/dev/null | grep "^version:" | awk '{print $2}' | tr -d '"' || echo "0.0.0")

              if [[ "$CURRENT_VERSION" == "$BASE_VERSION" ]]; then
                echo "  ⏳ $CHART_DIR: version not bumped yet ($CURRENT_VERSION)"
                NEEDS_BUMP=true
              else
                echo "  ✅ $CHART_DIR: version bumped ($BASE_VERSION → $CURRENT_VERSION)"
              fi
            fi
          done

          if [[ "$NEEDS_BUMP" == "true" ]]; then
            echo "⏳ Skipping prebuild - waiting for version bump to complete against $BASE_REF"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "✅ All chart versions bumped, proceeding with prebuild"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: ⚙️ Set up Helm
        if: steps.version-check.outputs.skip != 'true'
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.14.0

      - name: 🔐 Login to GHCR
        if: steps.version-check.outputs.skip != 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: 🔍 Detect Changed Charts
        if: steps.version-check.outputs.skip != 'true'
        id: detect
        run: |
          # Detect which charts have changes (excluding Chart.lock only changes)
          BASE_COMMIT="${{ steps.base.outputs.base_commit }}"

          CHANGED_FILES=$(git diff --name-only "$BASE_COMMIT"..HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Check which charts changed (excluding Chart.lock only changes)
          RAG_STACK_CHANGED=false
          AI_PLATFORM_CHANGED=false

          # Check rag-stack changes
          if echo "$CHANGED_FILES" | grep -q "^charts/rag-stack/"; then
            # Check if changes are more than just Chart.lock
            if echo "$CHANGED_FILES" | grep "^charts/rag-stack/" | grep -qv "Chart.lock$"; then
              RAG_STACK_CHANGED=true
              echo "✅ rag-stack chart has substantive changes"
            else
              echo "ℹ️  rag-stack only has Chart.lock changes, skipping prebuild"
            fi
          fi

          # Check ai-platform-engineering changes
          if echo "$CHANGED_FILES" | grep -q "^charts/ai-platform-engineering/"; then
            # Check if changes are more than just Chart.lock
            if echo "$CHANGED_FILES" | grep "^charts/ai-platform-engineering/" | grep -qv "Chart.lock$"; then
              AI_PLATFORM_CHANGED=true
              echo "✅ ai-platform-engineering chart has substantive changes"
            else
              echo "ℹ️  ai-platform-engineering only has Chart.lock changes, skipping prebuild"
            fi
          fi

          echo "rag-stack-changed=$RAG_STACK_CHANGED" >> $GITHUB_OUTPUT
          echo "ai-platform-changed=$AI_PLATFORM_CHANGED" >> $GITHUB_OUTPUT

      - name: 🏷️ Generate Prebuild Versions
        if: steps.version-check.outputs.skip != 'true'
        id: version
        run: |
          BASE_COMMIT="${{ steps.base.outputs.base_commit }}"

          # Get branch name and remove 'prebuild/' prefix if present
          BRANCH_NAME="${{ steps.pr-info.outputs.head_ref }}"
          CLEAN_BRANCH=$(echo "${BRANCH_NAME#prebuild/}" | tr '/' '-' | tr '_' '-' | tr '[:upper:]' '[:lower:]')

          # Get commit count for this PR
          COMMIT_COUNT=$(git rev-list --count "$BASE_COMMIT"..HEAD)

          echo "clean-branch=$CLEAN_BRANCH" >> $GITHUB_OUTPUT
          echo "commit-count=$COMMIT_COUNT" >> $GITHUB_OUTPUT

          make_prebuild_version() {
            local chart_file="$1"
            local current_version

            current_version=$(grep "^version:" "$chart_file" | awk '{print $2}' | tr -d '"')
            if [[ -z "$current_version" ]]; then
              echo "❌ Failed to read version from $chart_file"
              exit 1
            fi

            echo "${current_version}-${CLEAN_BRANCH}-${COMMIT_COUNT}"
          }

          # Generate version for rag-stack if changed
          if [[ "${{ steps.detect.outputs.rag-stack-changed }}" == "true" ]]; then
            RAG_STACK_VERSION=$(make_prebuild_version "charts/rag-stack/Chart.yaml")
            echo "rag-stack version: $RAG_STACK_VERSION"
            echo "rag-stack-version=$RAG_STACK_VERSION" >> $GITHUB_OUTPUT
          fi

          # Generate version for ai-platform-engineering if changed
          if [[ "${{ steps.detect.outputs.ai-platform-changed }}" == "true" ]]; then
            AI_PLATFORM_VERSION=$(make_prebuild_version "charts/ai-platform-engineering/Chart.yaml")
            echo "ai-platform-engineering version: $AI_PLATFORM_VERSION"
            echo "ai-platform-version=$AI_PLATFORM_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: 📦 Package rag-stack Chart
        if: steps.version-check.outputs.skip != 'true' && steps.detect.outputs.rag-stack-changed == 'true'
        run: |
          echo "📦 Packaging rag-stack..."

          mkdir -p ./packaged-charts

          # Update Chart.yaml with prebuild version and matching appVersion
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.rag-stack-version }}/" charts/rag-stack/Chart.yaml

          # Restore appVersion from main so image tags aren't overridden by RC bump
          # Apply to ALL Chart.yaml files (parent + subcharts)
          MAIN_APP_VERSION=$(git show origin/main:charts/rag-stack/Chart.yaml 2>/dev/null | grep "^appVersion:" | awk '{print $2}' | tr -d '"')
          if [[ -n "$MAIN_APP_VERSION" ]]; then
            echo "📌 Restoring appVersion to $MAIN_APP_VERSION in all charts/ Chart.yaml files"
            find charts/ -name Chart.yaml -exec grep -l '^appVersion:' {} \; | while read f; do
              sed -i "s/^appVersion:.*/appVersion: $MAIN_APP_VERSION/" "$f"
              echo "  ✅ $f"
            done
          fi

          # Update dependencies and package
          helm dependency update charts/rag-stack/
          helm package charts/rag-stack/ --destination ./packaged-charts/

          echo "✅ rag-stack packaged successfully"

      - name: 📦 Package ai-platform-engineering Chart
        if: steps.version-check.outputs.skip != 'true' && steps.detect.outputs.ai-platform-changed == 'true'
        run: |
          echo "📦 Packaging ai-platform-engineering..."

          mkdir -p ./packaged-charts

          # Update Chart.yaml with prebuild version and matching appVersion
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.ai-platform-version }}/" charts/ai-platform-engineering/Chart.yaml

          # Restore appVersion from main so image tags aren't overridden by RC bump
          # Apply to ALL Chart.yaml files (parent + subcharts)
          MAIN_APP_VERSION=$(git show origin/main:charts/ai-platform-engineering/Chart.yaml 2>/dev/null | grep "^appVersion:" | awk '{print $2}' | tr -d '"')
          if [[ -n "$MAIN_APP_VERSION" ]]; then
            echo "📌 Restoring appVersion to $MAIN_APP_VERSION in all charts/ Chart.yaml files"
            find charts/ -name Chart.yaml -exec grep -l '^appVersion:' {} \; | while read f; do
              sed -i "s/^appVersion:.*/appVersion: $MAIN_APP_VERSION/" "$f"
              echo "  ✅ $f"
            done
          fi

          # If rag-stack was also changed, update its dependency version
          if [[ "${{ steps.detect.outputs.rag-stack-changed }}" == "true" ]]; then
            echo "📝 Updating rag-stack dependency version to ${{ steps.version.outputs.rag-stack-version }}"
            sed -i "/name: rag-stack/,/repository:/ s/version:.*/version: ${{ steps.version.outputs.rag-stack-version }}/" charts/ai-platform-engineering/Chart.yaml
          fi

          # CRITICAL: Always update rag-stack dependencies first
          # ai-platform-engineering depends on rag-stack, which depends on neo4j and milvus
          # These external dependencies must be downloaded regardless of path changes
          echo "Updating rag-stack dependencies..."
          helm dependency update charts/rag-stack/

          echo "Updating ai-platform-engineering dependencies..."
          helm dependency update charts/ai-platform-engineering/

          helm package charts/ai-platform-engineering/ --destination ./packaged-charts/

          # Verify dependencies are packaged correctly
          echo "🔍 Verifying rag-stack dependencies..."
          if tar -tzf charts/ai-platform-engineering/charts/rag-stack-*.tgz | grep -q "^rag-stack/charts/neo4j/Chart.yaml"; then
            echo "✅ neo4j dependency verified"
          else
            echo "❌ ERROR: neo4j missing from rag-stack package"
            exit 1
          fi

          if tar -tzf charts/ai-platform-engineering/charts/rag-stack-*.tgz | grep -q "^rag-stack/charts/milvus/Chart.yaml"; then
            echo "✅ milvus dependency verified"
          else
            echo "❌ ERROR: milvus missing from rag-stack package"
            exit 1
          fi

          echo "✅ ai-platform-engineering packaged successfully with all dependencies"

      - name: 🚀 Push Prebuild Charts to GHCR
        if: steps.version-check.outputs.skip != 'true'
        run: |
          REGISTRY="oci://ghcr.io/${{ github.repository_owner }}/prebuild-helm-charts"

          echo "📦 Pushing prebuild charts to $REGISTRY"

          for CHART_FILE in ./packaged-charts/*.tgz; do
            if [ -f "$CHART_FILE" ]; then
              CHART_NAME=$(helm show chart "$CHART_FILE" | grep '^name:' | awk '{print $2}')
              CHART_VERSION=$(helm show chart "$CHART_FILE" | grep '^version:' | awk '{print $2}')

              echo "📦 Pushing $CHART_NAME:$CHART_VERSION"
              helm push "$CHART_FILE" "$REGISTRY"
              echo "✅ $CHART_NAME:$CHART_VERSION published successfully!"
            fi
          done

      - name: 💬 Comment on PR
        if: steps.version-check.outputs.skip != 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const registry = `ghcr.io/${{ github.repository_owner }}/prebuild-helm-charts`;
            const ragStackChanged = '${{ steps.detect.outputs.rag-stack-changed }}' === 'true';
            const aiPlatformChanged = '${{ steps.detect.outputs.ai-platform-changed }}' === 'true';
            const headRepo = '${{ steps.pr-info.outputs.head_repo_full_name }}';
            const isFork = headRepo !== '${{ github.repository }}';
            const prNumber = parseInt('${{ steps.bump-status.outputs.pr_number }}');

            let body = `## 📦 Prebuild Helm Charts Published\n\n`;

            if (isFork) {
              body += `> 🔀 **Fork PR** - Published via \`helm-prerelease\` label\n\n`;
            }

            body += `**Registry:** \`${registry}\`\n\n`;

            if (ragStackChanged) {
              const version = '${{ steps.version.outputs.rag-stack-version }}';
              body += `### rag-stack\n`;
              body += `**Version:** \`${version}\`\n\n`;
              body += `\`\`\`bash\n`;
              body += `helm upgrade --install rag oci://${registry}/rag-stack --version ${version}\n`;
              body += `\`\`\`\n\n`;
            }

            if (aiPlatformChanged) {
              const version = '${{ steps.version.outputs.ai-platform-version }}';
              body += `### ai-platform-engineering\n`;
              body += `**Version:** \`${version}\`\n\n`;
              body += `\`\`\`bash\n`;
              body += `helm upgrade --install ai-platform oci://${registry}/ai-platform-engineering --version ${version}\n`;
              body += `\`\`\`\n\n`;
            }

            const headRef = '${{ steps.pr-info.outputs.head_ref }}';
            const isBranchTrigger = headRef.startsWith('prebuild/');
            const isLabelTrigger = !isBranchTrigger;

            body += `> **Note:** These prebuild versions will be automatically cleaned up when the PR is closed or merged.\n\n`;

            if (isLabelTrigger) {
              body += `> **Tip:** Remove the \`helm-prerelease\` label to immediately cleanup prebuild versions and stop publishing new ones.`;
            }

            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
