name: "[CI] GitHub Actions Static Analysis"

on:
  pull_request:
    paths:
      - ".github/actions/**"
      - ".github/workflows/**"
      - ".zizmor.yml"
  push:
    branches:
      - main
    paths:
      - ".github/actions/**"
      - ".github/workflows/**"
      - ".zizmor.yml"

permissions:
  contents: read

jobs:
  zizmor:
    name: Run zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: 📦 Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: 📋 Collect changed Actions files
        id: changed-files
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            BASE_SHA="$PR_BASE_SHA"
          elif [[ "$PUSH_BEFORE_SHA" =~ ^0+$ ]]; then
            BASE_SHA="${CURRENT_SHA}^"
          else
            BASE_SHA="$PUSH_BEFORE_SHA"
          fi

          git diff --name-only --diff-filter=ACMRT "$BASE_SHA" "$CURRENT_SHA" \
            | grep -E '^\.github/(workflows/.*\.ya?ml|actions/.*/action\.ya?ml)$' \
            | sort > changed-actions-files.txt || true

          if [[ -s changed-actions-files.txt ]]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
            echo "Changed files:"
            sed 's/^/  - /' changed-actions-files.txt
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "No changed GitHub Actions workflow or composite action files."
          fi

      - name: 🔎 Run zizmor annotations
        if: steps.changed-files.outputs.has_files == 'true'
        env:
          ZIZMOR_VERSION: "1.25.2"
        run: |
          set -euo pipefail

          ZIZMOR_INPUTS=()
          while IFS= read -r file; do
            ZIZMOR_INPUTS+=("$file")
          done < changed-actions-files.txt

          uvx --from "zizmor==${ZIZMOR_VERSION}" zizmor \
            --format github \
            --min-severity high \
            --min-confidence high \
            "${ZIZMOR_INPUTS[@]}"

      - name: 📄 Generate SARIF
        if: always() && steps.changed-files.outputs.has_files == 'true'
        env:
          ZIZMOR_VERSION: "1.25.2"
        run: |
          set -euo pipefail

          ZIZMOR_INPUTS=()
          while IFS= read -r file; do
            ZIZMOR_INPUTS+=("$file")
          done < changed-actions-files.txt

          uvx --from "zizmor==${ZIZMOR_VERSION}" zizmor \
            --format sarif \
            --min-severity high \
            --min-confidence high \
            "${ZIZMOR_INPUTS[@]}" > zizmor.sarif

      - name: 📤 Upload SARIF
        if: always() && steps.changed-files.outputs.has_files == 'true'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: zizmor.sarif
