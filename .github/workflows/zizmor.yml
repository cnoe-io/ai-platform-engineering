name: "[CI] GitHub Actions Static Analysis"

on:
  pull_request:
    paths:
      - ".github/actions/**"
      - ".github/workflows/**"
      - ".github/zizmor.yml"
      - ".zizmor.yml"
  push:
    branches:
      - main
    paths:
      - ".github/actions/**"
      - ".github/workflows/**"
      - ".github/zizmor.yml"
      - ".zizmor.yml"

permissions:
  contents: read

jobs:
  zizmor:
    name: Run zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 📦 Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: false

      - name: 📋 Collect changed Actions files
        id: changed-files
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            BASE_SHA="$PR_BASE_SHA"
          elif [[ "$PUSH_BEFORE_SHA" =~ ^0+$ ]]; then
            BASE_SHA="${CURRENT_SHA}^"
          else
            BASE_SHA="$PUSH_BEFORE_SHA"
          fi

          git diff --name-only --diff-filter=ACMRT "$BASE_SHA" "$CURRENT_SHA" \
            | grep -E '^\.github/(workflows/.*\.ya?ml|actions/.*/action\.ya?ml)$' \
            | sort > changed-actions-files.txt || true

          if [[ -s changed-actions-files.txt ]]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
            echo "Changed files:"
            sed 's/^/  - /' changed-actions-files.txt
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "No changed GitHub Actions workflow or composite action files."
          fi

      - name: 🔎 Run zizmor annotations
        if: steps.changed-files.outputs.has_files == 'true'
        env:
          ZIZMOR_VERSION: "1.25.2"
        run: |
          set -euo pipefail

          ZIZMOR_INPUTS=()
          while IFS= read -r file; do
            ZIZMOR_INPUTS+=("$file")
          done < changed-actions-files.txt

          uvx --from "zizmor==${ZIZMOR_VERSION}" zizmor \
            --format github \
            --min-severity high \
            --min-confidence high \
            "${ZIZMOR_INPUTS[@]}"

      - name: 📄 Generate SARIF
        if: always() && steps.changed-files.outputs.has_files == 'true'
        env:
          ZIZMOR_VERSION: "1.25.2"
        run: |
          set -euo pipefail

          ZIZMOR_INPUTS=()
          while IFS= read -r file; do
            ZIZMOR_INPUTS+=("$file")
          done < changed-actions-files.txt

          uvx --from "zizmor==${ZIZMOR_VERSION}" zizmor \
            --format sarif \
            --min-severity high \
            --min-confidence high \
            "${ZIZMOR_INPUTS[@]}" > zizmor.sarif

      - name: 📤 Upload SARIF
        if: always() && steps.changed-files.outputs.has_files == 'true'
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: zizmor.sarif
