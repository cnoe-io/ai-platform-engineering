name: "[CI] Agentic App Runtime Build and Push"
description: "Build, smoke-test, and publish the embedded agentic app runtime image"

on:
  push:
    tags:
      - "**"
  pull_request:
    paths:
      - "ui/apps/**"
      - "ui/package.json"
      - "ui/package-lock.json"
      - "build/Dockerfile.agentic-app"
      - ".github/workflows/ci-agentic-app-runtime.yml"
  workflow_dispatch:
    inputs:
      tag_version:
        description: "Version tag to apply (e.g., 0.6.0-dev.1)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/caipe-agentic-app-runtime
  DOCKERFILE: build/Dockerfile.agentic-app
  LOCAL_IMAGE: caipe-agentic-app-runtime:ci

jobs:
  smoke-test:
    name: Smoke test ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: finops
            port: 3010
            command: node apps/agentic-apps/finops/server.mjs
            portEnv: FINOPS_APP_PORT
            jwtSkipEnv: AGENTIC_APP_FINOPS_JWT_SKIP_VERIFY
          - app: weather
            port: 3020
            command: node apps/agentic-apps/weather/server.mjs
            portEnv: WEATHER_APP_PORT
            jwtSkipEnv: AGENTIC_APP_WEATHER_JWT_SKIP_VERIFY
          - app: oss-repo-management
            port: 3040
            command: node apps/agentic-apps/oss-repo-management/server.mjs
            portEnv: OSS_REPO_MANAGEMENT_APP_PORT
            jwtSkipEnv: AGENTIC_APP_OSS_REPO_MANAGEMENT_JWT_SKIP_VERIFY
          - app: jira-project-dashboard
            port: 3041
            command: node apps/agentic-apps/jira-project-dashboard/server.mjs
            portEnv: JIRA_PROJECT_DASHBOARD_APP_PORT
            jwtSkipEnv: AGENTIC_APP_JIRA_PROJECT_DASHBOARD_JWT_SKIP_VERIFY

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build local agentic app runtime image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          load: true
          tags: ${{ env.LOCAL_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          provenance: false
          sbom: false

      - name: Start ${{ matrix.app }} server
        shell: bash
        env:
          APP: ${{ matrix.app }}
          COMMAND: ${{ matrix.command }}
          PORT: ${{ matrix.port }}
          PORT_ENV: ${{ matrix.portEnv }}
          JWT_SKIP_ENV: ${{ matrix.jwtSkipEnv }}
        run: |
          set -euo pipefail
          docker run -d \
            --name "agentic-app-${APP}" \
            -p "127.0.0.1:${PORT}:${PORT}" \
            -e NODE_ENV=test \
            -e "${PORT_ENV}=${PORT}" \
            -e "${JWT_SKIP_ENV}=true" \
            "${LOCAL_IMAGE}" \
            sh -c "${COMMAND}"

      - name: Check ${{ matrix.app }} /healthz
        shell: bash
        env:
          APP: ${{ matrix.app }}
          PORT: ${{ matrix.port }}
        run: |
          set -euo pipefail
          for attempt in {1..30}; do
            if curl --fail --silent --show-error "http://127.0.0.1:${PORT}/healthz"; then
              echo
              echo "${APP} health check passed"
              exit 0
            fi
            sleep 2
          done
          echo "${APP} health check failed"
          docker logs "agentic-app-${APP}" || true
          exit 1

      - name: Stop ${{ matrix.app }} server
        if: always()
        shell: bash
        env:
          APP: ${{ matrix.app }}
        run: docker rm -f "agentic-app-${APP}" || true

  publish:
    name: Publish runtime image
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' || (startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-rc.') && !contains(github.ref_name, '-hotfix.') && !contains(github.ref_name, '-chart.')) }}
            type=raw,value=${{ inputs.tag_version }},enable=${{ inputs.tag_version != '' }}
            type=ref,event=tag,prefix=
            type=sha,format=short,prefix=

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Build and push agentic app runtime image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=min
          provenance: false
          sbom: false
