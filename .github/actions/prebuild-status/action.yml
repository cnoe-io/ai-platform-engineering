name: Prebuild status artifact
description: Upload a prebuild status artifact and dispatch the artifact comment reconciler.

inputs:
  pr_number:
    description: Pull request number.
    required: true
  head_sha:
    description: Pull request head SHA.
    required: true
  head_ref:
    description: Pull request head ref.
    required: true
  source:
    description: Producer workflow source.
    required: true
  type:
    description: Artifact type, such as docker or helm.
    required: true
  name:
    description: Artifact display name.
    required: true
  repository:
    description: Docker repository or Helm registry.
    required: false
    default: ""
  tag:
    description: Docker tag.
    required: false
    default: ""
  ref:
    description: Fully qualified docker image or Helm chart ref.
    required: false
    default: ""
  version:
    description: Helm chart version.
    required: false
    default: ""
  release_name:
    description: Helm release name.
    required: false
    default: ""
  status:
    description: "Status value: building, published, or failed."
    required: true
  artifact_suffix:
    description: Artifact suffix, usually start or final.
    required: true

runs:
  using: composite
  steps:
    - name: Prepare status artifact
      id: status
      shell: bash
      env:
        PR_NUMBER: ${{ inputs.pr_number }}
        HEAD_SHA: ${{ inputs.head_sha }}
        HEAD_REF: ${{ inputs.head_ref }}
        SOURCE: ${{ inputs.source }}
        TYPE: ${{ inputs.type }}
        NAME: ${{ inputs.name }}
        REPOSITORY: ${{ inputs.repository }}
        TAG: ${{ inputs.tag }}
        REF: ${{ inputs.ref }}
        VERSION: ${{ inputs.version }}
        RELEASE_NAME: ${{ inputs.release_name }}
        STATUS: ${{ inputs.status }}
        ARTIFACT_SUFFIX: ${{ inputs.artifact_suffix }}
        WORKFLOW_NAME: ${{ github.workflow }}
        RUN_ID: ${{ github.run_id }}
        RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        set -euo pipefail

        artifact_name="prebuild-status-pr-${PR_NUMBER}-sha-${HEAD_SHA}-${SOURCE}-${NAME}-${ARTIFACT_SUFFIX}"
        artifact_dir="${RUNNER_TEMP}/prebuild-status/${artifact_name}"
        mkdir -p "${artifact_dir}"

        jq -n \
          --argjson pr_number "$PR_NUMBER" \
          --arg head_sha "$HEAD_SHA" \
          --arg head_ref "$HEAD_REF" \
          --arg source "$SOURCE" \
          --arg type "$TYPE" \
          --arg name "$NAME" \
          --arg repository "$REPOSITORY" \
          --arg tag "$TAG" \
          --arg ref "$REF" \
          --arg version "$VERSION" \
          --arg releaseName "$RELEASE_NAME" \
          --arg status "$STATUS" \
          --arg workflow "$WORKFLOW_NAME" \
          --arg run_id "$RUN_ID" \
          --arg run_url "$RUN_URL" \
          --arg created_at "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
          '{
            pr_number: $pr_number,
            head_sha: $head_sha,
            head_ref: $head_ref,
            source: $source,
            type: $type,
            name: $name,
            repository: $repository,
            tag: $tag,
            ref: $ref,
            version: $version,
            releaseName: $releaseName,
            status: $status,
            workflow: $workflow,
            run_id: $run_id,
            run_url: $run_url,
            created_at: $created_at
          }' > "${artifact_dir}/status.json"

        echo "artifact_name=${artifact_name}" >> "${GITHUB_OUTPUT}"

    - name: Upload status artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: ${{ steps.status.outputs.artifact_name }}
        path: ${{ runner.temp }}/prebuild-status/${{ steps.status.outputs.artifact_name }}/status.json
        retention-days: 7
        if-no-files-found: error

    - name: Dispatch artifact comment reconciler
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        ARTIFACT_SUFFIX: ${{ inputs.artifact_suffix }}
        PR_NUMBER: ${{ inputs.pr_number }}
        HEAD_SHA: ${{ inputs.head_sha }}
        GH_REPOSITORY: ${{ github.repository }}
      run: |
        set -euo pipefail

        if [[ "$ARTIFACT_SUFFIX" != "final" ]]; then
          echo "Skipping comment dispatch for non-final prebuild status artifact."
          exit 0
        fi

        payload_file="$(mktemp)"
        trap 'rm -f "${payload_file}"' EXIT

        jq -n \
          --argjson pr_number "$PR_NUMBER" \
          --arg head_sha "$HEAD_SHA" \
          '{
            event_type: "prebuild-artifact-status",
            client_payload: {
              pr_number: $pr_number,
              head_sha: $head_sha
            }
          }' > "${payload_file}"

        dispatch_reconciler() {
          gh api --method POST "/repos/${GH_REPOSITORY}/dispatches" --input "${payload_file}"
        }

        # assisted-by Codex Codex-sonnet-4-6
        # The uploaded artifact is the durable status record; dispatch only nudges
        # the PR comment reconciler and should not turn a good build red.
        if dispatch_reconciler; then
          exit 0
        fi

        echo "::warning::Prebuild status artifact was uploaded, but the comment reconciler dispatch failed. Continuing because the build result is independent of comment refresh."
