server {
    listen 80;
    server_name caipe-rbac.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name caipe-rbac.example.com;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Real-IP $remote_addr;

    location ~ ^/(realms|resources|admin|js|welcome-content)/ {
        proxy_pass http://keycloak:7080;
    }

    location = /openfga {
        return 302 /openfga/;
    }

    location /openfga/ {
        auth_basic "CAIPE admin dashboards";
        auth_basic_user_file /etc/nginx/certs/dashboard.htpasswd;
        proxy_pass http://openfga:3000/playground/;
    }

    location /assets/ {
        auth_basic "CAIPE admin dashboards";
        auth_basic_user_file /etc/nginx/certs/dashboard.htpasswd;
        proxy_pass http://openfga:3000/assets/;
    }

    location = /agentgateway {
        return 302 /agentgateway/;
    }

    location /agentgateway/ {
        auth_basic "CAIPE admin dashboards";
        auth_basic_user_file /etc/nginx/certs/dashboard.htpasswd;
        proxy_pass http://agentgateway:15000/ui/;
        sub_filter_once off;
        sub_filter '"/_next/' '"/agentgateway/_next/';
        sub_filter 'href="/_next/' 'href="/agentgateway/_next/';
        sub_filter 'src="/_next/' 'src="/agentgateway/_next/';
    }

    location /agentgateway/_next/ {
        auth_basic "CAIPE admin dashboards";
        auth_basic_user_file /etc/nginx/certs/dashboard.htpasswd;
        proxy_pass http://agentgateway:15000/_next/;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://caipe-ui:3000;
    }
}
