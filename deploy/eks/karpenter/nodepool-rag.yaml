apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: rag
spec:
  template:
    metadata:
      labels:
        workload-type: rag
    spec:
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: default

      # Only pods tolerating this taint will land on RAG nodes.
      # Set via charts/ai-platform-engineering/values-karpenter.yaml for rag-stack subcharts
      taints:
        - key: workload-type
          value: rag
          effect: NoSchedule

      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]   # RAG workloads are stateful; avoid spot interruptions
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: eks.amazonaws.com/instance-category
          operator: In
          values: ["r"]   # memory-optimized
        - key: eks.amazonaws.com/instance-generation
          operator: Gt
          values: ["4"]

      # rotate nodes to pick up patched AMIs.
      # Capped at 20d: v1 requires expireAfter + terminationGracePeriod <= 21d,
      # and EKS Auto Mode defaults terminationGracePeriod to 24h.
      expireAfter: 480h

  # Safety ceiling
  limits:
    cpu: "20"
    memory: 64Gi

  disruption:
    # Conservative: only consolidate when nodes are fully empty to avoid disrupting
    # stateful RAG services (neo4j, redis)
    consolidationPolicy: WhenEmpty
    consolidateAfter: 60s
