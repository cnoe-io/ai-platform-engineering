# OpenFGA + HTTP ext_authz bridge for AgentGateway experiments.
#
# Usage (from repo root, with the normal dev stack + rbac profile):
#
#   export OPENFGA_EXPERIMENT_SUB="<paste Keycloak access token `sub` claim>"
#   cp deploy/agentgateway/config.openfga-experiment.yaml deploy/agentgateway/config.yaml
#   docker compose -f docker-compose.dev.yaml -f docker-compose.openfga-experiment.yaml \
#     --profile rbac up -d openfga-exp-postgres openfga-exp-migrate openfga-exp \
#     openfga-exp-init openfga-authz-bridge agentgateway
#
# Revert AGW config when done:
#   git checkout -- deploy/agentgateway/config.yaml
#
# See deploy/openfga-experiment/README.md for details.

services:
  openfga-exp-postgres:
    image: postgres:17-alpine
    container_name: openfga-exp-postgres
    profiles:
      - rbac
    environment:
      POSTGRES_USER: openfga
      POSTGRES_PASSWORD: openfga
    volumes:
      - openfga_exp_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openfga"]
      interval: 5s
      timeout: 5s
      retries: 5

  openfga-exp-migrate:
    image: openfga/openfga:latest
    container_name: openfga-exp-migrate
    profiles:
      - rbac
    depends_on:
      openfga-exp-postgres:
        condition: service_healthy
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://openfga:openfga@openfga-exp-postgres:5432/postgres?sslmode=disable
    command: migrate

  openfga-exp:
    image: openfga/openfga:latest
    container_name: openfga-exp
    profiles:
      - rbac
    depends_on:
      openfga-exp-migrate:
        condition: service_completed_successfully
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://openfga:openfga@openfga-exp-postgres:5432/postgres?sslmode=disable
      OPENFGA_DATASTORE_MAX_OPEN_CONNS: "50"
      OPENFGA_PLAYGROUND_ENABLED: "true"
    command: run
    ports:
      - "8082:8080"
      - "8083:8081"
      - "3001:3000"
    healthcheck:
      test:
        - CMD
        - /usr/local/bin/grpc_health_probe
        - -addr=localhost:8081
      interval: 5s
      timeout: 30s
      retries: 5

  openfga-exp-init:
    build:
      context: ./deploy/openfga-experiment/init
    container_name: openfga-exp-init
    profiles:
      - rbac
    environment:
      OPENFGA_HTTP: http://openfga-exp:8080
      OPENFGA_STORE_NAME: caipe-openfga-experiment
      OPENFGA_EXPERIMENT_SUB: ${OPENFGA_EXPERIMENT_SUB:-}
    depends_on:
      openfga-exp:
        condition: service_healthy

  openfga-authz-bridge:
    build:
      context: ./deploy/openfga-experiment/bridge
    container_name: openfga-authz-bridge
    profiles:
      - rbac
    environment:
      OPENFGA_HTTP: http://openfga-exp:8080
      OPENFGA_STORE_NAME: caipe-openfga-experiment
      OPENFGA_RELATION: can_call
      OPENFGA_OBJECT: document:mcp
      OPENFGA_BYPASS_SUBS: ${OPENFGA_BYPASS_SUBS:-}
    ports:
      - "9100:9100"
    depends_on:
      openfga-exp-init:
        condition: service_completed_successfully
      openfga-exp:
        condition: service_healthy

  agentgateway:
    depends_on:
      openfga-authz-bridge:
        condition: service_started

volumes:
  openfga_exp_pg:
