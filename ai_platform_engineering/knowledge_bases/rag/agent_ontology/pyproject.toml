[project]
name = "agent-ontology"
version = "0.1.0"
description = "Ontology agent to generate relations between entities in the knowledge graph"
readme = "README.md"
authors = [
    { email = "subbaksh@cisco.com" }
]
requires-python = ">=3.13, <4.0"
dependencies = [
    # Core dependencies (includes langchain-openai via common)
    "common",
    "langchain==1.1.3",
    "langgraph==1.0.4",
    "pytest==9.0.2",
    "pytest-asyncio==1.3.0",
    "python-dotenv==1.2.1",
    "cnoe-agent-utils==0.3.14",
    "fastapi[standard]==0.124.0",
    "apscheduler==3.11.1",
    "pymilvus==2.6.5",
    "bm25s==0.2.14",
    "rbloom==1.5.4",
    "deepagents==0.2.8",
    "langfuse==3.14.5",
    "langmem==0.0.30",
]

[build-system]
requires = ["uv_build>=0.8.17,<0.9.0"]
build-backend = "uv_build"

[tool.uv.sources]
common = { path = "../common" }

[tool.ruff]
line-length = 300
indent-width = 2

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["F403"]
