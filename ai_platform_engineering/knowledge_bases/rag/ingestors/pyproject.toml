[project]
# assisted-by Codex Codex-sonnet-4-6
name = "ingestors"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { email = "subbaksh@cisco.com" }
]
requires-python = ">=3.13, <4.0"
dependencies = [
    "aiohttp==3.14.1",
    "aiohttp-retry==2.9.1",
    "beautifulsoup4==4.14.2",
    "boto3==1.42.45",
    "common",
    "fastapi[standard]==0.135.3",
    "kubernetes==35.0.0",
    "langchain==1.3.9",
    "langchain-text-splitters==1.1.2",
    "lxml==6.1.0",
    "pyjwt==2.13.0",
    "python-dotenv==1.2.2",
    "redis==6.4.0",
    "requests==2.33.0",
    "scrapy==2.16.0",
    "slack-sdk==3.38.0",
    "twisted==26.4.0",
]

[project.optional-dependencies]
# Playwright for JavaScript rendering in webloader ingestor
# Adds ~1GB to image size (Chromium browser + dependencies)
playwright = [
    "scrapy-playwright==0.0.46",
]
dev = [
    "pytest==9.0.3",
    "pytest-asyncio==1.3.0",
]

[project.scripts]
ingestors = "ingestors:main"

[build-system]
requires = ["uv_build>=0.8.17,<0.9.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest==9.0.3",
    "pytest-asyncio==1.3.0",
    "ruff==0.11.10",
]

[tool.ruff]
line-length = 300
indent-width = 2

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["F403"]

[tool.ruff.lint.per-file-ignores]
"src/ingestors/webloader/loader/scrapy_worker.py" = ["E402"]
"src/ingestors/webloader/loader/worker_pool.py" = ["E402"]
"tests/webloader/test_ingestor.py" = ["E402"]

[tool.uv]
constraint-dependencies = ["urllib3>=2.6.3"]
[tool.uv.sources]
common = { path = "../common" }
