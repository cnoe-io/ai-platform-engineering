[project]
name = "server"
version = "0.1.0"
description = "Server for the RAG agent that ingests documentation and entities for knowledge graph"
authors = [
    {name = "Rehan Agrawal", email = "rehagraw@cisco.com"},
    {name = "Shubham Bakshi", email = "subbaksh@cisco.com"}
]
license = {text = "Apache-2.0"}
readme = "README.md"
requires-python = ">=3.13,<4.0"
dependencies = [
    # LangChain ecosystem (versions must align with common's langchain-openai)
    "langchain==1.0.8",
    "langchain-core==1.2.31",
    "langchain-community==0.4.1",
    "langchain-milvus==0.3.0",
    # Vector DB
    "pymilvus==2.6.2",
    # Agent frameworks
    "a2a==0.44",
    "a2a-sdk==0.2.16",
    "cnoe-agent-utils==0.3.14",
    # Web framework
    "fastapi[standard]==0.122.0",
    "uvicorn==0.37.0",
    "fastmcp==3.2.3",
    # HTTP clients
    "aiohttp==3.13.4",
    "aiohttp-retry==2.9.1",
    "httpx==0.28.1",
    # Data processing
    "beautifulsoup4==4.14.2",
    "lxml==6.0.2",
    "pyyaml==6.0.3",
    # Auth & utils
    "openai==2.32.0",
    "python-dotenv==1.1.1",
    "PyJWT[crypto]==2.12.1",
    "click==8.3.0",
    "aiofile==3.9.0",
    # 098 RBAC additions
    "cel-python>=0.5.0",
    "python-jose[cryptography]>=3.3.0",
    "common",
]

[project.scripts]
run-server = "server.__main__:main"

[project.optional-dependencies]
dev = [
    "pytest==9.0.3",
    "pytest-asyncio==1.3.0",
    "pytest-cov==6.2.1",
    "pytest-mock==3.14.0",
    "ruff==0.11.10",
]
# HuggingFace local embeddings variant (~900MB additional due to PyTorch)
# Use the -hf image variant or install with: pip install server[huggingface]
huggingface = [
    "sentence-transformers==5.4.0",
    "huggingface-hub==1.3.0",
    "common[huggingface]",
]

[build-system]
requires = ["uv_build>=0.8.17,<0.9.0"]
build-backend = "uv_build"


[tool.uv]
constraint-dependencies = ["starlette>=0.50.0", "transformers>=5.0.0"]
dev-dependencies = [
    "pytest==9.0.3",
    "pytest-asyncio==1.3.0",
    "pytest-cov==6.2.1",
    "pytest-mock==3.14.0",
    "pytest-timeout==2.4.0",
    "requests==2.33.1",
    "ruff==0.11.10",
    "psutil==7.2.2",
    "memory-profiler==0.61.0",
    "aiofile==3.9.0",
]

[tool.uv.sources]
common = { path = "../common" }

[tool.ruff]
line-length = 300
indent-width = 2

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["F403"]
