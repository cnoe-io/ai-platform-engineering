[project]
name = "common"
version = "0.1.0"
description = "Common code for RAG"
readme = "README.md"
authors = [
    { email = "subbaksh@cisco.com" }
]
requires-python = ">=3.13, <4.0"
dependencies = [
    "cymple==0.12.0",
    "neo4j==5.28.2",
    "pydantic==2.11.9",
    "redis==6.4.0",
    # Embedding providers - lightweight API-based (always included)
    "langchain-openai==1.0.3",
    "langchain-aws==1.1.0",
    "langchain-cohere==0.5.0",
    "langchain-ollama==1.0.0",
]

[project.optional-dependencies]
# Heavy local embedding provider (~900MB due to PyTorch)
huggingface = [
    "langchain-huggingface==1.0.1",
]

[build-system]
requires = ["uv_build>=0.8.17,<0.9.0"]
build-backend = "uv_build"

[tool.ruff]
line-length = 300
indent-width = 2

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["F403"]
