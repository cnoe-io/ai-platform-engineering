# Dynamic Agents Configuration
#
# This file contains configuration for the Dynamic Agents service.
# In Kubernetes, this file can be mounted as a ConfigMap to customize
# settings per environment.
#
# =============================================================================
# Available LLM Models
# =============================================================================
#
# Defines which models are available in the model selector dropdown
# when creating or editing dynamic agents.
#
# Format:
#   models:
#     - model_id: <model-id>      # The model passed to the LLM provider
#       name: <display-name>      # Human-readable name shown in the UI
#       provider: <provider>      # Provider name (must match LLMFactory.SUPPORTED_PROVIDERS)
#       description: <desc>       # Optional description
#
# Supported providers:
#   - anthropic-claude
#   - openai
#   - azure-openai
#   - aws-bedrock
#   - google-gemini
#   - gcp-vertexai
#   - groq
#
# The "model_id" field is passed to LLMFactory.get_llm(model=model_id).
# An empty model_id ("") means use the platform default configuration.

models:
  # Anthropic Models (direct API)
  - model_id: "claude-sonnet-4-20250514"
    name: "Claude Sonnet 4"
    provider: "anthropic-claude"
    description: "Latest Claude Sonnet model - balanced performance and speed"

  - model_id: "claude-3-5-sonnet-20241022"
    name: "Claude 3.5 Sonnet"
    provider: "anthropic-claude"
    description: "High capability model with excellent reasoning"

  - model_id: "claude-3-5-haiku-20241022"
    name: "Claude 3.5 Haiku"
    provider: "anthropic-claude"
    description: "Fast and efficient for simpler tasks"

  # Anthropic Models (AWS Bedrock)
  - model_id: "global.anthropic.claude-sonnet-4-5-20250929-v1:0"
    name: "Claude Sonnet 4.5 (AWS Bedrock)"
    provider: "aws-bedrock"
    description: "Claude Sonnet 4.5 via AWS Bedrock"

  - model_id: "global.anthropic.claude-haiku-4-5-20251001-v1:0"
    name: "Claude Haiku 4.5 (AWS Bedrock)"
    provider: "aws-bedrock"
    description: "Smaller, faster Claude 4.5 model via AWS Bedrock"

  # OpenAI Models (direct API)
  - model_id: "gpt-4o"
    name: "GPT-4o"
    provider: "openai"
    description: "OpenAI's most capable model"

  - model_id: "gpt-4o-mini"
    name: "GPT-4o Mini"
    provider: "openai"
    description: "Smaller, faster GPT-4o variant"

  # AWS Bedrock Models
  # - model_id: "anthropic.claude-3-5-sonnet-20241022-v2:0"
  #   name: "Claude 3.5 Sonnet (Bedrock)"
  #   provider: "aws-bedrock"
  #   description: "Claude 3.5 Sonnet via AWS Bedrock"

  # Google Gemini Models
  # - model_id: "gemini-1.5-pro"
  #   name: "Gemini 1.5 Pro"
  #   provider: "google-gemini"
  #   description: "Google's Gemini 1.5 Pro model"

  # Azure OpenAI Models
  - model_id: "gpt-4o"
    name: "GPT-4o (Azure)"
    provider: "azure-openai"
    description: "GPT-4o via Azure OpenAI"

# =============================================================================
# Seed MCP Servers
# =============================================================================
#
# MCP servers defined here are loaded at startup and marked as config_driven.
# Config-driven servers cannot be edited or deleted via the UI - modify this
# file instead and restart the service.
#
# Format:
#   mcp_servers:
#     - id: <unique-slug>          # Required: Unique identifier (e.g., 'github')
#       name: <display-name>       # Required: Human-readable name
#       description: <desc>        # Optional: Description shown in UI
#       transport: <type>          # Required: 'stdio', 'sse', or 'http'
#       command: <cmd>             # For stdio: Command to run
#       args: [<arg1>, <arg2>]     # For stdio: Command arguments
#       env:                       # For stdio: Environment variables
#         VAR_NAME: "value"        # Supports ${ENV_VAR} and ${ENV_VAR:-default}
#       endpoint: <url>            # For sse/http: Server URL
#       enabled: true              # Optional: Whether server is active (default: true)
#
# Environment variable expansion:
#   ${VAR_NAME}           - Expands to env var value (empty if not set)
#   ${VAR_NAME:-default}  - Expands to env var value or 'default' if not set

mcp_servers:
  # GitLab MCP Server (shared with the platform gitlab agent)
  - id: "gitlab"
    name: "GitLab"
    description: "GitLab operations: projects, issues, merge requests, CI/CD pipelines, repository files"
    transport: "http"
    endpoint: "http://mcp-gitlab:8000/mcp"
    enabled: true

  # Jira MCP Server (shared with the platform jira agent)
  - id: "jira"
    name: "Jira"
    description: "Jira operations: issues, projects, sprints, boards, comments, workflows"
    transport: "http"
    endpoint: "http://mcp-jira:8000/mcp"
    enabled: true

  # Mock MCP server for testing config-driven functionality
  - id: "mock-server"
    name: "Mock Server"
    description: "A mock MCP server for testing config-driven seeding"
    transport: "stdio"
    command: "echo"
    args: ["mock-mcp-server"]
    enabled: false  # Disabled by default since it's just for testing

  # Example: GitHub MCP Server
  # - id: "github"
  #   name: "GitHub"
  #   description: "GitHub operations via MCP"
  #   transport: "stdio"
  #   command: "uvx"
  #   args: ["mcp-server-github"]
  #   env:
  #     GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"
  #   enabled: true

  # Example: Filesystem MCP Server
  # - id: "filesystem"
  #   name: "Filesystem"
  #   description: "Local filesystem access"
  #   transport: "stdio"
  #   command: "npx"
  #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/workspace"]
  #   enabled: true

# =============================================================================
# Seed Agents
# =============================================================================
#
# Agents defined here are loaded at startup and marked as config_driven.
# Config-driven agents cannot be edited or deleted via the UI - modify this
# file instead and restart the service.
#
# Format:
#   agents:
#     - id: <unique-slug>          # Required: Unique identifier
#       name: <display-name>       # Required: Human-readable name
#       description: <desc>        # Optional: Description shown in UI
#       system_prompt: |           # Required: Agent instructions (multiline)
#         Your instructions here...
#       model_id: <model>          # Required: LLM model ID from models section
#       model_provider: <provider> # Required: LLM provider
#       visibility: <scope>        # Optional: 'private', 'team', 'global' (default: global)
#       allowed_tools:             # Optional: MCP servers and tools to use
#         server_id: []            # Empty list = all tools from server
#         server_id: ["tool1"]     # Specific tools only
#       subagents: []              # Optional: Other agents to delegate to
#       builtin_tools:             # Optional: Built-in tools configuration
#         fetch_url:
#           enabled: true
#           allowed_domains: "*"
#       enabled: true              # Optional: Whether agent is active (default: true)

agents:
  # Mock agent for testing config-driven functionality
  - id: "mock-agent"
    name: "Mock Agent"
    description: "A mock agent for testing config-driven seeding"
    system_prompt: |
      You are a mock agent used for testing the config-driven agent seeding feature.
      This agent was loaded from config.yaml and cannot be edited or deleted via the UI.
      
      When a user interacts with you, explain that you are a test agent and demonstrate
      that config-driven agents work correctly.
    model_id: "claude-sonnet-4-20250514"
    model_provider: "anthropic-claude"
    visibility: "global"
    allowed_tools:
      mock-server: []  # Use all tools from the mock server
    builtin_tools:
      fetch_url:
        enabled: true
        allowed_domains: "*"
    enabled: false

  # Example: Code Reviewer Agent
  # - id: "code-reviewer"
  #   name: "Code Reviewer"
  #   description: "Reviews code for best practices and potential issues"
  #   system_prompt: |
  #     You are an expert code reviewer. When given code to review:
  #     1. Check for bugs and potential issues
  #     2. Suggest improvements for readability and maintainability
  #     3. Identify security concerns
  #     4. Recommend best practices
  #   model_id: "claude-sonnet-4-20250514"
  #   model_provider: "anthropic-claude"
  #   visibility: "global"
  #   allowed_tools:
  #     github: []
  #   enabled: true
