[project]
name = "mcp-netutils"
version = "0.1.0"
description = "Network Utility MCP Server - DNS, DHCP, and network diagnostics"
license = "Apache-2.0"
authors = [
  { name = "Sri Aradhyula", email = "sraradhy@cisco.com" }
]
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "fastmcp==3.2.3",
  "httpx==0.28.1",
  "mcp==1.26.0",
  "pydantic==2.12.5",
  "python-dotenv==1.2.1",
]

[project.scripts]
mcp-netutils = "mcp_netutils.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
