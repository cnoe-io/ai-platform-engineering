[project]
name = "mcp-confluence"
version = "0.1.0"
description = "Confluence MCP Server"
license = "Apache-2.0"
authors = [
  { name = "Sri Aradhyula", email = "sraradhy@cisco.com" }
]
readme = "README.md"
requires-python = ">=3.13,<4.0"
dependencies = [
  "fastmcp==3.2.3",
  "httpx==0.28.1",
  "mcp==1.26.0",
  "mcp-agent-auth",
  "pydantic==2.12.5",
  "python-dotenv==1.2.1",
  "typing-extensions==4.15.0",
]

[tool.uv.sources]
mcp-agent-auth = { path = "../../common/mcp-auth", editable = true }

[tool.poetry.scripts]
mcp_argocd = "mcp_confluence.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"