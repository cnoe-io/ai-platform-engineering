[project]
name = "mcp-aws"
version = "0.1.0"
description = "AWS MCP Server — aws_cli_execute and eks_kubectl_execute tools over HTTP/SSE"
license = "Apache-2.0"
authors = [
  { name = "AI Platform Engineering Contributors" }
]
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "fastmcp==3.3.1",
  "mcp==1.27.1",
  "pydantic==2.12.5",
  "python-dotenv==1.2.2",
]

[project.scripts]
mcp-aws = "mcp_aws.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
