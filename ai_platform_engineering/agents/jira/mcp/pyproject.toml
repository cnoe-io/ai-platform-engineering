[project]
name = "mcp-jira"
version = "0.1.0"
description = "Generated MCP server for jira from OpenAPI specification"
authors = [
  { name = "Sri Aradhyula", email = "sraradhy@cisco.com" }
]
readme = "README.md"
requires-python = ">=3.13,<4.0"
dependencies = [
  "fastmcp==3.2.3",
  "httpx==0.28.1",
  "keyring==25.6.0",
  "mcp==1.26.0",
  "mcp-agent-auth",
  "pydantic==2.12.5",
  "python-dateutil==2.9.0.post0",
  "python-dotenv==1.2.1",
  "typing-extensions==4.15.0",
]

[tool.uv.sources]
mcp-agent-auth = { path = "../../common/mcp-auth", editable = true }

[dependency-groups]
dev = [
  "pytest==9.0.3",
  "pytest-asyncio==1.3.0",
  "pytest-mock==3.15.1",
]

[project.scripts]
mcp-argocd = "mcp_argocd.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"