[project]
name = "mcp-argocd"
version = "0.1.0"
description = "ArgoCD MCP Server"
license = "Apache-2.0"
authors = [
  { name = "Sri Aradhyula", email = "sraradhy@cisco.com" }
]
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "fastmcp==3.2.4",
  "httpx==0.28.1",
  "mcp==1.27.1",
  "mcp-agent-auth", # gitleaks:allow - package name, not a credential
  "pydantic==2.12.5",
  "python-dotenv==1.2.2",
]
[tool.uv.sources]
mcp-agent-auth = { path = "../../common/mcp-auth", editable = true }

[project.scripts]
mcp-argocd = "mcp_argocd.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"