[project]
name = "mcp_webex"
description = "A Model Context Protocol server providing tools to act with Webex via LLMs"
authors = [
    { name = "Torben Tretau", email = "ttretau@cisco.com" }
]
dynamic = [
    "version"
]
readme = "README.md"
keywords = ["webex", "mcp", "llm", "automation"]
requires-python = ">=3.13,<4.0"
dependencies = [
    "click==8.3.1",
    "mcp==1.26.0",
    "pydantic==2.12.5",
    "httpx==0.28.1",
    "python-dotenv==1.2.1",
    "fastmcp==3.2.3",
    "typing-extensions==4.15.0",
]

[tool.uv]
constraint-dependencies = ["uv==0.11.6"]
dev-dependencies = [
    "pyright==1.1.408",
    "ruff==0.15.1",
    "pytest==9.0.3",
    "pytest-asyncio==1.3.0",
    "hatch==1.16.3",]

[tool.hatch.version]
path = "mcp_webex/__about__.py"

[project.scripts]
mcp-server-webex = "mcp_webex:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"

[tool.hatch.build.targets.wheel]
packages = ["mcp_webex"]