[project]
name = "mcp-agent-auth"
version = "0.1.0"
description = "Shared authentication middleware for MCP servers"
requires-python = ">=3.13"
dependencies = [
    "starlette==0.50.0",
    "pyjwt[crypto]==2.12.0",
    "requests==2.33.0",
    "python-dotenv==1.2.2",
    "httpx==0.28.1",
]

[dependency-groups]
dev = [
    "pytest==9.0.3",
    "pytest-asyncio==1.3.0",
    "respx==0.23.1",
    "cryptography==46.0.7",
]
