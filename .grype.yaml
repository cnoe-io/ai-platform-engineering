# Grype vulnerability scan configuration
# Suppress specific false-positive and accepted-risk findings.
#
# IMPORTANT: Every entry MUST pin `package.version` to the exact version
# currently installed. This ensures:
#   1. Any version change (upgrade or downgrade) re-triggers full Grype
#      evaluation automatically — the ignore never silently covers a new
#      vulnerable version.
#   2. When upstream ships a fix and we bump the dep, the old entry no
#      longer applies; a fresh Grype run will confirm the new version is
#      clean without any manual .grype.yaml edits.
#
# Maintenance: when upgrading a package in this list, remove or update
# its entry here. Do not leave stale version-pinned entries around.

ignore:
  # ── FALSE POSITIVES ────────────────────────────────────────────────────────
  # Grype's vulnerability DB has an incorrect/incomplete affected-version
  # range for these. The installed version is OUTSIDE the CVE's affected
  # range, but Grype flags it anyway.
  #
  # Resolution: entry should be REMOVED once Grype's DB is corrected or
  # the package is upgraded past any ambiguous range boundary.

  # uv 0.11.6: CVE affects <= 0.9.4. 0.11.6 is well outside the range.
  - vulnerability: GHSA-w476-p2h3-79g9
    package:
      name: uv
      type: python
      version: "0.11.6"

  # uv 0.11.6: CVE affects <= 0.9.5. Same DB issue.
  - vulnerability: GHSA-pqhf-p39g-3x64
    package:
      name: uv
      type: python
      version: "0.11.6"

  # dompurify 3.3.3: CVE affects < 3.3.2. 3.3.3 is the patched version.
  - vulnerability: GHSA-h8r8-wccr-v5f2
    package:
      name: dompurify
      type: npm
      version: "3.3.3"

  # serialize-javascript 7.0.5: CVE affects <= 7.0.2. 7.0.5 is patched.
  - vulnerability: GHSA-5c6j-r48x-rmvq
    package:
      name: serialize-javascript
      type: npm
      version: "7.0.5"

  # next 16.2.3: CVE affected range ends at 16.0.11 (and specific canary
  # ranges). 16.2.3 is not in any affected range; Grype over-matches on
  # the major version.
  - vulnerability: GHSA-h25m-26qc-wcjf
    package:
      name: next
      type: npm
      version: "16.2.3"

  # ── NO UPSTREAM FIX AVAILABLE ──────────────────────────────────────────────
  # Latest published version is still flagged. No patched release exists.
  # Version-pinned so an upgrade automatically re-triggers evaluation;
  # remove entry once a fix is available and the dep is upgraded.

  # fastmcp 3.2.3: 3 CVEs, latest on PyPI as of 2026-04-12. No fix.
  # Upstream: https://github.com/jlowin/fastmcp/security/advisories
  - vulnerability: GHSA-rcfx-77hg-w2wv
    package:
      name: fastmcp
      type: python
      version: "3.2.3"

  - vulnerability: GHSA-rww4-4w9c-7733
    package:
      name: fastmcp
      type: python
      version: "3.2.3"

  - vulnerability: GHSA-m8x7-r2rg-vh5g
    package:
      name: fastmcp
      type: python
      version: "3.2.3"

  # nltk 3.9.4: latest on PyPI as of 2026-04-12. No fix.
  - vulnerability: GHSA-rf74-v2fm-23pw
    package:
      name: nltk
      type: python
      version: "3.9.4"

  # scrapy 2.15.0: latest on PyPI as of 2026-04-12. No fix.
  - vulnerability: GHSA-cwxj-rr6w-m6w7
    package:
      name: scrapy
      type: python
      version: "2.15.0"

  # go-sdk v1.4.1: no patched release as of 2026-04-12.
  - vulnerability: GHSA-q382-vc8q-7jhj
    package:
      name: github.com/modelcontextprotocol/go-sdk
      type: go-module
      version: "1.4.1"
