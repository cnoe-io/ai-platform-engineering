# ============================================================================
# CAIPE DOCKER COMPOSE CONFIGURATION
# ============================================================================
# For setup instructions and agent orchestration details, refer to:
#   https://cnoe-io.github.io/ai-platform-engineering/getting-started/quick-start
#
# The UI proxies chat and streaming requests to the Dynamic Agents runtime.
# Agent selection and configuration are controlled through environment variables
# in the .env file—see documentation for full list and descriptions.
# ============================================================================

services:

  ####################################################################################################
  #                                         MCP Servers                                              #
  ####################################################################################################

  # Official GitHub MCP server for all-in-one mode.
  github-mcp-server:
    image: ghcr.io/github/github-mcp-server:latest
    container_name: github-mcp-server
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN}
    ports: ["18000:8082"]
    profiles:
      - github
      - mcp-servers

  mcp-backstage:
    image: ghcr.io/cnoe-io/mcp-backstage:${IMAGE_TAG:-0.5.16}
    container_name: mcp-backstage
    env_file: [.env]
    ports: ["18001:8000"]
    environment:
      - MCP_MODE=http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(1); result=s.connect_ex(('localhost', 8000)); s.close(); exit(0 if result == 0 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    profiles:
      - backstage
      - all-agents
      - mcp-servers

  # ArgoCD MCP

  mcp-argocd:
    image: ghcr.io/cnoe-io/mcp-argocd:${IMAGE_TAG:-0.5.16}
    container_name: mcp-argocd
    env_file: [.env]
    ports: ["18002:8000"]
    environment:
      - MCP_MODE=http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(1); result=s.connect_ex(('localhost', 8000)); s.close(); exit(0 if result == 0 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    profiles:
      - argocd
      - all-agents
      - mcp-servers

  # Confluence MCP

  mcp-confluence:
    image: ghcr.io/sooperset/mcp-atlassian:latest
    container_name: mcp-confluence
    env_file: [.env]
    ports: ["18003:8000"]
    environment:
      - CONFLUENCE_URL=${CONFLUENCE_URL}
      - CONFLUENCE_USERNAME=${CONFLUENCE_USERNAME}
      - CONFLUENCE_API_TOKEN=${CONFLUENCE_API_TOKEN}
    profiles:
      - confluence
      - all-agents
      - mcp-servers

  # Jira MCP

  mcp-jira:
    image: ghcr.io/cnoe-io/mcp-jira:${IMAGE_TAG:-0.5.16}
    container_name: mcp-jira
    env_file: [.env]
    ports: ["18004:8000"]
    environment:
      - MCP_MODE=http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(1); result=s.connect_ex(('localhost', 8000)); s.close(); exit(0 if result == 0 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    profiles:
      - jira
      - all-agents
      - mcp-servers

  # Komodor MCP

  mcp-komodor:
    image: ghcr.io/cnoe-io/mcp-komodor:${IMAGE_TAG:-0.5.16}
    container_name: mcp-komodor
    env_file: [.env]
    ports: ["18005:8000"]
    environment:
      - MCP_MODE=http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(1); result=s.connect_ex(('localhost', 8000)); s.close(); exit(0 if result == 0 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    profiles:
      - komodor
      - mcp-servers

  # PagerDuty MCP

  mcp-pagerduty:
    image: ghcr.io/cnoe-io/mcp-pagerduty:${IMAGE_TAG:-0.5.16}
    container_name: mcp-pagerduty
    env_file: [.env]
    ports: ["18006:8000"]
    environment:
      - MCP_MODE=http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(1); result=s.connect_ex(('localhost', 8000)); s.close(); exit(0 if result == 0 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    profiles:
      - pagerduty
      - all-agents
      - mcp-servers

  # Slack MCP

  mcp-slack:
    image: ghcr.io/korotovsky/slack-mcp-server:v1.2.3
    container_name: mcp-slack
    env_file: [.env]
    ports: ["18007:3001"]
    environment:
      - SLACK_MCP_HOST=0.0.0.0
      - SLACK_MCP_PORT=3001
      - SLACK_MCP_XOXB_TOKEN=${SLACK_BOT_TOKEN}
      # Message posting (disabled by default for safety). Set to 'true' for all
      # channels, or restrict to specific channel IDs (comma-separated), or use
      # '!' prefix to exclude channels.
      # Examples: 'true' (all), 'C123,C456' (whitelist), '!C789' (blacklist)
      # - SLACK_MCP_ADD_MESSAGE_TOOL=${SLACK_MCP_ADD_MESSAGE_TOOL:-false}
    command: ["--transport", "http"]
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null -w '%{http_code}' --max-time 2 -X POST http://localhost:3001/mcp | grep -q 400"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    profiles:
      - slack
      - all-agents
      - mcp-servers

  # Splunk

  mcp-splunk:
    image: ghcr.io/cnoe-io/mcp-splunk:${IMAGE_TAG:-0.5.16}
    container_name: mcp-splunk
    env_file: [.env]
    ports: ["18008:8000"]
    environment:
      - MCP_MODE=http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(1); result=s.connect_ex(('localhost', 8000)); s.close(); exit(0 if result == 0 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    profiles:
      - splunk
      - all-agents
      - mcp-servers

  # Webex

  mcp-webex:
    image: ghcr.io/cnoe-io/mcp-webex:${IMAGE_TAG:-0.5.16}
    container_name: mcp-webex
    env_file: [.env]
    ports: ["18009:8000"]
    environment:
      - MCP_MODE=http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(1); result=s.connect_ex(('localhost', 8000)); s.close(); exit(0 if result == 0 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    profiles:
      - webex
      - all-agents
      - mcp-servers

  # NetUtils MCP

  mcp-netutils:
    image: ghcr.io/cnoe-io/mcp-netutils:${IMAGE_TAG:-0.5.16}
    container_name: mcp-netutils
    env_file: [.env]
    ports: ["18011:8000"]
    environment:
      - MCP_MODE=http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(1); result=s.connect_ex(('localhost', 8000)); s.close(); exit(0 if result == 0 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    profiles:
      - netutils-agent
      - all-agents
      - mcp-servers

  ####################################################################################################
  #                                      CAIPE UI & MongoDB                                          #
  ####################################################################################################
  # MongoDB for CAIPE UI chat history and user settings
  caipe-mongodb:
    image: mongo:7.0
    container_name: caipe-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_ROOT_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_ROOT_PASSWORD:-changeme}
      - MONGO_INITDB_DATABASE=${MONGODB_DATABASE:-caipe}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    profiles:
      - caipe-mongodb

  # MongoDB Admin UI (optional)
  caipe-ui-mongo-express:
    image: mongo-express:latest
    container_name: caipe-ui-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGODB_ROOT_USERNAME:-admin}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGODB_ROOT_PASSWORD:-changeme}
      - ME_CONFIG_MONGODB_URL=mongodb://${MONGODB_ROOT_USERNAME:-admin}:${MONGODB_ROOT_PASSWORD:-changeme}@caipe-mongodb:27017/
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      caipe-mongodb:
        condition: service_healthy
    profiles:
      - caipe-ui-mongo-express

  ####################################################################################################
  #                                      CAIPE UI                                                    #
  ####################################################################################################
  # CAIPE UI - dynamic-agent chat with 3-panel layout
  # Features: Chat history, streaming chat UI, agent activity timeline
  # Includes Agent Builder for workflow creation and testing
  #
  # Configuration:
  #   MongoDB: For persistent chat history and user settings
  #   - Configure via MONGODB_* environment variables
  #   - See mongodb service configuration above
  caipe-ui:
    image: ghcr.io/cnoe-io/caipe-ui:${IMAGE_TAG:-0.5.16}
    container_name: caipe-ui
    ports: ["3000:3000"]
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # Pass the active Compose profile set through to the UI so product
      # health can show profile-enabled integrations as degraded/down even
      # when their container crashes before serving traffic.
      - COMPOSE_PROFILES=${COMPOSE_PROFILES:-}
      # Chat runtime health endpoint URL
      - A2A_BASE_URL=${A2A_BASE_URL:-http://dynamic-agents:8001}
      # Enable/Disable RAG Knowledge Bases (default: true)
      - RAG_ENABLED=${RAG_ENABLED:-true}
      # RAG Server URL for knowledge base API (internal Docker network)
      - RAG_SERVER_URL=${RAG_SERVER_URL:-http://rag-server:9446}
      - RAG_URL=${RAG_URL:-http://localhost:9446}
      # MongoDB configuration - Enable/disable MongoDB persistence
      - NEXT_PUBLIC_MONGODB_ENABLED=${NEXT_PUBLIC_MONGODB_ENABLED:-false}
      - "MONGODB_URI=${MONGODB_URI:-mongodb://${MONGODB_ROOT_USERNAME:-admin}:${MONGODB_ROOT_PASSWORD:-changeme}@caipe-mongodb:27017/${MONGODB_DATABASE:-caipe}?authSource=admin}"
      # NextAuth configuration (required for production)
      # Generate a secret with: openssl rand -base64 48
      # R4: NEXTAUTH_SECRET MUST be set in the environment (e.g. via .env)
      # for this production compose file. The `:?...` Compose syntax aborts
      # `docker compose up` with the supplied message if the env var is
      # missing or empty so an operator never silently inherits a shared
      # placeholder. (For local dev that genuinely wants a placeholder,
      # use docker-compose.dev.yaml instead.)
      - "NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?NEXTAUTH_SECRET must be set in your .env (run: openssl rand -base64 48)}"
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      # OpenFGA ReBAC reconciliation for the local RBAC profile.
      - OPENFGA_HTTP=${OPENFGA_HTTP:-http://openfga:8080}
      - OPENFGA_STORE_NAME=${OPENFGA_STORE_NAME:-caipe-openfga}
      # SSO Configuration - set NEXT_PUBLIC_SSO_ENABLED=true to enable
      - NEXT_PUBLIC_SSO_ENABLED=${NEXT_PUBLIC_SSO_ENABLED:-false}
      - OIDC_ISSUER=${OIDC_ISSUER:-}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
      - OIDC_GROUP_CLAIM=${OIDC_GROUP_CLAIM:-}
      - OIDC_REQUIRED_GROUP=${OIDC_REQUIRED_GROUP:-}
      - OIDC_REQUIRED_ADMIN_GROUP=${OIDC_REQUIRED_ADMIN_GROUP:-}
      - BOOTSTRAP_ADMIN_EMAILS=${BOOTSTRAP_ADMIN_EMAILS:-}
      - OIDC_ENABLE_REFRESH_TOKEN=${OIDC_ENABLE_REFRESH_TOKEN:-true}
      # Local Docker Keycloak admin client. The rbac profile seeds this
      # confidential client in realm-config.json; Kubernetes should inject
      # production values from its secret store instead.
      - KEYCLOAK_URL=${KEYCLOAK_URL:-http://keycloak:7080}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-caipe}
      - KEYCLOAK_RESOURCE_SERVER_ID=${KEYCLOAK_RESOURCE_SERVER_ID:-caipe-platform}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-caipe-platform-dev-secret}
      - KEYCLOAK_ADMIN_CLIENT_ID=${KEYCLOAK_ADMIN_CLIENT_ID:-caipe-platform}
      - KEYCLOAK_ADMIN_CLIENT_SECRET=${KEYCLOAK_ADMIN_CLIENT_SECRET:-caipe-platform-dev-secret}
      # Workflow runner - set WORKFLOW_RUNNER_ENABLED=true to show Run Workflow button and Multi-Step Workflows
      - WORKFLOW_RUNNER_ENABLED=${WORKFLOW_RUNNER_ENABLED:-false}
      - DYNAMIC_AGENTS_URL=${DYNAMIC_AGENTS_URL:-http://dynamic-agents:8001}
      # Connections & Secrets. Docker Compose reads provider bootstrap values
      # from .env; Kubernetes deployments use ESO to inject the same env names.
      - CAIPE_CREDENTIALS_ENABLED=${CAIPE_CREDENTIALS_ENABLED:-false}
      - CREDENTIAL_STORE_BACKEND=${CREDENTIAL_STORE_BACKEND:-mongodb-envelope}
      - CREDENTIAL_KEY_PROVIDER=${CREDENTIAL_KEY_PROVIDER:-local-cmk}
      - CREDENTIAL_KMS_CMK_ID=${CREDENTIAL_KMS_CMK_ID:-}
      - CREDENTIAL_KMS_REGION=${CREDENTIAL_KMS_REGION:-}
      - CREDENTIAL_SERVICE_AUDIENCE=${CREDENTIAL_SERVICE_AUDIENCE:-caipe-credential-service}
      - CREDENTIAL_BOOTSTRAP_OAUTH_CONNECTORS=${CREDENTIAL_BOOTSTRAP_OAUTH_CONNECTORS:-false}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GITHUB_REDIRECT_URI=${GITHUB_REDIRECT_URI:-}
      - CONFLUENCE_CLIENT_ID=${CONFLUENCE_CLIENT_ID:-}
      - CONFLUENCE_CLIENT_SECRET=${CONFLUENCE_CLIENT_SECRET:-}
      - CONFLUENCE_REDIRECT_URI=${CONFLUENCE_REDIRECT_URI:-}
      - WEBEX_CLIENT_ID=${WEBEX_CLIENT_ID:-}
      - WEBEX_CLIENT_SECRET=${WEBEX_CLIENT_SECRET:-}
      - WEBEX_REDIRECT_URI=${WEBEX_REDIRECT_URI:-}
      # Audit log storage is owned by the lightweight Python audit-service.
      - AUDIT_LOG_BACKEND=${AUDIT_LOG_BACKEND:-service}
      - AUDIT_SERVICE_URL=${AUDIT_SERVICE_URL:-http://audit-service:8010}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: /app/entrypoint.sh
    depends_on:
      audit-service:
        condition: service_healthy
        required: false
    profiles:
      - caipe-ui

  ####################################################################################################
  #                                      Audit Service                                               #
  ####################################################################################################
  # Lightweight audit collector. Services emit JSON batches to this process;
  # it owns local/S3 storage and serves bounded read queries.
  audit-service:
    build:
      context: .
      dockerfile: build/Dockerfile.audit-service
    image: ghcr.io/cnoe-io/caipe-audit-service:${IMAGE_TAG:-0.5.16}
    container_name: audit-service
    ports:
      - "127.0.0.1:${AUDIT_SERVICE_PORT:-8010}:8010"
    environment:
      AUDIT_SERVICE_BACKEND: ${AUDIT_SERVICE_BACKEND:-local}
      AUDIT_SERVICE_LOCAL_PATH: /var/lib/caipe-audit-service
      AUDIT_SERVICE_LOCAL_GZIP: ${AUDIT_SERVICE_LOCAL_GZIP:-true}
      AUDIT_SERVICE_LOCAL_RETENTION_DAYS: ${AUDIT_SERVICE_LOCAL_RETENTION_DAYS:-1}
      AUDIT_SERVICE_S3_BUCKET: ${AUDIT_SERVICE_S3_BUCKET:-}
      AUDIT_SERVICE_S3_PREFIX: ${AUDIT_SERVICE_S3_PREFIX:-audit}
      AUDIT_SERVICE_S3_REGION: ${AUDIT_SERVICE_S3_REGION:-us-east-2}
      AUDIT_SERVICE_S3_ENDPOINT_URL: ${AUDIT_SERVICE_S3_ENDPOINT_URL:-}
      AUDIT_SERVICE_S3_RETENTION_DAYS: ${AUDIT_SERVICE_S3_RETENTION_DAYS:-0}
      AUDIT_LOG_VERBOSITY: ${AUDIT_LOG_VERBOSITY:-minimal}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-us-east-2}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-2}
      AUDIT_SERVICE_QUEUE_MAX_SIZE: ${AUDIT_SERVICE_QUEUE_MAX_SIZE:-10000}
      AUDIT_SERVICE_FLUSH_BATCH_SIZE: ${AUDIT_SERVICE_FLUSH_BATCH_SIZE:-500}
      AUDIT_SERVICE_FLUSH_INTERVAL_SECONDS: ${AUDIT_SERVICE_FLUSH_INTERVAL_SECONDS:-1}
      AUDIT_SERVICE_READ_DEFAULT_LIMIT: ${AUDIT_SERVICE_READ_DEFAULT_LIMIT:-1000}
      AUDIT_SERVICE_READ_MAX_LIMIT: ${AUDIT_SERVICE_READ_MAX_LIMIT:-10000}
      AUDIT_SERVICE_READ_MAX_DAYS: ${AUDIT_SERVICE_READ_MAX_DAYS:-31}
    volumes:
      - audit_service_data:/var/lib/caipe-audit-service
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import json,urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8010/readyz',timeout=3); sys.exit(0 if r.status==200 and json.load(r).get('status')=='ready' else 1)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    profiles:
      - audit-service
      - caipe-ui
      - dynamic-agents
      - slack-bot
      - webex-bot
      - rbac

  ####################################################################################################
  #                                      RAG Services                                                #
  ####################################################################################################
  rag-server:
    image: ghcr.io/cnoe-io/caipe-rag-server:${IMAGE_TAG:-0.5.16}
    container_name: rag-server
    # Network alias keeps the legacy `rag_server` hostname working for any
    # client that still has it hardcoded. AGW's hickory-dns resolver rejects
    # underscores in DNS labels (RFC 1035), so the canonical name is now
    # `rag-server` and `rag_server` is a compatibility alias.
    networks:
      default:
        aliases:
          - rag_server
    volumes:
      - ${HOME}/.aws:/home/app/.aws:ro
    ports: ["9446:9446"]
    environment:
      - AWS_CONFIG_FILE=/home/app/.aws/config
      - AWS_SHARED_CREDENTIALS_FILE=/home/app/.aws/credentials
      - LOG_LEVEL=DEBUG
      - REDIS_URL=redis://rag-redis:6379/0
      - NEO4J_ADDR=neo4j://neo4j:7687
      - NEO4J_ONTOLOGY_ADDR=neo4j://neo4j-ontology:7688
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=dummy_password
      - MILVUS_URI=http://milvus-standalone:19530
      - ONTOLOGY_AGENT_RESTAPI_ADDR=http://agent_ontology:8098
      - ENABLE_GRAPH_RAG=${ENABLE_GRAPH_RAG:-true}
      - CLEANUP_INTERVAL=86400
      - EMBEDDINGS_MODEL=${EMBEDDINGS_MODEL:-text-embedding-3-large}
      - RBAC_TEAM_SCOPE_ENABLED=${RBAC_TEAM_SCOPE_ENABLED:-true}
      - OPENFGA_HTTP=${OPENFGA_HTTP:-http://openfga:8080}
      - OPENFGA_STORE_NAME=${OPENFGA_STORE_NAME:-caipe-openfga}
      - CAIPE_UNSAFE_RBAC_BYPASS=${CAIPE_UNSAFE_RBAC_BYPASS:-false}
    restart: unless-stopped
    env_file: [.env]
    depends_on: [rag-redis]
    profiles:
      - rag
      - graph_rag

  ####################################################################################################
  #                                    Dynamic Agents Service                                        #
  ####################################################################################################
  # Dynamic Agents - Standalone agent builder service using deepagents library
  # Creates ephemeral AI agents configured through the UI with MCP tool support
  #
  # Configuration:
  #   - Requires MongoDB for agent/MCP server configuration storage
  #   - Supports OIDC authentication (same config as CAIPE UI)
  #   - MCP servers can be configured via UI or seed config
  #
  # Ports:
  #   - 8100: Dynamic Agents API (proxied via UI at /api/dynamic-agents)
  dynamic-agents:
    image: ghcr.io/cnoe-io/caipe-dynamic-agents:${IMAGE_TAG:-0.5.16}
    container_name: dynamic-agents
    ports: ["8100:8001"]
    volumes:
      - ${HOME}/.aws:/home/app/.aws:ro
    env_file: [.env]
    environment:
      - AWS_CONFIG_FILE=/home/app/.aws/config
      - AWS_SHARED_CREDENTIALS_FILE=/home/app/.aws/credentials
      - AWS_BEDROCK_STREAMING=${AWS_BEDROCK_STREAMING:-false}
      - AWS_BEDROCK_USE_CONVERSE_API=${AWS_BEDROCK_USE_CONVERSE_API:-true}
      - AWS_BEDROCK_BASE_MODEL_ID=${AWS_BEDROCK_BASE_MODEL_ID:-}
      # MongoDB (same as CAIPE UI)
      - MONGODB_URI=${MONGODB_URI:-mongodb://${MONGODB_ROOT_USERNAME:-admin}:${MONGODB_ROOT_PASSWORD:-changeme}@caipe-mongodb:27017/${MONGODB_DATABASE:-caipe}?authSource=admin}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-caipe}
      # Authentication (same OIDC config as CAIPE UI)
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - OIDC_ISSUER=${OIDC_ISSUER:-}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-}
      - OIDC_DISCOVERY_URL=${OIDC_DISCOVERY_URL:-}
      - OIDC_GROUP_CLAIM=${OIDC_GROUP_CLAIM:-}
      - OIDC_REQUIRED_ADMIN_GROUP=${OIDC_REQUIRED_ADMIN_GROUP:-}
      # Centralized Authorization Service. Dynamic Agents delegates agent-use
      # decisions to the UI BFF and fails closed with 503 if this is unset.
      - AUTHZ_SERVICE_URL=${AUTHZ_SERVICE_URL:-http://caipe-ui:3000}
      # Tracing (Langfuse)
      - ENABLE_TRACING=${ENABLE_TRACING:-false}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://langfuse-web:3000}
      # Audit log storage is owned by the lightweight Python audit-service.
      - AUDIT_SERVICE_URL=${AUDIT_SERVICE_URL:-http://audit-service:8010}
      # Runtime configuration
      - AGENT_RUNTIME_TTL_SECONDS=${AGENT_RUNTIME_TTL_SECONDS:-3600}
      - CORS_ORIGINS=${DYNAMIC_AGENTS_CORS_ORIGINS:-["*"]}
      # Dedicated /metrics port. 0 (default) serves metrics on the main API
      # port — current behavior, unchanged.
      - METRICS_PORT=${DYNAMIC_AGENTS_METRICS_PORT:-0}
    healthcheck:
