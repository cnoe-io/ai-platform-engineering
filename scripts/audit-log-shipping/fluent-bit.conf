# Fluent Bit parser + filter for the CAIPE RBAC audit stdout sink.
#
# Spec 102 Phase 11.3 — audit log shipping.
#
# Enable in the supervisor / dynamic-agents containers by setting the env
# var AUDIT_STDOUT_ENABLED=true. Each authorization decision will then be
# written to stdout as a single line of the form:
#
#   AUDIT {"userId":"...","resource":"...","scope":"...","allowed":true,...}
#
# This config matches that line, parses the JSON payload, and tags it
# with `audit.rbac` so downstream sinks (loki, elasticsearch, datadog,
# cloudwatch, etc.) can route it independently from regular app logs.
#
# Drop this snippet into the relevant fluent-bit pipeline section.

[FILTER]
    Name        grep
    Match       caipe.*
    Regex       log ^AUDIT \{

[FILTER]
    Name        parser
    Match       caipe.*
    Key_Name    log
    Parser      caipe_audit
    Reserve_Data On
    Preserve_Key Off

[FILTER]
    Name        modify
    Match       caipe.*
    Condition   Key_Exists  resource
    Add         tag         audit.rbac

# ------------------------- parser definition -------------------------

[PARSER]
    Name         caipe_audit
    Format       regex
    # Strip the "AUDIT " prefix and capture the JSON object body.
    Regex        ^AUDIT (?<payload>\{.+\})$
    Decode_Field json payload
