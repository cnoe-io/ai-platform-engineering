{{- if and .Values.litellmMcp.enabled .Values.litellmMcp.externalSecrets.enabled }}
{{- $externalSecrets := .Values.litellmMcp.externalSecrets -}}
{{- $secretStoreRef := $externalSecrets.secretStoreRef | default .Values.global.externalSecrets.secretStoreRef -}}
apiVersion: external-secrets.io/{{ $externalSecrets.apiVersion | default (include "ai-platform-engineering.externalSecrets.apiVersion" .) }}
kind: ExternalSecret
metadata:
  name: {{ include "ai-platform-engineering.litellmMcp.fullname" . }}
  labels:
    {{- include "ai-platform-engineering.litellmMcp.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ $externalSecrets.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    {{- toYaml $secretStoreRef | nindent 4 }}
  target:
    name: {{ include "ai-platform-engineering.litellmMcp.secretName" . }}
    creationPolicy: Owner
  data:
    {{- toYaml $externalSecrets.data | nindent 4 }}
{{- end }}
