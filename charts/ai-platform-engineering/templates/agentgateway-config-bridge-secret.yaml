{{- $agwGlobal := ((.Values.global).agentgateway) | default dict }}
{{- $cb := (($agwGlobal.static).configBridge) | default dict }}
{{- /*
Auto-generate a Secret holding AGENTGATEWAY_TARGETS_TOKEN for the agentgateway
config-bridge sidecar and caipe-ui to share. The lookup prevents the token from
rotating on every helm upgrade — on the first install there is no existing Secret
so a random 32-character token is generated; subsequent upgrades reuse whatever
is already in the cluster.

NOTE: `lookup` returns empty under `helm template`, `helm diff`, `--dry-run`, and
GitOps controllers (ArgoCD, Flux), causing a new random token on every render. This
produces noisy diffs and a token mismatch if only one side re-renders. GitOps users
should set bff.existingSecret.name (BYO Secret) or bff.externalSecret.enabled (ESO)
instead of relying on auto-generation.

Skip generation when:
- existingSecret.name is set (operator-provided pre-existing Secret)
- externalSecret.enabled is true (ESO will create the Secret instead)
*/}}
{{- $bffESEnabled := (($cb.bff).externalSecret).enabled }}
{{- if and $agwGlobal.enabled $cb.enabled (not ((($cb.bff).existingSecret).name)) (not $bffESEnabled) }}
{{- $secretName := printf "%s-agentgateway-config-bridge-token" .Release.Name }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "ai-platform-engineering.labels" . | nindent 4 }}
type: Opaque
data:
  AGENTGATEWAY_TARGETS_TOKEN: {{ if $existing }}{{ index $existing.data "AGENTGATEWAY_TARGETS_TOKEN" }}{{ else }}{{ randAlphaNum 32 | b64enc }}{{ end }}
{{- end }}
