{{- /*
This ConfigMap is only needed in single-node mode where all agents run in-process.
It provides ENABLE_<AGENT> env vars so the deep agent knows which subagents to load,
and <AGENT>_MCP_HOST / <AGENT>_MCP_PORT / <AGENT>_MCP_MODE env vars for MCP transport.
Per-subagent LLM config (keys, endpoints, models) is handled via secrets (agentSecrets).
In multi-node mode, the supervisor-agent-env ConfigMap handles this instead.
*/ -}}
{{- if eq .Values.global.deploymentMode "single-node" }}
{{- $agwGlobal := .Values.global.agentgateway | default dict }}
{{- $agwRoutingMode := ($agwGlobal.routingMode | default "gateway-api") }}
{{- /*
gateway-api mode routes agent MCP traffic through the controller-provisioned
"<release>-agentgateway-proxy" Gateway data plane (proxyPort). static mode has no
controller, so traffic goes to the standalone agentgateway proxy Service
("<release>-agentgateway", agentgateway.service.port).
*/ -}}
{{- $agwStatic := eq $agwRoutingMode "static" }}
{{- $agwHost := ternary (printf "%s-agentgateway" .Release.Name) (printf "%s-agentgateway-proxy" .Release.Name) $agwStatic }}
{{- $agwPort := ternary ((($.Values.agentgateway).service | default dict).port | default 4000) ($agwGlobal.proxyPort | default 8080) $agwStatic }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-single-node-agent-env" .Release.Name }}
data:
  DISTRIBUTED_AGENTS: ""
  {{- range $name, $enabled := (include "ai-platform-engineering.enabledSubAgents" . | fromYaml) }}
  {{- $ENV := upper $name }}
  ENABLE_{{ $ENV }}: {{ ternary "true" "false" $enabled | quote }}
  {{- if $enabled }}
  {{- $agentValues := index $.Values (printf "agent-%s" $name) | default dict }}
  {{- $mcp := $agentValues.mcp | default dict }}
  {{- $agw := $mcp.agentgateway | default dict }}
  {{- if $mcp.useRemoteMcpServer }}
  {{ $ENV }}_MCP_MODE: "stdio"
  {{- else if and $agw.enabled $.Values.global.agentgateway.enabled }}
  {{ $ENV }}_MCP_MODE: "http"
  {{ $ENV }}_MCP_HOST: {{ $agwHost | quote }}
  {{ $ENV }}_MCP_PORT: {{ $agwPort | quote }}
  {{ $ENV }}_MCP_PATH: {{ printf "/mcp/%s" $name | quote }}
  {{- else if $mcp.mode }}
  {{ $ENV }}_MCP_MODE: {{ $mcp.mode | quote }}
  {{- if eq $mcp.mode "http" }}
  {{ $ENV }}_MCP_HOST: {{ printf "%s-agent-%s-mcp" (include "ai-platform-engineering.singleNodeMcpResourcePrefix" $) $name | quote }}
  {{ $ENV }}_MCP_PORT: {{ $mcp.port | default 8000 | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
  {{- end }}
{{- end }}
