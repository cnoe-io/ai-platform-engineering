{{- if .Values.global.createLlmSecret }}
{{- if eq (include "ai-platform-engineering.externalSecrets.enabled" .) "false" }}
{{- /*
Central LLM routing: when the litellm routing layer is enabled, default LLM_PROVIDER=openai
and OPENAI_ENDPOINT to the in-cluster proxy Service into the generated llm-secret, unless the
operator already set them. Single source of truth: every agent inherits these via `envFrom`
the llm-secret. OPENAI_API_KEY (the shared credential) is still operator-supplied.
Bring-your-own: leave routing disabled and set OPENAI_ENDPOINT yourself.
*/ -}}
{{- $data := deepCopy (default (dict) .Values.global.llmSecrets.data) }}
{{- if (dig "litellm" "enabled" false ((.Values.llmRouting) | default (dict))) }}
  {{- if not (hasKey $data "LLM_PROVIDER") }}{{- $_ := set $data "LLM_PROVIDER" "openai" }}{{- end }}
  {{- if not (hasKey $data "OPENAI_ENDPOINT") }}{{- $_ := set $data "OPENAI_ENDPOINT" (printf "http://%s-litellm:4000/v1" .Release.Name) }}{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.global.llmSecrets.secretName }}
  labels:
    {{- include "ai-platform-engineering.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range $key, $value := $data }}
  {{- if $value }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}