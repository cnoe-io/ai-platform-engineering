{{- /*
VPA objects for MCP HTTP server Deployments created in single-node mode.
Mirrors single-node-mcp-deployment.yaml - one VPA per enabled MCP deployment.
VPA config is resolved per-agent (mcp.vpa) falling back to global.mcp.vpa.
*/ -}}
{{- if eq .Values.global.deploymentMode "single-node" }}
{{- range $name, $enabled := (include "ai-platform-engineering.enabledSubAgents" . | fromYaml) }}
{{- if $enabled }}
{{- $agentKey := printf "agent-%s" $name }}
{{- $agentValues := index $.Values $agentKey | default dict }}
{{- $mcp := $agentValues.mcp | default dict }}
{{- $useRemote := $mcp.useRemoteMcpServer | default false }}
{{- if and (eq ($mcp.mode | default "stdio") "http") (not $useRemote) }}
{{- $mcpImageRepo := ($mcp.image | default dict).repository | default "" }}
{{- if $mcpImageRepo }}
{{- $vpa := $mcp.vpa | default $.Values.global.mcp.vpa }}
{{- if $vpa.enabled }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ printf "%s-%s-mcp" $.Release.Name $agentKey }}
  labels:
    {{- include "ai-platform-engineering.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ printf "%s-%s-mcp" $.Release.Name $agentKey }}
    app.kubernetes.io/component: mcp
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ printf "%s-%s-mcp" $.Release.Name $agentKey }}
  updatePolicy:
    updateMode: {{ $vpa.updateMode | quote }}
  resourcePolicy:
    containerPolicies:
      - containerName: mcp
        controlledResources: {{ $vpa.controlledResources | toJson }}
        {{- with $vpa.minAllowed }}
        minAllowed:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with $vpa.maxAllowed }}
        maxAllowed:
          {{- toYaml . | nindent 10 }}
        {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
