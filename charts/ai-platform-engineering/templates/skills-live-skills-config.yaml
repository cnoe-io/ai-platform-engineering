{{- if index .Values "caipe-ui" "skills" "enabled" | default true }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: skills-live-skills
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "ai-platform-engineering.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  live-skills.md: |
{{- if .Values.skillsLiveSkills }}
{{- /* Custom live-skills skill provided inline - use it directly */ -}}
{{ .Values.skillsLiveSkills | nindent 4 }}
{{- else }}
{{- /* Use skillsLiveSkillsName to select a variant file (defaults to "default") */ -}}
{{- $variant := .Values.skillsLiveSkillsName | default "default" }}
{{- $candidate := printf "data/skills/live-skills.%s.md" $variant }}
{{- $contents := .Files.Get $candidate }}
{{- if not $contents }}
{{- $contents = .Files.Get "data/skills/live-skills.md" }}
{{- end }}
{{ $contents | nindent 4 }}
{{- end }}
  update-skills.md: |
{{ .Files.Get "data/skills/update-skills.md" | nindent 4 }}
  caipe-skills.py: |
{{ .Files.Get "data/skills/caipe-skills.py" | nindent 4 }}
  caipe-catalog.sh: |
{{ .Files.Get "data/skills/caipe-catalog.sh" | nindent 4 }}
{{- end }}
