{{- if eq (include "ai-platform-engineering.externalSecrets.enabled" .) "true" }}
{{- $llmES := .Values.global.llmSecrets.externalSecrets | default dict }}
{{- if $llmES.data }}
apiVersion: external-secrets.io/{{ include "ai-platform-engineering.externalSecrets.apiVersion" . }}
kind: ExternalSecret
metadata:
  name: {{ include "ai-platform-engineering.llmSecrets.externalSecrets.name" . }}
spec:
  secretStoreRef:
    {{- include "ai-platform-engineering.externalSecrets.secretStoreRef" . | nindent 4 }}
  refreshInterval: "1h0m0s"
  target:
    name: {{ include "ai-platform-engineering.llmSecrets.secretName" . }}
    {{- with (default dict $llmES.target).template }}
    template:
      {{- if .engineVersion }}
      engineVersion: {{ .engineVersion }}
      {{- end }}
      {{- if .data }}
      data:
        {{- toYaml .data | nindent 8 }}
      {{- end }}
      {{- if .metadata }}
      metadata:
        {{- toYaml .metadata | nindent 8 }}
      {{- end }}
    {{- end }}
  data:
    {{- toYaml $llmES.data | nindent 4 }}
---
{{- end }}
{{- end }}
