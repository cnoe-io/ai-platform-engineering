{{- $agwGlobal := ((.Values.global).agentgateway) | default dict }}
{{- $cb := (($agwGlobal.static).configBridge) | default dict }}
{{- $cbEnabled := and $agwGlobal.enabled $cb.enabled }}
{{- $bffES := (($cb.bff).externalSecret) | default dict }}
{{- if and $cbEnabled $bffES.enabled $bffES.data }}
{{- $apiVersion := $bffES.apiVersion | default (include "ai-platform-engineering.externalSecrets.apiVersion" .) }}
{{- $storeRef := $bffES.secretStoreRef | default (dict) }}
{{- if not $storeRef.name }}
{{- $storeRef = fromYaml (include "ai-platform-engineering.externalSecrets.secretStoreRef" .) }}
{{- end }}
apiVersion: external-secrets.io/{{ $apiVersion }}
kind: ExternalSecret
metadata:
  name: {{ printf "%s-agentgateway-config-bridge-token" .Release.Name }}
  labels:
    {{- include "ai-platform-engineering.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ $bffES.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    {{- toYaml $storeRef | nindent 4 }}
  target:
    name: {{ printf "%s-agentgateway-config-bridge-token" .Release.Name }}
    creationPolicy: Owner
  data:
    {{- toYaml $bffES.data | nindent 4 }}
{{- end }}
