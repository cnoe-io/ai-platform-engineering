{{- if .Values.cloudabilityMcp.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-platform-engineering.cloudabilityMcp.fullname" . }}
  labels:
    {{- include "ai-platform-engineering.cloudabilityMcp.labels" . | nindent 4 }}
spec:
  type: {{ .Values.cloudabilityMcp.service.type }}
  ports:
    - port: {{ .Values.cloudabilityMcp.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ai-platform-engineering.cloudabilityMcp.selectorLabels" . | nindent 4 }}
{{- end }}
