{{- /*
In single-node mode, agent subcharts are disabled (tags.agent-<name>: false) so their
ExternalSecret templates don't run. This template creates per-agent ExternalSecrets at
the parent chart level so each agent's credentials come from a dedicated secret, matching
the multi-node pattern.

The supervisor deployment mounts these per-agent secrets via envFrom with optional: true,
so agents without secrets (e.g. aigateway, rag) are silently skipped.
*/ -}}
{{- if eq (default "multi-node" .Values.global.deploymentMode) "single-node" }}
{{- if eq (include "ai-platform-engineering.externalSecrets.enabled" .) "true" }}
{{- range $agentName, $enabled := (default dict .Values.global.enabledSubAgents) }}
{{- if $enabled }}
{{- $agentKey := printf "agent-%s" $agentName }}
{{- $agentValues := index $.Values $agentKey | default dict }}
{{- $agentSecrets := $agentValues.agentSecrets | default dict }}
{{- $esConfig := $agentSecrets.externalSecrets | default dict }}
{{- $esData := $esConfig.data | default list }}
{{- if $esData }}
---
apiVersion: external-secrets.io/{{ include "ai-platform-engineering.externalSecrets.apiVersion" $ }}
kind: ExternalSecret
metadata:
  name: {{ $agentSecrets.secretName | default (printf "%s-secret" $agentKey) }}
  labels:
    {{- include "ai-platform-engineering.labels" $ | nindent 4 }}
spec:
  secretStoreRef:
    {{- if $esConfig.secretStoreRef }}
    {{- toYaml $esConfig.secretStoreRef | nindent 4 }}
    {{- else }}
    {{- include "ai-platform-engineering.externalSecrets.secretStoreRef" $ | nindent 4 }}
    {{- end }}
  refreshInterval: "1h0m0s"
  target:
    name: {{ $agentSecrets.secretName | default (printf "%s-secret" $agentKey) }}
  data:
    {{- toYaml $esData | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
