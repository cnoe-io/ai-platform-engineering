# Karpenter values overlay for ai-platform-engineering
#
# Apply on top of your base values to route agent workloads to Karpenter-managed nodes:
#
#   helm upgrade --install ai-platform-engineering \
#     oci://ghcr.io/cnoe-io/charts/ai-platform-engineering \
#     -f charts/ai-platform-engineering/values.yaml \
#     -f charts/ai-platform-engineering/values-karpenter.yaml
#
# Prerequisites: deploy/eks/karpenter/ manifests must be applied first.
# See deploy/eks/karpenter/README.md for full setup steps.

# ---------------------------------------------------------------------------
# Agent tier: Karpenter `agents` NodePool (spot-preferred, compute-optimised)
# Taint: workload-type=agent:NoSchedule
# ---------------------------------------------------------------------------

agent-argocd:
  nodeSelector:
    workload-type: agent
  tolerations:
    - key: workload-type
      operator: Equal
      value: agent
      effect: NoSchedule

