# ---------------------------------------------------------------------------
# RAG tier: Karpenter `rag` NodePool (on-demand, memory-optimised)
# Taint: workload-type=rag:NoSchedule
# ---------------------------------------------------------------------------

rag-stack:
  rag-server:
    nodeSelector:
      workload-type: rag
    tolerations:
      - key: workload-type
        operator: Equal
        value: rag
        effect: NoSchedule

  agent-ontology:
    nodeSelector:
      workload-type: rag
    tolerations:
      - key: workload-type
        operator: Equal
        value: rag
        effect: NoSchedule

  rag-redis:
