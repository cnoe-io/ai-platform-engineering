      workload-type: rag
    tolerations:
      - key: workload-type
        operator: Equal
        value: rag
        effect: NoSchedule

  neo4j:
    nodeSelector:
      workload-type: rag
    tolerations:
      - key: workload-type
        operator: Equal
        value: rag
        effect: NoSchedule

