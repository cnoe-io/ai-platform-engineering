# ---------------------------------------------------------------------------
# RAG tier: Karpenter `rag` NodePool (on-demand, memory-optimised)
# Taint: workload-type=rag:NoSchedule
# ---------------------------------------------------------------------------

rag-stack:
  rag-server:
    nodeSelector:
      workload-type: rag
    tolerations:
      - key: workload-type
        operator: Equal
        value: rag
        effect: NoSchedule
    podDisruptionBudget:
      enabled: true

  agent-ontology:
    nodeSelector:
      workload-type: rag
    tolerations:
      - key: workload-type
        operator: Equal
        value: rag
        effect: NoSchedule
    podDisruptionBudget:
      enabled: true

  rag-redis:
    nodeSelector:
      workload-type: rag
    tolerations:
      - key: workload-type
        operator: Equal
        value: rag
        effect: NoSchedule
    podDisruptionBudget:
      enabled: true

  neo4j:
    nodeSelector:
      workload-type: rag
    tolerations:
      - key: workload-type
        operator: Equal
        value: rag
        effect: NoSchedule

# ---------------------------------------------------------------------------
# System tier: no nodeSelector/tolerations needed, lands on Auto Mode
# general-purpose pool by default. PDBs are still enabled because Auto Mode
# consolidates nodes and will evict pods without a PDB in place.
# ---------------------------------------------------------------------------

supervisor-agent:
  podDisruptionBudget:
    enabled: true

caipe-ui:
  podDisruptionBudget:
    enabled: true

caipe-ui-mongodb:
