        # AGNTCY Slim dataplane service
  - name: slim
    version: v0.1.8
    repository: oci://ghcr.io/agntcy/slim/helm
    condition: global.slim.enabled # NOTE: slim uses condition, not tags as it requires global variables to be passed into other subcharts
  - name: slim-control-plane
    version: v0.1.3
    repository: oci://ghcr.io/agntcy/slim/helm
    condition: global.slim.enabled
  - name: rag-stack
    version: 0.2.42 # Do NOT bump this. It will be updated automatically using the PR or release workflow
    repository: file://../rag-stack # TODO: might be changed to be separate
    tags:
      - rag-stack
      - complete
    import-values: # This is used to automatically render ENABLE_RAG variable for the supervisor configmap
      - child: agentExports.data
        parent: global.enabledSubAgents.rag
  # CAIPE UI
  - name: caipe-ui
    version: 0.2.42-rc.helm.1 # Do NOT bump this. It will be updated automatically using the PR or release workflow
    tags:
      - caipe-ui
  # Dynamic Agents - Standalone agent builder with MCP tool support
  - name: dynamic-agents
    version: 0.2.42 # Do NOT bump this. It will be updated automatically using the PR or release workflow
    tags:
      - dynamic-agents
  # MongoDB for CAIPE UI persistence
  - name: caipe-ui-mongodb
    version: 0.2.42
    condition: caipe-ui.mongodb.enabled
    alias: mongodb
  # Redis Stack for LangGraph checkpoint + store persistence
  - name: langgraph-redis
    version: 0.2.42 # Do NOT bump this. It will be updated automatically using the PR or release workflow
    condition: global.langgraphRedis.enabled
  # Slack Bot Integration (client, not an agent)
  - name: slack-bot
