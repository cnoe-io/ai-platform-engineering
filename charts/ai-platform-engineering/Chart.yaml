  # Each alias deploys one agent's MCP server (Deployment + Service).
  - name: mcp-server
    version: 0.5.59-dev.1 # Do NOT bump this. It will be updated automatically using the PR or release workflow
    alias: mcp-argocd
    tags:
      - mcp-argocd
      - basic
      - complete
    import-values:
      - child: agentExports.data
        parent: global.enabledSubAgents.argocd
