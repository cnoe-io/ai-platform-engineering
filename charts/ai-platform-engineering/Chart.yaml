apiVersion: v2
# pyproject.toml version
appVersion: 0.5.59-dev.1 # Do NOT modify. It will be updated automatically using the release workflow
name: ai-platform-engineering
description: Parent chart to deploy CAIPE — dynamic agents, per-agent MCP servers, RBAC, and the UI
sources:
  - https://github.com/cnoe-io/ai-platform-engineering/charts
# Chart version for ai-platform-engineering parent chart
version: 0.5.59-dev.1 # Do NOT bump this. It will be updated automatically using the PR or release workflow
dependencies:
