apiVersion: v2
# pyproject.toml version
appVersion: 0.5.15-dev.5 # Do NOT modify. It will be updated automatically using the release workflow
name: ai-platform-engineering
description: Parent chart to deploy multiple agent subcharts as different platform agents
sources:
  - https://github.com/cnoe-io/ai-platform-engineering/charts
# Chart version for ai-platform-engineering parent chart
version: 0.5.15-dev.5 # Do NOT bump this. It will be updated automatically using the PR or release workflow
