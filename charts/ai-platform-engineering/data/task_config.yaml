# Stub task_config.yaml — production config is managed in platform-apps-deployment
# and overrides this via the Helm taskConfig value.
#
# This stub provides a minimal "Hello World" workflow for local development/testing.

Hello World:
  tasks:
    - display_text: "Collect greeting details"
      llm_prompt: >
        Collect the following information from the user using CAIPEAgentResponse and write to /request.txt:
        - name (required): Your name
        - message (optional): A custom greeting message (default: "Hello World")

        user_email is auto-filled from the authenticated session — do NOT include it in the form.

        After the user submits the form, write the collected values to /request.txt
        in key=value format (one per line).
      subagent: "user_input"

    - display_text: "Send greeting via Webex"
      llm_prompt: >
        Read /request.txt to get name, message, and user_email.

        If message is not set, use "Hello World" as the default.

        Send a notification to the Webex room using the post_message tool with:
        - room_id: ${WEBEX_ROOM_ID}
        - text: "{message} from {name} ({user_email})"
        - markdown: |
            ## Hello World

            **From:** {name} ({user_email})
            **Message:** {message}
      subagent: "webex"
