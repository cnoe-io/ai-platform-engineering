tags:
  basic: false
  complete: false
  caipe-ui: false
  dynamic-agents: false
  agent-argocd: false
  agent-aws: false
  agent-backstage: false
  agent-confluence: false
  agent-github: false
  agent-gitlab: false
  agent-jira: false
  agent-komodor: false
  agent-pagerduty: false
  agent-slack: false
  agent-splunk: false
  agent-victorops: false
  agent-weather: false
  agent-webex: false
  agent-netutils: false
  agent-weather: false
  agent-petstore: false
  rag-stack: false
  slack-bot: false
  webex-bot: false
  keycloak: false

# Global configuration shared across all subcharts
global:
  # -- Global image tag override. When set, overrides the default appVersion-based
  # image tag for ALL subcharts (supervisor, agents, UI, etc.) in a single place.
  # Individual subchart `image.tag` values still take highest precedence.
  image:
    tag: ""
    # -- Image repository channel for maintained CAIPE images.
    # Empty means auto: rc/hotfix/dev chart appVersions use `pre-release/`,
    # final release appVersions use the root published image repositories.
    # Set to `pre-release` or `release` to force either repository channel.
    channel: ""

  # Deployment mode: "single-node" (all agents in-process) or "multi-node" (each agent as a separate pod)
  deploymentMode: "multi-node"

  # When deploymentMode is single-node, in-cluster MCP Services/Deployments/SAs use
  # {mcpResourcePrefix}-agent-<name>-mcp. Leave mcpResourcePrefix unset (empty) to use the
  # Helm release name; set to "single-node" for stable, readable resource names.
  singleNode:
    mcpResourcePrefix: ""

  createLlmSecret: false # if true, llm secret will be created by the parent chart. Otherwise, expect existing llm secret
  llmSecrets:
    create: false # do not create llm secret in subcharts (use global or existing llm secret)
    secretName: "llm-secret"
  externalSecrets:
    enabled: false
    apiVersion: "v1beta1"  # API version for ExternalSecret resources. Options: "v1" or "v1beta1". Defaults to "v1beta1" if not specified.
  slim:
    enabled: false
    endpoint: ""
    transport: "slim"

  # RAG Stack configuration
  rag:
    enableGraphRag: true

  metrics:
    enabled: true

  # Global VPA config for all agent deployments (supervisor + all sub-agents).
  # Requires VPA to be installed in the cluster.
  # Do not enable alongside global autoscaling — VPA conflicts with HPA on CPU/memory scaling.
  # Setting initial resource requests (see resources: in each agent section) improves early VPA recommendations.
  # NOTE: per-agent opt-out via vpa.enabled=false is not supported (Helm cannot distinguish
  # "explicitly false" from the default "false"). To enable VPA selectively, keep global.vpa.enabled=false
  # and set vpa.enabled=true on individual agents instead.
  # Override global defaults per-agent with non-enabled fields:
  #   agent-github:
  #     vpa:
  #       maxAllowed:
  #         cpu: 2
  #         memory: 2Gi
  vpa:
    enabled: false
    # "InPlaceOrRecreate" applies recommendations in-place (Kubernetes 1.29+) or recreates the pod.
    # Use "Off" for recommendations only (no restarts), or "Recreate" on older clusters.
    updateMode: "InPlaceOrRecreate"
    controlledResources: ["cpu", "memory"]
    controlledValues: "RequestsAndLimits"
    minAllowed:
      cpu: 50m
      memory: 128Mi
    maxAllowed: {}
    #   cpu: 2
    #   memory: 2Gi

  # VPA config for MCP containers in single-node mode, where each MCP server
  # runs as a standalone Deployment and gets its own VPA resource.
  # In multi-node mode, MCP runs as a sidecar and its VPA containerPolicy is
  # governed by global.vpa (or per-agent vpa) instead.
  # Override per-agent by setting mcp.vpa under the relevant agent-* section. Example:
  #   agent-github:
  #     mcp:
  #       vpa:
  #         enabled: false   # disable VPA for github MCP only
  #         maxAllowed:
  #           cpu: 2
  #           memory: 2Gi
  mcp:
    vpa:
      enabled: false
      # "Off" = recommendations only (no restarts).
      # Use "InPlaceOrRecreate" (Kubernetes 1.29+) or "Recreate" to apply automatically.
      updateMode: "InPlaceOrRecreate"
      controlledResources: ["cpu", "memory"]
      controlledValues: "RequestsAndLimits"
      minAllowed:
        cpu: 50m
        memory: 128Mi
      maxAllowed: {}
      #   cpu: 2
      #   memory: 2Gi

  agentgateway:
    enabled: false
    # Set to true only if Istio CRDs are NOT already present in the cluster.
    # If Istio is already installed (any version), leave this false to avoid conflicts.
    installIstioCrds: false
    # Port for the agentgateway proxy listener (Gateway resource)
    proxyPort: 8080
    extAuth:
      enabled: false
      serviceName: ""
      serviceNamespace: ""
      port: 9100
    # Built-in Knowledge Base MCP route. This keeps the Dynamic Agents
    # `knowledge-base` MCP server ID aligned with the RAG server MCP backend
    # when AgentGateway is enabled in the umbrella chart.
    knowledgeBaseTarget:
      enabled: true
      host: "rag-server.{{ .Release.Namespace }}.svc.cluster.local"
      port: 9446
      protocol: StreamableHTTP
      pathPrefix: /mcp/knowledge-base
    # Additional MCP routes that are not rendered from `agent-*` subcharts.
    # Use this for platform MCP endpoints such as RAG/Knowledge Base.
    # Each item renders one AgentgatewayBackend and one HTTPRoute:
    #   /mcp/<id> -> static host:port using the requested MCP protocol.
    #
    # Example:
    # extraMcpTargets:
    #   - id: knowledge-base
    #     host: "{{ .Release.Name }}-rag-server.{{ .Release.Namespace }}.svc.cluster.local"
    #     port: 9446
    #     protocol: StreamableHTTP
    #     pathPrefix: /mcp/knowledge-base
    extraMcpTargets: []

  # OpenFGA service discovery defaults for CAIPE components that perform
  # relationship-based authorization or reconciliation.
  openfga:
    httpUrl: ""
    storeName: "caipe-openfga"

agentgateway:
  enabled: false
  image:
    repository: cr.agentgateway.dev/agentgateway
    tag: v1.1.0
    pullPolicy: IfNotPresent
  # Secret-backed environment for backend auth placeholders used by the
  # standalone AgentGateway config, for example:
  #   backendAuth:
  #     key: "$GITHUB_PERSONAL_ACCESS_TOKEN"
  #     key: "$GITLAB_PERSONAL_ACCESS_TOKEN"
  extraEnv: []
  # - name: GITHUB_PERSONAL_ACCESS_TOKEN
  #   valueFrom:
  #     secretKeyRef:
  #       name: github-mcp-secret
  #       key: GITHUB_PERSONAL_ACCESS_TOKEN
  # - name: GITLAB_PERSONAL_ACCESS_TOKEN
  #   valueFrom:
  #     secretKeyRef:
  #       name: gitlab-mcp-secret
  #       key: GITLAB_PERSONAL_ACCESS_TOKEN
  extraEnvFrom: []

  # LangGraph Redis for checkpoint and cross-thread store persistence.
  # Two deployment options:
  #   1. Dedicated Redis Stack (recommended): set enabled=true to deploy langgraph-redis subchart
  #   2. Reuse rag-redis: set autoDiscoverService="rag-redis" on persistence values (see below)
  #      WARNING: rag-redis uses plain redis:7.2-alpine which lacks RedisJSON + RediSearch modules.
  #      langgraph-checkpoint-redis requires these modules. You must upgrade the rag-redis image
  #      to redis:8.0+ (which includes them natively) or use the dedicated langgraph-redis instance.
  langgraphRedis:
    enabled: false

  # Standalone cisco-ai-defense/skill-scanner microservice. The CAIPE UI
  # uploads zipped SKILL packages to this Service for safety scanning.
  # Disabled by default; enable when you want the scanner running in
  # cluster (recommended for any production deployment that exposes the
  # Skills builder).
  #
  # When `enabled: true` the parent chart automatically wires the
  # in-cluster URL into the caipe-ui ConfigMap (see `caipe-ui.config`
  # below) — no manual `caipe-ui.config.SKILL_SCANNER_URL` override is
  # required for the standard install. Override it there only if you
  # want to point the UI at a scanner running outside this release.
  #
  # The scanner is unauthenticated by design — Service stays ClusterIP.
  skillScanner:
    enabled: false

  # Global checkpoint persistence for all agents + supervisor.
  # Set once here; all subcharts inherit automatically.
  # Per-agent override: set checkpointPersistence on individual agent sections.
  # Options: memory (default, in-process) | redis | postgres | mongodb
  checkpointPersistence:
    type: "memory"
    redis:
      url: ""
      existingSecret: {}
      autoDiscoverService: ""
      dbIndex: 0
    postgres:
      dsn: ""
      existingSecret: {}
    mongodb:
      uri: ""
      existingSecret: {}
      dbName: ""
      checkpointCollection: ""
      writesCollection: ""
    ttlMinutes: 0

# ServiceMonitor for scraping all ai-platform-engineering components
# For agent metrics endpoints, use global.metrics.enabled above
metrics:
  # Path for metrics endpoint
  path: "/metrics"
  # ServiceMonitor configuration for Prometheus Operator
  serviceMonitor:
    # Enable ServiceMonitor for automatic Prometheus scraping
    # This creates ONE ServiceMonitor that scrapes ALL ai-platform-engineering services
    enabled: false
    # Scrape interval
    interval: "30s"
    # Scrape timeout
    scrapeTimeout: "10s"
    # Additional labels for the ServiceMonitor (e.g., to match Prometheus selector)
    # Example: labels: { release: prometheus }
    labels: {}
    # Additional annotations for the ServiceMonitor
    annotations: {}
    # Relabelings for metrics
    relabelings: []
    # Metric relabelings
    metricRelabelings: []
  grafanaDashboard:
    enabled: true
    # Labels for Grafana sidecar dashboard discovery
    # Override to match your Grafana sidecar configuration (e.g., grafana_dashboard: "local")
    labels:
      grafana_dashboard: "1"

# Extra Kubernetes resources to deploy
extraDeploy: []

# Prompt Configuration
# Choose between predefined prompt configurations or provide your own custom configuration
#
# Option 1: Use a predefined prompt configuration type
# promptConfigType: "default"       # Uses data/prompt_config.yaml (standard orchestrator)
# promptConfigType: "deep_agent"    # Uses data/prompt_config.deep_agent.yaml (strict zero-hallucination mode)
#
# Option 2: Provide custom prompt configuration (overrides promptConfigType)
# promptConfig: |
#   agent_name: "My Custom Agent"
#   system_prompt_template: |
#     ...
#
promptConfigType: "default"  # Options: "default" or "deep_agent"
promptConfig: ""              # Custom prompt config (overrides promptConfigType if set)

ragPromptConfig: ""           # Custom RAG prompt config (overrides default if set)

# ---------------------------------------------------------------------------
# Live-skills command template (rendered as the `/skills` slash command
# in the "Skills Gateway" UI page). Customizable per-deployment.
#
# Resolution order (mirrors promptConfig):
#   1. .Values.skillsLiveSkills          - inline multi-line string (highest)
#   2. .Values.skillsLiveSkillsName      - selects data/skills/live-skills.<name>.md
#   3. data/skills/live-skills.md         - packaged default
#
# The template supports the following placeholders, substituted by the UI:
#   {{COMMAND_NAME}} - slash command name (default: "skills")
#   {{DESCRIPTION}}  - short description shown in the slash-command picker
#   {{BASE_URL}}     - gateway base URL (auto-detected from window.location)
# ---------------------------------------------------------------------------
skillsLiveSkillsName: ""       # Variant name (looks up data/skills/live-skills.<name>.md)
skillsLiveSkills: ""           # Inline custom live-skills skill (overrides everything)

# Task Configuration
# Self-service workflow definitions (Create LLM Key, GitHub Org Invite, etc.)
# Default is bundled from data/task_config.yaml. Override via taskConfig value.
taskConfig: ""

######### Supervisor agent configuration #########
supervisor-agent:
  # Single-node mode configuration (only used when global.deploymentMode = "single-node").
  # Lives under supervisor-agent: so both the subchart deployment template AND
  # parent-chart templates (via index .Values "supervisor-agent") read from one place.
  # In multi-node mode the agent subcharts export their enabled state via
  # Chart.yaml import-values into global.enabledSubAgents — do NOT put
  # enabledSubAgents under global: or it will conflict with that mechanism.
  singleNode:
    userInputPromptConfig: ""  # Custom user input subagent prompt config (overrides default if set)
    enabledSubAgents:
      aigateway: true
      argocd: true
      aws: true
      backstage: true
      confluence: true
      github: true
      jira: true
      komodor: true
      pagerduty: true
      rag: false
      slack: true
      splunk: true
      weather: false
      webex: true
  nameOverride: "supervisor-agent"
  image:
    repository: "ghcr.io/cnoe-io/ai-platform-engineering"
    # tag defaults to .Chart.AppVersion when not specified
    tag: ""
    pullPolicy: "IfNotPresent"
    args: ["platform-engineer"]
  env:
    EXTERNAL_URL: "http://localhost:8000"  # Agent url for the client. NOTE: this will be user applicaiton specific
    SKIP_AGENT_CONNECTIVITY_CHECK: "false"
    AGENT_CONNECTIVITY_ENABLE_BACKGROUND: "true"
    USE_STRUCTURED_RESPONSE: "true" # Set to "true" to enforce agent to always use structured response format as the final output
    TASK_CONFIG_PATH: "/app/task_config.yaml"
    POLICY_FILE_PATH: "/app/policy.lp"
    ENABLE_USER_INFO_TOOL: "false"   # Capture user identity from JWT; enables user_info tool and JWT context middleware
    FORWARD_JWT_TO_MCP: "false"      # Forward the user JWT as Bearer token to HTTP/streamable-HTTP MCP connections (requires ENABLE_USER_INFO_TOOL=true). Also used by sub-agents via base_langgraph_agent.
    # Self-service workflow env vars — referenced as ${VAR_NAME} in task_config.yaml prompts.
    # Set these per environment so system workflows can resolve repo references at runtime.
    # JARVIS_WORKFLOWS_REPO: "org/jarvis-workflows"      # Templates repo (safe-settings, terraform, etc.)
    # ADMIN_REPO: "org/admin"                             # Safe-settings admin repo
    # TERRAFORM_INFRA_REPO: "org/terraform-infra"         # Terraform infrastructure repo
    # WORKFLOWS_REPO: "org/workflows"                     # GitHub Actions workflows repo
    # GROUPS_AUTOMATION_REPO: "org/groups-automation"      # Group management automation repo
    # GROUPS_TEAMS_PATH: "groups_yaml/teams"               # Path prefix for teams directory
    # ORG_MEMBERSHIP_FILE_PATTERN: ""                      # Org membership YAML path pattern
    # EMAIL_DOMAIN: "example.com"                          # Email domain for user ID derivation
    # GITHUB_ORGS: "org1,org2"                             # Comma-separated allowed GitHub orgs
  multiAgentConfig:
    protocol: "a2a"
    port: "8000"
  # Cross-thread memory persistence: memory (default) | redis | postgres
  # BYO / external: Redis (in-cluster, external, AWS ElastiCache for Redis), Postgres (external/managed).
  # Use url/dsn for plain values, or existingSecret to pull from a K8s Secret (recommended for credentials).
  memoryPersistence:
    type: "memory"
    redis:
      url: ""   # e.g. redis://host:6379/0, redis://user:pass@host:6379/0, or ElastiCache Redis endpoint
      existingSecret: {}   # optional: { name: "my-redis-secret", key: "REDIS_URL" }
      # Auto-discover in-cluster Redis: "langgraph-redis" (dedicated) or "rag-redis" (shared, see caveats above)
      autoDiscoverService: ""
      dbIndex: 0   # DB index for autoDiscoverService (rag-redis: use 1+, db 0 is RAG data)
      keyPrefix: ""   # optional: namespace shared Redis (e.g. release name, "caipe-prod", "tenant-xyz")
    postgres:
      dsn: ""   # e.g. postgresql://user:pass@host:5432/dbname
      existingSecret: {}   # optional: { name: "my-pg-secret", key: "DATABASE_URL" }
    mongodb:
      uri: ""   # e.g. mongodb://host:27017, mongodb+srv://user:pass@cluster.example.com
      existingSecret: {}   # optional: { name: "my-mongo-secret", key: "MONGODB_URI" }
    # Embeddings for semantic memory search (shared with RAG stack EMBEDDINGS_PROVIDER/MODEL).
    # When set, store backends use vector embeddings for similarity-based memory retrieval.
    embeddings:
      provider: ""   # e.g. openai, azure-openai (overrides EMBEDDINGS_PROVIDER for store)
      model: ""      # e.g. text-embedding-3-small (overrides EMBEDDINGS_MODEL for store)
      dims: ""       # auto-detected for known models; override if custom
    ttlMinutes: 10080
    enableFactExtraction: false
    maxMemories: 50    # max facts returned to LLM per cross-thread query (LANGGRAPH_STORE_MAX_MEMORIES)
    maxSummaries: 10   # max summaries returned to LLM per cross-thread query (LANGGRAPH_STORE_MAX_SUMMARIES)
  # In-thread checkpoint persistence: memory (default) | redis | postgres | mongodb
  # Persists conversation state within a thread across pod restarts.
  checkpointPersistence:
    type: "memory"
    redis:
      url: ""
      existingSecret: {}
      autoDiscoverService: ""   # "langgraph-redis" or "rag-redis"
      dbIndex: 0
    postgres:
      dsn: ""
      existingSecret: {}
    mongodb:
      uri: ""
      existingSecret: {}
    ttlMinutes: 0

######### Sub-agent configurations #########
# Agent configurations using aliases from Chart.yaml

# AIGateway agent — not a subchart today (runs in-process in the supervisor).
# Vault AppRole credentials for LiteLLM key management go here.
# In single-node mode, single-node-agent-secrets.yaml creates an ExternalSecret
# from this configuration.  A proper aigateway subchart is a follow-up.
agent-aigateway:
  mcp:
    mode: "stdio" # this is a special tool and doesn't have MCP
  agentSecrets:
    secretName: "agent-aigateway-secret"
    # externalSecrets:
    #   data:
    #   - secretKey: VAULT_ADDR
    #     remoteRef: { key: path/to/vault, property: VAULT_ADDR }
    #   - secretKey: VAULT_NAMESPACE
    #     remoteRef: { key: path/to/vault, property: VAULT_NAMESPACE }
    #   - secretKey: VAULT_ROLE_ID
    #     remoteRef: { key: path/to/vault, property: VAULT_ROLE_ID }
    #   - secretKey: VAULT_SECRET_ID
    #     remoteRef: { key: path/to/vault, property: VAULT_SECRET_ID }
    #   - secretKey: VAULT_MOUNT_POINT
    #     remoteRef: { key: path/to/vault, property: VAULT_MOUNT_POINT }
    #   - secretKey: VAULT_APPROLE_PATH
    #     remoteRef: { key: path/to/vault, property: VAULT_APPROLE_PATH }
    #   - secretKey: VAULT_PATH_PREFIX
    #     remoteRef: { key: path/to/vault, property: VAULT_PATH_PREFIX }

agent-argocd:
  nameOverride: "agent-argocd"
  image:
    repository: "ghcr.io/cnoe-io/agent-argocd"
    pullPolicy: "IfNotPresent"
  mcp:
    image:
      repository: "ghcr.io/cnoe-io/mcp-argocd"
      # tag defaults to .Chart.AppVersion when not specified
      tag: ""
      pullPolicy: "IfNotPresent"
    mode: "http" # Options: stdio, http
    port: 8000
    # Route MCP traffic through agentgateway proxy (requires global.agentgateway.enabled).
    # When enabled, subagent MCP calls go through the agentgateway proxy which can
    # enforce JWT validation and ext_authz decisions backed by OpenFGA.
    agentgateway:
      enabled: false
      protocol: StreamableHTTP # SSE or StreamableHTTP

agent-backstage:
  nameOverride: "agent-backstage"
  image:
    repository: "ghcr.io/cnoe-io/agent-backstage"
    pullPolicy: "IfNotPresent"
  mcp:
    image:
      repository: "ghcr.io/cnoe-io/mcp-backstage"
      # tag defaults to .Chart.AppVersion when not specified
      tag: ""
      pullPolicy: "IfNotPresent"
    mode: "http" # Options: stdio, http
    port: 8000
    agentgateway:
      enabled: false
      protocol: StreamableHTTP

agent-confluence:
  nameOverride: "agent-confluence"
  image:
    repository: "ghcr.io/cnoe-io/agent-confluence"
    pullPolicy: "IfNotPresent"
  mcp:
    image:
      repository: "ghcr.io/sooperset/mcp-atlassian"
      tag: "latest"
      pullPolicy: "IfNotPresent"
    mode: "http" # Options: stdio, http
    port: 8000
    agentgateway:
      enabled: false
      protocol: StreamableHTTP
    env:
      TRANSPORT: "streamable-http"

agent-github:
  nameOverride: "agent-github"
  image:
    repository: "ghcr.io/cnoe-io/agent-github"
    pullPolicy: "IfNotPresent"
  mcp:
    useRemoteMcpServer: true

agent-gitlab:
  nameOverride: "agent-gitlab"
  image:
    repository: "ghcr.io/cnoe-io/agent-gitlab"
    pullPolicy: "IfNotPresent"
  env:
    GIT_AUTHOR_NAME: "AI Agent"
    GIT_AUTHOR_EMAIL: "ai-agent@cnoe.io"
    GIT_COMMITTER_NAME: "AI Agent"
    GIT_COMMITTER_EMAIL: "ai-agent@cnoe.io"
  mcp:
    image:
      repository: "zereight050/gitlab-mcp"
      tag: "latest"
      pullPolicy: "IfNotPresent"
    mode: "http" # Options: stdio, http
    port: 8000
    env:
      STREAMABLE_HTTP: "true"
      HOST: "0.0.0.0"
      PORT: "8000"
      MAX_SESSIONS: "1000"
      MAX_REQUESTS_PER_MINUTE: "60"
      USE_PIPELINE: "true"
      # GITLAB_API_URL and GITLAB_PERSONAL_ACCESS_TOKEN should come from agentSecrets
      # Option 1: Simple read-only mode (blocks all write operations)
      GITLAB_READ_ONLY_MODE: "true"
      # Option 2: Fine-grained control via regex (uncomment and customize)
      # Tool filtering via regex. Uses ^ for prefix matching.
      # Example patterns:
      #
      # READ-ONLY - blocks all write operations:
      #   ^(delete_|remove_|create_|fork_|new_|update_|edit_|merge_|push_|publish_|retry_|cancel_|play_|promote_|upload_|resolve_|bulk_)|^(execute_graphql)$
      #
      # ALLOW CREATE - blocks delete/update:
      #   ^(delete_|remove_|update_|edit_|merge_|push_|publish_|retry_|cancel_|play_|promote_|upload_|resolve_|bulk_)|^(execute_graphql)$
      #
      # ALLOW UPDATE - blocks delete/create:
      #   ^(delete_|remove_|create_|fork_|new_)|^(execute_graphql)$
      #
      # ALLOW CREATE + UPDATE - blocks only delete:
      #   ^(delete_|remove_)|^(execute_graphql)$
      #
      # To block specific tools, add them as exact matches: |^(tool1|tool2)$
      # Example: ...|^(execute_graphql|approve_merge_request|unapprove_merge_request)$
      #
      # Note: execute_graphql is always blocked as it bypasses prefix-based permission controls
      #
      # GITLAB_DENIED_TOOLS_REGEX: "^(delete_|remove_|create_|fork_|new_|update_|edit_|merge_|push_|publish_|retry_|cancel_|play_|promote_|upload_|resolve_|bulk_)|^(execute_graphql)$"

agent-jira:
  nameOverride: "agent-jira"
  image:
    repository: "ghcr.io/cnoe-io/agent-jira"
    pullPolicy: "IfNotPresent"
  mcp:
    image:
      repository: "ghcr.io/cnoe-io/mcp-jira"
      # tag defaults to .Chart.AppVersion when not specified
      tag: ""
      pullPolicy: "IfNotPresent"
    mode: "http" # Options: stdio, http
    port: 8000
    agentgateway:
      enabled: false
      protocol: StreamableHTTP

agent-pagerduty:
  nameOverride: "agent-pagerduty"
  image:
    repository: "ghcr.io/cnoe-io/agent-pagerduty"
    pullPolicy: "IfNotPresent"
  mcp:
    image:
      repository: "ghcr.io/cnoe-io/mcp-pagerduty"
      # tag defaults to .Chart.AppVersion when not specified
      tag: ""
      pullPolicy: "IfNotPresent"
    mode: "http" # Options: stdio, http
    port: 8000
    agentgateway:
      enabled: false
      protocol: StreamableHTTP

agent-slack:
  nameOverride: "agent-slack"
  image:
    repository: "ghcr.io/cnoe-io/agent-slack"
    pullPolicy: "IfNotPresent"
  mcp:
    image:
      repository: "ghcr.io/korotovsky/slack-mcp-server"
      tag: "v1.2.3"
      pullPolicy: "IfNotPresent"
    mode: "http" # Options: stdio, http
    port: 3001
    agentgateway:
      enabled: false
      protocol: StreamableHTTP
    command: ["--transport", "http"]
    env:
      SLACK_MCP_HOST: "0.0.0.0"
      SLACK_MCP_PORT: "3001"
      # Message posting disabled by default for safety. Set to "true" to enable,
      # or restrict to specific channel IDs: "C123,C456" (whitelist), "!C789" (blacklist)
      # SLACK_MCP_ADD_MESSAGE_TOOL: "false"

agent-aws:
  nameOverride: "agent-aws"
  image:
    repository: "ghcr.io/cnoe-io/agent-aws"
    pullPolicy: "IfNotPresent"
  mcp:
    image:
      repository: "ghcr.io/cnoe-io/mcp-aws"
      # tag defaults to .Chart.AppVersion when not specified
      tag: ""
      pullPolicy: "IfNotPresent"
    mode: "http" # Options: stdio, http
    port: 8000
    agentgateway:
      enabled: false
      protocol: StreamableHTTP
  env:
    # -- Block kubectl get/describe secret(s) and redact Secret data from output. Defaults to true (on).
    RESTRICT_KUBECTL_SECRETS: "true"
    # -- Block kubectl proxy, which exposes the entire Kubernetes API server. Defaults to true (on).
    RESTRICT_KUBECTL_PROXY: "true"
    # -- Block kubectl exec (shell access inside pods). Defaults to false (off); enable for stricter environments.
    RESTRICT_KUBECTL_EXEC: "false"
    # -- Block kubectl attach (attach to a running process inside a pod). Defaults to false (off).
    RESTRICT_KUBECTL_ATTACH: "false"
    # -- Block kubectl cp (copy files out of pods). Defaults to false (off).
    RESTRICT_KUBECTL_CP: "false"
    # -- Block kubectl port-forward (tunnel internal services). Defaults to false (off).
    RESTRICT_KUBECTL_PORT_FORWARD: "false"

