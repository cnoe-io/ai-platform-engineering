  agent-webex: false
  agent-netutils: false
  agent-weather: false
  agent-petstore: false
  rag-stack: false
  slack-bot: false

# Global configuration shared across all subcharts
global:
  # Deployment mode: "single-node" (all agents in-process) or "multi-node" (each agent as a separate pod)
  deploymentMode: "multi-node"

  createLlmSecret: false # if true, llm secret will be created by the parent chart. Otherwise, expect existing llm secret
  llmSecrets:
    create: false # do not create llm secret in subcharts (use global or existing llm secret)
    secretName: "llm-secret"
  externalSecrets:
    enabled: false
    apiVersion: "v1beta1"  # API version for ExternalSecret resources. Options: "v1" or "v1beta1". Defaults to "v1beta1" if not specified.
  slim:
    enabled: false
    endpoint: "http://ai-platform-engineering-slim:46357"
    transport: "slim"

  # RAG Stack configuration
  rag:
    enableGraphRag: true

  metrics:
    enabled: false

  agentgateway:
    enabled: false

# ServiceMonitor for scraping all ai-platform-engineering components
# For agent metrics endpoints, use global.metrics.enabled above
metrics:
  # Path for metrics endpoint
  path: "/metrics"
  # ServiceMonitor configuration for Prometheus Operator
  serviceMonitor:
    # Enable ServiceMonitor for automatic Prometheus scraping
    # This creates ONE ServiceMonitor that scrapes ALL ai-platform-engineering services
    enabled: false
    # Scrape interval
    interval: "30s"
    # Scrape timeout
    scrapeTimeout: "10s"
    # Additional labels for the ServiceMonitor (e.g., to match Prometheus selector)
    # Example: labels: { release: prometheus }
    labels: {}
    # Additional annotations for the ServiceMonitor
    annotations: {}
    # Relabelings for metrics
    relabelings: []
    # Metric relabelings
    metricRelabelings: []
  grafanaDashboard:
    enabled: true
    # Labels for Grafana sidecar dashboard discovery
    # Override to match your Grafana sidecar configuration (e.g., grafana_dashboard: "local")
    labels:
      grafana_dashboard: "1"

# Extra Kubernetes resources to deploy
extraDeploy: []

# Prompt Configuration
# Choose between predefined prompt configurations or provide your own custom configuration
#
# Option 1: Use a predefined prompt configuration type
# promptConfigType: "default"       # Uses data/prompt_config.yaml (standard orchestrator)
# promptConfigType: "deep_agent"    # Uses data/prompt_config.deep_agent.yaml (strict zero-hallucination mode)
#
# Option 2: Provide custom prompt configuration (overrides promptConfigType)
# promptConfig: |
#   agent_name: "My Custom Agent"
#   system_prompt_template: |
#     ...
#
promptConfigType: "default"  # Options: "default" or "deep_agent"
promptConfig: ""              # Custom prompt config (overrides promptConfigType if set)

ragPromptConfig: ""           # Custom RAG prompt config (overrides default if set)

# Task Configuration
# Self-service workflow definitions (Create LLM Key, GitHub Org Invite, etc.)
# Default is bundled from data/task_config.yaml. Override via taskConfig value.
taskConfig: ""

######### Supervisor agent configuration #########
supervisor-agent:
  # Single-node mode configuration (only used when global.deploymentMode = "single-node").
  # Lives under supervisor-agent: so both the subchart deployment template AND
  # parent-chart templates (via index .Values "supervisor-agent") read from one place.
  # In multi-node mode the agent subcharts export their enabled state via
  # Chart.yaml import-values into global.enabledSubAgents — do NOT put
  # enabledSubAgents under global: or it will conflict with that mechanism.
  singleNode:
    enabledSubAgents:
      aigateway: true
      argocd: true
      aws: true
      backstage: true
      confluence: true
      github: true
      jira: true
      komodor: true
      pagerduty: true
      rag: false
      slack: true
      splunk: true
      weather: false
      webex: true
    # Supervisor (parent agent) LLM model override.
    # Uses langchain's provider:model-name format (e.g. "openai:gpt-4o").
    # When empty, falls back to the LLM_PROVIDER / model-name env vars from llm-secret.
    supervisorModel: ""
    # Per-subagent LLM model overrides.
    # All subagents share the supervisor's LLM by default.
    # Set a value here to override the model for a specific subagent.
    # Values use the provider:model-name format supported by langchain's init_chat_model.
    # Examples: "openai:gpt-4o-mini", "anthropic:claude-sonnet-4-5-20250929"
    subagentModels: {}
      # github: "openai:gpt-4o-mini"
      # jira: "openai:gpt-4o"
      # argocd: "azure_openai:gpt-5.2"
  nameOverride: "supervisor-agent"
  image:
    repository: "ghcr.io/cnoe-io/ai-platform-engineering"
    # tag defaults to .Chart.AppVersion when not specified
    tag: ""
    pullPolicy: "Always"
    args: ["platform-engineer"]
  env:
    EXTERNAL_URL: "http://localhost:8000"  # Agent url for the client. NOTE: this will be user applicaiton specific
    SKIP_AGENT_CONNECTIVITY_CHECK: "false"
    AGENT_CONNECTIVITY_ENABLE_BACKGROUND: "true"
    USE_STRUCTURED_RESPONSE: "true" # Set to "true" to enforce agent to always use structured response format as the final output
    TASK_CONFIG_PATH: "/app/task_config.yaml"
    POLICY_FILE_PATH: "/app/policy.lp"
    # Self-service workflow env vars — referenced as ${VAR_NAME} in task_config.yaml prompts.
    # Set these per environment so system workflows can resolve repo references at runtime.
    # JARVIS_WORKFLOWS_REPO: "org/jarvis-workflows"      # Templates repo (safe-settings, terraform, etc.)
    # ADMIN_REPO: "org/admin"                             # Safe-settings admin repo
    # TERRAFORM_INFRA_REPO: "org/terraform-infra"         # Terraform infrastructure repo
    # WORKFLOWS_REPO: "org/workflows"                     # GitHub Actions workflows repo
    # GROUPS_AUTOMATION_REPO: "org/groups-automation"      # Group management automation repo
    # GROUPS_TEAMS_PATH: "groups_yaml/teams"               # Path prefix for teams directory
    # ORG_MEMBERSHIP_FILE_PATTERN: ""                      # Org membership YAML path pattern
    # EMAIL_DOMAIN: "example.com"                          # Email domain for user ID derivation
    # GITHUB_ORGS: "org1,org2"                             # Comma-separated allowed GitHub orgs
  multiAgentConfig:
    protocol: "a2a"
    port: "8000"
  # Cross-thread memory persistence: memory (default) | redis | postgres
  # BYO / external: Redis (in-cluster, external, AWS ElastiCache for Redis), Postgres (external/managed).
  # Use url/dsn for plain values, or existingSecret to pull from a K8s Secret (recommended for credentials).
  memoryPersistence:
    type: "memory"
    redis:
      url: ""   # e.g. redis://host:6379/0, redis://user:pass@host:6379/0, or ElastiCache Redis endpoint
      existingSecret: {}   # optional: { name: "my-redis-secret", key: "REDIS_URL" }
      keyPrefix: ""   # optional: namespace shared Redis (e.g. release name, "caipe-prod", "tenant-xyz")
    postgres:
      dsn: ""   # e.g. postgresql://user:pass@host:5432/dbname
      existingSecret: {}   # optional: { name: "my-pg-secret", key: "DATABASE_URL" }
    ttlMinutes: 10080
    enableFactExtraction: false

######### Sub-agent configurations #########
# Agent configurations using aliases from Chart.yaml

# AIGateway agent — not a subchart today (runs in-process in the supervisor).
# Vault AppRole credentials for LiteLLM key management go here.
