######### CAIPE UI configuration #########
caipe-ui:
  skills:
    enabled: true
  nameOverride: "caipe-ui"
  image:
    repository: "ghcr.io/cnoe-io/caipe-ui"
    # tag defaults to .Chart.AppVersion when not specified
    tag: ""
    pullPolicy: "Always"
  service:
    port: 3000
  ingress:
    enabled: false
    className: "nginx"
    annotations: {}
    hosts:
      - host: caipe-ui.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
  volumes:
    - name: skill-templates
      configMap:
        name: skill-templates
  volumeMounts:
    - name: skill-templates
      mountPath: /app/data/skills
      readOnly: true
  env:
    # CAIPE Supervisor URL - automatically configured to use the supervisor-agent service
    A2A_BASE_URL: "http://ai-platform-engineering-supervisor-agent:8000"
    # Skills template directory (mounted from ConfigMap)
    SKILLS_DIR: "/app/data/skills"
  # ConfigMap for non-sensitive configuration
  config:
    # Feature flags
    ENABLE_SUBAGENT_CARDS: "true"
    SSO_ENABLED: "false"
    # MongoDB configuration
    MONGODB_DATABASE: "caipe"
    # NextAuth URL (non-sensitive)
    NEXTAUTH_URL: "http://localhost:3000"
    # Node environment
    NODE_ENV: "production"
    # Branding configuration
    TAGLINE: "Multi-Agent Workflow Automation"
    DESCRIPTION: "Where Humans and AI agents collaborate to deliver high quality outcomes."
    APP_NAME: "CAIPE"
    LOGO_URL: "/logo.svg"
    LOGO_STYLE: "default"
    # SPINNER_COLOR: ""
    SHOW_POWERED_BY: "false"
    # Environment badge (e.g. "Dev", "Preview", "Staging", "Prod"; empty = hidden)
    ENV_BADGE: ""
    # Header link URLs (leave empty/commented to hide)
    # DOCS_URL: "https://your-docs-site.com"
    # SOURCE_URL: "https://github.com/your-org/your-repo"
    # Enable Prometheus metrics
    # PROMETHEUS_URL: "http://prometheus-server.monitoring.svc.cluster.local:9090"
  # External Secrets configuration for sensitive data (OIDC, NextAuth, MongoDB/DocumentDB)
  # BYO MongoDB or DocumentDB: add data entry with secretKey: MONGODB_URI and remoteRef to your store.
  externalSecrets:
    enabled: false  # Set to true to enable external secrets
    apiVersion: "v1beta1"
    secretStoreRef:
      name: "vault"  # Your secret store name
      kind: "ClusterSecretStore"
    data: []
      # See charts/ai-platform-engineering/charts/caipe-ui/values-external-secrets.yaml for examples

  # BYO MongoDB/DocumentDB: set existingSecret to a Secret containing MONGODB_URI (and other keys as needed).
  # Leave mongodb.enabled false and provide MONGODB_URI via existingSecret or externalSecrets above.
  existingSecret: ""

  # MongoDB configuration for CAIPE UI persistence (in-cluster; disable for BYO)
  mongodb:
    nameOverride: "mongodb"
    enabled: false  # Set to true to enable MongoDB
    image:
      repository: "mongo"
      tag: "7.0"
      pullPolicy: "IfNotPresent"
    service:
      port: 27017
    persistence:
      enabled: true
      storageClass: ""  # Use default storage class or specify one
      size: 10Gi
    auth:
      rootUsername: "admin"
      rootPassword: "changeme"  # CHANGE THIS or use external secrets
      database: "caipe"
    # External Secrets for MongoDB credentials
    externalSecrets:
      enabled: false  # Set to true to use external secrets
      apiVersion: "v1beta1"
      secretStoreRef:
        name: "vault"
        kind: "ClusterSecretStore"
      data: []
        # - secretKey: MONGO_INITDB_ROOT_USERNAME
        #   remoteRef:
        #     key: dev/mongodb
        #     property: username
        # - secretKey: MONGO_INITDB_ROOT_PASSWORD
        #   remoteRef:
        #     key: dev/mongodb
        #     property: password

######### Slack Bot Integration configuration #########
# The Slack bot is a client integration (not an agent) that connects to the
# CAIPE supervisor via A2A protocol, bringing AI assistance into Slack channels.
# Enable with: global.integrations.slackBot.enabled=true
slack-bot:
  image:
    repository: "ghcr.io/cnoe-io/caipe-slack-bot"
    # tag defaults to .Chart.AppVersion when not specified
    tag: ""
    pullPolicy: "Always"

  # Display name used in Slack messages
  appName: "CAIPE"

  # Connection mode: "socket" (WebSocket via SLACK_APP_TOKEN) or "http" (webhooks via SLACK_SIGNING_SECRET)
  botMode: "socket"

  # Environment variables passed to the bot container
  env:
    CAIPE_URL: "http://ai-platform-engineering-supervisor-agent:8000"
    # Langfuse feedback scoring (uncomment to enable)
    # LANGFUSE_SCORING_ENABLED: "true"
    # LANGFUSE_PUBLIC_KEY: ""
    # LANGFUSE_HOST: ""

  # Reference to a Kubernetes Secret containing Slack tokens:
  #   SLACK_BOT_TOKEN (xoxb-...), SLACK_APP_TOKEN (xapp-...), SLACK_SIGNING_SECRET
  #   Optionally: OAUTH2_CLIENT_SECRET, LANGFUSE_SECRET_KEY
  slack:
    tokenSecretRef: "slack-bot-secrets"

  # MongoDB for persistent session storage (conversation context, trace IDs, user cache)
  # Uses the same MongoDB as CAIPE UI when deployed together
  mongodb:
    uri: ""  # Override per environment, e.g. "mongodb://admin:changeme@ai-platform-engineering-mongodb:27017"
    database: "caipe"

  # OAuth2 Client Credentials auth for A2A requests to the supervisor
  # Works with any OIDC provider (Okta, Keycloak, Auth0, Azure AD)
  auth:
    enabled: false
    tokenUrl: ""      # e.g. "https://your-idp.example.com/oauth2/v1/token"
    clientId: ""
    scope: ""         # Optional
    audience: ""      # Optional
    # clientSecret should be stored in the K8s Secret (slack.tokenSecretRef), NOT here

  # Suppress environment info in bot responses
  silenceEnv: "false"

  # Per-channel configuration (serialized as YAML into a ConfigMap)
  # Structure: channel_id -> channel config
  botConfig: {}
    # C012345678:
    #   name: "#my-channel"
    #   ai_enabled: true
    #   qanda:
    #     enabled: true
    #     overthink: true
    #   ai_alerts:
    #     enabled: false
    #   default:
    #     project_key: MYPROJ
    #     issue_type: Bug

  # External Secrets configuration for sensitive data (Slack tokens, Langfuse secret key, etc.)
  externalSecrets:
    enabled: false
    apiVersion: "v1beta1"
    secretStoreRef:
      name: "vault"
      kind: "ClusterSecretStore"
    data: []
      # - secretKey: SLACK_BOT_TOKEN
      #   remoteRef:
      #     key: prod/slack-bot
      #     property: bot_token
      # - secretKey: SLACK_APP_TOKEN
      #   remoteRef:
      #     key: prod/slack-bot
      #     property: app_token

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
