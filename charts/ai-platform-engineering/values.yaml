######### CAIPE UI configuration #########
caipe-ui:
  skills:
    enabled: true
  nameOverride: "caipe-ui"
  # The CAIPE UI BFF uses the caipe-platform confidential client for
  # Keycloak Admin REST calls. Helm does not support cross-subchart value
  # substitution at template time, so the conventional Secret name is
  # declared in both the keycloak and caipe-ui values.
  # Operators using a non-default Secret name must override BOTH:
  #     keycloak.platformClient.secretRef: my-custom-platform-secret
  #     caipe-ui.keycloakAdminClient.secretName: my-custom-platform-secret
  keycloakAdminClient:
    secretName: "caipe-platform-secret"
    secretKey: "OIDC_CLIENT_SECRET"
    clientId: "caipe-platform"
  # Dedicated Keycloak client used to mint the schedule owner's bearer. When
  # secretName is empty and global.scheduler.enabled=true, the chart derives
  # "<release>-keycloak-scheduler-runner" from the bundled Keycloak chart.
  # Operators using a custom Keycloak Secret name must override both this
  # value and keycloak.schedulerTokenExchange.secretRef.
  schedulerRunnerClient:
    secretName: ""
    secretKey: "KC_SCHEDULER_CLIENT_SECRET"
    clientId: "caipe-scheduler-runner"
  image:
    repository: "ghcr.io/cnoe-io/caipe-ui"
    # tag defaults to .Chart.AppVersion when not specified
    tag: ""
    pullPolicy: "IfNotPresent"
  service:
    port: 3000
  ingress:
    enabled: false
    className: "nginx"
    annotations: {}
    hosts:
      - host: caipe-ui.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
  volumes:
    - name: skill-templates
      configMap:
        name: skill-templates
    - name: skills-live-skills
      configMap:
        name: skills-live-skills
        optional: true
  volumeMounts:
    - name: skill-templates
      mountPath: /app/data/skills
      readOnly: true
    - name: skills-live-skills
      mountPath: /app/data/skills-live-skills
      readOnly: true
  # ConfigMap for non-sensitive configuration
  config:
    # Bootstrap default agent for new chats. Overridden at runtime by Admin → Settings UI.
    # Set to a dynamic agent ID to pre-configure the default without manual admin action.
    # When empty, the UI resolves the first available dynamic agent as the default.
    DEFAULT_AGENT_ID: ""
    # Skills template directory (mounted from ConfigMap)
    SKILLS_DIR: "/app/data/skills"
    # Live-skills skill template (mounted from ConfigMap "skills-live-skills").
    # Override per-deployment via .Values.skillsLiveSkills (inline string) or
    # .Values.skillsLiveSkillsName (selects data/skills/live-skills.<name>.md).
    SKILLS_LIVE_SKILLS_FILE: "/app/data/skills-live-skills/live-skills.md"
    # Python helper served at /api/skills/helpers/caipe-skills.py (mounted from same ConfigMap).
    SKILLS_HELPER_FILE: "/app/data/skills-live-skills/caipe-skills.py"
    # Update-skills slash-command template (companion to live-skills.md);
    # served at /api/skills/update-skills. Override paths follow the same
    # pattern as SKILLS_LIVE_SKILLS_FILE.
    SKILLS_UPDATE_SKILLS_FILE: "/app/data/skills-live-skills/update-skills.md"
    # Claude Code SessionStart hook script served at
    # /api/skills/hooks/caipe-catalog.sh (mounted from same ConfigMap).
    # install.sh installs this on the user's machine and registers it as
    # a SessionStart hook so the catalog is always discoverable in chat.
    SKILLS_HOOK_FILE: "/app/data/skills-live-skills/caipe-catalog.sh"
    # Feature flags
    ENABLE_SUBAGENT_CARDS: "true"
    SSO_ENABLED: "false"
    # Okta background sync is configured via the structured `oktaSync:` block
    # below (sibling of `config:`), modeled after the Backstage Okta provider.
    # Built-in skill IDs to seed (comma-separated whitelist).
    # When set, only listed templates are seeded; unlisted ones are removed on deploy.
    # When unset or empty, all built-in templates are seeded automatically.
    # BUILTIN_SKILL_IDS: "qs-deploy-status,qs-pr-review"
    # Dynamic Agents: set to "true" to enable custom agent creation and management
    # Requires admin role and MongoDB storage mode
    DYNAMIC_AGENTS_ENABLED: "false"
    # Dynamic Agents service URL. Leave empty to use the chart default.
    # DYNAMIC_AGENTS_URL: ""
    # Scheduler service used by the Schedules page and scheduled-run BFF path.
    SCHEDULER_URL: "http://caipe-scheduler:8080"
    # Connections & Secrets credential store. Disabled by default. Use local-cmk
    # only for non-production testing; production must use aws-kms.
    CAIPE_CREDENTIALS_ENABLED: "false"
    CREDENTIAL_STORE_BACKEND: "mongodb-envelope"
    CREDENTIAL_KEY_PROVIDER: "local-cmk"
    CREDENTIAL_KMS_CMK_ID: ""
    CREDENTIAL_KMS_REGION: ""
    CREDENTIAL_SERVICE_AUDIENCE: "caipe-credential-service"
    # Bootstrap global OAuth connectors from server env at startup. In
    # Kubernetes, provide provider client IDs/secrets/redirect URIs through
    # externalSecrets; in Docker Compose, provide them through .env. This flag
    # controls the legacy fixed-provider variables; oauthConnectors below is
    # always bootstrapped when non-empty.
    CREDENTIAL_BOOTSTRAP_OAUTH_CONNECTORS: "false"
    # Autonomous Agents: set to "true" to enable the admin-gated Autonomous tab
    # (UI proxies to the service at /api/autonomous). Requires tags.autonomous-agents=true.
    ENABLE_AUTONOMOUS_AGENTS: "false"
    # Autonomous Agents service URL (only used when ENABLE_AUTONOMOUS_AGENTS is "true")
    # AUTONOMOUS_AGENTS_URL: "http://{{ .Release.Name }}-autonomous-agents:8002"

    # Standalone skill-scanner microservice (cisco-ai-defense/skill-scanner).
    # Active when global.skillScanner.enabled=true. Leave empty to use the
    # in-cluster default (derived from .Release.Name in the deployment template).
    # Override only to point at a scanner running outside this release.
    SKILL_SCANNER_URL: ""
    # MongoDB configuration
    MONGODB_DATABASE: "caipe"
    # OpenFGA relationship authorization. Enable reconciliation only after
    # OpenFGA is installed and the authorization model has been initialized.
    OPENFGA_HTTP: ""
    OPENFGA_STORE_NAME: "caipe-openfga"
    OPENFGA_RECONCILE_ENABLED: "true"
    # Unsafe dev/emergency escape hatch: when true, UI RBAC checks allow all
    # requests without consulting OpenFGA. Do not enable in staging or prod.
    CAIPE_UNSAFE_RBAC_BYPASS: "false"
    # Identity sync: process IDP group claims at login time and automatically
    # create teams matching the user's AD/LDAP group memberships.
    # Set both to "true" when using an IDP (e.g. Keycloak brokering AD/LDAP)
    # that includes group claims in the OIDC token, so teams stay in sync with
    # AD groups without requiring manual team management in the Admin UI.
    IDENTITY_SYNC_LOGIN_CLAIMS_ENABLED: "false"
    IDENTITY_SYNC_LOGIN_AUTO_CREATE_TEAMS: "false"
    # Keycloak Admin API integration for resource/scope synchronization.
    KEYCLOAK_URL: ""
    KEYCLOAK_REALM: "caipe"
    KEYCLOAK_RESOURCE_SERVER_ID: "caipe-platform"
    # NextAuth URL (non-sensitive)
    NEXTAUTH_URL: "http://localhost:3000"
    # Node environment
    NODE_ENV: "production"
    # Branding configuration
    TAGLINE: "Multi-Agent Workflow Automation"
    DESCRIPTION: "Where Humans and AI agents collaborate to deliver high quality outcomes."
    APP_NAME: "CAIPE"
    # Canonical Slack workspace namespace used by UI-managed Slack ReBAC/routes.
    SLACK_WORKSPACE_ALIAS: "CAIPE"
    # Slack bot internal admin API used by the Web UI BFF for route reload and
    # one-time static-config-to-MongoDB/OpenFGA migration. The BFF uses the
    # existing OIDC_CLIENT_ID/OIDC_CLIENT_SECRET Keycloak client credentials.
    SLACK_BOT_ADMIN_URL: ""
    SLACK_BOT_ADMIN_AUDIENCE: "caipe-slack-bot-admin"
    # SLACK_BOT_ADMIN_TOKEN_URL: "http://keycloak:7080/realms/caipe/protocol/openid-connect/token"
    # SLACK_BOT_ADMIN_SCOPE: "slack:routes:read slack:routes:reload slack:routes:sync"
    SLACK_DEFAULT_TEAM_SLUG: ""
    SLACK_DEFAULT_AGENT_ID: ""
    # Webex bot internal admin API (BFF access-check + route management).
    WEBEX_BOT_ADMIN_URL: ""
    WEBEX_BOT_ADMIN_CLIENT_ID: "caipe-ui"
    WEBEX_BOT_ADMIN_AUDIENCE: "caipe-webex-bot-admin"
    # WEBEX_BOT_ADMIN_TOKEN_URL: "http://keycloak:7080/realms/caipe/protocol/openid-connect/token"
    WEBEX_DEFAULT_TEAM_SLUG: ""
    WEBEX_DEFAULT_AGENT_ID: ""
    WEBEX_THREAD_CONTEXT_ENABLED: "true"
    WEBEX_THREAD_CONTEXT_MAX_MESSAGES: "10"
    WEBEX_THREAD_CONTEXT_MAX_CHARS: "4000"
    CAIPE_ORG_KEY: "caipe"
    CAIPE_ORG_DISPLAY_NAME: "CAIPE"
    LOGO_URL: "/logo.svg"
    LOGO_STYLE: "default"
    # SPINNER_COLOR: ""
    SHOW_POWERED_BY: "false"
    # Environment badge (e.g. "Dev", "Preview", "Staging", "Prod"; empty = hidden)
    ENV_BADGE: ""
    # Header link URLs (leave empty/commented to hide)
    # DOCS_URL: "https://your-docs-site.com"
    # SOURCE_URL: "https://github.com/your-org/your-repo"
    # Enable Prometheus metrics
    # PROMETHEUS_URL: "http://prometheus-server.monitoring.svc.cluster.local:9090"

  # Arbitrary OAuth connectors to upsert at UI startup. Client secrets are not
  # accepted inline: clientSecretEnv must reference a key supplied through
  # caipe-ui.existingSecret or caipe-ui.externalSecrets. Entries are keyed by
  # provider, and configured entries override the legacy fixed-env bootstrap.
  # Removing an entry does not delete or disable an existing connector.
  oauthConnectors: []
    # - provider: "webex_secondary"
    #   name: "Webex Secondary"
    #   clientIdEnv: "WEBEX_SECONDARY_CLIENT_ID"
    #   clientSecretEnv: "WEBEX_SECONDARY_CLIENT_SECRET"
    #   authorizationUrl: "https://webexapis.com/v1/authorize"
    #   tokenUrl: "https://webexapis.com/v1/access_token"
    #   scopes:
    #     - "spark:mcp"
    #     - "meeting:schedules_read"
    #     - "meeting:transcripts_read"
    #   # Defaults to ${NEXTAUTH_URL}/api/credentials/oauth/<provider>/callback.
    #   redirectUri: "https://caipe.example.com/api/credentials/oauth/webex_secondary/callback"

  # ── Okta directory sync (Identity Sync admin tab) ──────────────────────────
  # Structured config modeled after the Backstage Okta entity provider. The
  # chart flattens this into IDENTITY_SYNC_OKTA_* env vars on the caipe-ui
  # Deployment (non-sensitive → ConfigMap; sensitive → Secret) so the app can
  # run identically locally (plain env vars) and in-cluster.
  #
  # Choose ONE auth mode:
  #   • token: SSWS API token (simplest)
  #   • oauth: OAuth 2.0 service app, private-key JWT (least privilege; grant
  #            scopes okta.groups.read + okta.users.read). Takes precedence.
  #
  # Secrets are NOT inlined here. Provide them via `existingSecret` /
  # `externalSecrets` using these keys, which the Deployment maps by name:
  #   IDENTITY_SYNC_OKTA_API_TOKEN          (token mode)
  #   IDENTITY_SYNC_OKTA_OAUTH_PRIVATE_KEY  (oauth mode, PEM PKCS#8)
  oktaSync:
    enabled: false
    # Non-sensitive — rendered into the ConfigMap.
    orgUrl: ""                 # e.g. https://your-org.okta.com
    oauth:
      clientId: ""             # non-sensitive (service app client id)
      keyId: ""                # optional kid; required for PEM keys
    # Optional Okta group filter expression (non-sensitive), applied to the
    # group listing.
    # groupFilter: 'profile.name eq "Engineering"'

  # External Secrets configuration for sensitive data (OIDC, NextAuth, MongoDB/DocumentDB)
  # BYO MongoDB or DocumentDB: add data entry with secretKey: MONGODB_URI and remoteRef to your store.
  externalSecrets:
    enabled: false  # Set to true to enable external secrets
    apiVersion: "v1beta1"
    secretStoreRef:
      name: "vault"  # Your secret store name
      kind: "ClusterSecretStore"
    data: []
      # See charts/ai-platform-engineering/charts/caipe-ui/values-external-secrets.yaml for examples

  # BYO MongoDB/DocumentDB: set existingSecret to a Secret containing MONGODB_URI (and other keys as needed).
  # Leave mongodb.enabled false and provide MONGODB_URI via existingSecret or externalSecrets above.
  # For Okta sync, add the sensitive credential to the same secret:
  #   token mode → IDENTITY_SYNC_OKTA_API_TOKEN
  #   oauth mode → IDENTITY_SYNC_OKTA_OAUTH_PRIVATE_KEY (PEM PKCS#8)
  existingSecret: ""

  # MongoDB configuration for CAIPE UI persistence (in-cluster; disable for BYO)
  mongodb:
    nameOverride: "mongodb"
    enabled: false  # Set to true to enable MongoDB
    image:
      repository: "mongo"
      tag: "7.0"
      pullPolicy: "IfNotPresent"
    service:
      port: 27017
    persistence:
      enabled: true
      storageClass: ""  # Use default storage class or specify one
      size: 10Gi
    auth:
      rootUsername: "admin"
      # CHANGE THIS or use external secrets.
      # R3 (May 2026): set `mongodb.strictPasswords: true` below to make
      # `helm install` / `helm upgrade` fail-fast on the placeholder.
      rootPassword: "changeme"
      database: "caipe"
    # R3: Production-safety gate. When true AND `externalSecrets.enabled`
    # is false, the chart refuses to render if `auth.rootPassword` is a
    # known placeholder ("changeme", "admin", "password", "mongo",
    # "root", "test", etc.). Mirrors `keycloak.strictClientSecrets`.
    # Default false so docker-compose dev + CI matrix keep working.
    strictPasswords: false
    # External Secrets for MongoDB credentials
    externalSecrets:
      enabled: false  # Set to true to use external secrets
      apiVersion: "v1beta1"
      secretStoreRef:
        name: "vault"
        kind: "ClusterSecretStore"
      data: []
        # - secretKey: MONGO_INITDB_ROOT_USERNAME
        #   remoteRef:
        #     key: dev/mongodb
        #     property: username
        # - secretKey: MONGO_INITDB_ROOT_PASSWORD
        #   remoteRef:
        #     key: dev/mongodb
        #     property: password

######### LiteLLM MCP configuration #########
# Standalone MCP server for LiteLLM FinOps reporting.
# Enable this when dynamic agents should call LiteLLM tools directly.
litellmMcp:
  enabled: false
  nameOverride: "litellm-mcp"
  fullnameOverride: ""
  replicaCount: 1
  revisionHistoryLimit: 3
  image:
    repository: "ghcr.io/cnoe-io/mcp-litellm"
    # tag defaults to .Chart.AppVersion when not specified
    tag: ""
    pullPolicy: "IfNotPresent"
  imagePullSecrets: []
  service:
    type: ClusterIP
    port: 8000
  # Non-sensitive environment variables.
  config:
    SERVER_NAME: "LITELLM"
    LITELLM_API_URL: ""
    LITELLM_API_TIMEOUT: "120"
    LITELLM_VERIFY_SSL: "true"
  # Existing Secret containing LITELLM_API_KEY. Takes precedence over secret.name.
  existingSecret: ""
  # Simple Secret creation for local/dev installs. Prefer existingSecret or
  # externalSecrets in shared clusters.
  secret:
    create: false
    name: ""
    data: {}
      # LITELLM_API_KEY: ""
  externalSecrets:
    enabled: false
    apiVersion: "v1beta1"
    refreshInterval: "1h"
    secretStoreRef:
      name: "vault"
      kind: "ClusterSecretStore"
    data: []
      # - secretKey: LITELLM_API_KEY
      #   remoteRef:
      #     key: dev/litellm-mcp
      #     property: LITELLM_API_KEY
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  resources: {}
    # requests:
    #   cpu: 100m
    #   memory: 256Mi
    # limits:
    #   cpu: 500m
    #   memory: 512Mi
  livenessProbe:
    tcpSocket:
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    tcpSocket:
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  nodeSelector: {}
  tolerations: []
  affinity: {}

######### Dynamic Agents configuration #########
# Dynamic Agents service for custom agent creation and management
# Enable with: tags.dynamic-agents=true
# Requires: MongoDB (uses same MongoDB as CAIPE UI), admin role for users
dynamic-agents:
  nameOverride: "dynamic-agents"
  image:
    repository: "ghcr.io/cnoe-io/caipe-dynamic-agents"
    # tag defaults to .Chart.AppVersion when not specified
    tag: ""
    pullPolicy: "IfNotPresent"
  service:
    port: 8001
    # Dedicated port for /metrics. 0 (default) serves metrics on `port`
    # above — unchanged from current behavior. Set to a different port to
    # split metrics onto its own port, e.g. so the main API port can run
    # strict mTLS while metrics stays permissive for scrapers that don't
    # support mTLS client certs.
    metricsPort: 0
  # ConfigMap for non-sensitive configuration
  config:
    # ─── Keycloak / OIDC (REQUIRED for Bearer token validation) ─────────
    # In-cluster Keycloak service URL used for the server-to-server JWKS
    # fetch. The bundled Keycloak subchart exposes its service as
    # `<release>-keycloak`; this default works for the umbrella chart
    # but MUST be overridden when pointing dynamic-agents at an external
    # Keycloak (production IdP / forge.dev / etc.).
    KEYCLOAK_URL: ""
    # Browser-facing issuer string baked into JWTs (Keycloak's
    # KC_HOSTNAME). Override when the public issuer differs from
    # KEYCLOAK_URL (the typical production topology), e.g.
    # OIDC_ISSUER: "https://idp.example.com/realms/caipe".
    # Leaving this empty falls back to deriving the issuer from
    # KEYCLOAK_URL, which only works in dev where both URLs coincide;
    # NOTES.txt prints a warning otherwise.
    OIDC_ISSUER: ""
    # OpenFGA authorization service (in-cluster default matches umbrella chart release name)
    OPENFGA_HTTP: ""
    OPENFGA_STORE_NAME: "caipe-openfga"
    # MongoDB configuration (uses same database as CAIPE UI)
    MONGODB_DATABASE: "caipe"
    # Connections & Secrets credential exchange client. Disabled by default.
    CAIPE_CREDENTIALS_ENABLED: "false"
    CREDENTIAL_API_URL: ""
    # CAIPE UI server base URL for built-in workflow tools.
    CAIPE_API_URL: ""
    CREDENTIAL_SERVICE_AUDIENCE: "caipe-credential-service"
    USE_IMPERSONATION_TOKENS: "false"
    # MCP server IDs routed through AgentGateway. "all" only applies to
    # gateway-managed MCP rows; manual/direct MCP rows keep their stored endpoint.
    AGENT_GATEWAY_MCP_SERVER_IDS: "all"
  agentContext:
    existingSecret:
      name: ""
      key: CAIPE_AGENT_CONTEXT_HMAC_SECRET
    # LLM configuration (override if needed)
    # LLM_PROVIDER: "openai"
    # LLM_MODEL: "gpt-4o"
  # External Secrets configuration for sensitive data (MongoDB URI, LLM API keys)
  externalSecrets:
    enabled: false  # Set to true to enable external secrets
    apiVersion: "v1beta1"
    secretStoreRef:
      name: "vault"  # Your secret store name
      kind: "ClusterSecretStore"
    data: []
      # - secretKey: MONGODB_URI
      #   remoteRef:
      #     key: dev/dynamic-agents
      #     property: MONGODB_URI
      # - secretKey: OPENAI_API_KEY
      #   remoteRef:
      #     key: dev/dynamic-agents
      #     property: OPENAI_API_KEY

######### Autonomous Agents configuration #########
# Autonomous Agents - standalone scheduler that fires tasks (cron / interval /
# webhook) at the dynamic-agents runtime. Tasks and run history are managed
# through the UI's admin-gated /api/autonomous proxy; this service is the
# upstream that proxy targets.
# Enable with: tags.autonomous-agents=true
# Requires: MongoDB (uses same MongoDB as CAIPE UI) and dynamic-agents.
# Also set the UI flags (caipe-ui.config.ENABLE_AUTONOMOUS_AGENTS /
# AUTONOMOUS_AGENTS_URL) -- see values-autonomous-agents.yaml.example for the
# full recipe.
autonomous-agents:
  nameOverride: "autonomous-agents"
  image:
    repository: "ghcr.io/cnoe-io/caipe-autonomous-agents"
    # tag defaults to .Chart.AppVersion when not specified
    tag: ""
    pullPolicy: "IfNotPresent"
  service:
    port: 8002
  # ConfigMap for non-sensitive configuration (values are rendered via tpl)
  config:
    # Dynamic-agents runtime endpoint -- every autonomous task runs against a
    # dynamic agent selected by the task's dynamic_agent_id.
    DYNAMIC_AGENTS_URL: "http://{{ .Release.Name }}-dynamic-agents:8001"
    # MongoDB configuration (uses same database as CAIPE UI)
    MONGODB_DATABASE: "caipe"
  # Pre-existing secret with MONGODB_URI (required), WEBHOOK_SECRET, and
  # optional WEBEX_* values -- see the subchart values.yaml for the full list
  existingSecret: ""
  # External Secrets configuration for sensitive data (MongoDB URI, webhook secrets)
  externalSecrets:
    enabled: false  # Set to true to enable external secrets
    apiVersion: "v1beta1"
    secretStoreRef:
      name: "vault"  # Your secret store name
      kind: "ClusterSecretStore"
    data: []
      # - secretKey: MONGODB_URI
      #   remoteRef:
      #     key: dev/autonomous-agents
      #     property: MONGODB_URI
      # - secretKey: WEBHOOK_SECRET
      #   remoteRef:
      #     key: dev/autonomous-agents
      #     property: WEBHOOK_SECRET

######### Scheduler service configuration #########
# Enable with global.scheduler.enabled=true. Dynamic Agents and Keycloak are
# required separately for authenticated scheduled execution.
scheduler:
  fullnameOverride: "caipe-scheduler"
  image:
    repository: "ghcr.io/cnoe-io/caipe-scheduler"
    tag: ""
    pullPolicy: "IfNotPresent"
  command: []
  args: []
  cronRunner:
    image:
      repository: "ghcr.io/cnoe-io/caipe-cron-runner"
      tag: ""
      pullPolicy: "IfNotPresent"
  caipe:
    apiUrl: 'http://{{ .Release.Name }}-caipe-ui:3000'
    chatPath: "/api/v1/chat/invoke"
  # Point this at the same MongoDB used by CAIPE UI and Dynamic Agents.
  mongo:
    uri: ""
    database: "caipe"
    existingSecret: ""
    existingSecretKey: "uri"
  serviceToken:
    # To consume an operator-managed Secret, set existingSecret and mirror its
    # name/key under global.scheduler so the UI and scheduler MCP use it too.
    existingSecret: ""
    existingSecretKey: "token"
    value: ""
# Scheduler MCP. Rendered whenever the scheduler feature is enabled unless this
# narrower switch is disabled. It shares the scheduler service token Secret.
schedulerMcp:
  enabled: true
  nameOverride: "mcp-scheduler"
  image:
    repository: "ghcr.io/cnoe-io/mcp-scheduler"
    tag: ""
    pullPolicy: "IfNotPresent"
  command: ["mcp-server-scheduler"]
  service:
    port: 8000
  env:
    MCP_MODE: "streamable-http"
    MCP_HOST: "0.0.0.0"
    MCP_PORT: "8000"
    SCHEDULER_URL: "http://caipe-scheduler:8080"
  auth:
    # AgentGateway authenticates the caller. This MCP relays the caller JWT
    # opaquely to caipe-scheduler, which validates it and derives ownership.
    mode: "none"
    jwksUri: ""
    issuer: ""
    audience: "caipe-platform"
  resources: {}

######### Slack Bot Integration configuration #########
# The Slack bot is a client integration (not an agent) that connects to the
# CAIPE UI BFF (dynamic agents) over SSE, bringing AI assistance into Slack channels.
# Enable with: global.integrations.slackBot.enabled=true
slack-bot:
  image:
    repository: "ghcr.io/cnoe-io/caipe-slack-bot"
    # tag defaults to .Chart.AppVersion when not specified
    tag: ""
    pullPolicy: "IfNotPresent"

  # -- Flat key-value map of environment variables.
  # Each key-value pair is injected as a flat environment variable via ConfigMap
  # (envFrom → configMapRef). All non-sensitive env vars go here.
  config:
    APP_NAME: "CAIPE"
    SLACK_BOT_MODE: "socket"
    CAIPE_API_URL: ""
    # MONGODB_URI: ""                          # Override per environment
    # SLACK_WORKSPACE_URL: ""                  # e.g. "https://mycompany.slack.com"
    SLACK_WORKSPACE_ALIAS: "CAIPE"             # Canonical workspace namespace for Slack ReBAC/routes
    # SLACK_INTEGRATION_ENABLE_AUTH: "true"    # Enable OAuth2 Client Credentials
    # OAUTH2_TOKEN_URL: ""                     # OIDC token endpoint
    # OAUTH2_CLIENT_ID: ""                     # OAuth2 client ID
    SLACK_AGENT_ROUTES_MODE: "db_prefer"       # Prefer UI-managed Slack routes, fallback to static config
    SLACK_AUTO_ASSIGN_UNMAPPED_CHANNELS: "false" # Opt-in first-message channel onboarding
    SLACK_DEFAULT_TEAM_SLUG: ""                # Required when auto-assignment is enabled
    SLACK_DEFAULT_AGENT_ID: ""                 # Required when auto-assignment is enabled
    SLACK_ADMIN_API_ENABLED: "true"            # Internal admin API when tags.slack-bot=true
    SLACK_ADMIN_API_HOST: "0.0.0.0"
    SLACK_ADMIN_API_PORT: "3001"
    SLACK_ADMIN_JWT_ISSUER: ""                 # Set to Keycloak/OIDC issuer when admin API is enabled
    SLACK_ADMIN_JWT_AUDIENCE: "caipe-slack-bot-admin"
    SLACK_ADMIN_ALLOWED_CLIENT_IDS: "caipe-ui"

  # -- Reference to a pre-existing Kubernetes Secret.
  # Should contain: SLACK_BOT_TOKEN, SLACK_APP_TOKEN, SLACK_SIGNING_SECRET,
  # and optionally OAUTH2_CLIENT_SECRET.
  existingSecret: "slack-bot-secrets"

  # -- Per-channel configuration rendered as YAML and volume-mounted
  # at /etc/caipe/bot-config.yaml. Only mounted when non-empty.
  botConfig: {}
    # C012345678:
    #   name: "#my-channel"
    #   ai_enabled: true
    #   qanda:
    #     enabled: true
    #     overthink: true
    #   ai_alerts:
    #     enabled: false
    #   other:
    #     jira:
    #       project_key: MYPROJ
    #       issue_type: Bug

  # -- External Secrets configuration for sensitive data
  externalSecrets:
    enabled: false
    apiVersion: "v1beta1"
    secretStoreRef:
      name: "vault"
      kind: "ClusterSecretStore"
    data: []
      # Example placeholders. Keep values in your external secret backend; these
      # keys are materialized into the generated Kubernetes Secret and injected
      # into the slack-bot pod via envFrom.
      # - secretKey: SLACK_BOT_TOKEN
      #   remoteRef:
      #     key: prod/slack-bot
      #     property: bot_token
      # - secretKey: SLACK_APP_TOKEN
      #   remoteRef:
      #     key: prod/slack-bot
      #     property: app_token
      # - secretKey: SLACK_SIGNING_SECRET
      #   remoteRef:
      #     key: prod/slack-bot
      #     property: signing_secret
      # - secretKey: SLACK_CLIENT_SECRET
      #   remoteRef:
      #     key: prod/slack-bot
      #     property: slack_client_secret
      # - secretKey: SLACK_LINK_HMAC_SECRET
      #   remoteRef:
      #     key: prod/slack-bot
      #     property: slack_link_hmac_secret
      # - secretKey: OAUTH2_CLIENT_SECRET
      #   remoteRef:
      #     key: prod/slack-bot
      #     property: oauth2_client_secret
      # - secretKey: KEYCLOAK_BOT_CLIENT_SECRET
      #   remoteRef:
      #     key: prod/slack-bot
      #     property: keycloak_bot_client_secret

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

######### Webex Bot Integration configuration #########
# Parallel to slack-bot: Webex spaces, identity linking, and OpenFGA ReBAC.
# Enable with Helm tag: webex-bot=true
webex-bot:
  image:
    repository: "ghcr.io/cnoe-io/caipe-webex-bot"
    tag: ""
    pullPolicy: "IfNotPresent"

  config:
    APP_NAME: "CAIPE"
    CAIPE_API_URL: ""
    WEBEX_WORKSPACE_ALIAS: "CAIPE-WEBEX"
    WEBEX_AGENT_ROUTES_MODE: "db_prefer"
    WEBEX_THREAD_CONTEXT_ENABLED: "true"
    WEBEX_THREAD_CONTEXT_MAX_MESSAGES: "10"
    WEBEX_THREAD_CONTEXT_MAX_CHARS: "4000"
    WEBEX_AUTO_ASSIGN_UNMAPPED_SPACES: "false"
    WEBEX_DEFAULT_TEAM_SLUG: ""
    WEBEX_DEFAULT_AGENT_ID: ""
    WEBEX_ADMIN_API_ENABLED: "false"
    WEBEX_ADMIN_API_HOST: "0.0.0.0"
    WEBEX_ADMIN_API_PORT: "3002"
    WEBEX_ADMIN_JWT_ISSUER: ""
    WEBEX_ADMIN_JWKS_URL: ""
    WEBEX_ADMIN_JWT_AUDIENCE: "caipe-webex-bot-admin"
    WEBEX_ADMIN_ALLOWED_CLIENT_IDS: "caipe-ui"
    KEYCLOAK_URL: ""
    KEYCLOAK_REALM: "caipe"
    OPENFGA_HTTP: ""
    OPENFGA_STORE_NAME: "caipe-openfga"

  # Wire OBO secret from Keycloak chart (see keycloak/templates/NOTES.txt).
  keycloakBot:
    clientSecretFromSecret:
      name: ""
      key: "KC_WEBEX_BOT_CLIENT_SECRET"

  existingSecret: "webex-bot-secrets"

  botConfig: {}

  externalSecrets:
    enabled: false
    apiVersion: "v1beta1"
    secretStoreRef:
      name: "vault"
      kind: "ClusterSecretStore"
    data: []

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

######### Keycloak Identity Provider configuration #########
# Keycloak provides RBAC, identity federation (upstream SSO broker),
# and token exchange (RFC 8693) for the Slack bot.
# Enable with tag: keycloak=true
keycloak:
  image:
    repository: "quay.io/keycloak/keycloak"
    tag: "26.3"
    pullPolicy: IfNotPresent

  # Admin credentials — auto-generated random password by default.
  # For prod: set admin.secretRef to an existing Secret, or enable
  # externalSecrets to pull from Vault / AWS Secrets Manager.
  admin:
    username: admin
    password: ""       # Leave empty for auto-generated 32-char password
    secretRef: ""      # Set to an existing K8s Secret name with keys: username, password

  realm:
    name: caipe
    sslRequired: "external"  # "none" for dev, "external" for prod

  # Keycloak features
  features:
    tokenExchange: true
    adminFineGrainedAuthz: true

  # Token exchange setup — enables bot impersonation via RFC 8693
  tokenExchange:
    enabled: true
    botClientId: "caipe-slack-bot"
  webexTokenExchange:
    enabled: true
    botClientId: "caipe-webex-bot"
  schedulerTokenExchange:
    enabled: true
    botClientId: "caipe-scheduler-runner"
    secretRef: ""

  # CAIPE platform OIDC client. Keep this Secret name aligned with
  # `caipe-ui.keycloakAdminClient.secretName`; the BFF reads it as
  # KEYCLOAK_ADMIN_CLIENT_SECRET, and the Keycloak init/reconcile Jobs
  # read the same value as KEYCLOAK_PLATFORM_CLIENT_SECRET.
  platformClient:
    secretRef: "caipe-platform-secret"

  # Upstream IDP broker (generic OIDC — works with Okta, Azure AD, Duo, etc.)
  # No vendor-specific credentials stored here.
  idp:
    enabled: false
    alias: ""              # e.g. "upstream-sso"
    displayName: ""        # e.g. "Enterprise SSO"
    issuer: ""             # OIDC issuer URL
    clientId: ""
    secretRef: ""          # K8s Secret with key: IDP_CLIENT_SECRET
    accessGroup: ""        # Optional upstream group reference; mirrored into idp_groups only
    adminGroup: ""         # Optional upstream admin group reference; map to OpenFGA admin via Identity Group Sync

  # External Secrets for admin password
  externalSecrets:
    enabled: false
    apiVersion: "v1beta1"
    secretStoreRef:
      name: "vault"
      kind: "ClusterSecretStore"
    data: []
      # - secretKey: password
      #   remoteRef:
      #     key: prod/keycloak
      #     property: admin_password

  service:
    type: ClusterIP
    port: 8080

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

######### OpenFGA Relationship PDP configuration #########
# OpenFGA stores team/resource tuples used by the UI and the AgentGateway
# ext_authz bridge. Enable for RBAC/ReBAC installs.
openfga:
  enabled: false
  image:
    repository: openfga/openfga
    tag: v1.15.1
    pullPolicy: IfNotPresent
  init:
    enabled: true
    storeName: caipe-openfga
    seedTuples: []
  datastore:
    engine: memory
    uriSecretRef:
      name: ""
      key: OPENFGA_DATASTORE_URI
  migrate:
    enabled: true

######### OpenFGA AgentGateway ext_authz bridge #########
# The bridge receives Envoy ext_authz checks from AgentGateway and performs
# OpenFGA Check calls. Enable alongside OpenFGA and AgentGateway.
openfgaAuthzBridge:
  enabled: false

# Values for the openfga-authz-bridge subchart. The separate camelCase block
# above is kept as the dependency condition flag.
openfga-authz-bridge:
  image:
    repository: ghcr.io/cnoe-io/openfga-authz-bridge
    tag: ""
    pullPolicy: IfNotPresent
  openfga:
    httpUrl: ""
    storeName: caipe-openfga
    relation: can_call
    object: mcp_gateway:list
  agentContext:
    existingSecret:
      name: ""
      key: CAIPE_AGENT_CONTEXT_HMAC_SECRET
  tokenValidation:
    jwksUrl: ""
    issuer: ""
    audiences: []
    algorithms:
      - RS256
  # Require caller-level `mcp_server:<id>#can_invoke` authorization only for
  # these AgentGateway MCP targets.
  restrictedMcpServers:
    - scheduler
  audit:
    enabled: true
    serviceUrl: ""
    tenantId: default
    subjectSalt: caipe-098-audit

######### RAG Stack configuration #########
# RAG Stack - Complete stack including web, server, agent, Redis, and Milvus
# Below values are only a subset of the values that are available in the rag-stack chart.
# For more values, please refer to the rag-stack chart values.yaml file.
rag-stack:
######### RAG Stack configuration #########
# RAG Stack - Complete stack including web, server, agent, Redis, and Milvus
# Below values are only a subset of the values that are available in the rag-stack chart.
# For more values, please refer to the rag-stack chart values.yaml file.
rag-stack:

  rag-server:
    enabled: true
    image:
      repository: "ghcr.io/cnoe-io/caipe-rag-server"
      # tag defaults to .Chart.AppVersion when not specified
      tag: ""
      pullPolicy: "IfNotPresent"
    env:
      RBAC_TEAM_SCOPE_ENABLED: "true"
      OPENFGA_STORE_NAME: "caipe-openfga"
      CAIPE_UNSAFE_RBAC_BYPASS: "false"

  agent-rag:
    enabled: true
    image:
      repository: "ghcr.io/cnoe-io/caipe-rag-agent-rag"
      # tag defaults to .Chart.AppVersion when not specified
      tag: ""
      pullPolicy: "IfNotPresent"

  agent-ontology:
    enabled: true

  neo4j:
    enabled: true

  rag-redis:
    enabled: true
    image:
      repository: "redis"
      tag: "7.2-alpine"
      pullPolicy: IfNotPresent
    persistence:
      enabled: false

  milvus:
    enabled: true
