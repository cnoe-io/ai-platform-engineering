mcp-slack:
  nameOverride: "mcp-slack"
  image:
    repository: "ghcr.io/cnoe-io/agent-slack"
    pullPolicy: "IfNotPresent"
  mcp:
    image:
      repository: "ghcr.io/korotovsky/slack-mcp-server"
      tag: "v1.2.3"
      pullPolicy: "IfNotPresent"
    mode: "http" # Options: stdio, http
    port: 3001
    agentgateway:
      enabled: false
      protocol: StreamableHTTP
    command: ["--transport", "http"]
    env:
      SLACK_MCP_HOST: "0.0.0.0"
      SLACK_MCP_PORT: "3001"
      # Message posting disabled by default for safety. Set to "true" to enable,
      # or restrict to specific channel IDs: "C123,C456" (whitelist), "!C789" (blacklist)
      # SLACK_MCP_ADD_MESSAGE_TOOL: "false"

mcp-aws:
  nameOverride: "mcp-aws"
  image:
    repository: "ghcr.io/cnoe-io/agent-aws"
    pullPolicy: "IfNotPresent"
  mcp:
    image:
      repository: "ghcr.io/cnoe-io/mcp-aws"
      # tag defaults to .Chart.AppVersion when not specified
      tag: ""
      pullPolicy: "IfNotPresent"
    mode: "http" # Options: stdio, http
    port: 8000
    agentgateway:
      enabled: false
      protocol: StreamableHTTP
  env:
    # -- Block kubectl get/describe secret(s) and redact Secret data from output. Defaults to true (on).
    RESTRICT_KUBECTL_SECRETS: "true"
    # -- Block kubectl proxy, which exposes the entire Kubernetes API server. Defaults to true (on).
    RESTRICT_KUBECTL_PROXY: "true"
    # -- Block kubectl exec (shell access inside pods). Defaults to false (off); enable for stricter environments.
    RESTRICT_KUBECTL_EXEC: "false"
    # -- Block kubectl attach (attach to a running process inside a pod). Defaults to false (off).
    RESTRICT_KUBECTL_ATTACH: "false"
    # -- Block kubectl cp (copy files out of pods). Defaults to false (off).
    RESTRICT_KUBECTL_CP: "false"
    # -- Block kubectl port-forward (tunnel internal services). Defaults to false (off).
    RESTRICT_KUBECTL_PORT_FORWARD: "false"

