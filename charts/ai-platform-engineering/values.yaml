tags:
  basic: false
  complete: false
  caipe-ui: false
  dynamic-agents: false
  autonomous-agents: false
  mcp-argocd: false
  mcp-aws: false
  mcp-backstage: false
  mcp-confluence: false
  mcp-github: false
  mcp-gitlab: false
  mcp-jira: false
  mcp-komodor: false
  mcp-pagerduty: false
  mcp-slack: false
  mcp-splunk: false
  mcp-victorops: false
  mcp-webex: false
  mcp-webex-meetings: false
  mcp-netutils: false
  rag-stack: false
  slack-bot: false
  webex-bot: false
  keycloak: false

# Global configuration shared across all subcharts
global:
  # -- Global image tag override. When set, overrides the default appVersion-based
  # image tag for ALL subcharts (MCP servers, dynamic agents, UI, etc.) in a single place.
  # Individual subchart `image.tag` values still take highest precedence.
  image:
    tag: ""
    # -- Image repository channel for maintained CAIPE images.
    # Empty means auto: rc/hotfix/dev chart appVersions use `pre-release/`,
    # final release appVersions use the root published image repositories.
    # Set to `pre-release` or `release` to force either repository channel.
    channel: ""

  # Scheduled Dynamic Agent runs. Enabling this installs the scheduler service,
  # cron runner integration, scheduler MCP, and UI server-side token wiring.
  # Dynamic Agents and Keycloak must also be enabled for executions to run.
  scheduler:
    enabled: false
    serviceTokenSecretName: "caipe-scheduler-service-token"
    serviceTokenSecretKey: "token"

  createLlmSecret: false # if true, llm secret will be created by the parent chart. Otherwise, expect existing llm secret
  llmSecrets:
    create: false # do not create llm secret in subcharts (use global or existing llm secret)
    secretName: "llm-secret"
  externalSecrets:
    enabled: false
    apiVersion: "v1beta1"  # API version for ExternalSecret resources. Options: "v1" or "v1beta1". Defaults to "v1beta1" if not specified.
  # RAG Stack configuration
  rag:
    enableGraphRag: true
    openfga:
      httpUrl: ""

  metrics:
    enabled: true

  # Global VPA config for all MCP server deployments.
  # Requires VPA to be installed in the cluster.
  # Do not enable alongside global autoscaling — VPA conflicts with HPA on CPU/memory scaling.
  # Setting initial resource requests (see resources: in each agent section) improves early VPA recommendations.
  # NOTE: per-agent opt-out via vpa.enabled=false is not supported (Helm cannot distinguish
  # "explicitly false" from the default "false"). To enable VPA selectively, keep global.vpa.enabled=false
  # and set vpa.enabled=true on individual agents instead.
  # Override global defaults per-agent with non-enabled fields:
  #   mcp-github:
  #     vpa:
  #       maxAllowed:
  #         cpu: 2
  #         memory: 2Gi
  vpa:
    enabled: false
    # "InPlaceOrRecreate" applies recommendations in-place (Kubernetes 1.29+) or recreates the pod.
    # Use "Off" for recommendations only (no restarts), or "Recreate" on older clusters.
    updateMode: "InPlaceOrRecreate"
    controlledResources: ["cpu", "memory"]
    controlledValues: "RequestsAndLimits"
    minAllowed:
      cpu: 50m
      memory: 128Mi
    maxAllowed: {}
    #   cpu: 2
    #   memory: 2Gi

  # VPA config for MCP server Deployments. Each MCP server runs as its own
  # Deployment and gets its own VPA resource.
  # Override per-agent by setting mcp.vpa under the relevant mcp-* section. Example:
  #   mcp-github:
  #     mcp:
  #       vpa:
  #         enabled: false   # disable VPA for github MCP only
  #         maxAllowed:
  #           cpu: 2
  #           memory: 2Gi
  mcp:
    vpa:
      enabled: false
      # "Off" = recommendations only (no restarts).
      # Use "InPlaceOrRecreate" (Kubernetes 1.29+) or "Recreate" to apply automatically.
      updateMode: "InPlaceOrRecreate"
      controlledResources: ["cpu", "memory"]
      controlledValues: "RequestsAndLimits"
      minAllowed:
        cpu: 50m
        memory: 128Mi
      maxAllowed: {}
      #   cpu: 2
      #   memory: 2Gi

  agentgateway:
    enabled: true
    # How AgentGateway MCP routing is provisioned. This controls whether the
    # umbrella chart renders Gateway API / AgentGateway custom resources.
    #
    #   static (default): render NO custom resources. MCP routes are written into
    #     the standalone AgentGateway proxy's static config instead (the
    #     `agentgateway` subchart must be enabled). This requires no CRDs and no
    #     cluster-admin controller install, so it is safe on clusters you do not
    #     own and keeps `helm diff`/`helm upgrade` clean. MCP endpoints are still
    #     discoverable via the proxy admin /config endpoint (the CAIPE UI
    #     discover/sync flow reads from there). This is the default so enabling
    #     AgentGateway never depends on cluster-scoped CRDs.
    #
    #   gateway-api: render Gateway, HTTPRoute, AgentgatewayBackend and
    #     AgentgatewayPolicy custom resources. Requires these CRDs + an
    #     AgentGateway/Gateway API controller to be installed in the cluster:
    #       gateways.gateway.networking.k8s.io
    #       httproutes.gateway.networking.k8s.io
    #       agentgatewaybackends.agentgateway.dev
    #       agentgatewaypolicies.agentgateway.dev
    routingMode: static
    # Set to true only if Istio CRDs are NOT already present in the cluster.
    # If Istio is already installed (any version), leave this false to avoid conflicts.
    installIstioCrds: false
    # Port for the agentgateway proxy listener (Gateway resource)
    proxyPort: 8080
    # Static routing mode only: listener-level JWT validation for the standalone
    # proxy. Disabled by default so plain (non-RBAC) installs route MCP traffic
    # without requiring an IdP. When enabled, mirrors the Gateway API jwtAuth
    # listener policy.
    static:
      jwtAuth:
        enabled: false
        issuer: ""
        jwksUrl: ""
        audiences: []
      # Dynamic MCP route reconciliation (static routing mode only).
      #
      # When enabled, a config-bridge sidecar runs alongside the standalone
      # AgentGateway proxy and reconciles runtime-added MCP servers from the BFF
      # internal target API into the proxy config so
      # they receive a /mcp/<id> route WITHOUT a `helm upgrade` / values change.
      #
      # How it works:
      #   - The Helm-rendered static config (jwtAuth + extraMcpTargets) is the
      #     bootstrap/seed; an initContainer seeds a shared emptyDir so the
      #     proxy always starts with a valid config.
      #   - The sidecar polls the BFF target API and writes /mcp/<id> routes into
      #     that shared file; the proxy hot-reloads on change.
      #
      # NOTE: route discovery only — it does NOT affect JWT authentication
      # (jwtAuth). Ignored in `gateway-api` routing mode (CRDs manage routes).
      configBridge:
        enabled: true
        image:
          repository: ghcr.io/cnoe-io/agentgateway-config-bridge
          tag: ""              # defaults to agentgateway subchart appVersion
          pullPolicy: IfNotPresent
        pollSeconds: 5
        # gRPC host:port of the OpenFGA authz bridge used as ext_authz on every
        # discovered MCP route (passed to the bridge as AGENTGATEWAY_AUTHZ_HOST).
        # Defaults to <release>-openfga-authz-bridge:9100 (matches the Helm-rendered
        # service name and the static-config generator). Leave empty unless the
        # authz bridge runs under a non-default service name or port.
        authzHost: ""
        ui:
          # Internal BFF route that publishes sanitized AgentGateway MCP targets.
          url: ""              # defaults to http://<release>-caipe-ui:3000/api/internal/agentgateway/mcp-targets
          existingSecret:
            # REQUIRED when configBridge is enabled and externalSecret is not used.
            # Name of a pre-existing Secret containing AGENTGATEWAY_TARGETS_TOKEN.
            # The same secret must be accessible to caipe-ui (via caipe-ui.existingSecret
            # or caipe-ui.externalSecrets) so both sides share the token.
            # Generate and create:
            #   TOKEN=$(openssl rand -base64 32)
            #   kubectl create secret generic <name> --from-literal=AGENTGATEWAY_TARGETS_TOKEN=$TOKEN
            name: ""
            key: AGENTGATEWAY_TARGETS_TOKEN
          # ESO alternative: when enabled, the External Secrets Operator creates the
          # token secret from an external store (Vault, AWS SM, etc.).
          # existingSecret.name is not required when this is enabled.
          # Independent of global.externalSecrets.enabled.
          externalSecret:
            enabled: false
            # apiVersion: v1beta1        # defaults to global.externalSecrets.apiVersion
            # refreshInterval: "1h"
            # secretStoreRef:            # defaults to global.externalSecrets.secretStoreRef
            #   name: vault
            #   kind: ClusterSecretStore
            data: []
            # - secretKey: AGENTGATEWAY_TARGETS_TOKEN
            #   remoteRef:
            #     key: dev/agentgateway-config-bridge
            #     property: AGENTGATEWAY_TARGETS_TOKEN
        # securityContext: {}  # optional; defaults to agentgateway.securityContext
        # resources: {}        # optional; defaults to agentgateway.resources
        extraEnv: []
    extAuth:
      enabled: false
      serviceName: ""
      serviceNamespace: ""
      port: 9100
      # Per-route external-authorization (ext_authz) request timeout applied by
      # the AgentGateway proxy (static routing). The proxy's built-in default is
      # 200ms: listing tools fires one ext_authz Check per MCP route
      # concurrently, and against a cold/loaded OpenFGA those serialize and blow
      # the 200ms budget, returning fail-closed 403s that surface in the UI as
      # "MCP server unavailable". 10s is generous headroom while still bounding
      # a stuck call. Raising this does NOT change the fail-closed posture.
      # NOTE: the opt-in Gateway-API/CRD routing path (routingMode: gateway-api)
      # has no AgentgatewayPolicy timeout field; tune it there via the
      # ext_authz backend `requestTimeout` instead.
      timeout: "10s"
    # Built-in Knowledge Base MCP route. This keeps the Dynamic Agents
    # `knowledge-base` MCP server ID aligned with the RAG server MCP backend
    # when AgentGateway is enabled in the umbrella chart.
    knowledgeBaseTarget:
      enabled: true
      host: "rag-server.{{ .Release.Namespace }}.svc.cluster.local"
      port: 9446
      protocol: StreamableHTTP
      pathPrefix: /mcp/knowledge-base
      providerTokenAuth: true
    # GitHub MCP server — official GitHub MCP server container.
    # Routes /mcp/github-mcp-server -> the in-cluster Deployment.
    # The Deployment is enabled by this same section; keep it opt-in because
    # the official GitHub MCP server needs a GitHub PAT secret at startup.
    # When enabled, GITHUB_PERSONAL_ACCESS_TOKEN is injected from
    # existingSecret; Helm fails early if the secret name is omitted.
    githubMcpServer:
      enabled: false
      image:
        repository: ghcr.io/github/github-mcp-server
        # Multi-arch index digest inspected from ghcr.io/github/github-mcp-server:latest.
        tag: latest@sha256:5c83359327a0bacc3d34db730bea6557d39d341cee0bf6c58c9a896e33150e80
        pullPolicy: IfNotPresent
      port: 8082
      pathPrefix: /mcp/github-mcp-server
      # Secret containing GITHUB_PERSONAL_ACCESS_TOKEN.
      existingSecret:
        name: ""   # e.g. "github-mcp-secret"
        key: GITHUB_PERSONAL_ACCESS_TOKEN
    # Additional MCP routes that are not rendered from `mcp-*` subcharts.
    # Use this for platform MCP endpoints such as RAG/Knowledge Base.
    # Each item renders one AgentgatewayBackend and one HTTPRoute:
    #   /mcp/<id> -> static host:port using the requested MCP protocol.
    #
    # Example:
    # extraMcpTargets:
    #   - id: knowledge-base
    #     host: "{{ .Release.Name }}-rag-server.{{ .Release.Namespace }}.svc.cluster.local"
    #     port: 9446
    #     protocol: StreamableHTTP
    #     pathPrefix: /mcp/knowledge-base
    #     # Optional: set providerTokenAuth directly, or declare header-targeted
    #     # credential_sources and the chart derives the AgentGateway transform.
    #    #     providerTokenAuth: false
    #     # credential_sources:
    #     #   - kind: caller_token
    #     #     name: X-CAIPE-Provider-Token
    #     #     target: header
    extraMcpTargets: []

  # OpenFGA service discovery defaults for CAIPE components that perform
  # relationship-based authorization or reconciliation.
  openfga:
    httpUrl: ""
    storeName: "caipe-openfga"

agentgateway:
  enabled: true
  image:
    repository: cr.agentgateway.dev/agentgateway
    tag: v1.1.0
    pullPolicy: IfNotPresent
  # Secret-backed environment for backend auth placeholders used by the
  # standalone AgentGateway config, for example:
  #   backendAuth:
  #     key: "$GITHUB_PERSONAL_ACCESS_TOKEN"
  #     key: "$GITLAB_PERSONAL_ACCESS_TOKEN"
  extraEnv: []
  # - name: GITHUB_PERSONAL_ACCESS_TOKEN
  #   valueFrom:
  #     secretKeyRef:
  #       name: github-mcp-secret
  #       key: GITHUB_PERSONAL_ACCESS_TOKEN
  # - name: GITLAB_PERSONAL_ACCESS_TOKEN
  #   valueFrom:
  #     secretKeyRef:
  #       name: gitlab-mcp-secret
  #       key: GITLAB_PERSONAL_ACCESS_TOKEN
  extraEnvFrom: []

  # Standalone cisco-ai-defense/skill-scanner microservice. The CAIPE UI
  # uploads zipped SKILL packages to this Service for safety scanning.
  # Disabled by default; enable when you want the scanner running in
  # cluster (recommended for any production deployment that exposes the
  # Skills builder).
  #
  # When `enabled: true` the parent chart automatically wires the
  # in-cluster URL into the caipe-ui ConfigMap (see `caipe-ui.config`
  # below) — no manual `caipe-ui.config.SKILL_SCANNER_URL` override is
  # required for the standard install. Override it there only if you
  # want to point the UI at a scanner running outside this release.
  #
  # The scanner is unauthenticated by design — Service stays ClusterIP.
  skillScanner:
    enabled: false

# ServiceMonitor for scraping all ai-platform-engineering components
# For agent metrics endpoints, use global.metrics.enabled above
metrics:
  # Path for metrics endpoint
  path: "/metrics"
  # ServiceMonitor configuration for Prometheus Operator
  serviceMonitor:
    # Enable ServiceMonitor for automatic Prometheus scraping
    # This creates ONE ServiceMonitor that scrapes ALL ai-platform-engineering services
    enabled: false
    # Scrape interval
    interval: "30s"
    # Scrape timeout
    scrapeTimeout: "10s"
    # Additional labels for the ServiceMonitor (e.g., to match Prometheus selector)
    # Example: labels: { release: prometheus }
    labels: {}
    # Additional annotations for the ServiceMonitor
    annotations: {}
    # Relabelings for metrics
    relabelings: []
    # Metric relabelings
    metricRelabelings: []
  grafanaDashboard:
    enabled: true
    # Labels for Grafana sidecar dashboard discovery
    # Override to match your Grafana sidecar configuration (e.g., grafana_dashboard: "local")
    labels:
      grafana_dashboard: "1"

# Extra Kubernetes resources to deploy
extraDeploy: []

# ---------------------------------------------------------------------------
# Live-skills command template (rendered as the `/skills` slash command
# in the "Skills Gateway" UI page). Customizable per-deployment.
#
# Resolution order (mirrors promptConfig):
#   1. .Values.skillsLiveSkills          - inline multi-line string (highest)
#   2. .Values.skillsLiveSkillsName      - selects data/skills/live-skills.<name>.md
#   3. data/skills/live-skills.md         - packaged default
#
# The template supports the following placeholders, substituted by the UI:
#   {{COMMAND_NAME}} - slash command name (default: "skills")
#   {{DESCRIPTION}}  - short description shown in the slash-command picker
#   {{BASE_URL}}     - gateway base URL (auto-detected from window.location)
# ---------------------------------------------------------------------------
skillsLiveSkillsName: ""       # Variant name (looks up data/skills/live-skills.<name>.md)
skillsLiveSkills: ""           # Inline custom live-skills skill (overrides everything)

######### MCP server configurations #########
# Each mcp-* block configures one MCP server (alias from Chart.yaml).

mcp-argocd:
  nameOverride: "mcp-argocd"
  image:
    repository: "ghcr.io/cnoe-io/mcp-argocd"
    pullPolicy: "IfNotPresent"
  mcp:
    image:
      repository: "ghcr.io/cnoe-io/mcp-argocd"
      # tag defaults to .Chart.AppVersion when not specified
      tag: ""
      pullPolicy: "IfNotPresent"
    mode: "http" # Options: stdio, http
    port: 8000
    # Route MCP traffic through agentgateway proxy (requires global.agentgateway.enabled).
    # When enabled, subagent MCP calls go through the agentgateway proxy which can
    # enforce JWT validation and ext_authz decisions backed by OpenFGA.
    agentgateway:
      enabled: false
      protocol: StreamableHTTP # SSE or StreamableHTTP

mcp-backstage:
  nameOverride: "mcp-backstage"
  image:
    repository: "ghcr.io/cnoe-io/agent-backstage"
    pullPolicy: "IfNotPresent"
  mcp:
    image:
      repository: "ghcr.io/cnoe-io/mcp-backstage"
      # tag defaults to .Chart.AppVersion when not specified
      tag: ""
      pullPolicy: "IfNotPresent"
    mode: "http" # Options: stdio, http
    port: 8000
    agentgateway:
      enabled: false
      protocol: StreamableHTTP

mcp-confluence:
  nameOverride: "mcp-confluence"
  image:
    repository: "ghcr.io/cnoe-io/agent-confluence"
    pullPolicy: "IfNotPresent"
  mcp:
    image:
      repository: "ghcr.io/sooperset/mcp-atlassian"
      tag: "latest"
      pullPolicy: "IfNotPresent"
    mode: "http" # Options: stdio, http
    port: 8000
    agentgateway:
      enabled: false
      protocol: StreamableHTTP
    env:
      TRANSPORT: "streamable-http"

mcp-github:
  nameOverride: "mcp-github"
  image:
    repository: "ghcr.io/cnoe-io/mcp-github"
    pullPolicy: "IfNotPresent"
  mcp:
    mode: "stdio"
    useRemoteMcpServer: false
    agentgateway:
      enabled: false
      protocol: StreamableHTTP
      # Rewrite X-CAIPE-Provider-Token into Authorization: Bearer for per-caller OAuth/PAT passthrough.
      providerTokenAuth: true

mcp-gitlab:
  nameOverride: "mcp-gitlab"
  image:
    repository: "ghcr.io/cnoe-io/agent-gitlab"
    pullPolicy: "IfNotPresent"
  env:
    GIT_AUTHOR_NAME: "AI Agent"
    GIT_AUTHOR_EMAIL: "ai-agent@cnoe.io"
    GIT_COMMITTER_NAME: "AI Agent"
    GIT_COMMITTER_EMAIL: "ai-agent@cnoe.io"
  mcp:
    image:
      repository: "zereight050/gitlab-mcp"
      tag: "latest"
      pullPolicy: "IfNotPresent"
    mode: "http" # Options: stdio, http
    port: 8000
    agentgateway:
      enabled: false
      protocol: StreamableHTTP
      # Rewrite X-CAIPE-Provider-Token into Authorization: Bearer for per-caller OAuth/PAT passthrough.
      providerTokenAuth: true
    env:
      STREAMABLE_HTTP: "true"
      HOST: "0.0.0.0"
      PORT: "8000"
      MAX_SESSIONS: "1000"
      MAX_REQUESTS_PER_MINUTE: "60"
      USE_PIPELINE: "true"
      # GITLAB_API_URL and GITLAB_PERSONAL_ACCESS_TOKEN should come from agentSecrets
      # Option 1: Simple read-only mode (blocks all write operations)
      GITLAB_READ_ONLY_MODE: "true"
      # Option 2: Fine-grained control via regex (uncomment and customize)
      # Tool filtering via regex. Uses ^ for prefix matching.
      # Example patterns:
      #
      # READ-ONLY - blocks all write operations:
      #   ^(delete_|remove_|create_|fork_|new_|update_|edit_|merge_|push_|publish_|retry_|cancel_|play_|promote_|upload_|resolve_|bulk_)|^(execute_graphql)$
      #
      # ALLOW CREATE - blocks delete/update:
      #   ^(delete_|remove_|update_|edit_|merge_|push_|publish_|retry_|cancel_|play_|promote_|upload_|resolve_|bulk_)|^(execute_graphql)$
      #
      # ALLOW UPDATE - blocks delete/create:
      #   ^(delete_|remove_|create_|fork_|new_)|^(execute_graphql)$
      #
      # ALLOW CREATE + UPDATE - blocks only delete:
      #   ^(delete_|remove_)|^(execute_graphql)$
      #
      # To block specific tools, add them as exact matches: |^(tool1|tool2)$
      # Example: ...|^(execute_graphql|approve_merge_request|unapprove_merge_request)$
      #
      # Note: execute_graphql is always blocked as it bypasses prefix-based permission controls
      #
      # GITLAB_DENIED_TOOLS_REGEX: "^(delete_|remove_|create_|fork_|new_|update_|edit_|merge_|push_|publish_|retry_|cancel_|play_|promote_|upload_|resolve_|bulk_)|^(execute_graphql)$"

