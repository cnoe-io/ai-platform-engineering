# Secret for your global LLM provider
global:
  createLlmSecret: false
  externalSecrets:
    enabled: false
  llmSecrets:
    create: false
    secretName: "existing-llm-secret" # Specify an existing Kubernetes secret name, or leave empty to auto-generate from values-secrets.yaml
  agentSecrets:
    create: false

# Agent specific secrets
