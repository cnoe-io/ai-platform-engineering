# Secret for your global LLM provider
global:
  createLlmSecret: false
  externalSecrets:
    enabled: false
  llmSecrets:
    create: false
    secretName: "existing-llm-secret" # Specify an existing Kubernetes secret name, or leave empty to auto-generate from values-secrets.yaml
    # Central LLM routing (llmRouting.litellm.enabled=true): the parent chart only auto-injects
    # LLM_PROVIDER / OPENAI_ENDPOINT into a Helm-GENERATED llm-secret. With an existing secret,
    # Helm does not touch it, so this secret MUST already contain the routing keys:
    #   LLM_PROVIDER=openai
    #   OPENAI_ENDPOINT=http://<release-name>-litellm:4000/v1   # in-stack proxy, or your BYO proxy
    #   OPENAI_API_KEY=<shared credential>                      # also the proxy master_key
  agentSecrets:
    create: false

# Agent specific secrets
mcp-argocd:
  agentSecrets:
    secretName: "existing-argocd-secret" # Specify an existing Kubernetes secret name, or leave empty to auto-generate from values-secrets.yaml

