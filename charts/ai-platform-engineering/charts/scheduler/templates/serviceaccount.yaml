{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "scheduler.serviceAccountName" . }}
  labels:
    {{- include "scheduler.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}
{{- if .Values.cronRunnerServiceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "scheduler.cronRunnerServiceAccountName" . }}
  labels:
    {{- include "scheduler.labels" . | nindent 4 }}
    app.kubernetes.io/component: cron-runner
# cron-runner pods do not need a projected service-account token; their only
# auth is the chat API token + scheduler service token mounted as env vars
# from Secrets.
automountServiceAccountToken: false
{{- end }}
