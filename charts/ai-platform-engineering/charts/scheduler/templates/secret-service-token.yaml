{{- if not .Values.serviceToken.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "scheduler.serviceTokenSecretName" . }}
  labels:
    {{- include "scheduler.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.serviceToken.existingSecretKey | default "token" }}: {{ required "scheduler.serviceToken.value or scheduler.serviceToken.existingSecret must be set" .Values.serviceToken.value | quote }}
{{- end }}
