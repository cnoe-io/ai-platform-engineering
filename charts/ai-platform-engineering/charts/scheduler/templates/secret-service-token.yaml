{{- if not .Values.serviceToken.existingSecret }}
{{- $secretName := include "scheduler.serviceTokenSecretName" . }}
{{- $secretKey := include "scheduler.serviceTokenSecretKey" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "scheduler.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.serviceToken.value }}
  {{ $secretKey }}: {{ .Values.serviceToken.value | b64enc | quote }}
  {{- else if and $existing (hasKey $existing.data $secretKey) }}
  {{ $secretKey }}: {{ index $existing.data $secretKey | quote }}
  {{- else }}
  {{ $secretKey }}: {{ randAlphaNum 48 | b64enc | quote }}
  {{- end }}
{{- end }}
