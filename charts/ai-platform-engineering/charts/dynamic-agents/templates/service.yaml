apiVersion: v1
kind: Service
metadata:
  name: {{ include "dynamic-agents.fullname" . }}
  labels:
    {{- include "dynamic-agents.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if eq (include "dynamic-agents.metricsPortSeparate" .) "true" }}
    - port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
    {{- end }}
  selector:
    {{- include "dynamic-agents.selectorLabels" . | nindent 4 }}
