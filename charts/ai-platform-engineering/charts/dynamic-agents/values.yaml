# Default values for dynamic-agents
# This is a YAML-formatted file.

# Override the chart name
nameOverride: ""
fullnameOverride: ""

# Container image configuration
image:
  repository: "ghcr.io/cnoe-io/caipe-dynamic-agents"
  pullPolicy: "Always"
  # tag defaults to .Chart.AppVersion when not specified
  tag: ""

# Secrets for pulling images from private repositories
imagePullSecrets: []

# Service account configuration
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Pod annotations and labels
podAnnotations: {}
podLabels: {}

# Security contexts are set to satisfy the Kubernetes Pod Security Standards Baseline
# profile (enforced) and meet all Restricted profile requirements except
# readOnlyRootFilesystem, which is left false because agent workloads may write to
# /tmp at runtime. To enforce the policy at the namespace level:
#   kubectl label namespace <ns> \
#     pod-security.kubernetes.io/enforce=baseline \
#     pod-security.kubernetes.io/warn=restricted \
#     pod-security.kubernetes.io/audit=restricted
podSecurityContext:
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1001
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  seccompProfile:
    type: RuntimeDefault

# Service configuration
service:
  type: ClusterIP
  port: 8001
  # Dedicated port for the /metrics endpoint. 0 (default) serves metrics on
  # `port` above — current behavior, unchanged. Set to a different port to
  # split metrics onto its own container/service port, e.g. so the main API
  # port can run strict mTLS while metrics stays on a permissive port for
  # scrapers that don't support mTLS client certs.
  metricsPort: 0

# Ingress configuration
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: dynamic-agents.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Replica configuration
replicaCount: 1
revisionHistoryLimit: 3

# Resource limits and requests
resources: {}

# Health probes
startupProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

livenessProbe:
  httpGet:
    path: /health
    port: http
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

# VPA configuration. Requires VPA to be installed in the cluster.
# Cannot be enabled alongside autoscaling (VPA conflicts with HPA on CPU/memory scaling).
# Inherits global.vpa defaults; override any field here to customise for dynamic-agents.
vpa:
  enabled: false
  updateMode: "InPlaceOrRecreate"
  controlledResources: ["cpu", "memory"]
  controlledValues: "RequestsAndLimits"
  minAllowed:
    cpu: 50m
    memory: 128Mi
  maxAllowed: {}

volumes: []
volumeMounts: []
nodeSelector: {}
tolerations: []
affinity: {}

# PodDisruptionBudget: prevents simultaneous eviction of all replicas during voluntary disruptions.
# Enable in production; leave disabled for local/single-node environments.
podDisruptionBudget:
  enabled: false
  maxUnavailable: 1
  # minAvailable: 1  # alternative: require at least N pods available (multi-replica only)
  annotations: {}

# ConfigMap for non-sensitive configuration
config:
  # ─── Keycloak / OIDC (REQUIRED in production) ───────────────────────────
  # The dynamic-agents service validates every incoming Bearer token against
  # Keycloak's JWKS endpoint (see dynamic_agents.auth.jwks_validate). Two
  # env vars MUST be set whenever the cluster's in-network Keycloak URL is
  # different from the public, browser-facing issuer (the typical
  # production topology):
  #
  #   KEYCLOAK_URL  — in-cluster service URL the pod uses for JWKS fetch
  #                   (e.g. http://<release-name>-keycloak:8080).
  #                   When unset, the code falls back to
  #                   http://localhost:7080 which is a CONNECTION-REFUSED
  #                   trap inside a Kubernetes pod.
  #
  #   OIDC_ISSUER   — public issuer string that MUST exactly match the
  #                   `iss` claim Keycloak puts in the JWT (driven by
  #                   KC_HOSTNAME on the Keycloak side, e.g.
  #                   https://idp.example.com/realms/caipe). When unset,
  #                   the code derives the issuer from KEYCLOAK_URL and
  #                   token validation fails with InvalidIssuerError if
  #                   the in-cluster URL ≠ public issuer.
  #
  # NOTES.txt prints a warning on `helm install` if both of these are
  # empty — see templates/NOTES.txt.
  KEYCLOAK_URL: ""
  OIDC_ISSUER: ""
  # OpenFGA authorization service URL (in-cluster default matches umbrella chart release name)
  OPENFGA_HTTP: ""
  OPENFGA_STORE_NAME: "caipe-openfga"
  # MongoDB database name (uses same DB as CAIPE UI)
  MONGODB_DATABASE: "caipe"
  # Connections & Secrets credential exchange client. Disabled by default.
  CAIPE_CREDENTIALS_ENABLED: "false"
  CREDENTIAL_API_URL: ""
  CREDENTIAL_SERVICE_AUDIENCE: "caipe-credential-service"
  USE_IMPERSONATION_TOKENS: "false"
  # Agent runtime TTL in seconds (purged after this much inactivity)
  AGENT_RUNTIME_TTL_SECONDS: "60"
  # Set to "true" to enable multi-turn conversation history via POST /invoke.
  # When false (default), each /invoke call uses an ephemeral in-memory runtime
  # with no MongoDB writes. Enable only if callers reuse conversation_id across
  # /invoke calls and require history — it increases MongoDB load.
  INVOKE_PERSIST_HISTORY: "false"
  # CORS origins (JSON array format for Pydantic)
  CORS_ORIGINS: '["*"]'
  # MCP server IDs routed through AgentGateway. Use "all" because AgentGateway
  # uses one route/backend per MCP server in the packaged RBAC deployment.
  AGENT_GATEWAY_MCP_SERVER_IDS: "all"
  # Tracing disabled by default
  ENABLE_TRACING: "false"
  # Strip skill payloads (SKILL.md bodies, ancillary files,
  # skills_metadata channel) and task_config workflow prompts
  # (tasks/todos channels, workflow tool IO) from OTel spans
  # before they ship to Langfuse. Has no effect when ENABLE_TRACING
  # is false. Set to "false" for one-off debug sessions only.
  SKILL_TRACE_SCRUB_ENABLED: "true"
  # Defensive per-attribute byte cap to keep OTel spans under
  # Langfuse's 1 MiB nginx body limit even when non-skill
  # attributes (tool defs, message history) blow up. 256 KiB
  # default. Set to "0" to disable.
  SKILL_TRACE_MAX_ATTR_BYTES: "262144"

agentContext:
  # Secret shared with openfga-authz-bridge for signed agent_id context headers.
  # Leave empty to enforce only the coarse user mcp_gateway:list gate.
  existingSecret:
    name: ""
    key: CAIPE_AGENT_CONTEXT_HMAC_SECRET

# Pre-existing secret with MONGODB_URI and other sensitive values
# Dynamic-agents uses the same MongoDB as CAIPE UI, so you can reference
# the same secret or create a separate one with the connection string
existingSecret: ""

# LLM secret containing LLM_PROVIDER, API keys, and model configuration
# This secret is typically shared across CAIPE components
llmSecret: ""

# External Secrets configuration
externalSecrets:
  enabled: false
  apiVersion: "v1beta1"
  secretStoreRef:
    name: "vault"
    kind: "ClusterSecretStore"
  data: []

