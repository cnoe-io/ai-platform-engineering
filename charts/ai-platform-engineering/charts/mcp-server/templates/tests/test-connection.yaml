{{- if include "agent.createMcpHttpServer" . | eq "true" }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "agent.fullname" . }}-test-connection"
  labels:
    {{- include "agent.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "agent.fullname" . }}:{{ .Values.mcp.service.port | default 8000 }}']
  restartPolicy: Never
{{- end }}
