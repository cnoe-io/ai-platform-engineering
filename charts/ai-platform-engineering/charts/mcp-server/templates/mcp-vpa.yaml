{{- /*
  VPA for the standalone MCP HTTP server Deployment.
  Mirrors mcp-deployment.yaml conditions exactly.
*/ -}}
{{- if include "agent.createMcpHttpServer" . | eq "true" }}
{{- $globalVpa := dig "vpa" dict .Values.global }}
{{- $vpaEnabled := or .Values.vpa.enabled (and $globalVpa $globalVpa.enabled) }}
{{- if $vpaEnabled }}
{{- $vpa := mergeOverwrite (deepCopy $globalVpa) .Values.vpa }}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "agent.fullname" . }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "agent.fullname" . }}
  updatePolicy:
    updateMode: {{ $vpa.updateMode | quote }}
  resourcePolicy:
    containerPolicies:
      - containerName: mcp
        controlledResources: {{ $vpa.controlledResources | toJson }}
        controlledValues: {{ $vpa.controlledValues | quote }}
        {{- with $vpa.minAllowed }}
        minAllowed:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with $vpa.maxAllowed }}
        maxAllowed:
          {{- toYaml . | nindent 10 }}
        {{- end }}
{{- end }}
{{- end }}
