apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentgateway.fullname" . }}
  labels:
    {{- include "agentgateway.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
    - name: admin
      port: {{ .Values.service.adminPort }}
      targetPort: admin
      protocol: TCP
    - name: stats
      port: {{ .Values.service.statsPort }}
      targetPort: stats
      protocol: TCP
  selector:
    {{- include "agentgateway.selectorLabels" . | nindent 4 }}
