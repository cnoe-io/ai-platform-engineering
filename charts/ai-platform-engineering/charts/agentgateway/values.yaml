replicaCount: 1

image:
  repository: cr.agentgateway.dev/agentgateway
  tag: v1.1.0
  pullPolicy: IfNotPresent

extraEnv: []
# - name: GITHUB_PERSONAL_ACCESS_TOKEN
#   valueFrom:
#     secretKeyRef:
#       name: github-mcp-secret
#       key: GITHUB_PERSONAL_ACCESS_TOKEN
# - name: GITLAB_PERSONAL_ACCESS_TOKEN
#   valueFrom:
#     secretKeyRef:
#       name: gitlab-mcp-secret
#       key: GITLAB_PERSONAL_ACCESS_TOKEN

extraEnvFrom: []
# - secretRef:
#     name: agentgateway-secrets

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 4000
  adminPort: 15000
  statsPort: 15020

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: agentgateway.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

config:
  binds:
    - port: 4000
      listeners:
        - protocol: HTTP
          routes: []
  config:
    adminAddr: 0.0.0.0:15000
    logging:
      level: info
      format: json

# Config-bridge sidecar (static routing mode only).
#
# This feature is configured from the UMBRELLA chart under
# `global.agentgateway.static.configBridge` (alongside jwtAuth / extAuth /
# extraMcpTargets), since it depends on the umbrella-rendered static config.
# See charts/ai-platform-engineering/values.yaml for the full schema.
#
# The bridge containers reuse this subchart's `securityContext` and
# `resources` by default; override via
# `global.agentgateway.static.configBridge.{securityContext,resources}`.

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# PodDisruptionBudget: prevents simultaneous eviction of all replicas during voluntary disruptions.
# Enable in production; leave disabled for local/single-node environments.
podDisruptionBudget:
  enabled: false
  maxUnavailable: 1
  # minAvailable: 1  # alternative: require at least N pods available (multi-replica only)
  annotations: {}
