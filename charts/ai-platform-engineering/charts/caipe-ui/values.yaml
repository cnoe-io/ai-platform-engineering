# Default values for caipe-ui
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: "ghcr.io/cnoe-io/caipe-ui"
  pullPolicy: "Always"
  # tag defaults to .Chart.AppVersion when not specified
  tag: ""

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

# Security contexts are set to satisfy the Kubernetes Pod Security Standards Baseline
# profile (enforced) and meet all Restricted profile requirements except
# readOnlyRootFilesystem, which is left false because the application may write to
# /tmp at runtime. To enforce the policy at the namespace level:
#   kubectl label namespace <ns> \
#     pod-security.kubernetes.io/enforce=baseline \
#     pod-security.kubernetes.io/warn=restricted \
#     pod-security.kubernetes.io/audit=restricted
podSecurityContext:
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1001
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  seccompProfile:
    type: RuntimeDefault

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 3000

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: caipe-ui.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: caipe-ui-tls
  #    hosts:
  #      - caipe-ui.local

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the number of old ReplicaSets to retain for rollback
# Kubernetes will automatically clean up ReplicaSets beyond this limit
revisionHistoryLimit: 3

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
startupProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30
livenessProbe:
  httpGet:
    path: /api/health
    port: http
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /api/health
    port: http
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# VPA configuration. Requires VPA to be installed in the cluster.
# Cannot be enabled alongside autoscaling (VPA conflicts with HPA on CPU/memory scaling).
# Inherits global.vpa defaults; override any field here to customise for caipe-ui.
vpa:
  enabled: false
  updateMode: "InPlaceOrRecreate"
  controlledResources: ["cpu", "memory"]
  controlledValues: "RequestsAndLimits"
  minAllowed:
    cpu: 50m
    memory: 128Mi
  maxAllowed: {}

# Additional init containers for the Deployment.
# Runs before the main container starts. Useful for pre-creating directories
# needed by subPath volume mounts on runtimes (e.g. kind) that do not
# auto-create missing parent paths.
initContainers: []
# - name: init-skill-dirs
#   image: busybox:1.36
#   command: ["sh", "-c", "mkdir -p /data/skills/my-skill"]
#   volumeMounts:
#     - name: skill-data-dir
#       mountPath: /data

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

# Non-sensitive application configuration.
# Each key-value pair is injected as a flat environment variable via ConfigMap (envFrom).
# For sensitive values (OIDC secrets, MongoDB URI, etc.) use existingSecret or externalSecrets below.
config:
  # Feature flags
  ENABLE_SUBAGENT_CARDS: "true"
  SSO_ENABLED: "true"
  # Built-in skill IDs to seed (comma-separated whitelist).
  # "none" (default) disables auto-seeding entirely — use "Import template skills"
  # in the Skills UI to load templates explicitly. Set to a comma-separated list
  # of template IDs to seed only those; leave empty to seed all built-in templates.
  BUILTIN_SKILL_IDS: "none"
  # NextAuth URL (non-sensitive)
  NEXTAUTH_URL: "http://localhost:3000"
  # Node environment
  NODE_ENV: "production"
  # Production-safety gate for the BFF admin-token fallback path.
  #
  # When `KEYCLOAK_ADMIN_CLIENT_ID/SECRET` are unset (or client_credentials
  # returns 401), `ui/src/lib/rbac/keycloak-admin.ts` historically fell back
  # to `password / admin-cli / admin / admin` against `/realms/master`. In
  # a misconfigured cluster where Keycloak still has its bootstrap admin
  # password, this is master-realm admin escalation from the BFF.
  #
  # As of R1, the fallback is gated:
  #   - In production (`NODE_ENV=production`, which is the chart default),
  #     the BFF refuses to fall back and throws a configuration error so
  #     the misconfiguration is loud instead of latent.
  #   - In dev (`NODE_ENV != "production"`), the fallback is allowed so
  #     local docker-compose / make targets keep working out of the box.
  #   - Either default can be overridden with this flag:
  #     - `"true"`  → fallback enabled regardless of `NODE_ENV`
  #     - `"false"` → fallback disabled regardless of `NODE_ENV`
  #     - `""` (default) → behavior determined by `NODE_ENV`.
  #
  # Leave empty in production. Set to `"true"` only in throwaway clusters
  # where the Keycloak bootstrap admin password is known not to be the
  # default (or has already been rotated).
  ALLOW_KEYCLOAK_ADMIN_PASSWORD_FALLBACK: ""
  # MongoDB configuration
  MONGODB_DATABASE: "caipe"
  # RAG Server URL (if RAG is enabled)
  # RAG_URL: "http://<release-name>-rag-server:9446"
  # Branding configuration
  TAGLINE: "Multi-Agent Workflow Automation"
  DESCRIPTION: "Where Humans and AI agents collaborate to deliver high quality outcomes."
  APP_NAME: "CAIPE"
  # AgentGateway MCP discovery endpoints. Leave empty to default to the in-cluster
  # AgentGateway Services (admin /config on "<release>-agentgateway:15000"; MCP
  # listener mode-aware on the standalone proxy or controller Gateway). Only used
  # when global.agentgateway.enabled=true. Override for out-of-cluster gateways.
  AGENT_GATEWAY_ADMIN_URL: ""
  AGENT_GATEWAY_URL: ""
  # Canonical Slack workspace namespace used by UI-managed Slack ReBAC/routes.
  SLACK_WORKSPACE_ALIAS: "CAIPE"
  # Slack bot internal admin API used for route-cache reload and one-time
  # static-config-to-MongoDB/OpenFGA migration. The Web UI backend uses the
  # existing OIDC_CLIENT_ID/OIDC_CLIENT_SECRET Keycloak client credentials.
  SLACK_BOT_ADMIN_URL: ""
  SLACK_BOT_ADMIN_AUDIENCE: "caipe-slack-bot-admin"
  # SLACK_BOT_ADMIN_SCOPE: "slack:routes:read slack:routes:reload slack:routes:sync"
  SLACK_DEFAULT_TEAM_SLUG: ""
  SLACK_DEFAULT_AGENT_ID: ""
  # Webex bot internal admin API used for route-cache reload and one-time
  # static-config-to-MongoDB/OpenFGA migration. The client secret is sensitive
  # and must come from existingSecret/externalSecrets as WEBEX_BOT_ADMIN_CLIENT_SECRET.
  WEBEX_BOT_ADMIN_URL: ""
  WEBEX_BOT_ADMIN_CLIENT_ID: "caipe-ui"
  WEBEX_BOT_ADMIN_AUDIENCE: "caipe-webex-bot-admin"
  # WEBEX_BOT_ADMIN_TOKEN_URL: "http://keycloak:7080/realms/caipe/protocol/openid-connect/token"
  # WEBEX_BOT_ADMIN_SCOPE: "webex:routes:read webex:routes:reload webex:routes:sync"
  # WEBEX_LINK_HMAC_SECRET is sensitive and must come from existingSecret/externalSecrets.
  WEBEX_DEFAULT_TEAM_SLUG: ""
  WEBEX_DEFAULT_AGENT_ID: ""
  WEBEX_THREAD_CONTEXT_ENABLED: "true"
  WEBEX_THREAD_CONTEXT_MAX_MESSAGES: "10"
  WEBEX_THREAD_CONTEXT_MAX_CHARS: "4000"
  LOGO_URL: "/logo.svg"
  LOGO_STYLE: "default"
  # SPINNER_COLOR: ""
  SHOW_POWERED_BY: "false"
  # Environment badge label shown next to the app name (e.g. "Dev", "Preview", "Staging", "Prod")
  # Leave empty to hide. Backward-compat: PREVIEW_MODE=true still works.
  ENV_BADGE: ""
  # Workflow runner: set to "true" to show Run Workflow button and Multi-Step Workflows section
  WORKFLOW_RUNNER_ENABLED: "false"
  # Dynamic Agents service URL. Leave empty to use the chart default.
  DYNAMIC_AGENTS_URL: ""
  # Connections & Secrets credential store. Disabled by default. Use local-cmk
  # only for non-production testing; production must use aws-kms.
  CAIPE_CREDENTIALS_ENABLED: "false"
  CREDENTIAL_STORE_BACKEND: "mongodb-envelope"
  CREDENTIAL_KEY_PROVIDER: "local-cmk"
  CREDENTIAL_KMS_CMK_ID: ""
  CREDENTIAL_KMS_REGION: ""
  CREDENTIAL_SERVICE_AUDIENCE: "caipe-credential-service"
  # Bootstrap global OAuth connectors from server env at startup. In
  # Kubernetes, provide provider client IDs/secrets/redirect URIs through
  # externalSecrets below; in Docker Compose, provide them through .env.
  CREDENTIAL_BOOTSTRAP_OAUTH_CONNECTORS: "false"
  # Standalone skill-scanner microservice (cisco-ai-defense/skill-scanner).
  # Set when global.skillScanner.enabled=true on the parent chart so the
  # UI can reach the in-cluster scanner Service. Leave empty to disable
  # the safety scan (skills will save with scan_status=unscanned).
  SKILL_SCANNER_URL: ""
  # In-cluster Keycloak service URL (server-side JWKS fetch + admin API)
  KEYCLOAK_URL: ""
  KEYCLOAK_REALM: "caipe"
  KEYCLOAK_RESOURCE_SERVER_ID: "caipe-platform"
  # Internal OIDC discovery URL for server-side token validation
  OIDC_DISCOVERY_URL: ""
  OIDC_CLIENT_ID: "caipe-ui"
  # Slack bot admin token URL (in-cluster Keycloak token endpoint)
  SLACK_BOT_ADMIN_TOKEN_URL: ""
  SLACK_BOT_ADMIN_CLIENT_ID: "caipe-ui"
  # OpenFGA authorization service
  OPENFGA_HTTP: ""
  OPENFGA_STORE_NAME: "caipe-openfga"
  # OIDC group required for basic Web UI admission. Set per deployment; empty disables the group gate.
  OIDC_REQUIRED_GROUP: ""
  # Deprecated: admin access is granted through Identity Group Sync + OpenFGA organization admin relationships.
  OIDC_REQUIRED_ADMIN_GROUP: ""
  # Bootstrap admin emails — comma-separated list for initial admin setup.
  # The BFF resolves these to Keycloak subjects and seeds durable OpenFGA
  # organization/system_config grants. Remove after configuring Identity Group
  # Sync to grant OpenFGA admin.
  BOOTSTRAP_ADMIN_EMAILS: ""
  # Unsafe dev/emergency escape hatch: when true, UI RBAC checks allow all
  # requests without consulting OpenFGA. Do not enable in staging or prod.
  CAIPE_UNSAFE_RBAC_BYPASS: "false"
  CAIPE_ORG_KEY: "caipe"
  CAIPE_ORG_DISPLAY_NAME: "CAIPE"
  # OIDC refresh token support
  OIDC_ENABLE_REFRESH_TOKEN: "true"
  # Additional JWKS URIs for token validation (JSON array, non-sensitive)
  # OIDC_ADDITIONAL_JWKS: '["https://other-idp/.well-known/jwks.json"]'
  # Accepted JWT audiences for Bearer token validation (comma-separated)
  # When the OIDC authorization server uses a fixed audience that differs
  # from OIDC_CLIENT_ID, list accepted values here.
  # OIDC_ACCEPTED_AUDIENCES: "https://my-api.example.com"
  # Support contact email
  SUPPORT_EMAIL: "support@example.com"
  # Header link URLs (leave empty/commented to hide)
  # DOCS_URL: "https://your-docs-site.com"
  # SOURCE_URL: "https://github.com/your-org/your-repo"
  # Report a Problem: enabled by default, set to "false" to hide the button
  # REPORT_PROBLEM_ENABLED: "false"
  # Ticket integration: route reported problems to Jira/GitHub agents
  # Jira ticket creation (set both to enable)
  # JIRA_TICKET_ENABLED: "true"
  # JIRA_TICKET_PROJECT: "OPENSD"
  # JIRA_TICKET_LABEL: "caipe-reported"
  # GitHub issue creation (set both to enable)
  # GITHUB_TICKET_ENABLED: "true"
  # GITHUB_TICKET_REPO: "org/repo"
  # GITHUB_TICKET_LABEL: "caipe-reported"
  # Server-side user identity via JWT — same flag as backend.
  # When true, the UI stops prefixing messages with "by user: email".
  ENABLE_USER_INFO_TOOL: "false"

# Name of a pre-existing Kubernetes Secret to mount as environment variables.
# Use this when managing secrets outside the chart (e.g. via extraDeploy, CI/CD, or manual creation).
# The secret is mounted via envFrom.secretRef alongside the config ConfigMap.
#
# BYO MongoDB / DocumentDB: Create a Secret with key MONGODB_URI (connection string).
# Example: kubectl create secret generic my-caipe-secrets --from-literal=MONGODB_URI='mongodb://user:pass@host:27017/caipe'
# For AWS DocumentDB use the DocumentDB connection string (MongoDB-compatible) as MONGODB_URI.
# You can also include NEXTAUTH_SECRET, OIDC_*, etc. in the same secret.
# Slack bot admin sync/reload uses OIDC_CLIENT_ID/OIDC_CLIENT_SECRET. Webex bot
# admin sync/reload still requires WEBEX_BOT_ADMIN_CLIENT_SECRET when enabled.
existingSecret: ""

# ---------- Keycloak Admin REST client wiring ----------
#
# The BFF's `fetchFreshAdminToken` (ui/src/lib/rbac/keycloak-admin.ts) needs
# `KEYCLOAK_ADMIN_CLIENT_ID` + `KEYCLOAK_ADMIN_CLIENT_SECRET` in the pod's
# environment to call the Keycloak Admin REST API via the confidential
# `caipe-platform` client. Set `keycloakAdminClient.secretName` to the same Secret the
# keycloak chart's `platformClient.secretRef`/`externalSecret` writes
# so both the BFF and the Keycloak reconciliation Jobs use the same
# client_secret value.
#
# For non-default Secret names (rare): override BOTH
# `keycloak.platformClient.secretRef` AND `caipe-ui.keycloakAdminClient.secretName`
# to the same value. Helm does not support cross-subchart value
# substitution at template time, so this is the simplest contract that
# also lets ESO-only installs work without changing the keycloak chart's
# helper logic.
#
# Leave `secretName` empty in standalone caipe-ui dev installs (where
# the BFF talks to an external Keycloak via its own credentials in
# `existingSecret` or `OIDC_CLIENT_SECRET`).
keycloakAdminClient:
  # Name of the K8s Secret holding the Keycloak Admin REST client_secret.
  # Defaults to "" in the standalone subchart; the umbrella sets this to
  # "caipe-platform-secret" so a Helm install with only
  # `keycloak.platformClient.secretRef=caipe-platform-secret` lights up
  # the BFF admin path automatically.
  secretName: ""
  # Key inside `secretName` that holds the actual client_secret value.
  # Matches `keycloak.platformClient.secretKey` (default: OIDC_CLIENT_SECRET).
  secretKey: "OIDC_CLIENT_SECRET"
  # Client ID to use when calling the Keycloak Admin REST API. The realm
  # ships `caipe-platform` with `service-accounts-enabled: true` and the
  # `realm-management` role mappings — see realm-config.json. There is
  # no reason to change this in a vanilla install.
  clientId: "caipe-platform"

# External Secrets configuration for sensitive data (OIDC, NextAuth, MongoDB/DocumentDB)
# Secrets are fetched from your secret store (Vault, AWS Secrets Manager, etc.)
# To enable: set externalSecrets.enabled=true and configure data section
# See EXTERNAL_SECRETS.md and values-external-secrets.yaml for full examples
#
# BYO MongoDB / DocumentDB: Add a data entry with secretKey: MONGODB_URI and remoteRef
# to your store (e.g. key: dev/caipe-ui, property: MONGODB_URI). Use MongoDB or
# DocumentDB connection string; DocumentDB is MongoDB-compatible.
externalSecrets:
  enabled: false  # Set to true to enable external secrets
  apiVersion: "v1beta1"
  secretStoreRef:
    name: "vault"  # Your secret store name (replace with your SecretStore/ClusterSecretStore)
    kind: "ClusterSecretStore"  # or "SecretStore" for namespace-scoped
  data: []
    # Example configuration (see values-external-secrets.yaml or EXTERNAL_SECRETS.md):
    # - secretKey: NEXTAUTH_SECRET
    #   remoteRef:
    #     conversionStrategy: Default
    #     decodingStrategy: None
    #     key: dev/caipe-ui
    #     property: NEXTAUTH_SECRET
    # - secretKey: MONGODB_URI
    #   remoteRef:
    #     key: dev/caipe-ui
    #     property: MONGODB_URI
    # - secretKey: OIDC_ISSUER
    #   remoteRef:
    #     key: dev/caipe-ui
    #     property: OIDC_ISSUER
    # - secretKey: OIDC_CLIENT_ID
    #   remoteRef:
    #     key: dev/caipe-ui
    #     property: OIDC_CLIENT_ID
    # - secretKey: OIDC_CLIENT_SECRET
    #   remoteRef:
    #     key: dev/caipe-ui
    #     property: OIDC_CLIENT_SECRET
    # - secretKey: WEBEX_BOT_ADMIN_CLIENT_SECRET
    #   remoteRef:
    #     key: dev/caipe-ui
    #     property: WEBEX_BOT_ADMIN_CLIENT_SECRET
    # - secretKey: WEBEX_LINK_HMAC_SECRET
    #   remoteRef:
    #     key: dev/caipe-ui
    #     property: WEBEX_LINK_HMAC_SECRET
    # Credential OAuth connector bootstrap fields. These are consumed only when
    # config.CREDENTIAL_BOOTSTRAP_OAUTH_CONNECTORS=true.
    # - secretKey: GITHUB_CLIENT_ID
    #   remoteRef:
    #     key: dev/credential-oauth-connectors
    #     property: GITHUB_CLIENT_ID
    # - secretKey: GITHUB_CLIENT_SECRET
    #   remoteRef:
    #     key: dev/credential-oauth-connectors
    #     property: GITHUB_CLIENT_SECRET
    # - secretKey: GITHUB_REDIRECT_URI
    #   remoteRef:
    #     key: dev/credential-oauth-connectors
    #     property: GITHUB_REDIRECT_URI
    # - secretKey: CONFLUENCE_CLIENT_ID
    #   remoteRef:
    #     key: dev/credential-oauth-connectors
    #     property: CONFLUENCE_CLIENT_ID
    # - secretKey: CONFLUENCE_CLIENT_SECRET
    #   remoteRef:
    #     key: dev/credential-oauth-connectors
    #     property: CONFLUENCE_CLIENT_SECRET
    # - secretKey: CONFLUENCE_REDIRECT_URI
    #   remoteRef:
    #     key: dev/credential-oauth-connectors
    #     property: CONFLUENCE_REDIRECT_URI
    # - secretKey: WEBEX_CLIENT_ID
    #   remoteRef:
    #     key: dev/credential-oauth-connectors
    #     property: WEBEX_CLIENT_ID
    # - secretKey: WEBEX_CLIENT_SECRET
    #   remoteRef:
    #     key: dev/credential-oauth-connectors
    #     property: WEBEX_CLIENT_SECRET
    # - secretKey: WEBEX_REDIRECT_URI
    #   remoteRef:
    #     key: dev/credential-oauth-connectors
    #     property: WEBEX_REDIRECT_URI
    # - secretKey: PAGERDUTY_CLIENT_ID
    #   remoteRef:
    #     key: dev/credential-oauth-connectors
    #     property: PAGERDUTY_CLIENT_ID
    # - secretKey: PAGERDUTY_CLIENT_SECRET
    #   remoteRef:
    #     key: dev/credential-oauth-connectors
    #     property: PAGERDUTY_CLIENT_SECRET
    # - secretKey: PAGERDUTY_REDIRECT_URI
    #   remoteRef:
    #     key: dev/credential-oauth-connectors
    #     property: PAGERDUTY_REDIRECT_URI
    # - secretKey: PAGERDUTY_SCOPES
    #   remoteRef:
    #     key: dev/credential-oauth-connectors
    #     property: PAGERDUTY_SCOPES

# Structured application config (models, MCP servers, agents).
# Rendered as a YAML file and volume-mounted into the container at /etc/caipe-ui/app-config.yaml.
# Loaded at startup and marked as config_driven (cannot be edited via UI).
# Auto-mounted only when at least one key below is non-empty.
# Environment variables in values support ${VAR_NAME} and ${VAR_NAME:-default} syntax.
appConfig:
  # Available LLM models for the model selector
  models: []
  # Example:
  # - model_id: "claude-sonnet-4-20250514"
  #   name: "Claude Sonnet 4"
  #   provider: "anthropic-claude"
  #   description: "Latest Claude Sonnet model"

  # MCP server configurations
  # Transport types: stdio, sse, http
  mcp_servers: []
  # Example for HTTP MCP server (Streamable HTTP):
  # - id: "argocd"
  #   name: "ArgoCD"
  #   description: "ArgoCD operations via MCP"
  #   transport: "http"
  #   endpoint: "http://mcp-argocd-mcp:8000/mcp"
  #   enabled: true
  #
  # Example for stdio MCP server:
  # - id: "github"
  #   name: "GitHub"
  #   transport: "stdio"
  #   command: "uvx"
  #   args: ["mcp-server-github"]
  #   env:
  #     GITHUB_TOKEN: "${GITHUB_PERSONAL_ACCESS_TOKEN}"
  #   enabled: true

  # Agent configurations
  agents: []
  # Example:
  # - id: "code-reviewer"
  #   name: "Code Reviewer"
  #   description: "Reviews code for best practices"
  #   system_prompt: |
  #     You are an expert code reviewer...
  #   model_id: "claude-sonnet-4-20250514"
  #   model_provider: "anthropic-claude"
  #   visibility: "global"
  #   allowed_tools:
  #     github: []
  #   enabled: true

  # Workflow configurations (multi-step automated pipelines)
  workflow_configs: []
  # Example:
  # - id: "my-workflow"
  #   name: "My Workflow"
  #   description: "A multi-step workflow"
  #   config_driven: true
  #   steps:
  #     - type: "step"
  #       display_text: "Step description"
  #       agent_id: "mcp-sre"
  #       prompt: "Do something"
  #       on_error: "abort"
