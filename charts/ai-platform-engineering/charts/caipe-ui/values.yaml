# Default values for caipe-ui
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: "ghcr.io/cnoe-io/caipe-ui"
  pullPolicy: "Always"
  # tag defaults to .Chart.AppVersion when not specified
  tag: ""

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 3000

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: caipe-ui.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: caipe-ui-tls
  #    hosts:
  #      - caipe-ui.local

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the number of old ReplicaSets to retain for rollback
# Kubernetes will automatically clean up ReplicaSets beyond this limit
revisionHistoryLimit: 3

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

# Environment variables (non-sensitive configuration)
env:
  # CAIPE Supervisor URL - should point to the supervisor-agent service
  A2A_BASE_URL: "http://ai-platform-engineering-supervisor-agent:8000"

# ConfigMap for non-sensitive configuration
# These values are mounted as environment variables to the pod
config:
  # Feature flags
  ENABLE_SUBAGENT_CARDS: "true"
  SSO_ENABLED: "true"
  # Built-in skill IDs to seed (comma-separated whitelist).
  # When set, only listed templates are seeded; unlisted ones are removed.
  # Leave empty to seed all built-in templates.
  # BUILTIN_SKILL_IDS: ""
  # NextAuth URL (non-sensitive)
  NEXTAUTH_URL: "http://localhost:3000"
  # Node environment
  NODE_ENV: "production"
  # MongoDB configuration
  MONGODB_DATABASE: "caipe"
  # RAG Server URL (if RAG is enabled)
  # RAG_URL: "http://ai-platform-engineering-rag-server:9446"
  # Branding configuration
  TAGLINE: "Multi-Agent Workflow Automation"
  DESCRIPTION: "Where Humans and AI agents collaborate to deliver high quality outcomes."
  APP_NAME: "CAIPE"
  LOGO_URL: "/logo.svg"
  LOGO_STYLE: "default"
  # SPINNER_COLOR: ""
  SHOW_POWERED_BY: "false"
  # Environment badge label shown next to the app name (e.g. "Dev", "Preview", "Staging", "Prod")
  # Leave empty to hide. Backward-compat: PREVIEW_MODE=true still works.
  ENV_BADGE: ""
  # Workflow runner: set to "true" to show Run Workflow button and Multi-Step Workflows section
  WORKFLOW_RUNNER_ENABLED: "false"
  # Dynamic Agents: set to "true" to enable custom agent creation and management
  # Requires admin role and MongoDB storage mode
  DYNAMIC_AGENTS_ENABLED: "false"
  # Dynamic Agents service URL (only used when DYNAMIC_AGENTS_ENABLED is "true")
  # DYNAMIC_AGENTS_URL: "http://ai-platform-engineering-dynamic-agents:8001"
  # OIDC required group (non-sensitive)
  OIDC_REQUIRED_GROUP: "app-users"
  # OIDC admin group (non-sensitive)
  OIDC_REQUIRED_ADMIN_GROUP: "app-admins"
  # Bootstrap admin emails — comma-separated list for initial admin setup.
  # Remove after configuring proper role mappings via the Admin > Roles tab.
  # BOOTSTRAP_ADMIN_EMAILS: ""
  # OIDC refresh token support
  OIDC_ENABLE_REFRESH_TOKEN: "true"
  # Support contact email
  SUPPORT_EMAIL: "support@example.com"
  # Header link URLs (leave empty/commented to hide)
  # DOCS_URL: "https://your-docs-site.com"
  # SOURCE_URL: "https://github.com/your-org/your-repo"
  # Report a Problem: enabled by default, set to "false" to hide the button
  # REPORT_PROBLEM_ENABLED: "false"
  # Ticket integration: route reported problems to Jira/GitHub via A2A agents
  # Jira ticket creation (set both to enable)
  # JIRA_TICKET_ENABLED: "true"
  # JIRA_TICKET_PROJECT: "OPENSD"
  # JIRA_TICKET_LABEL: "caipe-reported"
  # GitHub issue creation (set both to enable)
  # GITHUB_TICKET_ENABLED: "true"
  # GITHUB_TICKET_REPO: "org/repo"
  # GITHUB_TICKET_LABEL: "caipe-reported"
  # Server-side user identity via JWT — same flag as backend.
  # When true, the UI stops prefixing messages with "by user: email".
  ENABLE_USER_INFO_TOOL: "false"

# Name of a pre-existing Kubernetes Secret to mount as environment variables.
# Use this when managing secrets outside the chart (e.g. via extraDeploy, CI/CD, or manual creation).
# The secret is mounted via envFrom.secretRef alongside the config ConfigMap.
#
# BYO MongoDB / DocumentDB: Create a Secret with key MONGODB_URI (connection string).
# Example: kubectl create secret generic my-caipe-secrets --from-literal=MONGODB_URI='mongodb://user:pass@host:27017/caipe'
# For AWS DocumentDB use the DocumentDB connection string (MongoDB-compatible) as MONGODB_URI.
# You can also include NEXTAUTH_SECRET, OIDC_*, etc. in the same secret.
existingSecret: ""

# External Secrets configuration for sensitive data (OIDC, NextAuth, MongoDB/DocumentDB)
# Secrets are fetched from your secret store (Vault, AWS Secrets Manager, etc.)
# To enable: set externalSecrets.enabled=true and configure data section
# See EXTERNAL_SECRETS.md and values-external-secrets.yaml for full examples
#
# BYO MongoDB / DocumentDB: Add a data entry with secretKey: MONGODB_URI and remoteRef
# to your store (e.g. key: dev/caipe-ui, property: MONGODB_URI). Use MongoDB or
# DocumentDB connection string; DocumentDB is MongoDB-compatible.
externalSecrets:
  enabled: false  # Set to true to enable external secrets
  apiVersion: "v1beta1"
  secretStoreRef:
    name: "vault"  # Your secret store name (replace with your SecretStore/ClusterSecretStore)
    kind: "ClusterSecretStore"  # or "SecretStore" for namespace-scoped
  data: []
    # Example configuration (see values-external-secrets.yaml or EXTERNAL_SECRETS.md):
    # - secretKey: NEXTAUTH_SECRET
    #   remoteRef:
    #     conversionStrategy: Default
    #     decodingStrategy: None
    #     key: dev/caipe-ui
    #     property: NEXTAUTH_SECRET
    # - secretKey: MONGODB_URI
    #   remoteRef:
    #     key: dev/caipe-ui
    #     property: MONGODB_URI
    # - secretKey: OIDC_ISSUER
    #   remoteRef:
    #     key: dev/caipe-ui
    #     property: OIDC_ISSUER
    # - secretKey: OIDC_CLIENT_ID
    #   remoteRef:
    #     key: dev/caipe-ui
    #     property: OIDC_CLIENT_ID
    # - secretKey: OIDC_CLIENT_SECRET
    #   remoteRef:
    #     key: dev/caipe-ui
    #     property: OIDC_CLIENT_SECRET
