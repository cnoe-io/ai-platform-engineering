{{- $schedulerEnabled := dig "scheduler" "enabled" false (.Values.global | default dict) -}}
{{- $schedulerRunnerSecretName := .Values.schedulerRunnerClient.secretName | default "" -}}
{{- if and $schedulerEnabled (not $schedulerRunnerSecretName) -}}
{{- $schedulerRunnerBase := printf "%s-keycloak" .Release.Name | trunc 46 | trimSuffix "-" -}}
{{- $schedulerRunnerSecretName = printf "%s-scheduler-runner" $schedulerRunnerBase -}}
{{- end -}}
{{- $oauthConnectors := .Values.oauthConnectors | default list -}}
{{- $credentialSecretRefs := .Values.credentialSecretRefs | default list -}}
{{- $_ := include "caipe-ui.validate.bootstrapConfig" . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "caipe-ui.fullname" . }}-config
  labels:
    {{- include "caipe-ui.labels" . | nindent 4 }}
data:
  # Render each value through `tpl` so operators can reference Helm built-ins
  # (notably `{{ .Release.Name }}`) inside string values like
  # `SKILL_SCANNER_URL`. Plain literals pass through unchanged because `tpl`
  # is a no-op when the template body has no actions.
  {{- range $key, $value := .Values.config }}
  {{- if not (eq (toString $value) "") }}
  {{ $key }}: {{ tpl ($value | toString) $ | quote }}
  {{- end }}
  {{- end }}
  {{- /* R1 upstream fix (May 2026): when an operator wires up the
         Keycloak Admin REST client via keycloakAdminClient.secretName,
         also surface the client ID through the ConfigMap so the BFF's
         `fetchFreshAdminToken` can pick it up without an extra env-var
         entry on the Deployment. The matching client_secret is mounted
         via valueFrom.secretKeyRef in deployment.yaml — never inlined
         into a ConfigMap. We respect any explicit value the operator
         already set under .Values.config to avoid clobbering a hand-roll.
         See values.yaml `keycloakAdminClient` for the full contract. */}}
  {{- if and .Values.keycloakAdminClient.secretName (not (hasKey .Values.config "KEYCLOAK_ADMIN_CLIENT_ID")) }}
  KEYCLOAK_ADMIN_CLIENT_ID: {{ .Values.keycloakAdminClient.clientId | default "caipe-platform" | quote }}
  {{- end }}
  {{- /* Scheduled-run minting client id. Its
         client_secret is injected via secretKeyRef in deployment.yaml. */}}
  {{- if and $schedulerRunnerSecretName (not (hasKey .Values.config "KEYCLOAK_SCHEDULER_CLIENT_ID")) }}
  KEYCLOAK_SCHEDULER_CLIENT_ID: {{ .Values.schedulerRunnerClient.clientId | default "caipe-scheduler-runner" | quote }}
  {{- end }}
  {{- if and $schedulerEnabled (not (hasKey .Values.config "SCHEDULER_ENABLED")) }}
  SCHEDULER_ENABLED: "true"
  {{- end }}
  {{- if and (gt (len $oauthConnectors) 0) (not (hasKey .Values.config "CREDENTIAL_BOOTSTRAP_OAUTH_CONNECTORS_JSON")) }}
  CREDENTIAL_BOOTSTRAP_OAUTH_CONNECTORS_JSON: {{ mustToJson $oauthConnectors | quote }}
  {{- end }}
  {{- if and (gt (len $credentialSecretRefs) 0) (not (hasKey .Values.config "CREDENTIAL_BOOTSTRAP_SECRET_REFS_JSON")) }}
  CREDENTIAL_BOOTSTRAP_SECRET_REFS_JSON: {{ mustToJson $credentialSecretRefs | quote }}
  {{- end }}
  {{- /* Okta directory sync — flatten the structured `oktaSync:` block
         (Backstage-style) into IDENTITY_SYNC_OKTA_* env vars. Only the
         non-sensitive fields live here; the SSWS token and OAuth private key
         are mounted from the Secret (existingSecret / externalSecrets) under
         the matching env-var keys. */}}
  {{- if .Values.oktaSync.enabled }}
  IDENTITY_SYNC_OKTA_ORG_URL: {{ .Values.oktaSync.orgUrl | quote }}
  {{- with .Values.oktaSync.oauth }}
  {{- if .clientId }}
  IDENTITY_SYNC_OKTA_OAUTH_CLIENT_ID: {{ .clientId | quote }}
  {{- end }}
  {{- if .keyId }}
  IDENTITY_SYNC_OKTA_OAUTH_KEY_ID: {{ .keyId | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.oktaSync.groupFilter }}
  IDENTITY_SYNC_OKTA_GROUP_FILTER: {{ .Values.oktaSync.groupFilter | quote }}
  {{- end }}
  {{- end }}
  {{- /* OpenFGA / Keycloak IdP identity sync — default OIDC group claim wiring
         when login-time reconciliation is enabled. Operators may override any
         key via caipe-ui.config. Mirror keycloak.idp into caipe-ui.keycloakIdp
         when Keycloak brokers an upstream IdP (e.g. duo-sso). */ -}}
  {{- $openfgaIntent := or (eq (toString (index .Values.config "OPENFGA_RECONCILE_ENABLED" | default "")) "true") (eq (toString (index .Values.config "IDENTITY_SYNC_LOGIN_CLAIMS_ENABLED" | default "")) "true") (index .Values.config "BOOTSTRAP_ADMIN_EMAILS" | default "") -}}
  {{- if and $openfgaIntent (not (hasKey .Values.config "IDENTITY_SYNC_OIDC_CLAIM_PROVIDER_ID")) }}
  IDENTITY_SYNC_OIDC_CLAIM_PROVIDER_ID: "oidc-claims"
  {{- end }}
  {{- if and $openfgaIntent (not (hasKey .Values.config "OIDC_GROUP_CLAIM")) }}
  OIDC_GROUP_CLAIM: "members,groups"
  {{- end }}
  {{- $idp := .Values.keycloakIdp | default dict -}}
  {{- if and $idp.enabled (not (hasKey .Values.config "OIDC_IDP_HINT")) }}
  OIDC_IDP_HINT: {{ $idp.alias | default "duo-sso" | quote }}
  {{- end }}
  {{- $agwEnabled := dig "agentgateway" "enabled" false (.Values.global | default dict) -}}
  {{- if and $agwEnabled (not (hasKey .Values.config "OIDC_EXTRA_AUDIENCES")) }}
  OIDC_EXTRA_AUDIENCES: "caipe-platform"
  {{- end }}
