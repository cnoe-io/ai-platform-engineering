{{- if .Values.upstreamSecret.create }}
{{- /*
Proxy-only upstream-provider credentials (the real, cost-bearing keys), read by the proxy via
os.environ/* in modelList. Helm-generated strategy only - never commit real keys. For production,
set upstreamSecret.name to reference an existing / external-secrets secret instead.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-upstream" (include "litellm.fullname" .) }}
  labels:
    {{- include "litellm.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range $key, $value := .Values.upstreamSecret.data }}
  {{- if $value }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
