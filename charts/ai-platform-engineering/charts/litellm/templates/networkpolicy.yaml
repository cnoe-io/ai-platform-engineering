{{- if .Values.networkPolicy.enabled }}
{{/*
Restrict the proxy to in-cluster callers: only pods in the release namespace may reach the
proxy port, so the upstream provider key the proxy fronts is never reachable off-cluster.
Ingress is namespace-scoped; tighten with podSelector labels if you want to limit to
specific agent pods.
*/}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "litellm.fullname" . }}
  labels:
    {{- include "litellm.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "litellm.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
{{- end }}
