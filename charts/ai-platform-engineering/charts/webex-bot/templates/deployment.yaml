apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "webex-bot.fullname" . }}
  labels:
    {{- include "webex-bot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "webex-bot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "webex-bot.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "webex-bot.fullname" . }}
      {{- end }}
      containers:
        - name: webex-bot
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "webex-bot.fullname" . }}-config
            {{- if .Values.secretRef }}
            - secretRef:
                name: {{ .Values.secretRef }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
