apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "slack-bot.fullname" . }}
  labels:
    {{- include "slack-bot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "slack-bot.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "slack-bot.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "slack-bot.serviceAccountName" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default (include "slack-bot.appVersion" .) }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.botConfig }}
          env:
            - name: SLACK_INTEGRATION_BOT_CONFIG
              value: "/etc/caipe/bot-config.yaml"
          {{- end }}
          envFrom:
            # Flat config → ConfigMap (non-sensitive env vars)
            - configMapRef:
                name: {{ include "slack-bot.fullname" . }}-config
            # Pre-existing secret (Slack tokens, OAuth2 client secret, etc.)
            {{- if .Values.existingSecret }}
            - secretRef:
                name: {{ .Values.existingSecret }}
            {{- end }}
            {{- if .Values.externalSecrets.enabled }}
            # ExternalSecret (sensitive data from vault/cloud provider)
            - secretRef:
                name: {{ include "slack-bot.fullname" . }}-secret
            {{- end }}
          {{- if eq (default "socket" (index .Values.config "SLACK_BOT_MODE")) "http" }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.botConfig }}
            - name: bot-config
              mountPath: /etc/caipe
              readOnly: true
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- if .Values.botConfig }}
        - name: bot-config
          configMap:
            name: {{ include "slack-bot.fullname" . }}-bot-config
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
