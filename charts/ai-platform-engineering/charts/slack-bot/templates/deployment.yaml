apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "slack-bot.fullname" . }}
  labels:
    {{- include "slack-bot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "slack-bot.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "slack-bot.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "slack-bot.serviceAccountName" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default (include "slack-bot.appVersion" .) }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: APP_NAME
              value: {{ .Values.appName | quote }}
            - name: SLACK_BOT_MODE
              value: {{ .Values.botMode | quote }}
            - name: SLACK_INTEGRATION_SILENCE_ENV
              value: {{ .Values.silenceEnv | quote }}
            {{- if .Values.slackWorkspaceUrl }}
            - name: SLACK_WORKSPACE_URL
              value: {{ .Values.slackWorkspaceUrl | quote }}
            {{- end }}
            {{- if .Values.auth.enabled }}
            - name: SLACK_INTEGRATION_ENABLE_AUTH
              value: "true"
            - name: OAUTH2_TOKEN_URL
              value: {{ .Values.auth.tokenUrl | quote }}
            - name: OAUTH2_CLIENT_ID
              value: {{ .Values.auth.clientId | quote }}
            {{- if .Values.auth.scope }}
            - name: OAUTH2_SCOPE
              value: {{ .Values.auth.scope | quote }}
            {{- end }}
            {{- if .Values.auth.audience }}
            - name: OAUTH2_AUDIENCE
              value: {{ .Values.auth.audience | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.prompts.responseStyle }}
            - name: SLACK_INTEGRATION_PROMPT_RESPONSE_STYLE
              value: {{ .Values.prompts.responseStyle | quote }}
            {{- end }}
            {{- if .Values.prompts.qanda }}
            - name: SLACK_INTEGRATION_PROMPT_QANDA
              value: {{ .Values.prompts.qanda | quote }}
            {{- end }}
            {{- if .Values.prompts.overthinkQanda }}
            - name: SLACK_INTEGRATION_PROMPT_OVERTHINK_QANDA
              value: {{ .Values.prompts.overthinkQanda | quote }}
            {{- end }}
            {{- if .Values.prompts.mention }}
            - name: SLACK_INTEGRATION_PROMPT_MENTION
              value: {{ .Values.prompts.mention | quote }}
            {{- end }}
            {{- if .Values.prompts.humbleFollowup }}
            - name: SLACK_INTEGRATION_PROMPT_HUMBLE_FOLLOWUP
              value: {{ .Values.prompts.humbleFollowup | quote }}
            {{- end }}
            {{- if .Values.prompts.aiAlerts }}
            - name: SLACK_INTEGRATION_PROMPT_AI_ALERTS
              value: {{ .Values.prompts.aiAlerts | quote }}
            {{- end }}
            - name: CAIPE_BOT_CONFIG
              value: /etc/caipe/caipe-bot-config.yaml
            {{- if .Values.mongodb.uri }}
            - name: MONGODB_URI
              value: {{ .Values.mongodb.uri | quote }}
            {{- end }}
            - name: MONGODB_DATABASE
              value: {{ .Values.mongodb.database | quote }}
            - name: CAIPE_URL
              value: {{ .Values.caipeUrl | quote }}
            - name: CAIPE_UI_URL
              value: {{ .Values.caipeUiUrl | quote }}
            {{- range $key, $value := .Values.env }}
            {{- if ne $key "CAIPE_URL" }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.slack.tokenSecretRef }}
            {{- if .Values.externalSecrets.enabled }}
            - secretRef:
                name: {{ include "slack-bot.fullname" . }}-secret
            {{- end }}
          {{- if eq .Values.botMode "http" }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: {{ include "slack-bot.fullname" . }}-config
              mountPath: /etc/caipe
              readOnly: true
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: {{ include "slack-bot.fullname" . }}-config
          configMap:
            name: {{ include "slack-bot.fullname" . }}-config
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
