apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "slack-bot.fullname" . }}
  labels:
    {{- include "slack-bot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "slack-bot.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "slack-bot.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "slack-bot.serviceAccountName" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default (include "slack-bot.appVersion" .) }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- /* Build env: block conditionally. Three independent sources may
                 contribute entries:
                   1. botConfig          → SLACK_INTEGRATION_BOT_CONFIG path
                   2. oauth2.*           → OAUTH2_CLIENT_SECRET (OBO flow)
                   3. keycloakAdmin.*    → KEYCLOAK_SLACK_BOT_ADMIN_CLIENT_ID/_SECRET
                                            (slack-bot Admin-API user lookup)
                 At least one must be present for the YAML key to be valid. */ -}}
          {{- $hasOauth2Secret := and .Values.oauth2 .Values.oauth2.clientSecretFromSecret .Values.oauth2.clientSecretFromSecret.name }}
          {{- $hasKcAdminSecret := and .Values.keycloakAdmin .Values.keycloakAdmin.clientSecretFromSecret .Values.keycloakAdmin.clientSecretFromSecret.name }}
          {{- $hasKcAdminClientId := and .Values.keycloakAdmin .Values.keycloakAdmin.clientId }}
          {{- $needEnv := or .Values.botConfig $hasOauth2Secret $hasKcAdminSecret $hasKcAdminClientId }}
          {{- if $needEnv }}
          env:
            {{- if .Values.botConfig }}
            - name: SLACK_INTEGRATION_BOT_CONFIG
              value: "/etc/caipe/bot-config.yaml"
            {{- end }}
            {{- if $hasOauth2Secret }}
            # Single-source-of-truth: pull OAUTH2_CLIENT_SECRET from the
            # Secret managed by the keycloak subchart (or its ExternalSecret).
            # This guarantees the value used by this pod EXACTLY matches the
            # client_secret stored in Keycloak's caipe-slack-bot client.
            # Overrides any OAUTH2_CLIENT_SECRET that might also come in via
            # `existingSecret`/`externalSecrets` because env: takes precedence
            # over envFrom: in Kubernetes.
            - name: OAUTH2_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oauth2.clientSecretFromSecret.name | quote }}
                  key: {{ .Values.oauth2.clientSecretFromSecret.key | default "KC_BOT_CLIENT_SECRET" | quote }}
            {{- end }}
            {{- if $hasKcAdminClientId }}
            # Slack-bot Admin REST API client_id (for user lookup by slack_user_id).
            # Surface-specific name (KEYCLOAK_SLACK_BOT_ADMIN_*) leaves room for
            # future bot surfaces (Webex, Teams, …). Distinct from OAUTH2_* (OBO
            # flow) and from the UI BFF's KEYCLOAK_ADMIN_* vars — see values.yaml.
            - name: KEYCLOAK_SLACK_BOT_ADMIN_CLIENT_ID
              value: {{ .Values.keycloakAdmin.clientId | quote }}
            {{- end }}
            {{- if $hasKcAdminSecret }}
            - name: KEYCLOAK_SLACK_BOT_ADMIN_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloakAdmin.clientSecretFromSecret.name | quote }}
                  key: {{ .Values.keycloakAdmin.clientSecretFromSecret.key | default "KC_PLATFORM_CLIENT_SECRET" | quote }}
            {{- end }}
          {{- end }}
          envFrom:
            # Flat config → ConfigMap (non-sensitive env vars)
            - configMapRef:
                name: {{ include "slack-bot.fullname" . }}-config
            # Pre-existing secret (Slack tokens, OAuth2 client secret, etc.)
            {{- if .Values.existingSecret }}
            - secretRef:
                name: {{ .Values.existingSecret }}
            {{- end }}
            {{- if .Values.externalSecrets.enabled }}
            # ExternalSecret (sensitive data from vault/cloud provider)
            - secretRef:
                name: {{ include "slack-bot.fullname" . }}-secret
            {{- end }}
          {{- if eq (default "socket" (index .Values.config "SLACK_BOT_MODE")) "http" }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.botConfig }}
            - name: bot-config
              mountPath: /etc/caipe
              readOnly: true
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- if .Values.botConfig }}
        - name: bot-config
          configMap:
            name: {{ include "slack-bot.fullname" . }}-bot-config
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
