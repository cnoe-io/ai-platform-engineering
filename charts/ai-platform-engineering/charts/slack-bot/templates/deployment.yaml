apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "slack-bot.fullname" . }}
  labels:
    {{- include "slack-bot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "slack-bot.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "slack-bot.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "slack-bot.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ include "slack-bot.imageRepository" (dict "root" . "repository" .Values.image.repository) }}:{{ .Values.image.tag | default (include "slack-bot.appVersion" .) }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- /* Service URL defaults (always rendered): env: takes precedence over
                 envFrom (ConfigMap), so these provide release-name-derived defaults
                 while still allowing operators to override via .Values.config. */ -}}
          {{- $hasOauth2Secret := and .Values.oauth2 .Values.oauth2.clientSecretFromSecret .Values.oauth2.clientSecretFromSecret.name }}
          {{- $hasKcBotSecret := and .Values.keycloakBot .Values.keycloakBot.clientSecretFromSecret .Values.keycloakBot.clientSecretFromSecret.name }}
          {{- $hasKcAdminSecret := and .Values.keycloakAdmin .Values.keycloakAdmin.clientSecretFromSecret .Values.keycloakAdmin.clientSecretFromSecret.name }}
          {{- $hasKcAdminClientId := and .Values.keycloakAdmin .Values.keycloakAdmin.clientId }}
          env:
            - name: CAIPE_API_URL
              value: {{ index .Values.config "CAIPE_API_URL" | default (printf "http://%s-caipe-ui:3000" .Release.Name) | quote }}
            - name: KEYCLOAK_URL
              value: {{ index .Values.config "KEYCLOAK_URL" | default (printf "http://%s-keycloak:8080" .Release.Name) | quote }}
            {{- if .Values.botConfig }}
            - name: SLACK_INTEGRATION_BOT_CONFIG
              value: "/etc/caipe/bot-config.yaml"
            {{- end }}
            {{- if $hasOauth2Secret }}
            # Single-source-of-truth: pull OAUTH2_CLIENT_SECRET from the
            # Secret managed by the keycloak subchart (or its ExternalSecret).
            # This guarantees the value used by this pod EXACTLY matches the
            # client_secret stored in Keycloak's caipe-slack-bot client.
            # Overrides any OAUTH2_CLIENT_SECRET that might also come in via
            # `existingSecret`/`externalSecrets` because env: takes precedence
            # over envFrom: in Kubernetes.
            - name: OAUTH2_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oauth2.clientSecretFromSecret.name | quote }}
                  key: {{ .Values.oauth2.clientSecretFromSecret.key | default "KC_BOT_CLIENT_SECRET" | quote }}
            {{- end }}
            {{- if $hasKcBotSecret }}
            # Keycloak bot client_secret for Slack OBO token exchange.
            - name: KEYCLOAK_BOT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloakBot.clientSecretFromSecret.name | quote }}
                  key: {{ .Values.keycloakBot.clientSecretFromSecret.key | default "KC_BOT_CLIENT_SECRET" | quote }}
            {{- end }}
            {{- if $hasKcAdminClientId }}
            # Slack-bot Admin REST API client_id (for user lookup by slack_user_id).
            # Surface-specific name (KEYCLOAK_SLACK_BOT_ADMIN_*) leaves room for
            # future bot surfaces (Webex, Teams, …). Distinct from OAUTH2_* (OBO
            # flow) and from the UI BFF's KEYCLOAK_ADMIN_* vars — see values.yaml.
            - name: KEYCLOAK_SLACK_BOT_ADMIN_CLIENT_ID
              value: {{ .Values.keycloakAdmin.clientId | quote }}
            {{- end }}
            {{- if $hasKcAdminSecret }}
            - name: KEYCLOAK_SLACK_BOT_ADMIN_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloakAdmin.clientSecretFromSecret.name | quote }}
                  key: {{ .Values.keycloakAdmin.clientSecretFromSecret.key | default "KC_PLATFORM_CLIENT_SECRET" | quote }}
            {{- end }}
          envFrom:
            # Flat config → ConfigMap (non-sensitive env vars)
            - configMapRef:
                name: {{ include "slack-bot.fullname" . }}-config
            # Pre-existing secret (Slack tokens, OAuth2 client secret, etc.)
            {{- if .Values.existingSecret }}
            - secretRef:
                name: {{ .Values.existingSecret }}
            {{- end }}
            {{- if .Values.externalSecrets.enabled }}
            # ExternalSecret (sensitive data from vault/cloud provider)
            - secretRef:
                name: {{ include "slack-bot.fullname" . }}-secret
            {{- end }}
          {{- $botMode := default "socket" (index .Values.config "SLACK_BOT_MODE") }}
          {{- $adminApiEnabled := eq (toString (default "false" (index .Values.config "SLACK_ADMIN_API_ENABLED"))) "true" }}
          {{- if or (eq $botMode "http") $adminApiEnabled }}
          ports:
            {{- if eq $botMode "http" }}
            - name: http
              containerPort: 3000
              protocol: TCP
            {{- end }}
            {{- if $adminApiEnabled }}
            - name: admin
              containerPort: {{ default "3001" (index .Values.config "SLACK_ADMIN_API_PORT") | int }}
              protocol: TCP
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.botConfig }}
            - name: bot-config
              mountPath: /etc/caipe
              readOnly: true
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- if .Values.botConfig }}
        - name: bot-config
          configMap:
            name: {{ include "slack-bot.fullname" . }}-bot-config
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
