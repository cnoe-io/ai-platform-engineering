replicaCount: 1

image:
  repository: ghcr.io/cnoe-io/caipe-slack-bot
  tag: ""
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

# -- Flat key-value map of environment variables.
# Each key-value pair is injected as a flat environment variable via ConfigMap
# (envFrom → configMapRef). Put ALL non-sensitive env vars here — no separate
# env: block needed.
#
# Common keys:
#   APP_NAME:                          Display name used in Slack messages (default: CAIPE)
#   SLACK_BOT_MODE:                    "socket" (WebSocket) or "http" (webhooks)
#   CAIPE_API_URL:                     Next.js gateway URL the bot routes requests through
#   SLACK_INTEGRATION_SILENCE_ENV:     "true" to suppress environment info in responses
#   SLACK_WORKSPACE_URL:               e.g. "https://mycompany.slack.com" for permalink deep links
#   MONGODB_URI:                       MongoDB connection string
#   MONGODB_DATABASE:                  MongoDB database name (default: caipe)
#   SLACK_INTEGRATION_ENABLE_AUTH:     "true" to enable OAuth2 Client Credentials
#   OAUTH2_TOKEN_URL:                  OIDC token endpoint
#   OAUTH2_CLIENT_ID:                  OAuth2 client ID
#   OAUTH2_SCOPE:                      OAuth2 scope (optional)
#   OAUTH2_AUDIENCE:                   OAuth2 audience (optional)
#   SLACK_INTEGRATION_PROMPT_RESPONSE_STYLE:  Override response style prompt
#   SLACK_INTEGRATION_PROMPT_QANDA:           Override Q&A prompt
#   SLACK_INTEGRATION_PROMPT_OVERTHINK_QANDA: Override overthink Q&A prompt
#   SLACK_INTEGRATION_PROMPT_MENTION:         Override mention prompt
#   SLACK_INTEGRATION_PROMPT_HUMBLE_FOLLOWUP: Override humble followup prompt
#   SLACK_INTEGRATION_PROMPT_AI_ALERTS:       Override AI alerts prompt
config:
  APP_NAME: "CAIPE"
  SLACK_BOT_MODE: "socket"
  CAIPE_API_URL: "http://ai-platform-engineering-caipe-ui:3000"
  SLACK_INTEGRATION_SILENCE_ENV: "false"
  MONGODB_DATABASE: "caipe"

# -- Reference to a pre-existing Kubernetes Secret.
# All keys in the secret are injected as env vars via envFrom → secretRef.
# Typically contains: SLACK_BOT_TOKEN, SLACK_APP_TOKEN, SLACK_SIGNING_SECRET,
# and optionally OAUTH2_CLIENT_SECRET.
existingSecret: "slack-bot-secrets"

# -- External Secrets configuration for sensitive data (Slack tokens, OAuth2 client secret, etc.)
externalSecrets:
  enabled: false  # Set to true to use ExternalSecrets instead of a manually-created K8s Secret
  apiVersion: "v1beta1"
  secretStoreRef:
    name: "vault"  # Your secret store name
    kind: "ClusterSecretStore"
  data: []
    # Example:
    # - secretKey: SLACK_BOT_TOKEN
    #   remoteRef:
    #     key: prod/slack-bot
    #     property: bot_token
    # - secretKey: SLACK_APP_TOKEN
    #   remoteRef:
    #     key: prod/slack-bot
    #     property: app_token
    # - secretKey: SLACK_SIGNING_SECRET
    #   remoteRef:
    #     key: prod/slack-bot
    #     property: signing_secret
    # - secretKey: OAUTH2_CLIENT_SECRET
    #   remoteRef:
    #     key: prod/slack-bot
    #     property: oauth2_client_secret

# -- Structured channel configuration rendered as a YAML file and volume-mounted
# at /etc/caipe/bot-config.yaml. Only mounted when non-empty.
# Structure: channel_id -> channel config (same format as config_models.py expects).
# Example:
#   C012345678:
#     name: "#my-channel"
#     ai_enabled: true
#     agent_id: "my-agent"
#     qanda:
#       enabled: true
#       overthink: true
#     ai_alerts:
#       enabled: false
#     other:
#       jira:
#         project_key: MYPROJ
#         issue_type: Bug
botConfig: {}

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

podAnnotations: {}

podDisruptionBudget:
  enabled: false
  minAvailable: 1

nodeSelector: {}
tolerations: []
affinity: {}

volumes: []
volumeMounts: []

# VPA configuration. Requires VPA to be installed in the cluster.
# Inherits global.vpa defaults; override any field here to customise for slack-bot.
vpa:
  enabled: false
  updateMode: "InPlaceOrRecreate"
  controlledResources: ["cpu", "memory"]
  controlledValues: "RequestsAndLimits"
  minAllowed:
    cpu: 50m
    memory: 128Mi
  maxAllowed: {}
