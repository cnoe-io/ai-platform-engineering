replicaCount: 1

image:
  repository: ghcr.io/cnoe-io/caipe-slack-bot
  tag: ""
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

# -- Flat key-value map of environment variables.
# Each key-value pair is injected as a flat environment variable via ConfigMap
# (envFrom → configMapRef). Put ALL non-sensitive env vars here — no separate
# env: block needed.
#
# Common keys:
#   APP_NAME:                          Display name used in Slack messages (default: CAIPE)
#   SLACK_BOT_MODE:                    "socket" (WebSocket) or "http" (webhooks)
#   CAIPE_API_URL:                     Next.js gateway URL the bot routes requests through
#   SLACK_INTEGRATION_SILENCE_ENV:     "true" to suppress environment info in responses
#   SLACK_WORKSPACE_URL:               e.g. "https://mycompany.slack.com" for permalink deep links
#   MONGODB_URI:                       MongoDB connection string
#   MONGODB_DATABASE:                  MongoDB database name (default: caipe)
#   SLACK_INTEGRATION_ENABLE_AUTH:     "true" to enable OAuth2 Client Credentials
#   OAUTH2_TOKEN_URL:                  OIDC token endpoint
#   OAUTH2_CLIENT_ID:                  OAuth2 client ID
#   OAUTH2_SCOPE:                      OAuth2 scope (optional)
#   OAUTH2_AUDIENCE:                   OAuth2 audience (optional)
#   SLACK_INTEGRATION_PROMPT_RESPONSE_STYLE:  Override response style prompt
#   SLACK_INTEGRATION_PROMPT_QANDA:           Override Q&A prompt
#   SLACK_INTEGRATION_PROMPT_OVERTHINK_QANDA: Override overthink Q&A prompt
#   SLACK_INTEGRATION_PROMPT_MENTION:         Override mention prompt
#   SLACK_INTEGRATION_PROMPT_HUMBLE_FOLLOWUP: Override humble followup prompt
#   SLACK_INTEGRATION_PROMPT_AI_ALERTS:       Override AI alerts prompt
#
# Spec 103 (Just-In-Time Keycloak user creation):
#   SLACK_JIT_CREATE_USER:               "true" (default) auto-creates a
#                                        federated-only Keycloak shell user
#                                        on first Slack DM when no Keycloak
#                                        user with the Slack profile email
#                                        exists yet. "false" falls back to
#                                        sending the existing HMAC-signed
#                                        linking URL so the user onboards
#                                        via the web UI before Slack use.
#                                        Reuses the keycloakAdmin.* credential
#                                        above — no new Secret to wire (see
#                                        plan.md R-8 for the accepted trade-off).
#   SLACK_JIT_ALLOWED_EMAIL_DOMAINS:     Optional comma-separated allowlist
#                                        of email domains eligible for JIT
#                                        (e.g. "corp.com,acme.io"). Empty =>
#                                        any domain. Recommended for prod
#                                        when the federated IdP can return
#                                        non-corporate emails.
config:
  APP_NAME: "CAIPE"
  SLACK_BOT_MODE: "socket"
  CAIPE_API_URL: "http://ai-platform-engineering-caipe-ui:3000"
  SLACK_INTEGRATION_SILENCE_ENV: "false"
  MONGODB_DATABASE: "caipe"
  SLACK_JIT_CREATE_USER: "true"
  SLACK_JIT_ALLOWED_EMAIL_DOMAINS: ""

# -- Cross-chart binding to the Keycloak bot client_secret.
# When set, the pod's OAUTH2_CLIENT_SECRET env var is sourced via
# secretKeyRef from the named Secret instead of (or in addition to) the
# `existingSecret`/`externalSecrets` flat map. This is the recommended
# wiring when you install the umbrella chart: the keycloak subchart
# creates `<release>-keycloak-bot` (random in dev, ESO-managed in prod)
# AND configures Keycloak to use that exact value as the client_secret,
# so both ends of the OAuth flow stay in sync without duplication.
#
# For umbrella installs, just set:
#   slack-bot:
#     oauth2:
#       clientSecretFromSecret:
#         name: <release>-keycloak-bot
#         # key: KC_BOT_CLIENT_SECRET    # default — only override if you renamed it
oauth2:
  clientSecretFromSecret:
    name: ""
    key: "KC_BOT_CLIENT_SECRET"

# -- Cross-chart binding to the Keycloak Admin-API credentials used by the slack-bot
# for user-attribute lookups (find Keycloak user by `slack_user_id` attribute,
# read/write `team_id` etc.). This is a SEPARATE auth flow from the OAuth2 OBO
# above — it uses the `client_credentials` grant on a *confidential* Keycloak
# client that has `view-users` + `query-users` on `realm-management`.
#
# In a default umbrella install, the keycloak subchart provisions
# `caipe-platform` with those roles, so wiring this to the same secret as the
# OBO flow is incorrect — they are different clients with different secrets.
#
# Set BOTH `clientId` (typically "caipe-platform") and `clientSecretFromSecret`
# pointing at the K8s/ESO Secret that holds that client's secret. Example for a
# release named `caipe`:
#   slack-bot:
#     keycloakAdmin:
#       clientId: "caipe-platform"
#       clientSecretFromSecret:
#         name: "caipe-keycloak-platform"
#         key:  "KC_PLATFORM_CLIENT_SECRET"
#
# Historical note: pre-098 these were named `KEYCLOAK_ADMIN_*` and shared a
# namespace with the UI BFF admin vars, which caused a 401 collision in dev.
# The surface-specific `KEYCLOAK_SLACK_BOT_ADMIN_*` env names eliminate that
# risk and leave room for future bot surfaces (Webex, Teams, …) without
# re-namespacing.
keycloakAdmin:
  clientId: ""
  clientSecretFromSecret:
    name: ""
    key: "KC_PLATFORM_CLIENT_SECRET"

# -- Reference to a pre-existing Kubernetes Secret.
# All keys in the secret are injected as env vars via envFrom → secretRef.
# Typically contains: SLACK_BOT_TOKEN, SLACK_APP_TOKEN, SLACK_SIGNING_SECRET,
# and optionally OAUTH2_CLIENT_SECRET.
existingSecret: "slack-bot-secrets"

# -- External Secrets configuration for sensitive data (Slack tokens, OAuth2 client secret, etc.)
externalSecrets:
  enabled: false  # Set to true to use ExternalSecrets instead of a manually-created K8s Secret
  apiVersion: "v1beta1"
  secretStoreRef:
    name: "vault"  # Your secret store name
    kind: "ClusterSecretStore"
  data: []
    # Example:
    # - secretKey: SLACK_BOT_TOKEN
    #   remoteRef:
    #     key: prod/slack-bot
    #     property: bot_token
    # - secretKey: SLACK_APP_TOKEN
    #   remoteRef:
    #     key: prod/slack-bot
    #     property: app_token
    # - secretKey: SLACK_SIGNING_SECRET
    #   remoteRef:
    #     key: prod/slack-bot
    #     property: signing_secret
    # - secretKey: OAUTH2_CLIENT_SECRET
    #   remoteRef:
    #     key: prod/slack-bot
    #     property: oauth2_client_secret

# -- Structured channel configuration rendered as a YAML file and volume-mounted
# at /etc/caipe/bot-config.yaml. Only mounted when non-empty.
# Structure: channel_id -> channel config (same format as config_models.py expects).
# Example:
#   C012345678:
#     name: "#my-channel"
#     ai_enabled: true
#     agent_id: "my-agent"
#     qanda:
#       enabled: true
#       overthink: true
#     ai_alerts:
#       enabled: false
#     other:
#       jira:
#         project_key: MYPROJ
#         issue_type: Bug
botConfig: {}

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

podAnnotations: {}

podDisruptionBudget:
  enabled: false
  minAvailable: 1

nodeSelector: {}
tolerations: []
affinity: {}

volumes: []
volumeMounts: []

# VPA configuration. Requires VPA to be installed in the cluster.
# Inherits global.vpa defaults; override any field here to customise for slack-bot.
vpa:
  enabled: false
  updateMode: "InPlaceOrRecreate"
  controlledResources: ["cpu", "memory"]
  controlledValues: "RequestsAndLimits"
  minAllowed:
    cpu: 50m
    memory: 128Mi
  maxAllowed: {}
