replicaCount: 1

image:
  repository: ghcr.io/cnoe-io/caipe-slack-bot
  tag: ""
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

appName: "CAIPE"  # Display name used in Slack messages (maps to APP_NAME env var)

# CAIPE supervisor URL — the bot connects to this endpoint via A2A protocol.
# Required. Must be reachable from the bot pod.
caipeUrl: "http://ai-platform-engineering-supervisor-agent:8000"

# CAIPE UI URL — must be reachable from the bot pod.
caipeUiUrl: "http://ai-platform-engineering-caipe-ui:3000"

# Bot connection mode: "socket" (WebSocket via SLACK_APP_TOKEN) or "http" (incoming webhooks via SLACK_SIGNING_SECRET)
botMode: "socket"

# Additional env vars passed through to the container.
env: {}

slack:
  # Reference to a Kubernetes Secret containing SLACK_BOT_TOKEN, SLACK_APP_TOKEN, SLACK_SIGNING_SECRET
  tokenSecretRef: "slack-bot-secrets"

# External Secrets configuration for sensitive data (Slack tokens, OAuth2 client secret, etc.)
externalSecrets:
  enabled: false  # Set to true to use ExternalSecrets instead of a manually-created K8s Secret
  apiVersion: "v1beta1"
  secretStoreRef:
    name: "vault"  # Your secret store name
    kind: "ClusterSecretStore"
  data: []
    # Example:
    # - secretKey: SLACK_BOT_TOKEN
    #   remoteRef:
    #     key: prod/slack-bot
    #     property: bot_token
    # - secretKey: SLACK_APP_TOKEN
    #   remoteRef:
    #     key: prod/slack-bot
    #     property: app_token
    # - secretKey: SLACK_SIGNING_SECRET
    #   remoteRef:
    #     key: prod/slack-bot
    #     property: signing_secret
    # - secretKey: OAUTH2_CLIENT_SECRET
    #   remoteRef:
    #     key: prod/slack-bot
    #     property: oauth2_client_secret

mongodb:
  uri: ""  # Override per environment, e.g. "mongodb://admin:changeme@ai-platform-engineering-mongodb:27017"
  database: "caipe"

# OAuth2 Client Credentials authentication for A2A requests to the supervisor.
# When enabled, the bot obtains a Bearer token and injects it into all A2A API calls.
# Works with any OIDC provider (Okta, Keycloak, Auth0, Azure AD, etc.).
auth:
  enabled: false
  tokenUrl: ""      # e.g. "https://your-idp.example.com/oauth2/v1/token"
  clientId: ""
  scope: ""         # Optional, e.g. "api://caipe"
  audience: ""      # Optional
  # clientSecret should be stored in the Kubernetes Secret (slack.tokenSecretRef) or ExternalSecrets,
  # NOT in values.yaml. Add OAUTH2_CLIENT_SECRET to your secret.

slackWorkspaceUrl: ""  # e.g. "https://mycompany.slack.com" — used for feedback permalink deep links
silenceEnv: "false"  # Suppress environment info in bot responses

# Prompt overrides — set any of these to replace the built-in default prompt.
# Values are injected as SLACK_INTEGRATION_PROMPT_* env vars.
# Leave empty ("") to use the built-in defaults from the bot's config_models.py.
prompts:
  responseStyle: ""       # SLACK_INTEGRATION_PROMPT_RESPONSE_STYLE
  qanda: ""               # SLACK_INTEGRATION_PROMPT_QANDA
  overthinkQanda: ""      # SLACK_INTEGRATION_PROMPT_OVERTHINK_QANDA
  mention: ""             # SLACK_INTEGRATION_PROMPT_MENTION
  humbleFollowup: ""      # SLACK_INTEGRATION_PROMPT_HUMBLE_FOLLOWUP
  aiAlerts: ""            # SLACK_INTEGRATION_PROMPT_AI_ALERTS

# Channel configuration — written into a ConfigMap and mounted as /etc/caipe/caipe-bot-config.yaml.
# Structure: channel_id -> channel config (same format as the bot's config_models.py expects).
# Example:
#   C012345678:
#     name: "#my-channel"
#     ai_enabled: true
#     custom_prompt: |     # Per-channel @mention prompt override. Overrides the global prompts.mention value
#       You are a helpful assistant for the #my-channel team.
#       Answer questions about our platform and escalate incidents when needed.
#       User message: {message_text}
#     qanda:
#       enabled: true
#       overthink: true
#       custom_prompt: |   # Per-channel Q&A prompt override. Overrides the global prompts.qanda value
#         You are a Q&A assistant for the #my-channel team.
#         User message: {message_text}
#     ai_alerts:
#       enabled: false
#       custom_prompt: ""  # Per-channel AI alerts prompt override. Overrides the global prompts.aiAlerts value
#     default:
#       project_key: MYPROJ
#       issue_type: Bug
botConfig: {}

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

podAnnotations: {}

podDisruptionBudget:
  enabled: false
  minAvailable: 1

nodeSelector: {}
tolerations: []
affinity: {}

volumes: []
volumeMounts: []
