{{- if .Values.init.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "openfga.fullname" . }}-init
  labels:
    {{- include "openfga.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    helm.sh/hook-delete-policy: {{ .Values.init.helmHookDeletePolicy | default "before-hook-creation" | quote }}
    {{- with .Values.init.argocdHookDeletePolicy }}
    argocd.argoproj.io/hook-delete-policy: {{ . | quote }}
    {{- end }}
spec:
  backoffLimit: {{ .Values.init.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "openfga.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: openfga-init
          image: "{{ .Values.init.image.repository }}:{{ .Values.init.image.tag }}"
          imagePullPolicy: {{ .Values.init.image.pullPolicy }}
          command: ["python", "/model/seed.py"]
          env:
            - name: OPENFGA_HTTP
              value: "http://{{ include "openfga.fullname" . }}:{{ .Values.service.httpPort }}"
            - name: OPENFGA_STORE_NAME
              value: {{ .Values.init.storeName | quote }}
            {{- if .Values.init.seedSub }}
            - name: OPENFGA_SEED_SUB
              value: {{ .Values.init.seedSub | quote }}
            {{- end }}
            {{- if .Values.init.seedTuples }}
            - name: OPENFGA_SEED_TUPLES
              value: {{ .Values.init.seedTuples | toJson | quote }}
            {{- end }}
            {{- if .Values.init.platformClient.enabled }}
            - name: KEYCLOAK_TOKEN_URL
              value: {{ include "openfga.platformClientTokenUrl" . | quote }}
            - name: KEYCLOAK_PLATFORM_CLIENT_ID
              value: {{ .Values.init.platformClient.clientId | quote }}
            - name: OPENFGA_ORG_OBJECT
              value: {{ .Values.init.platformClient.orgObject | quote }}
            - name: KEYCLOAK_PLATFORM_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ required "openfga.init.platformClient.clientSecretRef.name is required when platformClient seeding is enabled" .Values.init.platformClient.clientSecretRef.name | quote }}
                  key: {{ .Values.init.platformClient.clientSecretRef.key | quote }}
            {{- end }}
          volumeMounts:
            - name: openfga-model
              mountPath: /model
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: openfga-model
          configMap:
            name: {{ include "openfga.fullname" . }}-model
{{- end }}
