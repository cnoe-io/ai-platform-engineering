{{- /*
ExternalSecret for the Keycloak admin credentials.

Two value-shapes are supported:

  (NEW) admin.externalSecret.enabled=true with admin.externalSecret.remoteRefs
        — preferred, structured, mirrors how `idp.externalSecret` and
          `tokenExchange.externalSecret` are configured.

  (LEGACY) externalSecrets.enabled=true with externalSecrets.data — the
           older flat-array shape. Kept working for back-compat; logs a
           deprecation hint via NOTES.txt.

Both shapes target the same K8s Secret name (<adminSecretName>) so the
init Jobs do not need to know which shape was used.
*/ -}}
{{- if .Values.admin.externalSecret.enabled }}
apiVersion: external-secrets.io/{{ .Values.externalSecretsApiVersion | default "v1beta1" }}
kind: ExternalSecret
metadata:
  name: {{ include "keycloak.adminSecretName" . }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.admin.externalSecret.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: {{ .Values.admin.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.admin.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ include "keycloak.adminSecretName" . }}
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: {{ required "admin.externalSecret.remoteRefs.username.key is required" .Values.admin.externalSecret.remoteRefs.username.key | quote }}
        {{- if .Values.admin.externalSecret.remoteRefs.username.property }}
        property: {{ .Values.admin.externalSecret.remoteRefs.username.property | quote }}
        {{- end }}
    - secretKey: password
      remoteRef:
        key: {{ required "admin.externalSecret.remoteRefs.password.key is required" .Values.admin.externalSecret.remoteRefs.password.key | quote }}
        {{- if .Values.admin.externalSecret.remoteRefs.password.property }}
        property: {{ .Values.admin.externalSecret.remoteRefs.password.property | quote }}
        {{- end }}
{{- else if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/{{ .Values.externalSecrets.apiVersion }}
kind: ExternalSecret
metadata:
  name: {{ include "keycloak.fullname" . }}-external-secret
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
  annotations:
    # DEPRECATED — set admin.externalSecret.enabled=true for the new shape.
    deprecated: "true"
spec:
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ include "keycloak.adminSecretName" . }}
    creationPolicy: Owner
  data:
    {{- range .Values.externalSecrets.data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        conversionStrategy: {{ .remoteRef.conversionStrategy | default "Default" }}
        decodingStrategy: {{ .remoteRef.decodingStrategy | default "None" }}
        key: {{ .remoteRef.key }}
        {{- if .remoteRef.property }}
        property: {{ .remoteRef.property }}
        {{- end }}
    {{- end }}
{{- end }}
