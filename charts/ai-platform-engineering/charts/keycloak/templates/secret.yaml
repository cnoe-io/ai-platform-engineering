{{- /* Keycloak only uses KEYCLOAK_ADMIN_PASSWORD to bootstrap the initial admin.
       Once the user exists, the password hash lives in Keycloak's database.
       Refuse to generate a random password during upgrades because that drifts
       the K8s Secret away from the persisted admin credential. */ -}}
{{- if and (not .Values.admin.secretRef) (not .Values.admin.externalSecret.enabled) (not .Values.externalSecrets.enabled) (not .Values.admin.password) -}}
{{- fail "keycloak.admin.secretRef, keycloak.admin.externalSecret.enabled, externalSecrets.enabled, or keycloak.admin.password is required; generated admin passwords are disabled because Keycloak stores the bootstrap admin password in its database" -}}
{{- end -}}
{{- /* Emit a chart-owned Secret only when a literal admin.password is explicitly provided.
       Existing Secret and ExternalSecret modes own the value elsewhere. */ -}}
{{- if and (not .Values.admin.secretRef) (not .Values.admin.externalSecret.enabled) (not .Values.externalSecrets.enabled) .Values.admin.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "keycloak.fullname" . }}-admin
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  username: {{ .Values.admin.username | b64enc | quote }}
  password: {{ .Values.admin.password | b64enc | quote }}
{{- end }}
