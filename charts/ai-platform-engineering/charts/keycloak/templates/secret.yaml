{{- /* Skip the literal-value Secret when:
         - the user pre-created one (admin.secretRef), OR
         - ESO will populate one (admin.externalSecret.enabled), OR
         - the legacy externalSecrets.enabled (back-compat) targets the same Secret.
       In any of those cases the value lives elsewhere; emitting an empty/random
       Secret here would either collide on the same name (Helm error) or get
       overwritten by ESO on the next reconcile. */ -}}
{{- if and (not .Values.admin.secretRef) (not .Values.admin.externalSecret.enabled) (not .Values.externalSecrets.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "keycloak.fullname" . }}-admin
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  username: {{ .Values.admin.username | b64enc | quote }}
  {{- if .Values.admin.password }}
  password: {{ .Values.admin.password | b64enc | quote }}
  {{- else }}
  password: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
