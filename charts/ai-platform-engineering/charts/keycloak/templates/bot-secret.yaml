{{- /*
caipe-slack-bot client-secret K8s Secret.

Created when tokenExchange is enabled AND the user did NOT pre-create
a Secret via `tokenExchange.secretRef`. When ESO is enabled the
ExternalSecret is the authoritative writer and this template is skipped.

Resolution order for the actual value:
  1. .Values.tokenExchange.botClientSecret (literal — dev-only, NOT recommended)
  2. random 32-char string generated at install time (kept across upgrades
     thanks to helm.sh/resource-policy=keep — DO NOT remove that annotation
     or you will lock the cluster out of the slack-bot client every helm upgrade).
*/ -}}
{{- if and (include "keycloak.shouldCreateBotSecret" .) (not .Values.tokenExchange.externalSecret.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "keycloak.botSecretName" . }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- if .Values.tokenExchange.botClientSecret }}
  KC_BOT_CLIENT_SECRET: {{ .Values.tokenExchange.botClientSecret | b64enc | quote }}
  {{- else }}
  KC_BOT_CLIENT_SECRET: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
