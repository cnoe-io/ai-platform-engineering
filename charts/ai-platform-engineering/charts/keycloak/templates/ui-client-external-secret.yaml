{{- /*
ExternalSecret for the caipe-ui OIDC client_secret.

The Secret is consumed by init-idp/auth-reconcile as KEYCLOAK_UI_CLIENT_SECRET
and pushed into Keycloak through the Admin API. Do not place this value in the
realm ConfigMap; rendered ConfigMaps are not an appropriate secret boundary.
*/ -}}
{{- if .Values.uiClient.externalSecret.enabled }}
apiVersion: external-secrets.io/{{ .Values.externalSecretsApiVersion | default "v1beta1" }}
kind: ExternalSecret
metadata:
  name: {{ include "keycloak.uiClientSecretName" . }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.uiClient.externalSecret.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: {{ .Values.uiClient.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.uiClient.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ include "keycloak.uiClientSecretName" . }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.uiClient.secretKey | default "OIDC_CLIENT_SECRET" | quote }}
      remoteRef:
        key: {{ required "uiClient.externalSecret.remoteRef.key is required" .Values.uiClient.externalSecret.remoteRef.key | quote }}
        {{- if .Values.uiClient.externalSecret.remoteRef.property }}
        property: {{ .Values.uiClient.externalSecret.remoteRef.property | quote }}
        {{- end }}
{{- end }}
