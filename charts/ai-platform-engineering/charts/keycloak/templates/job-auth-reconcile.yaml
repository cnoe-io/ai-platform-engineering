{{- if and .Values.idp.enabled .Values.authReconcile.enabled }}
{{- if not .Values.idp.issuer -}}
{{- fail "keycloak.idp.issuer is required when keycloak.idp.enabled=true" -}}
{{- end -}}
{{- if not .Values.idp.clientId -}}
{{- fail "keycloak.idp.clientId is required when keycloak.idp.enabled=true" -}}
{{- end -}}
{{- if not (or .Values.idp.secretRef .Values.idp.externalSecret.enabled) -}}
{{- fail "keycloak.idp.secretRef or keycloak.idp.externalSecret.enabled is required when keycloak.idp.enabled=true; auth-reconcile requires IDP_CLIENT_SECRET" -}}
{{- end -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "keycloak.fullname" . }}-auth-reconcile
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: {{ .Values.authReconcile.hook.argocdHook | quote }}
    argocd.argoproj.io/sync-wave: {{ .Values.authReconcile.hook.argocdSyncWave | quote }}
    argocd.argoproj.io/hook-delete-policy: {{ .Values.authReconcile.hook.argocdHookDeletePolicy | quote }}
    helm.sh/hook: {{ .Values.authReconcile.hook.helmHook | quote }}
    helm.sh/hook-weight: {{ .Values.authReconcile.hook.helmHookWeight | quote }}
    helm.sh/hook-delete-policy: {{ .Values.authReconcile.hook.helmHookDeletePolicy | quote }}
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        {{- include "keycloak.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: auth-reconcile
    spec:
      restartPolicy: OnFailure
      containers:
        - name: auth-reconcile
          image: "{{ include "keycloak.imageRepository" (dict "root" . "repository" .Values.initImage.repository) }}:{{ .Values.initImage.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.initImage.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              if [ ! -f /scripts/init-idp.sh ]; then
                echo "[auth-reconcile] Keycloak init-scripts ConfigMap not yet deployed, skipping auth reconcile."
                exit 0
              fi

              if [ -z "${KEYCLOAK_ADMIN:-}" ] || [ -z "${KEYCLOAK_ADMIN_PASSWORD:-}" ]; then
                echo "[auth-reconcile] ERROR: KEYCLOAK_ADMIN and KEYCLOAK_ADMIN_PASSWORD are required; check keycloak.admin.secretRef or keycloak.admin.externalSecret."
                exit 1
              fi

              if ! curl -sf "${KC_URL}/realms/${KC_REALM}" >/dev/null 2>&1; then
                echo "[auth-reconcile] Keycloak is not reachable yet; skipping early reconcile."
                exit 0
              fi

              /scripts/init-idp.sh
          env:
            - name: KC_URL
              value: "http://{{ include "keycloak.fullname" . }}:{{ .Values.service.port }}"
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.adminSecretName" . }}
                  key: username
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.adminSecretName" . }}
                  key: password
            - name: KC_REALM
              value: {{ .Values.realm.name | quote }}
            - name: KEYCLOAK_ACCESS_TOKEN_LIFESPAN
              value: {{ .Values.realm.accessTokenLifespan | quote }}
            - name: KEYCLOAK_SSO_SESSION_IDLE_TIMEOUT
              value: {{ .Values.realm.ssoSessionIdleTimeout | quote }}
            - name: KEYCLOAK_SSO_SESSION_MAX_LIFESPAN
              value: {{ .Values.realm.ssoSessionMaxLifespan | quote }}
            - name: KEYCLOAK_SEED_DEMO_USERS
              value: "false"
            {{- if .Values.bootstrapAdminEmails }}
            - name: BOOTSTRAP_ADMIN_EMAILS
              value: {{ .Values.bootstrapAdminEmails | quote }}
            {{- end }}
            {{- if .Values.admin.frontendUrl }}
            - name: KEYCLOAK_ADMIN_FRONTEND_URL
              value: {{ .Values.admin.frontendUrl | quote }}
            {{- end }}
            - name: IDP_ALIAS
              value: {{ .Values.idp.alias | quote }}
            - name: IDP_DISPLAY_NAME
              value: {{ .Values.idp.displayName | quote }}
            - name: IDP_ISSUER
              value: {{ .Values.idp.issuer | quote }}
            - name: IDP_CLIENT_ID
              value: {{ .Values.idp.clientId | quote }}
            {{- if or .Values.idp.secretRef .Values.idp.externalSecret.enabled }}
            - name: IDP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.idpSecretName" . }}
                  key: IDP_CLIENT_SECRET
            {{- end }}
            - name: IDP_ACCESS_GROUP
              value: {{ .Values.idp.accessGroup | quote }}
            - name: IDP_ADMIN_GROUP
              value: {{ .Values.idp.adminGroup | quote }}
            - name: KEYCLOAK_FORCE_IDP_REDIRECT
              value: {{ .Values.idp.forceRedirect | quote }}
            {{- if .Values.idp.pkce.enabled }}
            - name: IDP_PKCE_ENABLED
              value: "true"
            - name: IDP_PKCE_METHOD
              value: {{ .Values.idp.pkce.method | default "S256" | quote }}
            {{- end }}
          volumeMounts:
            - name: init-scripts
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: init-scripts
          configMap:
            name: {{ include "keycloak.fullname" . }}-init-scripts
            defaultMode: 0755
            optional: true
{{- end }}
