{{- /*
caipe-webex-bot client-secret K8s Secret.

Created when webexTokenExchange is enabled AND the user did NOT pre-create
a Secret via `webexTokenExchange.secretRef`. When ESO is enabled the
ExternalSecret is the authoritative writer and this template is skipped.
*/ -}}
{{- if and (eq (include "keycloak.shouldCreateWebexBotSecret" .) "true") (not .Values.webexTokenExchange.externalSecret.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "keycloak.webexBotSecretName" . }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- if .Values.webexTokenExchange.botClientSecret }}
  KC_WEBEX_BOT_CLIENT_SECRET: {{ .Values.webexTokenExchange.botClientSecret | b64enc | quote }}
  {{- else }}
  KC_WEBEX_BOT_CLIENT_SECRET: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
