{{- if .Values.tokenExchange.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "keycloak.fullname" . }}-init-token-exchange
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: {{ .Values.tokenExchange.hook.helmHook | quote }}
    helm.sh/hook-weight: {{ .Values.tokenExchange.hook.helmHookWeight | quote }}
    helm.sh/hook-delete-policy: {{ .Values.tokenExchange.hook.helmHookDeletePolicy | quote }}
    {{- with .Values.tokenExchange.hook.argocdHook }}
    argocd.argoproj.io/hook: {{ . | quote }}
    {{- end }}
    {{- with .Values.tokenExchange.hook.argocdSyncWave }}
    argocd.argoproj.io/sync-wave: {{ . | quote }}
    {{- end }}
    {{- with .Values.tokenExchange.hook.argocdHookDeletePolicy }}
    argocd.argoproj.io/hook-delete-policy: {{ . | quote }}
    {{- end }}
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "keycloak.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: init-token-exchange
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-token-exchange
          image: "{{ include "keycloak.imageRepository" (dict "root" . "repository" .Values.initImage.repository) }}:{{ .Values.initImage.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.initImage.pullPolicy }}
          command: ["/bin/sh", "/scripts/init-token-exchange.sh"]
          env:
            - name: KC_URL
              value: "http://{{ include "keycloak.fullname" . }}:{{ .Values.service.port }}"
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.adminSecretName" . }}
                  key: username
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.adminSecretName" . }}
                  key: password
            - name: KC_REALM
              value: {{ .Values.realm.name | quote }}
            - name: KC_BOT_CLIENT_ID
              value: {{ .Values.tokenExchange.botClientId | quote }}
            - name: KC_SSL_REQUIRED
              value: {{ .Values.realm.sslRequired | quote }}
            {{- /* Public CLI client (caipe-cli / forge-cli) — reconciled
                   imperatively by init-token-exchange.sh so it lands on
                   existing realms during upgrade even when idp.enabled=false
                   (this job is always-on; job-init-idp is not). */}}
            - name: KEYCLOAK_CLI_CLIENT_ID
              value: {{ (.Values.cliClient).clientId | default "caipe-cli" | quote }}
            {{- with (.Values.cliClient).accessTokenLifespan }}
            - name: KEYCLOAK_CLI_ACCESS_TOKEN_LIFESPAN
              value: {{ . | quote }}
            {{- end }}
            {{- with (.Values.cliClient).redirectUris }}
            - name: KEYCLOAK_CLI_REDIRECT_URIS
              value: {{ join " " . | quote }}
            {{- end }}
            {{- with (.Values.cliClient).webOrigins }}
            - name: KEYCLOAK_CLI_WEB_ORIGINS
              value: {{ join " " . | quote }}
            {{- end }}
            {{- /* The script seeds each bot service account's OpenFGA grants
                   (e.g. read on system_config:platform_settings) so the bots
                   can make service-to-service reads against the BFF. The URL
                   defaults to the in-cluster OpenFGA service, matching the
                   caipe-ui deployment's `<release>-openfga:8080` convention;
                   set tokenExchange.openfgaHttp to override. */}}
            - name: OPENFGA_HTTP
              value: {{ .Values.tokenExchange.openfgaHttp | default (printf "http://%s-openfga:8080" .Release.Name) | quote }}
            - name: OPENFGA_STORE_NAME
              value: {{ .Values.tokenExchange.openfgaStoreName | default "caipe-openfga" | quote }}
            {{- /* When KC_BOT_CLIENT_SECRET is set, init-token-exchange.sh
                   will PUT it to /admin/realms/{realm}/clients/{uuid} so
                   Keycloak's stored secret matches what the slack-bot pod
                   uses. Idempotent — re-applying the same value is a no-op
                   from Keycloak's perspective. */}}
            {{- if or .Values.tokenExchange.secretRef
                      .Values.tokenExchange.externalSecret.enabled
                      (eq (include "keycloak.shouldCreateBotSecret" .) "true") }}
            - name: KC_BOT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.botSecretName" . }}
                  key: KC_BOT_CLIENT_SECRET
            {{- end }}
            {{- if eq (include "keycloak.webexTokenExchangeEnabled" .) "true" }}
            - name: KC_WEBEX_BOT_CLIENT_ID
              value: {{ .Values.webexTokenExchange.botClientId | quote }}
            {{- end }}
            {{- if and (eq (include "keycloak.webexTokenExchangeEnabled" .) "true")
                      (or .Values.webexTokenExchange.secretRef
                           .Values.webexTokenExchange.externalSecret.enabled
                           (eq (include "keycloak.shouldCreateWebexBotSecret" .) "true")) }}
            - name: KC_WEBEX_BOT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.webexBotSecretName" . }}
                  key: KC_WEBEX_BOT_CLIENT_SECRET
            {{- end }}
            {{- /* Scheduler-runner client. The
                   script reconciles its client_secret so it matches what the
                   caipe-ui BFF uses to mint schedule-owner bearers. */}}
            {{- if eq (include "keycloak.schedulerTokenExchangeEnabled" .) "true" }}
            - name: KC_SCHEDULER_CLIENT_ID
              value: {{ .Values.schedulerTokenExchange.botClientId | quote }}
            {{- end }}
            {{- if and (eq (include "keycloak.schedulerTokenExchangeEnabled" .) "true")
                      (or .Values.schedulerTokenExchange.secretRef
                           .Values.schedulerTokenExchange.externalSecret.enabled
                           (eq (include "keycloak.shouldCreateSchedulerRunnerSecret" .) "true")) }}
            - name: KC_SCHEDULER_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.schedulerRunnerSecretName" . }}
                  key: KC_SCHEDULER_CLIENT_SECRET
            {{- end }}
            {{- /* Strict client-secret mode — fail the Job if any of the four
                   dev placeholder secrets is still accepted by Keycloak after
                   reconciliation. See values.yaml `strictClientSecrets`. */}}
            {{- if .Values.strictClientSecrets }}
            - name: KEYCLOAK_STRICT_CLIENT_SECRETS
              value: "true"
            {{- end }}
          volumeMounts:
            - name: init-scripts
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: init-scripts
          configMap:
            name: {{ include "keycloak.fullname" . }}-init-scripts
            defaultMode: 0755
{{- end }}
