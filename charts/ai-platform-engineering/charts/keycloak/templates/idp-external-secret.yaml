{{- /*
ExternalSecret for the IdP client_secret. ESO reconciles
the K8s Secret <fullname>-idp (key: IDP_CLIENT_SECRET) from the configured
backend (Vault / AWS SM / GCP SM / Azure KV / k8s-as-store / etc.).

The init-idp Job already reads via secretKeyRef → so as long as ESO has
populated the Secret before the Job's first retry, bootstrap is hands-free.
*/ -}}
{{- if and .Values.idp.enabled .Values.idp.externalSecret.enabled }}
apiVersion: external-secrets.io/{{ .Values.externalSecretsApiVersion | default "v1beta1" }}
kind: ExternalSecret
metadata:
  name: {{ include "keycloak.idpSecretName" . }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.idp.externalSecret.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: {{ .Values.idp.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.idp.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ include "keycloak.idpSecretName" . }}
    creationPolicy: Owner
  data:
    - secretKey: IDP_CLIENT_SECRET
      remoteRef:
        key: {{ required "idp.externalSecret.remoteRef.key is required" .Values.idp.externalSecret.remoteRef.key | quote }}
        {{- if .Values.idp.externalSecret.remoteRef.property }}
        property: {{ .Values.idp.externalSecret.remoteRef.property | quote }}
        {{- end }}
{{- end }}
