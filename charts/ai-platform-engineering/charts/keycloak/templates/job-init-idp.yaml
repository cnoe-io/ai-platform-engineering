{{- if .Values.idp.enabled }}
{{- if not .Values.idp.issuer -}}
{{- fail "keycloak.idp.issuer is required when keycloak.idp.enabled=true" -}}
{{- end -}}
{{- if not .Values.idp.clientId -}}
{{- fail "keycloak.idp.clientId is required when keycloak.idp.enabled=true" -}}
{{- end -}}
{{- if not (or .Values.idp.secretRef .Values.idp.externalSecret.enabled) -}}
{{- fail "keycloak.idp.secretRef or keycloak.idp.externalSecret.enabled is required when keycloak.idp.enabled=true; init-idp requires IDP_CLIENT_SECRET" -}}
{{- end -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "keycloak.fullname" . }}-init-idp
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "20"
    helm.sh/hook-delete-policy: {{ .Values.idp.hook.helmHookDeletePolicy | default "before-hook-creation,hook-succeeded" | quote }}
    {{- with .Values.idp.hook.argocdHook }}
    argocd.argoproj.io/hook: {{ . | quote }}
    {{- end }}
    {{- with .Values.idp.hook.argocdSyncWave }}
    argocd.argoproj.io/sync-wave: {{ . | quote }}
    {{- end }}
    {{- with .Values.idp.hook.argocdHookDeletePolicy }}
    argocd.argoproj.io/hook-delete-policy: {{ . | quote }}
    {{- end }}
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "keycloak.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: init-idp
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-idp
          image: "{{ include "keycloak.imageRepository" (dict "root" . "repository" .Values.initImage.repository) }}:{{ .Values.initImage.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.initImage.pullPolicy }}
          command: ["/bin/sh", "/scripts/init-idp.sh"]
          env:
            - name: KC_URL
              value: "http://{{ include "keycloak.fullname" . }}:{{ .Values.service.port }}"
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.adminSecretName" . }}
                  key: username
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.adminSecretName" . }}
                  key: password
            - name: KC_REALM
              value: {{ .Values.realm.name | quote }}
            - name: KEYCLOAK_ACCESS_TOKEN_LIFESPAN
              value: {{ .Values.realm.accessTokenLifespan | quote }}
            - name: KEYCLOAK_SSO_SESSION_IDLE_TIMEOUT
              value: {{ .Values.realm.ssoSessionIdleTimeout | quote }}
            - name: KEYCLOAK_SSO_SESSION_MAX_LIFESPAN
              value: {{ .Values.realm.ssoSessionMaxLifespan | quote }}
            - name: KEYCLOAK_SEED_DEMO_USERS
              value: {{ .Values.demoUsers.enabled | quote }}
            {{- if .Values.bootstrapAdminEmails }}
            - name: BOOTSTRAP_ADMIN_EMAILS
              value: {{ .Values.bootstrapAdminEmails | quote }}
            {{- end }}
            {{- if .Values.admin.frontendUrl }}
            - name: KEYCLOAK_ADMIN_FRONTEND_URL
              value: {{ .Values.admin.frontendUrl | quote }}
            {{- end }}
            - name: IDP_ALIAS
              value: {{ .Values.idp.alias | quote }}
            - name: IDP_DISPLAY_NAME
              value: {{ .Values.idp.displayName | quote }}
            - name: IDP_ISSUER
              value: {{ .Values.idp.issuer | quote }}
            - name: IDP_CLIENT_ID
              value: {{ .Values.idp.clientId | quote }}
            {{- /* IDP_CLIENT_SECRET source — explicit secretRef wins; else
                   ESO-managed Secret <fullname>-idp; else (idp.enabled but
                   no source) the script will exit non-zero before bootstrap. */}}
            {{- if or .Values.idp.secretRef .Values.idp.externalSecret.enabled }}
            - name: IDP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.idpSecretName" . }}
                  key: IDP_CLIENT_SECRET
            {{- end }}
            {{- if or .Values.uiClient.secretRef .Values.uiClient.externalSecret.enabled }}
            - name: KEYCLOAK_UI_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.uiClientSecretName" . }}
                  key: {{ .Values.uiClient.secretKey | default "OIDC_CLIENT_SECRET" | quote }}
            {{- end }}
            {{- /* KEYCLOAK_PLATFORM_CLIENT_SECRET — when provided, init-idp.sh
                   reconciles the caipe-platform client_secret in Keycloak,
                   replacing the dev placeholder shipped in realm-config.json. */}}
            {{- if or .Values.platformClient.secretRef .Values.platformClient.externalSecret.enabled }}
            - name: KEYCLOAK_PLATFORM_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.platformClientSecretName" . }}
                  key: {{ .Values.platformClient.secretKey | default "OIDC_CLIENT_SECRET" | quote }}
            {{- end }}
            - name: IDP_ACCESS_GROUP
              value: {{ .Values.idp.accessGroup | quote }}
            - name: IDP_ADMIN_GROUP
              value: {{ .Values.idp.adminGroup | quote }}
            - name: KEYCLOAK_FORCE_IDP_REDIRECT
              value: {{ .Values.idp.forceRedirect | quote }}
            {{- if .Values.idp.pkce.enabled }}
            - name: IDP_PKCE_ENABLED
              value: "true"
            - name: IDP_PKCE_METHOD
              value: {{ .Values.idp.pkce.method | default "S256" | quote }}
            {{- end }}
            {{- /* Strict client-secret mode — fail the Job if any of the four
                   dev placeholder secrets is still accepted by Keycloak after
                   reconciliation. See values.yaml `strictClientSecrets`. */}}
            {{- if .Values.strictClientSecrets }}
            - name: KEYCLOAK_STRICT_CLIENT_SECRETS
              value: "true"
            {{- end }}
          volumeMounts:
            - name: init-scripts
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: init-scripts
          configMap:
            name: {{ include "keycloak.fullname" . }}-init-scripts
            defaultMode: 0755
{{- end }}
