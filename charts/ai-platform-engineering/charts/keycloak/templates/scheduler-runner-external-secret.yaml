{{- /* ExternalSecret for the caipe-scheduler-runner client secret. */ -}}
{{- if and (eq (include "keycloak.schedulerTokenExchangeEnabled" .) "true") .Values.schedulerTokenExchange.externalSecret.enabled }}
apiVersion: external-secrets.io/{{ .Values.externalSecretsApiVersion | default "v1beta1" }}
kind: ExternalSecret
metadata:
  name: {{ include "keycloak.schedulerRunnerSecretName" . }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.schedulerTokenExchange.externalSecret.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: {{ .Values.schedulerTokenExchange.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.schedulerTokenExchange.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ include "keycloak.schedulerRunnerSecretName" . }}
    creationPolicy: Owner
  data:
    - secretKey: KC_SCHEDULER_CLIENT_SECRET
      remoteRef:
        key: {{ required "schedulerTokenExchange.externalSecret.remoteRef.key is required" .Values.schedulerTokenExchange.externalSecret.remoteRef.key | quote }}
        {{- if .Values.schedulerTokenExchange.externalSecret.remoteRef.property }}
        property: {{ .Values.schedulerTokenExchange.externalSecret.remoteRef.property | quote }}
        {{- end }}
{{- end }}
