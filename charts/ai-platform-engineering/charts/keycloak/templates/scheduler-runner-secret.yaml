{{- /*
caipe-scheduler-runner client-secret K8s Secret.

Created when schedulerTokenExchange is enabled AND the user did NOT pre-create
a Secret via `schedulerTokenExchange.secretRef`. When ESO is enabled the
ExternalSecret is the authoritative writer and this template is skipped.

Consumed by:
  - keycloak init-token-exchange Job (KC_SCHEDULER_CLIENT_SECRET): PUTs the
    secret onto the caipe-scheduler-runner client in Keycloak.
  - the caipe-ui BFF deployment (KEYCLOAK_SCHEDULER_CLIENT_SECRET): used to
    authenticate the token-exchange that mints schedule-owner bearers.
*/ -}}
{{- if and (eq (include "keycloak.shouldCreateSchedulerRunnerSecret" .) "true") (not .Values.schedulerTokenExchange.externalSecret.enabled) }}
{{- $secretName := include "keycloak.schedulerRunnerSecretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- if .Values.schedulerTokenExchange.botClientSecret }}
  KC_SCHEDULER_CLIENT_SECRET: {{ .Values.schedulerTokenExchange.botClientSecret | b64enc | quote }}
  {{- else if and $existing (hasKey $existing.data "KC_SCHEDULER_CLIENT_SECRET") }}
  KC_SCHEDULER_CLIENT_SECRET: {{ index $existing.data "KC_SCHEDULER_CLIENT_SECRET" | quote }}
  {{- else }}
  KC_SCHEDULER_CLIENT_SECRET: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
