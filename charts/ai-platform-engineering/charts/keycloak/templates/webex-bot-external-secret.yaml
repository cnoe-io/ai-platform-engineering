{{- /*
ExternalSecret for the caipe-webex-bot client_secret (single source of truth).
*/ -}}
{{- if and (eq (include "keycloak.webexTokenExchangeEnabled" .) "true") .Values.webexTokenExchange.externalSecret.enabled }}
apiVersion: external-secrets.io/{{ .Values.externalSecretsApiVersion | default "v1beta1" }}
kind: ExternalSecret
metadata:
  name: {{ include "keycloak.webexBotSecretName" . }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.webexTokenExchange.externalSecret.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: {{ .Values.webexTokenExchange.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.webexTokenExchange.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ include "keycloak.webexBotSecretName" . }}
    creationPolicy: Owner
  data:
    - secretKey: KC_WEBEX_BOT_CLIENT_SECRET
      remoteRef:
        key: {{ required "webexTokenExchange.externalSecret.remoteRef.key is required" .Values.webexTokenExchange.externalSecret.remoteRef.key | quote }}
        {{- if .Values.webexTokenExchange.externalSecret.remoteRef.property }}
        property: {{ .Values.webexTokenExchange.externalSecret.remoteRef.property | quote }}
        {{- end }}
{{- end }}
