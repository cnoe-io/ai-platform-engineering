apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "keycloak.fullname" . }}-realm
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
data:
  realm-config.json: |-
    {{- $realm := .Files.Get "realm-config.json" | fromJson -}}
    {{- $clients := list -}}
    {{- range $client := $realm.clients -}}
      {{- if eq $client.clientId "caipe-ui" -}}
        {{- $_ := set $client "redirectUris" $.Values.uiClient.redirectUris -}}
        {{- $_ := set $client "webOrigins" $.Values.uiClient.webOrigins -}}
      {{- end -}}
      {{- $clients = append $clients $client -}}
    {{- end -}}
    {{- $_ := set $realm "clients" $clients -}}
    {{- $_ := set $realm "accessTokenLifespan" (.Values.realm.accessTokenLifespan | int) -}}
    {{- $_ := set $realm "accessTokenLifespanForImplicitFlow" (.Values.realm.accessTokenLifespanForImplicitFlow | int) -}}
    {{- $_ := set $realm "ssoSessionIdleTimeout" (.Values.realm.ssoSessionIdleTimeout | int) -}}
    {{- $_ := set $realm "ssoSessionMaxLifespan" (.Values.realm.ssoSessionMaxLifespan | int) -}}
    {{- if not .Values.demoUsers.enabled -}}
      {{- $users := list -}}
      {{- range $user := $realm.users -}}
        {{- if $user.serviceAccountClientId -}}
          {{- $users = append $users $user -}}
        {{- end -}}
      {{- end -}}
      {{- $_ := set $realm "users" $users -}}
    {{- end -}}
    {{- $realm | toPrettyJson | nindent 4 }}
