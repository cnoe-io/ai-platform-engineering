apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "keycloak.fullname" . }}-realm
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
data:
  realm-config.json: |-
    {{- $realm := .Files.Get "realm-config.json" | fromJson -}}
    {{- $realmName := .Values.realm.name | default "caipe" -}}
    {{- $_ := set $realm "realm" $realmName -}}
    {{- $defaultRole := $realm.defaultRole | default dict -}}
    {{- if $defaultRole -}}
      {{- $_ := set $defaultRole "name" (printf "default-roles-%s" $realmName) -}}
      {{- $_ := set $realm "defaultRole" $defaultRole -}}
    {{- end -}}
    {{- $roles := $realm.roles | default dict -}}
    {{- $realmRoles := list -}}
    {{- range $role := ($roles.realm | default list) -}}
      {{- if hasKey $role "containerId" -}}
        {{- $_ := set $role "containerId" $realmName -}}
      {{- end -}}
      {{- $realmRoles = append $realmRoles $role -}}
    {{- end -}}
    {{- if $roles -}}
      {{- $_ := set $roles "realm" $realmRoles -}}
      {{- $_ := set $realm "roles" $roles -}}
    {{- end -}}
    {{- $cliClientId := (.Values.cliClient).clientId | default "caipe-cli" -}}
    {{- $clients := list -}}
    {{- range $client := $realm.clients -}}
      {{- if eq $client.clientId "caipe-ui" -}}
        {{- $_ := set $client "redirectUris" $.Values.uiClient.redirectUris -}}
        {{- $_ := set $client "webOrigins" $.Values.uiClient.webOrigins -}}
      {{- end -}}
      {{- if eq $client.clientId "caipe-cli" -}}
        {{- /* Public CLI client for local-dev tokens; id, callbacks, and access
               token lifespan are configurable so downstream realms can rename
               it (e.g. forge-cli) and tune session length. */ -}}
        {{- $_ := set $client "clientId" $cliClientId -}}
        {{- with ($.Values.cliClient).redirectUris -}}
          {{- $_ := set $client "redirectUris" . -}}
        {{- end -}}
        {{- with ($.Values.cliClient).webOrigins -}}
          {{- $_ := set $client "webOrigins" . -}}
        {{- end -}}
        {{- with ($.Values.cliClient).accessTokenLifespan -}}
          {{- $attrs := $client.attributes | default dict -}}
          {{- $_ := set $attrs "access.token.lifespan" (printf "%d" (int .)) -}}
          {{- $_ := set $client "attributes" $attrs -}}
        {{- end -}}
      {{- end -}}
      {{- $clients = append $clients $client -}}
    {{- end -}}
    {{- $_ := set $realm "clients" $clients -}}
    {{- $_ := set $realm "accessTokenLifespan" (.Values.realm.accessTokenLifespan | int) -}}
    {{- $_ := set $realm "accessTokenLifespanForImplicitFlow" (.Values.realm.accessTokenLifespanForImplicitFlow | int) -}}
    {{- $_ := set $realm "ssoSessionIdleTimeout" (.Values.realm.ssoSessionIdleTimeout | int) -}}
    {{- $_ := set $realm "ssoSessionMaxLifespan" (.Values.realm.ssoSessionMaxLifespan | int) -}}
    {{- if not .Values.demoUsers.enabled -}}
      {{- $users := list -}}
      {{- range $user := $realm.users -}}
        {{- if $user.serviceAccountClientId -}}
          {{- $users = append $users $user -}}
        {{- end -}}
      {{- end -}}
      {{- $_ := set $realm "users" $users -}}
    {{- end -}}
    {{- $realm | toPrettyJson | nindent 4 }}
