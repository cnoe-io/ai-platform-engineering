{{- /*
ExternalSecret for the caipe-slack-bot client_secret.

This is the SINGLE SOURCE OF TRUTH for the bot's OAuth credentials in
production:
  Vault/AWS-SM/etc.
       │
       ▼  (ESO)
  K8s Secret <fullname>-bot (key: KC_BOT_CLIENT_SECRET)
       │
       ├──→ keycloak init-token-exchange Job → PUT /clients/caipe-slack-bot
       │     (sets the value in Keycloak so it MATCHES what the bot pod will use)
       │
       └──→ slack-bot pod env SLACK_INTEGRATION_AUTH_CLIENT_SECRET
            (cross-chart reference via secretKeyRef — see docs)

Rotation: bump the value in Vault, ESO refreshes the Secret, the next
helm upgrade re-runs init-token-exchange which pushes the new value to
Keycloak. The bot pod picks it up on next restart (or use Reloader
annotation for hot rotation).
*/ -}}
{{- if and .Values.tokenExchange.enabled .Values.tokenExchange.externalSecret.enabled }}
apiVersion: external-secrets.io/{{ .Values.externalSecretsApiVersion | default "v1beta1" }}
kind: ExternalSecret
metadata:
  name: {{ include "keycloak.botSecretName" . }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.tokenExchange.externalSecret.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: {{ .Values.tokenExchange.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.tokenExchange.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ include "keycloak.botSecretName" . }}
    creationPolicy: Owner
  data:
    - secretKey: KC_BOT_CLIENT_SECRET
      remoteRef:
        key: {{ required "tokenExchange.externalSecret.remoteRef.key is required" .Values.tokenExchange.externalSecret.remoteRef.key | quote }}
        {{- if .Values.tokenExchange.externalSecret.remoteRef.property }}
        property: {{ .Values.tokenExchange.externalSecret.remoteRef.property | quote }}
        {{- end }}
{{- end }}
