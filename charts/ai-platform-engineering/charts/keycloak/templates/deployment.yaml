apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "keycloak.fullname" . }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "keycloak.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/keycloak-realm: {{ include (print $.Template.BasePath "/configmap-realm.yaml") . | sha256sum }}
        {{- if and .Values.theme.enabled (not .Values.theme.existingConfigMap) }}
        checksum/keycloak-theme: {{ include (print $.Template.BasePath "/configmap-theme.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "keycloak.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "keycloak.serviceAccountName" . }}
      containers:
        - name: keycloak
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - {{ if .Values.database.enabled }}start{{ else }}start-dev{{ end }}
            - --import-realm
            {{- $features := list }}
            {{- if .Values.features.tokenExchange }}
            {{- $features = append $features "token-exchange" }}
            {{- end }}
            {{- if .Values.features.adminFineGrainedAuthz }}
            {{- $features = append $features "admin-fine-grained-authz:v1" }}
            {{- end }}
            {{- if $features }}
            - --features={{ join "," $features }}
            {{- end }}
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.adminSecretName" . }}
                  key: username
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.adminSecretName" . }}
                  key: password
            - name: KC_HTTP_PORT
              value: {{ .Values.service.port | quote }}
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_METRICS_ENABLED
              value: "true"
            {{- if .Values.database.enabled }}
            {{- if not .Values.database.host }}
            {{- fail "keycloak.database.host is required when keycloak.database.enabled is true" }}
            {{- end }}
            {{- if not .Values.database.existingSecret }}
            {{- fail "keycloak.database.existingSecret is required when keycloak.database.enabled is true" }}
            {{- end }}
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: "jdbc:postgresql://{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}"
            - name: KC_DB_USERNAME
              value: {{ .Values.database.username | quote }}
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.existingSecretPasswordKey }}
            - name: KC_HTTP_ENABLED
              value: {{ .Values.database.httpEnabled | quote }}
            - name: KC_HOSTNAME_STRICT
              value: {{ .Values.database.hostnameStrict | quote }}
            {{- end }}
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: management
              containerPort: 9000
              protocol: TCP
          startupProbe:
            httpGet:
              path: /realms/{{ .Values.realm.name }}/protocol/openid-connect/certs
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /realms/{{ .Values.realm.name }}/protocol/openid-connect/certs
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: management
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: realm-config
              mountPath: /opt/keycloak/data/import
              readOnly: true
            {{- if .Values.theme.enabled }}
            - name: keycloak-theme
              mountPath: /opt/keycloak/themes/{{ .Values.theme.name }}
              readOnly: true
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: realm-config
          configMap:
            name: {{ include "keycloak.fullname" . }}-realm
        {{- if .Values.theme.enabled }}
        - name: keycloak-theme
          configMap:
            name: {{ include "keycloak.themeConfigMapName" . }}
            items:
              {{- toYaml .Values.theme.items | nindent 14 }}
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
