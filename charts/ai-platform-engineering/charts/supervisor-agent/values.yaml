# -- Override the chart name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

image:
  # -- Container image repository
  repository: "ghcr.io/cnoe-io/ai-platform-engineering"
  # -- Image pull policy
  pullPolicy: "Always"
  # -- Image tag. Defaults to chart appVersion when not set
  tag: ""
  # -- Container args
  args: ["platform-engineer"]

# -- Image pull secrets for private registries
imagePullSecrets: []

serviceAccount:
  # -- Create a service account
  create: true
  # -- Automount the service account API token
  automount: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- Override the service account name. Generated from fullname template when empty
  name: ""

# -- Extra annotations added to the pod
podAnnotations: {}
# -- Extra labels added to the pod
podLabels: {}

# -- Pod-level security context
podSecurityContext: {}
  # fsGroup: 2000

# -- Container-level security context
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  # -- Kubernetes service type
  type: ClusterIP
  # -- Service port
  port: 8000

ingress:
  # -- Enable ingress
  enabled: false
  # -- Ingress class name
  className: ""
  # -- Ingress annotations
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  # -- Ingress host rules
  hosts: []
  # -- Ingress TLS configuration
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - supervisor-agent.local

# -- Number of replicas
replicaCount: 1

# -- Number of old ReplicaSets to retain for rollback
revisionHistoryLimit: 3

# -- CPU/memory requests and limits
resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# -- Liveness probe configuration
livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# -- Readiness probe configuration
readinessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  # -- Enable Horizontal Pod Autoscaler
  enabled: false
  # -- HPA minimum replicas
  minReplicas: 1
  # -- HPA maximum replicas
  maxReplicas: 100
  # -- HPA target CPU utilization percentage
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# -- Vertical Pod Autoscaler - applies resource recommendations automatically (updateMode: "InPlaceOrRecreate").
# Requires VPA to be installed in the cluster before deploying with vpa.enabled=true.
# Do not enable alongside autoscaling.enabled - VPA conflicts with HPA on both CPU-based and memory-based scaling.
# Setting initial resource requests (see resources: above) improves the quality of early VPA recommendations.
vpa:
  # -- Enable VPA
  enabled: false
  # -- "InPlaceOrRecreate" applies recommendations in-place (Kubernetes 1.29+) or recreates the pod.
  # -- Use "Off" for recommendations only (no restarts), or "Recreate" on older clusters.
  updateMode: "InPlaceOrRecreate"
  # -- Resources VPA should observe and recommend for
  controlledResources: ["cpu", "memory"]
  # -- Whether VPA controls Requests only or RequestsAndLimits
  controlledValues: "RequestsAndLimits"
  # -- Minimum bounds VPA will recommend
  minAllowed:
    cpu: 50m
    memory: 128Mi
  # -- Maximum bounds VPA will recommend (empty = no cap)
  maxAllowed: {}
  #   cpu: 2
  #   memory: 2Gi

# -- Extra volumes
volumes: []
# -- Extra volume mounts
volumeMounts: []

# -- Node selector labels
nodeSelector: {}
# -- Pod tolerations
tolerations: []
# -- Pod affinity rules
affinity: {}

llmSecrets:
  # -- Create the LLM secret. Set false if the secret already exists in the cluster
  create: true
  # -- Name of the LLM secret
  secretName: "llm-secret"
  # -- Key/value pairs for the LLM secret
  data: {}
  externalSecrets:
    # -- Use External Secrets Operator for the LLM secret
    enabled: false
    secretStoreRef:
      # -- ESO SecretStore name
      name: ""
      # -- ESO SecretStore kind
      kind: ClusterSecretStore
    # -- ESO data mappings
    data: []

externalSecrets:
  # -- Enable External Secrets Operator integration
  enabled: false
  # -- List of existing ESO secret names to reference
  secretNames: []

# -- Non-sensitive environment variables injected into the supervisor container
env:
  EXTERNAL_URL: "http://localhost:8000"

multiAgentConfig:
  # -- Agent-to-agent protocol (`a2a` or `slim`)
  protocol: "a2a"
  # -- Port advertised to peer agents
  port: "8000"
  # -- Explicit agent list. Auto-discovered when empty
  agents: []

slim:
  # -- Enable SLIM transport (standalone fallback; in production provided by global.slim)
  enabled: false
  # -- SLIM endpoint URL
  endpoint: "http://ai-platform-engineering-slim:46357"
  # -- Transport label passed to agents
  transport: "slim"

metrics:
  # -- Expose /metrics endpoint for Prometheus scraping
  enabled: true

# Cross-thread memory persistence (LangGraph Store).
# Persists user facts and conversation summaries across separate threads.
memoryPersistence:
  # -- Memory store backend. One of: `memory` (in-process default), `redis`, `postgres`, `mongodb`
  type: "memory"
  redis:
    # -- Redis URL (e.g. `redis://host:6379/0`). Takes precedence over autoDiscoverService
    url: ""
    existingSecret:
      # -- Name of a Kubernetes Secret containing the Redis URL
      name: ""
      # -- Key inside the secret (e.g. `REDIS_URL`)
      key: ""
    # -- In-cluster Redis service name to auto-build the URL from (`redis://<release>-<service>:6379/<dbIndex>`). Common values: `langgraph-redis`, `rag-redis`
    autoDiscoverService: ""
    # -- Redis DB index. Use 1+ when sharing with RAG Redis (db 0 is RAG data)
    dbIndex: 0
    # -- Key namespace prefix for shared Redis instances. Prevents key collisions across deployments
    keyPrefix: ""
  postgres:
    # -- PostgreSQL DSN (e.g. `postgresql://user:pass@host:5432/db`). Prefer existingSecret for credentials
    dsn: ""
    existingSecret:
      # -- Name of a Kubernetes Secret containing the Postgres DSN
      name: ""
      # -- Key inside the secret (e.g. `DATABASE_URL`)
      key: ""
  mongodb:
    # -- MongoDB connection URI (e.g. `mongodb://host:27017`)
    uri: ""
    existingSecret:
      # -- Name of a Kubernetes Secret containing the MongoDB URI
      name: ""
      # -- Key inside the secret (e.g. `MONGODB_URI`)
      key: ""
  embeddings:
    # -- Embedding provider for semantic memory search (`openai`, `azure-openai`, `litellm`)
    provider: ""
    # -- Embedding model name (e.g. `text-embedding-3-small`)
    model: ""
    # -- Embedding dimensions. Auto-detected for known models when empty
    dims: ""
  # -- TTL for stored memory items in minutes. `0` disables expiry
  ttlMinutes: 10080
  # -- Automatically extract facts from every conversation turn and store them for cross-thread recall
  enableFactExtraction: false
  # -- Maximum number of memory facts returned to the LLM per cross-thread context query
  maxMemories: 50
  # -- Maximum number of conversation summaries returned to the LLM per cross-thread context query
  maxSummaries: 10

# In-thread checkpoint persistence (LangGraph Checkpointer).
# Persists conversation graph state within a single thread across pod restarts.
checkpointPersistence:
  # -- Checkpoint backend. One of: `memory` (in-process default), `redis`, `postgres`, `mongodb`
  type: "memory"
  redis:
    # -- Redis URL. Requires Redis Stack with RedisJSON + RediSearch modules
    url: ""
    existingSecret:
      # -- Name of a Kubernetes Secret containing the Redis URL
      name: ""
      # -- Key inside the secret
      key: ""
    # -- In-cluster Redis service name to auto-build the URL from
    autoDiscoverService: ""
    # -- Redis DB index
    dbIndex: 0
  postgres:
    # -- PostgreSQL DSN
    dsn: ""
    existingSecret:
      # -- Name of a Kubernetes Secret containing the Postgres DSN
      name: ""
      # -- Key inside the secret
      key: ""
  mongodb:
    # -- MongoDB connection URI
    uri: ""
    existingSecret:
      # -- Name of a Kubernetes Secret containing the MongoDB URI
      name: ""
      # -- Key inside the secret
      key: ""
    # -- MongoDB database name (default: "checkpointing_db")
    dbName: ""
    # -- Checkpoint collection name (default: "checkpoints")
    checkpointCollection: ""
    # -- Checkpoint writes collection name (default: "checkpoint_writes")
    writesCollection: ""
  # -- TTL for checkpoints in minutes. `0` disables expiry
  ttlMinutes: 0
