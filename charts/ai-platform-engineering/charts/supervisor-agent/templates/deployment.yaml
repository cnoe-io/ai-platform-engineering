apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "supervisorAgent.fullname" . }}
  labels:
    {{- include "supervisorAgent.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "supervisorAgent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "supervisorAgent.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "supervisorAgent.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.image.command }}
          command:
            {{- range .Values.image.command }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          {{- if .Values.image.args }}
          args:
            {{- range .Values.image.args }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          ports:
            {{- if .Values.service.ports }}
            {{- range .Values.service.ports }}
            - name: {{ .name }}
              containerPort: {{ .port }}
              protocol: {{ .protocol | default "TCP" }}
            {{- end }}
            {{- else }}
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            {{- end }}
          envFrom:
            {{- $llmSecretName := include "supervisorAgent.llmSecrets.secretName" . | trim }}
            {{- if $llmSecretName }}
            - secretRef:
                name: {{ $llmSecretName }}
            {{- end }}
            {{- if eq .Values.global.deploymentMode "multi-node" }}
            - configMapRef:
                name: {{ printf "%s-supervisor-agent-env" .Release.Name }}
            {{- else }}
            - configMapRef:
                name: {{ printf "%s-single-node-agent-env" .Release.Name }}
            {{- range $name, $enabled := (default dict .Values.singleNode.enabledSubAgents) }}
            {{- if $enabled }}
            - secretRef:
                name: {{ printf "agent-%s-secret" $name }}
                optional: true
            {{- end }}
            {{- end }}
            {{- end }}
          env:
            - name: AGENT_PROTOCOL
              value: {{ .Values.multiAgentConfig.protocol | quote }}
            - name: METRICS_ENABLED
              value: {{ include "supervisorAgent.metrics.enabled" . | quote }}
            {{- if .Values.env }}
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
            {{- if eq (include "supervisorAgent.slim.enabled" .) "true" }}
            - name: A2A_TRANSPORT
              value: {{ include "supervisorAgent.slim.transport" . | quote }}
            - name: SLIM_ENDPOINT
              value: {{ include "supervisorAgent.slim.endpoint" . | quote }}
            {{- end }}
            {{- with .Values.memoryPersistence }}
            - name: LANGGRAPH_STORE_TYPE
              value: {{ .type | default "memory" | quote }}
            {{- if eq (.type | default "memory") "redis" }}
            {{- if and .redis.existingSecret .redis.existingSecret.name .redis.existingSecret.key }}
            - name: LANGGRAPH_STORE_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .redis.existingSecret.name | quote }}
                  key: {{ .redis.existingSecret.key | quote }}
            {{- else if .redis.url }}
            - name: LANGGRAPH_STORE_REDIS_URL
              value: {{ .redis.url | quote }}
            {{- else if .redis.autoDiscoverService }}
            - name: LANGGRAPH_STORE_REDIS_URL
              value: {{ printf "redis://%s-%s:6379/%d" $.Release.Name .redis.autoDiscoverService (.redis.dbIndex | int) | quote }}
            {{- end }}
            {{- if .redis.keyPrefix }}
            - name: LANGGRAPH_STORE_KEY_PREFIX
              value: {{ .redis.keyPrefix | quote }}
            {{- end }}
            {{- end }}
            {{- if eq (.type | default "memory") "postgres" }}
            {{- if and .postgres.existingSecret .postgres.existingSecret.name .postgres.existingSecret.key }}
            - name: LANGGRAPH_STORE_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .postgres.existingSecret.name | quote }}
                  key: {{ .postgres.existingSecret.key | quote }}
            {{- else }}
            - name: LANGGRAPH_STORE_POSTGRES_DSN
              value: {{ .postgres.dsn | default "" | quote }}
            {{- end }}
            {{- end }}
            {{- if eq (.type | default "memory") "mongodb" }}
            {{- if and .mongodb .mongodb.existingSecret .mongodb.existingSecret.name .mongodb.existingSecret.key }}
            - name: LANGGRAPH_STORE_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .mongodb.existingSecret.name | quote }}
                  key: {{ .mongodb.existingSecret.key | quote }}
            {{- else if .mongodb }}
            - name: LANGGRAPH_STORE_MONGODB_URI
              value: {{ .mongodb.uri | default "" | quote }}
            {{- end }}
            {{- end }}
            {{- if and .embeddings .embeddings.provider }}
            - name: LANGGRAPH_STORE_EMBEDDINGS_PROVIDER
              value: {{ .embeddings.provider | quote }}
            {{- end }}
            {{- if and .embeddings .embeddings.model }}
            - name: LANGGRAPH_STORE_EMBEDDINGS_MODEL
              value: {{ .embeddings.model | quote }}
            {{- end }}
            {{- if and .embeddings .embeddings.dims }}
            - name: LANGGRAPH_STORE_EMBEDDINGS_DIMS
              value: {{ .embeddings.dims | quote }}
            {{- end }}
            - name: LANGGRAPH_STORE_TTL_MINUTES
              value: {{ .ttlMinutes | default 10080 | quote }}
            - name: ENABLE_FACT_EXTRACTION
              value: {{ .enableFactExtraction | default false | quote }}
            - name: LANGGRAPH_STORE_MAX_MEMORIES
              value: {{ .maxMemories | default 50 | quote }}
            - name: LANGGRAPH_STORE_MAX_SUMMARIES
              value: {{ .maxSummaries | default 10 | quote }}
            {{- end }}
            {{- with .Values.checkpointPersistence }}
            - name: LANGGRAPH_CHECKPOINT_TYPE
              value: {{ .type | default "memory" | quote }}
            {{- if eq (.type | default "memory") "redis" }}
            {{- if and .redis.existingSecret .redis.existingSecret.name .redis.existingSecret.key }}
            - name: LANGGRAPH_CHECKPOINT_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .redis.existingSecret.name | quote }}
                  key: {{ .redis.existingSecret.key | quote }}
            {{- else if .redis.url }}
            - name: LANGGRAPH_CHECKPOINT_REDIS_URL
              value: {{ .redis.url | quote }}
            {{- else if .redis.autoDiscoverService }}
            - name: LANGGRAPH_CHECKPOINT_REDIS_URL
              value: {{ printf "redis://%s-%s:6379/%d" $.Release.Name .redis.autoDiscoverService (.redis.dbIndex | int) | quote }}
            {{- end }}
            {{- end }}
            {{- if eq (.type | default "memory") "postgres" }}
            {{- if and .postgres .postgres.existingSecret .postgres.existingSecret.name .postgres.existingSecret.key }}
            - name: LANGGRAPH_CHECKPOINT_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .postgres.existingSecret.name | quote }}
                  key: {{ .postgres.existingSecret.key | quote }}
            {{- else if .postgres }}
            - name: LANGGRAPH_CHECKPOINT_POSTGRES_DSN
              value: {{ .postgres.dsn | default "" | quote }}
            {{- end }}
            {{- end }}
            {{- if eq (.type | default "memory") "mongodb" }}
            {{- if and .mongodb .mongodb.existingSecret .mongodb.existingSecret.name .mongodb.existingSecret.key }}
            - name: LANGGRAPH_CHECKPOINT_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .mongodb.existingSecret.name | quote }}
                  key: {{ .mongodb.existingSecret.key | quote }}
            {{- else if .mongodb }}
            - name: LANGGRAPH_CHECKPOINT_MONGODB_URI
              value: {{ .mongodb.uri | default "" | quote }}
            {{- end }}
            {{- end }}
            - name: LANGGRAPH_CHECKPOINT_TTL_MINUTES
              value: {{ .ttlMinutes | default 0 | quote }}
            {{- end }}
          {{- if not (eq (include "supervisorAgent.slim.enabled" .) "true") }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: prompt-config
              mountPath: /app/prompt_config.yaml
              subPath: prompt_config.yaml
              readOnly: true
            - name: prompt-config-rag
              mountPath: /app/prompt_config.rag.yaml
              subPath: prompt_config.rag.yaml
              readOnly: true
            - name: task-config
              mountPath: /app/task_config.yaml
              subPath: task_config.yaml
              readOnly: true
            {{- if eq .Values.global.deploymentMode "single-node" }}
            {{- range $name, $enabled := (default dict .Values.singleNode.enabledSubAgents) }}
            {{- if $enabled }}
            - name: prompt-config-{{ $name | replace "_" "-" }}
              mountPath: /app/prompt_config.{{ $name }}_agent.yaml
              subPath: prompt_config.{{ $name }}_agent.yaml
              readOnly: true
            {{- end }}
            {{- end }}
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: prompt-config
          configMap:
            name: prompt-config
        - name: prompt-config-rag
          configMap:
            name: prompt-config-rag
        - name: task-config
          configMap:
            name: task-config
        {{- if eq .Values.global.deploymentMode "single-node" }}
        {{- range $name, $enabled := (default dict .Values.singleNode.enabledSubAgents) }}
        {{- if $enabled }}
        - name: prompt-config-{{ $name | replace "_" "-" }}
          configMap:
            name: prompt-config-{{ $name | replace "_" "-" }}
            optional: true
        {{- end }}
        {{- end }}
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
