{{- /*
  VPA for the standalone MCP HTTP server Deployment (non-single-node mode).
  Mirrors mcp-deployment.yaml conditions exactly. In single-node mode the
  parent chart's single-node-mcp-vpa.yaml covers MCP VPAs instead.
*/ -}}
{{- if and (or (ne .Values.global.deploymentMode "single-node") .Values.remoteAgent) (include "agent.createMcpHttpServer" . | eq "true") }}
{{- $globalVpa := dig "vpa" dict .Values.global }}
{{- $vpaEnabled := or .Values.vpa.enabled (and $globalVpa $globalVpa.enabled) }}
{{- if $vpaEnabled }}
{{- $vpa := mergeOverwrite (deepCopy $globalVpa) .Values.vpa }}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "agent.fullname" . }}-mcp
  labels:
    {{- include "agent.labels" . | nindent 4 }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "agent.fullname" . }}-mcp
  updatePolicy:
    updateMode: {{ $vpa.updateMode | quote }}
  resourcePolicy:
    containerPolicies:
      - containerName: mcp
        controlledResources: {{ $vpa.controlledResources | toJson }}
        controlledValues: {{ $vpa.controlledValues | quote }}
        {{- with $vpa.minAllowed }}
        minAllowed:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with $vpa.maxAllowed }}
        maxAllowed:
          {{- toYaml . | nindent 10 }}
        {{- end }}
{{- end }}
{{- end }}
