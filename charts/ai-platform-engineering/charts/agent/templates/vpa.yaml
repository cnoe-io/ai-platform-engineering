{{- /*
  Effective VPA config: local values take precedence over global defaults.
  global.vpa.enabled=true activates VPA on all agents; per-agent vpa.enabled=false opts out.
  In single-node mode the agent Deployment does not exist, so no VPA is rendered.
  MCP containers in single-node mode are covered by single-node-mcp-vpa.yaml in the parent chart.
*/ -}}
{{- $globalVpa := dig "vpa" dict .Values.global }}
{{- $vpaEnabled := or .Values.vpa.enabled (and $globalVpa $globalVpa.enabled) }}
{{- if and $vpaEnabled (or (ne .Values.global.deploymentMode "single-node") .Values.remoteAgent) }}
{{- if .Values.autoscaling.enabled }}
{{- fail "vpa.enabled and autoscaling.enabled cannot both be true - VPA conflicts with HPA on both CPU-based and memory-based scaling" }}
{{- end }}
{{- $vpa := mergeOverwrite (deepCopy $globalVpa) .Values.vpa }}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "agent.fullname" . }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "agent.fullname" . }}
  updatePolicy:
    updateMode: {{ $vpa.updateMode | quote }}
  resourcePolicy:
    containerPolicies:
      - containerName: {{ .Chart.Name }}
        controlledResources: {{ $vpa.controlledResources | toJson }}
        controlledValues: {{ $vpa.controlledValues | quote }}
        {{- with $vpa.minAllowed }}
        minAllowed:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with $vpa.maxAllowed }}
        maxAllowed:
          {{- toYaml . | nindent 10 }}
        {{- end }}
{{- end }}
