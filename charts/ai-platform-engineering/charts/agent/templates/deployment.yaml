{{- if or (ne .Values.global.deploymentMode "single-node") .Values.remoteAgent }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent.fullname" . }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "agent.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "agent.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default (include "agent.appVersion" .) }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.image.command }}
          command:
            {{- range .Values.image.command }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          {{- if .Values.image.args }}
          args:
            {{- range .Values.image.args }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          ports:
            {{- if .Values.service.ports }}
            {{- range .Values.service.ports }}
            - name: {{ .name }}
              containerPort: {{ .port }}
              protocol: {{ .protocol | default "TCP" }}
            {{- end }}
            {{- else }}
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            {{- end }}
          envFrom:
            {{- $llmSecretName := include "agent.llmSecrets.secretName" . | trim -}}
            {{- if $llmSecretName }}
            - secretRef:
                name: {{ $llmSecretName }}
            {{- end }}
            {{- $agentSecretName := include "agent.agentSecrets.secretName" . | trim -}}
            {{- if $agentSecretName }}
            - secretRef:
                name: {{ $agentSecretName }}
            {{- end }}
          env:
            - name: METRICS_ENABLED
              value: {{ include "agent.metrics.enabled" . | quote }}
            {{- if .Values.env }}
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
            {{- if eq (include "agent.slim.enabled" .) "true" }}
            - name: A2A_TRANSPORT
              value: {{ include "agent.slim.transport" . | quote }}
            - name: SLIM_ENDPOINT
              value: {{ include "agent.slim.endpoint" . | quote }}
            {{- end }}
            {{- if eq .Values.mcp.mode "http" }}
            - name: MCP_MODE
              value: http
            - name: MCP_PORT
              value: {{ .Values.mcp.service.port | quote }}
            - name: MCP_HOST
              value: {{ include "agent.fullname" . }}-mcp
            {{- end }}
            {{- /* Resolve checkpointPersistence: local override > global > default (memory) */}}
            {{- $ckpt := .Values.checkpointPersistence }}
            {{- if and (hasKey .Values "global") (hasKey .Values.global "checkpointPersistence") }}
              {{- if eq ($ckpt.type | default "memory") "memory" }}
                {{- $ckpt = .Values.global.checkpointPersistence }}
              {{- end }}
            {{- end }}
            {{- with $ckpt }}
            - name: LANGGRAPH_CHECKPOINT_TYPE
              value: {{ .type | default "memory" | quote }}
            {{- if eq (.type | default "memory") "redis" }}
            {{- if and .redis.existingSecret .redis.existingSecret.name .redis.existingSecret.key }}
            - name: LANGGRAPH_CHECKPOINT_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .redis.existingSecret.name | quote }}
                  key: {{ .redis.existingSecret.key | quote }}
            {{- else if .redis.url }}
            - name: LANGGRAPH_CHECKPOINT_REDIS_URL
              value: {{ .redis.url | quote }}
            {{- else if .redis.autoDiscoverService }}
            - name: LANGGRAPH_CHECKPOINT_REDIS_URL
              value: {{ printf "redis://%s-%s:6379/%d" $.Release.Name .redis.autoDiscoverService (.redis.dbIndex | int) | quote }}
            {{- end }}
            {{- end }}
            {{- if eq (.type | default "memory") "postgres" }}
            {{- if and .postgres .postgres.existingSecret .postgres.existingSecret.name .postgres.existingSecret.key }}
            - name: LANGGRAPH_CHECKPOINT_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .postgres.existingSecret.name | quote }}
                  key: {{ .postgres.existingSecret.key | quote }}
            {{- else if .postgres }}
            - name: LANGGRAPH_CHECKPOINT_POSTGRES_DSN
              value: {{ .postgres.dsn | default "" | quote }}
            {{- end }}
            {{- end }}
            {{- if eq (.type | default "memory") "mongodb" }}
            {{- if and .mongodb .mongodb.existingSecret .mongodb.existingSecret.name .mongodb.existingSecret.key }}
            - name: LANGGRAPH_CHECKPOINT_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .mongodb.existingSecret.name | quote }}
                  key: {{ .mongodb.existingSecret.key | quote }}
            {{- else if .mongodb }}
            - name: LANGGRAPH_CHECKPOINT_MONGODB_URI
              value: {{ .mongodb.uri | default "" | quote }}
            {{- end }}
            {{- if .mongodb.dbName }}
            - name: LANGGRAPH_CHECKPOINT_MONGODB_DB_NAME
              value: {{ .mongodb.dbName | quote }}
            {{- end }}
            {{- if .mongodb.checkpointCollection }}
            - name: LANGGRAPH_CHECKPOINT_MONGODB_COLLECTION
              value: {{ .mongodb.checkpointCollection | quote }}
            {{- end }}
            {{- if .mongodb.writesCollection }}
            - name: LANGGRAPH_CHECKPOINT_MONGODB_WRITES_COLLECTION
              value: {{ .mongodb.writesCollection | quote }}
            {{- end }}
            {{- end }}
            - name: LANGGRAPH_CHECKPOINT_TTL_MINUTES
              value: {{ .ttlMinutes | default 0 | quote }}
            {{- end }}
          {{- if not (eq (include "agent.slim.enabled" .) "true") }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: prompt-config
              mountPath: /app/prompt_config.{{ include "agent.simpleName" . }}_agent.yaml
              subPath: prompt_config.{{ include "agent.simpleName" . }}_agent.yaml
              readOnly: true
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: prompt-config
          configMap:
            name: prompt-config-{{ include "agent.simpleName" . }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
