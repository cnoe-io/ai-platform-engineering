apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "agent.fullname" . }}-test-comprehensive"
  labels:
    {{- include "agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "2"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
  - name: test-agent-comprehensive
    image: curlimages/curl:latest
    command: ['sh', '-c']
    args:
    - |
      set -e
      echo "Testing Agent comprehensive functionality..."

      # Test main agent service health and readiness endpoints
      echo "Testing agent /health endpoint..."
      curl -sf http://{{ include "agent.fullname" . }}:{{ .Values.service.port }}/health | grep -q '"status":"ok"'
      echo "Testing agent /ready endpoint..."
      curl -sf http://{{ include "agent.fullname" . }}:{{ .Values.service.port }}/ready | grep -q '"status":"ok"'

      # Test environment variables
      echo "Checking environment configuration..."
      {{- if .Values.env }}
      {{- range $key, $value := .Values.env }}
      echo "Environment variable {{ $key }}: {{ $value }}"
      {{- end }}
      {{- end }}

      echo "✓ Agent comprehensive tests completed"
