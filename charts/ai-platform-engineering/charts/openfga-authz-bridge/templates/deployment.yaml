apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openfga-authz-bridge.fullname" . }}
  labels:
    {{- include "openfga-authz-bridge.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "openfga-authz-bridge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openfga-authz-bridge.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "openfga-authz-bridge.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: openfga-authz-bridge
          image: "{{ include "openfga-authz-bridge.imageRepository" (dict "root" . "repository" .Values.image.repository) }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: OPENFGA_HTTP
              value: {{ tpl (.Values.openfga.httpUrl | default (printf "http://%s-openfga:8080" .Release.Name)) . | quote }}
            - name: OPENFGA_STORE_NAME
              value: {{ .Values.openfga.storeName | quote }}
            {{- if .Values.openfga.storeId }}
            - name: OPENFGA_STORE_ID
              value: {{ .Values.openfga.storeId | quote }}
            {{- end }}
            - name: OPENFGA_RELATION
              value: {{ .Values.openfga.relation | quote }}
            - name: OPENFGA_OBJECT
              value: {{ .Values.openfga.object | quote }}
            {{- if .Values.openfga.bypassSubs }}
            - name: OPENFGA_BYPASS_SUBS
              value: {{ .Values.openfga.bypassSubs | quote }}
            {{- end }}
            {{- if .Values.agentContext.existingSecret.name }}
            - name: CAIPE_AGENT_CONTEXT_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.agentContext.existingSecret.name | quote }}
                  key: {{ .Values.agentContext.existingSecret.key | quote }}
            {{- end }}
            - name: JWT_JWKS_URL
              value: {{ tpl (.Values.tokenValidation.jwksUrl | default (printf "http://%s-keycloak:8080/realms/caipe/protocol/openid-connect/certs" .Release.Name)) . | quote }}
            {{- if .Values.tokenValidation.issuer }}
            - name: JWT_ISSUER
              value: {{ tpl .Values.tokenValidation.issuer . | quote }}
            {{- end }}
            {{- if .Values.tokenValidation.audiences }}
            - name: JWT_AUDIENCES
              value: {{ join "," .Values.tokenValidation.audiences | quote }}
            {{- end }}
            - name: JWT_ALGORITHMS
              value: {{ join "," .Values.tokenValidation.algorithms | quote }}
            {{- if .Values.audit.enabled }}
            {{- if .Values.audit.serviceUrl }}
            - name: AUDIT_SERVICE_URL
              value: {{ tpl .Values.audit.serviceUrl . | quote }}
            {{- end }}
            - name: TENANT_ID
              value: {{ .Values.audit.tenantId | quote }}
            - name: AUDIT_SUBJECT_SALT
              value: {{ .Values.audit.subjectSalt | quote }}
            {{- end }}
            {{- if .Values.callerToolCheck.enabled }}
            - name: CAIPE_CALLER_TOOL_CHECK_ENABLED
              value: "true"
            {{- end }}
          ports:
            - name: grpc
              containerPort: 9100
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 15
            periodSeconds: 30
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
