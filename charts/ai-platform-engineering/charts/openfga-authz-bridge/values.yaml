replicaCount: 1

image:
  repository: ghcr.io/cnoe-io/openfga-authz-bridge
  tag: ""
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 9100

openfga:
  httpUrl: "http://openfga:8080"
  storeName: caipe-openfga
  storeId: ""
  relation: can_call
  object: mcp_gateway:list
  bypassSubs: ""

agentContext:
  # Secret shared with Dynamic Agents for signed agent_id context headers.
  # Leave empty to enforce only the coarse user mcp_gateway:list gate.
  existingSecret:
    name: ""
    key: CAIPE_AGENT_CONTEXT_HMAC_SECRET

tokenValidation:
  # The bridge validates bearer JWTs itself before calling OpenFGA. Keep this
  # pointing at an internal JWKS endpoint when Keycloak runs in-cluster.
  jwksUrl: ""
  issuer: ""
  audiences: []
  algorithms:
    - RS256

audit:
  enabled: true
  serviceUrl: ""
  tenantId: default
  subjectSalt: caipe-098-audit

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  seccompProfile:
    type: RuntimeDefault

# PodDisruptionBudget: prevents simultaneous eviction of all replicas during voluntary disruptions.
# Enable in production; leave disabled for local/single-node environments.
podDisruptionBudget:
  enabled: false
  maxUnavailable: 1
  # minAvailable: 1  # alternative: require at least N pods available (multi-replica only)
  annotations: {}
