apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "autonomous-agents.fullname" . }}-config
  labels:
    {{- include "autonomous-agents.labels" . | nindent 4 }}
data:
  {{- /*
    Render each value through `tpl` so defaults like SUPERVISOR_URL can
    reference Helm built-ins ({{ .Release.Name }}) and track the actual
    install name. Plain literals pass through unchanged.
  */}}
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ tpl ($value | toString) $ | quote }}
  {{- end }}
