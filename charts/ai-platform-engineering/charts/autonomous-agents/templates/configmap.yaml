apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "autonomous-agents.fullname" . }}-config
  labels:
    {{- include "autonomous-agents.labels" . | nindent 4 }}
data:
  SUPERVISOR_URL: {{ include "autonomous-agents.supervisorUrl" . | quote }}
  DYNAMIC_AGENTS_URL: {{ include "autonomous-agents.dynamicAgentsUrl" . | quote }}
  {{- range $key, $value := omit .Values.config "SUPERVISOR_URL" "DYNAMIC_AGENTS_URL" }}
  {{ $key }}: {{ $value | toString | quote }}
  {{- end }}
