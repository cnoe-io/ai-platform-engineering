{{- /*
  One VPA per ingestor Deployment, mirroring the loop in deployment.yaml.
  Effective VPA config: local values take precedence over global defaults.
  global.vpa.enabled=true activates VPA; local vpa.enabled=true enables it independently.
*/ -}}
{{- $globalVpa := dig "vpa" dict .Values.global }}
{{- $vpaEnabled := or .Values.vpa.enabled (and $globalVpa $globalVpa.enabled) }}
{{- if $vpaEnabled }}
{{- $vpa := mergeOverwrite (deepCopy $globalVpa) .Values.vpa }}
{{- range $ingestor := .Values.ingestors }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "rag-ingestors.fullname" $ }}-{{ $ingestor.name }}
  labels:
    {{- include "rag-ingestors.labels" $ | nindent 4 }}
    app.kubernetes.io/component: ingestor
    app.kubernetes.io/ingestor-type: {{ $ingestor.type }}
    app.kubernetes.io/ingestor-name: {{ $ingestor.name }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "rag-ingestors.fullname" $ }}-{{ $ingestor.name }}
  updatePolicy:
    updateMode: {{ $vpa.updateMode | quote }}
  resourcePolicy:
    containerPolicies:
      - containerName: ingestor
        controlledResources: {{ $vpa.controlledResources | toJson }}
        controlledValues: {{ $vpa.controlledValues | quote }}
        {{- with $vpa.minAllowed }}
        minAllowed:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with $vpa.maxAllowed }}
        maxAllowed:
          {{- toYaml . | nindent 10 }}
        {{- end }}
{{- end }}
{{- end }}
