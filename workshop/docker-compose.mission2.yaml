name: caipe-workshop-mission2

services:
  # Mission 2 uses a current MCP server directly. MCP servers live under
  # ai_platform_engineering/mcp and share build/agents/Dockerfile.mcp.
  mcp-netutils:
    build:
      context: ..
      dockerfile: build/agents/Dockerfile.mcp
      args:
        - AGENT_NAME=netutils
    image: ghcr.io/cnoe-io/mcp-netutils:${IMAGE_TAG:-localtag}
    ports:
      - "18011:8000"
    volumes:
      - ../ai_platform_engineering/mcp/netutils:/app/ai_platform_engineering/mcp/netutils
    environment:
      - MCP_MODE=http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(1); result=s.connect_ex(('localhost', 8000)); s.close(); exit(0 if result == 0 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
