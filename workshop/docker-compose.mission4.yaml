name: caipe-workshop-mission4

x-mongo-env: &mongo-env
  MONGO_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USERNAME:-admin}
  MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-changeme}
  MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-caipe}

x-dynamic-agents-env: &dynamic-agents-env
  AUTH_ENABLED: "false"
  DA_REQUIRE_BEARER: "false"
  DEFAULT_RUNTIME_BACKEND: store
  MONGODB_URI: mongodb://${MONGODB_ROOT_USERNAME:-admin}:${MONGODB_ROOT_PASSWORD:-changeme}@caipe-mongodb:27017/${MONGODB_DATABASE:-caipe}?authSource=admin
  MONGODB_DATABASE: ${MONGODB_DATABASE:-caipe}
  LOG_LEVEL: ${DYNAMIC_AGENTS_LOG_LEVEL:-INFO}
  CORS_ORIGINS: '["*"]'
  GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN:-}
  LLM_PROVIDER: ${LLM_PROVIDER:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_ENDPOINT: ${OPENAI_ENDPOINT:-}
  OPENAI_MODEL_NAME: ${OPENAI_MODEL_NAME:-}
  AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
  AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-}
  AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-}
  AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  AWS_REGION: ${AWS_REGION:-}
  AWS_PROFILE: ${AWS_PROFILE:-}

x-ui-env: &ui-env
  NODE_ENV: production
  SSO_ENABLED: "false"
  DYNAMIC_AGENTS_ENABLED: "true"
  DYNAMIC_AGENTS_URL: http://dynamic-agents:8001
  RAG_ENABLED: "true"
  RAG_SERVER_URL: http://rag-server:9446
  RAG_URL: http://localhost:9446
  NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-caipe-dev-secret-change-in-production}
  NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
  MONGODB_URI: mongodb://${MONGODB_ROOT_USERNAME:-admin}:${MONGODB_ROOT_PASSWORD:-changeme}@caipe-mongodb:27017/${MONGODB_DATABASE:-caipe}?authSource=admin
  MONGODB_DATABASE: ${MONGODB_DATABASE:-caipe}
  OPENFGA_RECONCILE_ENABLED: "false"
  AUDIT_LOG_BACKEND: stdout

services:
  caipe-mongodb:
    image: mongo:7.0
    ports:
      - "${MONGODB_HOST_PORT:-27017}:27017"
    environment: *mongo-env
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    command: ["mongod", "--quiet", "--logpath", "/dev/null"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  dynamic-agents:
    build:
      context: ../ai_platform_engineering/dynamic_agents
      dockerfile: build//Dockerfile
    image: ghcr.io/cnoe-io/caipe-dynamic-agents:${IMAGE_TAG:-localtag}
    ports:
      - "8100:8001"
    volumes:
      - ../ai_platform_engineering/dynamic_agents/src:/app/dynamic_agents/src
    environment: *dynamic-agents-env
    depends_on:
      caipe-mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import json,urllib.request,sys; r=urllib.request.urlopen('http://localhost:8001/healthz',timeout=3); sys.exit(0 if r.status==200 and json.load(r).get('status')=='healthy' else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  caipe-ui:
    build:
      context: ..
      dockerfile: build//Dockerfile.caipe-ui
      target: runner
      args:
        - IMAGE_TAG=${IMAGE_TAG:-localtag}
        - GIT_COMMIT=${GIT_COMMIT:-unknown}
        - BUILD_DATE=${BUILD_DATE:-}
        - CAIPE_UI_FAST_BUILD=${CAIPE_UI_FAST_BUILD:-true}
    image: ghcr.io/cnoe-io/caipe-ui-prod:${IMAGE_TAG:-localtag}
    ports:
      - "3000:3000"
    environment: *ui-env
    volumes:
      - ../config/app-config.yaml:/app/config/app-config.yaml:ro
    command: /app/entrypoint.sh
    depends_on:
      caipe-mongodb:
        condition: service_healthy
      dynamic-agents:
        condition: service_healthy
      rag-server:
        condition: service_started

  mcp-netutils:
    build:
      context: ..
      dockerfile: build/agents/Dockerfile.mcp
      args:
        - AGENT_NAME=netutils
    image: ghcr.io/cnoe-io/mcp-netutils:${IMAGE_TAG:-localtag}
    ports:
      - "18011:8000"
    volumes:
      - ../ai_platform_engineering/mcp/netutils:/app/ai_platform_engineering/mcp/netutils
    environment:
      - MCP_MODE=http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000

  github-mcp-server:
    image: ghcr.io/github/github-mcp-server:latest
    ports:
      - "18000:8082"
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN:-}

  rag-server:
    build:
      context: ../ai_platform_engineering/knowledge_bases/rag
      dockerfile: ./build//Dockerfile.server
    image: ghcr.io/cnoe-io/caipe-rag-server:${IMAGE_TAG:-localtag}
    ports:
      - "9446:9446"
    volumes:
      - ../ai_platform_engineering/knowledge_bases/rag/server/src/server:/app/server/src/server
      - ../ai_platform_engineering/knowledge_bases/rag/common/src/common:/app/common/src/common
    environment:
      - LOG_LEVEL=${RAG_SERVER_LOG_LEVEL:-INFO}
      - REDIS_URL=redis://rag-redis:6379/0
      - MILVUS_URI=http://milvus-standalone:19530
      - ENABLE_GRAPH_RAG=false
      - EMBEDDINGS_PROVIDER=${EMBEDDINGS_PROVIDER:-azure-openai}
      - EMBEDDINGS_MODEL=${EMBEDDINGS_MODEL:-text-embedding-3-large}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AWS_REGION=${AWS_REGION:-}
      - AWS_PROFILE=${AWS_PROFILE:-}
      - OIDC_ISSUER=${OIDC_ISSUER:-http://localhost:7080/realms/caipe}
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL:-http://localhost:7080/realms/caipe}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-caipe-ui}
      - OIDC_AUDIENCE=${OIDC_AUDIENCE:-caipe-platform}
      - OIDC_JWKS_URL=${OIDC_JWKS_URL:-}
      - OIDC_DISCOVERY_URL=${OIDC_DISCOVERY_URL:-}
      - CAIPE_UNSAFE_RBAC_BYPASS=${CAIPE_UNSAFE_RBAC_BYPASS:-true}
    depends_on:
      rag-redis:
        condition: service_started
      milvus-standalone:
        condition: service_healthy

  rag-redis:
    image: redis:7
    command: ["/bin/sh", "-c", "redis-server --save 60 1 --appendonly yes"]
    volumes:
      - rag_redis_data:/data

  milvus-standalone:
    image: milvusdb/milvus:v2.6.0
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      - MINIO_REGION=us-east-1
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=milvus-minio:9000
      - LOG_LEVEL=error
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - milvus-minio

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-minio:
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    command: minio server /minio_data --console-address ":9001"
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    volumes:
      - minio_data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  mongodb_data:
  mongodb_config:
  rag_redis_data:
  milvus_data:
  etcd_data:
  minio_data:
